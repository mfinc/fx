<script>
'use strict';
/* ═══════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════ */
const PHI          = (1 + Math.sqrt(5)) / 2;
const GOLDEN_ANGLE = Math.PI * 2 * (2 - PHI);   // ≈137.508°
const TAU          = Math.PI * 2;
const N_FIBERS     = 168;
const SEGS         = 84;
const N_PART       = 640;
const FIBER_ALPHA  = 0.68;
const PROJ_SCALE   = 0.55;

/* ═══════════════════════════════════════════════════
   CRYPTO-SEEDED RANDOM PARAMS
═══════════════════════════════════════════════════ */
function cr(){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]/0xFFFFFFFF}

function randomParams(){
  return{
    hopfTwist: cr()*TAU,
    hopfWrap:  0.6 + cr()*0.8,
    rotSpeed:  0.06 + cr()*0.22,
    f:         0.014 + cr()*0.042,
    k:         0.048 + cr()*0.038,
    bzWaves:   2 + Math.floor(cr()*7),
    bzFreq:    0.18 + cr()*0.85,
    omega:     0.05 + cr()*0.9,
    K:         0.08 + cr()*1.45,
    diverge:   GOLDEN_ANGLE + (cr()-0.5)*0.35,
    spiralN:   28 + Math.floor(cr()*55),
    hypX:      (cr()-0.5)*0.65,
    hypY:      (cr()-0.5)*0.65,
    hypSpeed:  0.12 + cr()*0.38,
    hueBase:   cr(),
    hueRange:  0.28 + cr()*0.55,
    satBase:   0.62 + cr()*0.32,
    baseFreq:  70 + cr()*230,
    pdRatio:   0.25 + cr()*0.75,
    fov:       0.68 + cr()*0.42,
    camDist:   3.8 + cr()*2.2,
  };
}
let P = randomParams();

/* ═══════════════════════════════════════════════════
   COLOR
═══════════════════════════════════════════════════ */
function hsvRgb(h,s,v){
  h=((h%1)+1)%1;
  const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  switch(i%6){
    case 0:return[v,t,p]; case 1:return[q,v,p]; case 2:return[p,v,t];
    case 3:return[p,q,v]; case 4:return[t,p,v]; case 5:return[v,p,q];
  }
  return[0,0,0];
}

/* ═══════════════════════════════════════════════════
   ARNOL'D TONGUE  (circle map winding number)
═══════════════════════════════════════════════════ */
const RATIONALS=[[1,2],[1,3],[2,3],[1,4],[3,4],[1,5],[2,5],[3,5],[1,6],[5,6],[1,7],[2,7],[3,7],[4,7],[1,8],[3,8],[5,8]];
let arnoldZones=new Float32Array(N_FIBERS);

function circleWinding(omega,K,n=60){
  let x=0;
  for(let i=0;i<n;i++) x=(x+omega-(K/TAU)*Math.sin(TAU*x));
  x-=Math.floor(x);
  let s=0;
  for(let i=0;i<20;i++){x=(x+omega-(K/TAU)*Math.sin(TAU*x));s+=omega-(K/TAU)*Math.sin(TAU*x);}
  return s/20;
}

function updateArnold(){
  for(let k=0;k<N_FIBERS;k++){
    const ok=P.omega+0.3*(k/N_FIBERS);
    const Kk=P.K*(0.4+0.6*(k/N_FIBERS));
    const w=circleWinding(ok,Kk);
    let best=0,bestD=Infinity;
    RATIONALS.forEach(([p,q],i)=>{const d=Math.abs(w-p/q);if(d<bestD){bestD=d;best=i;}});
    arnoldZones[k]=best/RATIONALS.length+bestD*4;
  }
}
updateArnold();

let lockedRatios=[];
function computeLocked(){
  lockedRatios=RATIONALS.filter(([p,q])=>{
    const w=Math.min(P.K,1)*Math.min(P.K,1)/q;
    return Math.abs(P.omega-p/q)<w*0.6;
  }).map(([p,q])=>`${p}/${q}`).slice(0,6);
}
computeLocked();

/* ═══════════════════════════════════════════════════
   HOPF FIBRATION  (S³ → R³ via stereographic projection)
═══════════════════════════════════════════════════ */
function hopfFibers(){
  const pos=new Float32Array(N_FIBERS*SEGS*3);
  for(let k=0;k<N_FIBERS;k++){
    // Phyllotaxis point on S²
    const theta=Math.acos(Math.max(-0.88,Math.min(0.88,1-2*k/N_FIBERS)));
    const phi=k*P.diverge+P.hopfTwist;

    for(let j=0;j<SEGS;j++){
      const a=TAU*j/SEGS;
      // Unit quaternion on S³ — Hopf fiber over (θ,φ)
      const q0= Math.cos(theta/2)*Math.cos(a);
      const q1= Math.cos(theta/2)*Math.sin(a);
      const q2= Math.sin(theta/2)*Math.cos(phi+a*P.hopfWrap);
      const q3= Math.sin(theta/2)*Math.sin(phi+a*P.hopfWrap);
      // Stereographic projection from (-1,0,0,0) pole: (x,y,z) = (q1,q2,q3)/(1+q0)
      const w=1+q0;
      let x=0,y=0,z=0;
      if(Math.abs(w)>1e-5){
        const s=PROJ_SCALE/w;
        x=q1*s; y=q2*s; z=q3*s;
      }
      const idx=(k*SEGS+j)*3;
      pos[idx]=x; pos[idx+1]=y; pos[idx+2]=z;
    }
  }
  return pos;
}

/* ═══════════════════════════════════════════════════
   BELOUSOV-ZHABOTINSKY  (1D ring Oregonator)
═══════════════════════════════════════════════════ */
let bzU=new Float32Array(N_FIBERS);
let bzV=new Float32Array(N_FIBERS);
function initBZ(){for(let i=0;i<N_FIBERS;i++){bzU[i]=Math.random();bzV[i]=Math.random();}}
initBZ();

function stepBZ(dt){
  const eps=0.09,q=0.002,f=P.f,Du=0.6,Dv=0.15;
  const nu=new Float32Array(N_FIBERS),nv=new Float32Array(N_FIBERS);
  for(let i=0;i<N_FIBERS;i++){
    const u=bzU[i],v=bzV[i];
    const ip=(i+1)%N_FIBERS,im=(i-1+N_FIBERS)%N_FIBERS;
    const lap_u=bzU[ip]-2*u+bzU[im];
    const lap_v=bzV[ip]-2*v+bzV[im];
    const phi_u=(u*(1-u)-(u-q)/(u+q+1e-9)*f*v)/eps;
    nu[i]=Math.max(0,Math.min(1,u+(Du*lap_u+phi_u)*dt));
    nv[i]=Math.max(0,Math.min(1,v+(Dv*lap_v+(u-v))*dt));
  }
  bzU=nu; bzV=nv;
}

/* ═══════════════════════════════════════════════════
   FIBER COLORS  (BZ × Arnold tongue × Laplacian eigenfunctions)
═══════════════════════════════════════════════════ */
function fiberColors(t){
  const col=new Float32Array(N_FIBERS*SEGS*4);
  for(let k=0;k<N_FIBERS;k++){
    const ft=k/N_FIBERS;
    const u=bzU[k],v=bzV[k];
    const az=arnoldZones[k];
    for(let j=0;j<SEGS;j++){
      const st=j/SEGS;
      // BZ wave phase along fiber (oxidation front)
      const wave=Math.sin(TAU*(ft*P.bzWaves+st-t*P.bzFreq));
      // Laplacian eigenfunctions on torus topology
      const ef1=Math.sin(TAU*ft*3)*Math.cos(TAU*st*2);
      const ef2=Math.cos(TAU*ft*5)*Math.sin(TAU*st*1.5);
      // Smoothstep blended hue through Arnold tongue zones + golden ratio
      const hue=P.hueBase+az*P.hueRange+0.12*wave+0.06*(ef1+ef2)+0.04*u;
      const sat=P.satBase+0.35*v;
      const val=0.28+0.45*(u+0.4*Math.abs(wave));
      const [r,g,b]=hsvRgb(hue,Math.min(1,sat),Math.min(1,val));
      const idx=(k*SEGS+j)*4;
      col[idx]=r; col[idx+1]=g; col[idx+2]=b; col[idx+3]=FIBER_ALPHA;
    }
  }
  return col;
}

/* ═══════════════════════════════════════════════════
   BZ WAVEFRONT PARTICLES  (phyllotaxis-seeded gl.POINTS)
═══════════════════════════════════════════════════ */
const pPos =new Float32Array(N_PART*3);
const pCol =new Float32Array(N_PART*4);
const pSz  =new Float32Array(N_PART);
const pPh  =new Float32Array(N_PART);
function initPart(){for(let i=0;i<N_PART;i++)pPh[i]=Math.random();}
initPart();

function updatePart(t){
  for(let i=0;i<N_PART;i++){
    // Phyllotaxis seeding on S²
    const theta=Math.acos(Math.max(-0.88,Math.min(0.88,1-2*i/N_PART)));
    const phi_s=i*P.diverge+P.hopfTwist*0.5;
    // BZ wavefront expanding ring on this fiber
    const waveR=(((t*P.bzFreq+pPh[i])%1)+1)%1;
    const at=TAU*waveR;
    const tw=theta+0.3*waveR;
    const q0=Math.cos(tw/2)*Math.cos(at);
    const q1=Math.cos(tw/2)*Math.sin(at);
    const q2=Math.sin(tw/2)*Math.cos(phi_s+at*P.hopfWrap*0.8);
    const q3=Math.sin(tw/2)*Math.sin(phi_s+at*P.hopfWrap*0.8);
    const w=1+q0;
    let x=0,y=0,z=0;
    if(Math.abs(w)>1e-5){const s=PROJ_SCALE*0.92/w;x=q1*s;y=q2*s;z=q3*s;}
    pPos[i*3]=x; pPos[i*3+1]=y; pPos[i*3+2]=z;
    // BZ curvature-colored (oxidation front: bright peak at waveR~0)
    const ox=Math.pow(Math.max(0,Math.cos(TAU*waveR)),3);
    const [r,g,b]=hsvRgb(P.hueBase+0.5+ox*0.35,0.9,0.45+0.55*ox);
    pCol[i*4]=r; pCol[i*4+1]=g; pCol[i*4+2]=b; pCol[i*4+3]=0.35+0.65*ox;
    pSz[i]=2.5+7.5*ox;
  }
}

/* ═══════════════════════════════════════════════════
   MATRIX MATH  (column-major WebGL convention)
═══════════════════════════════════════════════════ */
// col-major index: col*4+row
function m4mul(a,b){
  const c=new Float32Array(16);
  for(let col=0;col<4;col++)
    for(let row=0;row<4;row++)
      for(let k=0;k<4;k++)
        c[col*4+row]+=a[k*4+row]*b[col*4+k];
  return c;
}
function m4persp(fov,asp,n,f){
  const t=1/Math.tan(fov/2),m=new Float32Array(16);
  m[0]=t/asp; m[5]=t;
  m[10]=(f+n)/(n-f); m[11]=-1;
  m[14]=2*f*n/(n-f);
  return m;
}
function m4ry(a){
  const m=new Float32Array(16),c=Math.cos(a),s=Math.sin(a);
  m[0]=c; m[2]=-s; m[5]=1; m[8]=s; m[10]=c; m[15]=1; return m;
}
function m4rx(a){
  const m=new Float32Array(16),c=Math.cos(a),s=Math.sin(a);
  m[0]=1; m[5]=c; m[6]=s; m[9]=-s; m[10]=c; m[15]=1; return m;
}
function m4trans(tx,ty,tz){
  const m=new Float32Array(16);
  m[0]=m[5]=m[10]=m[15]=1; m[12]=tx; m[13]=ty; m[14]=tz; return m;
}

/* ═══════════════════════════════════════════════════
   WEBGL CANVAS SETUP
═══════════════════════════════════════════════════ */
const glCv=document.getElementById('gl');
const hudCv=document.getElementById('hud');
const gl=glCv.getContext('webgl',{antialias:true,alpha:false});
const ctx=hudCv.getContext('2d');
if(!gl){document.body.innerHTML='<p style="color:#f55;padding:2em;font-family:monospace">WebGL not supported.</p>';}

function resize(){
  const W=window.innerWidth,H=window.innerHeight;
  glCv.width=W; glCv.height=H; hudCv.width=W; hudCv.height=H;
  gl.viewport(0,0,W,H);
}
resize();
window.addEventListener('resize',resize);

/* ═══════════════════════════════════════════════════
   SHADER UTILITIES
═══════════════════════════════════════════════════ */
function mkShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))
    console.error('Shader:',gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,mkShader(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,mkShader(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))
    console.error('Program:',gl.getProgramInfoLog(p));
  return p;
}

/* ═══════════════════════════════════════════════════
   BACKGROUND SHADER — Poincaré disk {7,3}-ish tiling
   with animated Möbius transforms + Fibonacci spiral
═══════════════════════════════════════════════════ */
const BG_VS=`attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
const BG_FS=`
precision highp float;
uniform vec2  uR;    // resolution
uniform float uT;    // time
uniform vec2  uH;    // hyperbolic trans params
uniform float uHS;   // hyperbolic speed
uniform float uHue;  // base hue

const float PI  = 3.14159265359;
const float TAU = 6.28318530718;
const float PHI = 1.61803398875;
const float GA  = 2.39996322973; // golden angle rad

vec3 hsv(float h,float s,float v){
  h=fract(h+100.);
  vec3 c=abs(fract(h+vec3(0.,2./3.,1./3.))*6.-3.);
  return v*mix(vec3(1.),clamp(c-1.,0.,1.),s);
}
vec2 cmul(vec2 a,vec2 b){return vec2(a.x*b.x-a.y*b.y,a.x*b.y+a.y*b.x);}
vec2 cdiv(vec2 a,vec2 b){float d=dot(b,b);return vec2(dot(a,b),a.y*b.x-a.x*b.y)/d;}
vec2 mobius(vec2 z,vec2 a){
  return cdiv(z-a,vec2(1.,0.)-cmul(vec2(a.x,-a.y),z));
}

void main(){
  vec2 p=(gl_FragCoord.xy-uR*.5)/(min(uR.x,uR.y)*.465);
  float rp=length(p);

  // Outside Poincaré disk
  if(rp>=1.){
    float ang=atan(p.y,p.x);
    float sym=sin(ang*7.-uT*.35)*.5+.5;
    float rim=1.-smoothstep(.97,1.12,rp);
    gl_FragColor=vec4(hsv(uHue+.12*sym,.88,rim*.4),1.);
    return;
  }

  // Animated Möbius translation (hyperbolic isometry)
  float at=uT*uHS;
  float tx=uH.x*(.5+.4*sin(at*.73));
  float ty=uH.y*(.5+.4*cos(at*.53));
  float cl=length(vec2(tx,ty));
  if(cl>.84){tx*=.84/cl; ty*=.84/cl;}
  float rc=cos(at*.28),rs=sin(at*.28);
  vec2 tr=vec2(rc*tx-rs*ty,rs*tx+rc*ty);
  vec2 z=mobius(p,tr);

  float zr=length(z);
  float ang=atan(z.y,z.x);

  // Hyperbolic distance: 2*atanh(r) ≈ log((1+r)/(1-r))
  float hd=log((1.+zr)/(1.-zr+.0001));

  // 7-fold angular sectors (heptagonal structure)
  float norm7=(ang/TAU+1.)*7.;
  float sector=fract(norm7);
  float sID=floor(norm7);
  // Radial rings (log-spaced = linear in hd)
  float ring=fract(hd*1.25);
  float rID=floor(hd*1.25);

  // Geodesic grid lines via SDF
  float sLine=smoothstep(.055,.0,min(sector,1.-sector));
  float rLine=smoothstep(.055,.0,min(ring,1.-ring));
  float grid=max(sLine,rLine);

  // Tile color identity via golden ratio mixing
  float tileH=fract((sID*.16180+rID*.27180)*PHI*.5);

  // BZ-inspired wave ripple across tiles
  float ripple=sin(hd*2.8-uT*.55+ang*3.5+sID*PHI)*.5+.5;

  // Phyllotaxis (Fibonacci spiral pattern on hyperbolic disk)
  float phylloAng=ang*7.+hd/PHI*2.-uT*.3;
  float phyllo=sin(phylloAng)*.5+.5;

  // Arnol'd tongue–like coloring: 3-fold resonance overlay
  float resonance=abs(sin(hd*PI*3.+sID*TAU/7.+uT*.4))*.5;

  // Compose color
  float hue=uHue+.28*tileH+.08*ripple+.05*phyllo+.06*resonance;
  float sat=.6+.28*phyllo+.1*resonance;
  float val=.03+.09*ripple+.07*phyllo+.05*resonance+grid*.28;
  val*=1.-rp*rp*.65; // vignette

  // 7-fold vertex glow (where heptagons meet)
  float vGlow=pow(abs(cos(ang*3.5+PI*.5)),8.)*(1.-zr)*.08;
  val+=vGlow;

  gl_FragColor=vec4(hsv(hue,clamp(sat,0.,1.),clamp(val,0.,1.)),1.);
}`;

/* ═══════════════════════════════════════════════════
   FIBER SHADER
═══════════════════════════════════════════════════ */
const FIB_VS=`
attribute vec3 aP;
attribute vec4 aC;
uniform mat4 uMVP;
varying vec4 vC;
void main(){gl_Position=uMVP*vec4(aP,1.);vC=aC;}`;
const FIB_FS=`
precision mediump float;
varying vec4 vC;
void main(){gl_FragColor=vC;}`;

/* ═══════════════════════════════════════════════════
   PARTICLE SHADER  (BZ wavefront gl.POINTS)
═══════════════════════════════════════════════════ */
const PT_VS=`
attribute vec3 aP;
attribute vec4 aC;
attribute float aS;
uniform mat4 uMVP;
uniform float uSc;
varying vec4 vC;
void main(){
  vec4 vp=uMVP*vec4(aP,1.);
  gl_Position=vp;
  gl_PointSize=aS*uSc/vp.w;
  vC=aC;
}`;
const PT_FS=`
precision mediump float;
varying vec4 vC;
void main(){
  vec2 d=gl_PointCoord-.5;
  float r=dot(d,d);
  if(r>.25)discard;
  float a=1.-smoothstep(.12,.25,r);
  gl_FragColor=vec4(vC.rgb,vC.a*a);
}`;

/* ═══════════════════════════════════════════════════
   COMPILE PROGRAMS
═══════════════════════════════════════════════════ */
const bgProg  =mkProg(BG_VS, BG_FS);
const fibProg =mkProg(FIB_VS,FIB_FS);
const ptProg  =mkProg(PT_VS, PT_FS);

/* ═══════════════════════════════════════════════════
   BUFFERS
═══════════════════════════════════════════════════ */
// Background quad
const bgBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,bgBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

// Fiber position buffer
let fibPosBuf=gl.createBuffer();
let fibPositions=hopfFibers();
gl.bindBuffer(gl.ARRAY_BUFFER,fibPosBuf);
gl.bufferData(gl.ARRAY_BUFFER,fibPositions,gl.STATIC_DRAW);

// Fiber color buffer (DYNAMIC — updated every frame)
const fibColBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,fibColBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(N_FIBERS*SEGS*4),gl.DYNAMIC_DRAW);

// Particle buffers
const ptPosBuf=gl.createBuffer(), ptColBuf=gl.createBuffer(), ptSzBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,ptPosBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(N_PART*3),gl.DYNAMIC_DRAW);
gl.bindBuffer(gl.ARRAY_BUFFER,ptColBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(N_PART*4),gl.DYNAMIC_DRAW);
gl.bindBuffer(gl.ARRAY_BUFFER,ptSzBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(N_PART),gl.DYNAMIC_DRAW);

/* ═══════════════════════════════════════════════════
   WEB AUDIO  (phase distortion synthesis)
═══════════════════════════════════════════════════ */
let audioCtx=null,gainMaster=null,audioOn=false;
const oscs=[];

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  gainMaster=audioCtx.createGain();
  gainMaster.gain.value=0;
  gainMaster.connect(audioCtx.destination);

  // Phase distortion synthesis: harmonic series with PHI ratios
  const mults=[1,PHI,2,Math.sqrt(5),3,Math.sqrt(7),PHI*2];
  mults.forEach((m,i)=>{
    const osc=audioCtx.createOscillator();
    const lfo=audioCtx.createOscillator();
    const lfoGain=audioCtx.createGain();
    const g=audioCtx.createGain();

    osc.type='sine';
    osc.frequency.value=P.baseFreq*m;
    lfo.type='sine';
    lfo.frequency.value=P.bzFreq*m*(1-P.pdRatio);
    lfoGain.gain.value=P.baseFreq*m*0.08; // FM depth

    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    g.gain.value=0.12/mults.length;
    osc.connect(g); g.connect(gainMaster);
    osc.start(); lfo.start();
    oscs.push({osc,lfo,lfoGain,g});
  });
}

function updateAudio(t){
  if(!audioCtx||!audioOn)return;
  const bzMod=1+0.18*bzU[0]+0.1*Math.sin(t*P.bzFreq*TAU);
  const beatPhase=t*P.omega;
  oscs.forEach((o,i)=>{
    const mults=[1,PHI,2,Math.sqrt(5),3,Math.sqrt(7),PHI*2];
    const f=P.baseFreq*mults[i]*bzMod;
    o.osc.frequency.setTargetAtTime(f,audioCtx.currentTime,0.06);
    // Rhythmic amplitude from modular arithmetic (Arnol'd tongue resonance)
    const beatAmp=0.5+0.5*Math.cos((beatPhase*mults[i])%1*TAU);
    const amp=0.11/mults.length*beatAmp;
    o.g.gain.setTargetAtTime(amp,audioCtx.currentTime,0.04);
    // LFO depth modulation (BZ curvature → FM depth)
    const bzCurv=Math.abs(bzU[Math.floor(i*N_FIBERS/oscs.length)]-0.5)*2;
    o.lfoGain.gain.setTargetAtTime(P.baseFreq*mults[i]*0.05*bzCurv,audioCtx.currentTime,0.1);
  });
}

function toggleAudio(){
  if(!audioCtx)initAudio();
  audioOn=!audioOn;
  if(gainMaster)
    gainMaster.gain.setTargetAtTime(audioOn?.35:0,audioCtx.currentTime,.12);
}

/* ═══════════════════════════════════════════════════
   HUD
═══════════════════════════════════════════════════ */
let hudOn=false;

function drawHUD(t){
  const W=hudCv.width,H=hudCv.height;
  ctx.clearRect(0,0,W,H);

  // Always: minimal hint strip
  ctx.save();
  ctx.font='12px "Courier New",monospace';
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.fillText('SPACE/Click: Randomize   H: HUD   S: Audio',14,H-12);
  ctx.restore();

  if(!hudOn)return;

  // Translucent panel
  const pw=330,ph=260,px=16,py=16;
  ctx.save();
  ctx.fillStyle='rgba(4,4,12,0.75)';
  ctx.strokeStyle='rgba(180,200,255,0.18)';
  ctx.lineWidth=1;
  // rounded rect polyfill
  const r2=10;
  ctx.beginPath();
  ctx.moveTo(px+r2,py);
  ctx.lineTo(px+pw-r2,py);ctx.quadraticCurveTo(px+pw,py,px+pw,py+r2);
  ctx.lineTo(px+pw,py+ph-r2);ctx.quadraticCurveTo(px+pw,py+ph,px+pw-r2,py+ph);
  ctx.lineTo(px+r2,py+ph);ctx.quadraticCurveTo(px,py+ph,px,py+ph-r2);
  ctx.lineTo(px,py+r2);ctx.quadraticCurveTo(px,py,px+r2,py);
  ctx.closePath();
  ctx.fill();ctx.stroke();

  // Title
  ctx.font='bold 11px "Courier New",monospace';
  ctx.fillStyle='rgba(160,200,255,0.9)';
  ctx.fillText('── HOPF·BZ·REACTOR  STATE ──',px+14,py+22);

  ctx.font='11px "Courier New",monospace';
  const dim='rgba(140,170,200,0.75)';
  const hi='rgba(200,230,255,0.95)';
  function row(label,val,y){
    ctx.fillStyle=dim; ctx.fillText(label,px+14,y);
    ctx.fillStyle=hi;  ctx.fillText(val,px+150,y);
  }
  let ry=py+42;
  const rs=17;
  row('Fiber Count:',     N_FIBERS,              ry+=rs);
  row('BZ Wave Count:',   P.bzWaves,             ry+=rs);
  row('BZ Freq:',         P.bzFreq.toFixed(4),   ry+=rs);
  row('BZ f / k:',        P.f.toFixed(4)+' / '+P.k.toFixed(4),ry+=rs);
  row('Phyllotaxis N:',   P.spiralN,             ry+=rs);
  row('Arnol\'d  Ω:',    P.omega.toFixed(5),    ry+=rs);
  row('Arnol\'d  K:',    P.K.toFixed(5),        ry+=rs);
  row('Locked ratios:',   lockedRatios.length?lockedRatios.join('  '):'none', ry+=rs);
  row('Audio:',           audioOn?'▶  ON':'■  OFF', ry+=rs);
  row('Time:',            t.toFixed(1)+' s',     ry+=rs);

  // BZ mini-wave indicator
  const bx=px+14,by=ry+12,bw=pw-28,bh=28;
  ctx.strokeStyle='rgba(100,160,255,0.3)';
  ctx.lineWidth=1;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.strokeStyle='rgba(0,220,180,0.7)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<N_FIBERS;i++){
    const xx=bx+bw*i/N_FIBERS;
    const yy=by+bh/2-bzU[i]*bh*0.45;
    i===0?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy);
  }
  ctx.stroke();

  ctx.restore();
}

/* ═══════════════════════════════════════════════════
   RENDER STATE
═══════════════════════════════════════════════════ */
let rotX=0.22,rotY=0.0,autoRY=0;
let mDown=false,lmx=0,lmy=0;
let elapsed=0,lastNow=null;

/* ═══════════════════════════════════════════════════
   MAIN LOOP
═══════════════════════════════════════════════════ */
function render(now){
  const dt=Math.min((now-(lastNow||now))/1e3,0.05);
  lastNow=now; elapsed+=dt;

  const W=glCv.width,H=glCv.height,t=elapsed;

  // Step BZ simulation
  stepBZ(dt*0.4);
  if(!mDown)autoRY+=P.rotSpeed*dt;

  // MVP matrix
  const asp=W/H;
  const mvp=m4mul(
    m4persp(P.fov,asp,0.1,60),
    m4mul(m4trans(0,0,-P.camDist),
      m4mul(m4rx(rotX),m4ry(rotY+autoRY)))
  );

  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

  // ── BACKGROUND (Poincaré disk) ────────────────────
  gl.disable(gl.DEPTH_TEST);
  gl.disable(gl.BLEND);
  gl.useProgram(bgProg);
  const bgA=gl.getAttribLocation(bgProg,'a');
  gl.bindBuffer(gl.ARRAY_BUFFER,bgBuf);
  gl.enableVertexAttribArray(bgA);
  gl.vertexAttribPointer(bgA,2,gl.FLOAT,false,0,0);
  gl.uniform2f(gl.getUniformLocation(bgProg,'uR'),W,H);
  gl.uniform1f(gl.getUniformLocation(bgProg,'uT'),t);
  gl.uniform2f(gl.getUniformLocation(bgProg,'uH'),P.hypX,P.hypY);
  gl.uniform1f(gl.getUniformLocation(bgProg,'uHS'),P.hypSpeed);
  gl.uniform1f(gl.getUniformLocation(bgProg,'uHue'),P.hueBase);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // ── HOPF FIBERS (line loops) ──────────────────────
  gl.enable(gl.DEPTH_TEST);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  gl.useProgram(fibProg);
  const fMVP=gl.getUniformLocation(fibProg,'uMVP');
  gl.uniformMatrix4fv(fMVP,false,mvp);

  const fPA=gl.getAttribLocation(fibProg,'aP');
  const fCA=gl.getAttribLocation(fibProg,'aC');

  // Upload dynamic colors
  const cols=fiberColors(t);
  gl.bindBuffer(gl.ARRAY_BUFFER,fibColBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,cols);

  gl.bindBuffer(gl.ARRAY_BUFFER,fibPosBuf);
  gl.enableVertexAttribArray(fPA);
  gl.vertexAttribPointer(fPA,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,fibColBuf);
  gl.enableVertexAttribArray(fCA);
  gl.vertexAttribPointer(fCA,4,gl.FLOAT,false,0,0);
  for(let k=0;k<N_FIBERS;k++) gl.drawArrays(gl.LINE_LOOP,k*SEGS,SEGS);

  // ── BZ WAVEFRONT PARTICLES (gl.POINTS) ───────────
  updatePart(t);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  gl.useProgram(ptProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(ptProg,'uMVP'),false,mvp);
  gl.uniform1f(gl.getUniformLocation(ptProg,'uSc'),Math.min(W,H)*0.013);

  const pPA=gl.getAttribLocation(ptProg,'aP');
  const pCA=gl.getAttribLocation(ptProg,'aC');
  const pSA=gl.getAttribLocation(ptProg,'aS');

  gl.bindBuffer(gl.ARRAY_BUFFER,ptPosBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,pPos);
  gl.enableVertexAttribArray(pPA);
  gl.vertexAttribPointer(pPA,3,gl.FLOAT,false,0,0);

  gl.bindBuffer(gl.ARRAY_BUFFER,ptColBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,pCol);
  gl.enableVertexAttribArray(pCA);
  gl.vertexAttribPointer(pCA,4,gl.FLOAT,false,0,0);

  gl.bindBuffer(gl.ARRAY_BUFFER,ptSzBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER,0,pSz);
  gl.enableVertexAttribArray(pSA);
  gl.vertexAttribPointer(pSA,1,gl.FLOAT,false,0,0);

  gl.drawArrays(gl.POINTS,0,N_PART);

  // ── HUD & AUDIO ───────────────────────────────────
  updateAudio(t);
  drawHUD(t);

  requestAnimationFrame(render);
}

/* ═══════════════════════════════════════════════════
   FULL RESET (crypto re-randomize everything)
═══════════════════════════════════════════════════ */
function fullReset(){
  P=randomParams();
  updateArnold();
  computeLocked();
  initBZ();
  fibPositions=hopfFibers();
  gl.bindBuffer(gl.ARRAY_BUFFER,fibPosBuf);
  gl.bufferData(gl.ARRAY_BUFFER,fibPositions,gl.STATIC_DRAW);
  autoRY=0;

  if(audioCtx){
    const mults=[1,PHI,2,Math.sqrt(5),3,Math.sqrt(7),PHI*2];
    oscs.forEach((o,i)=>{
      o.osc.frequency.setTargetAtTime(P.baseFreq*mults[i],audioCtx.currentTime,.35);
      o.lfo.frequency.setTargetAtTime(P.bzFreq*mults[i]*(1-P.pdRatio),audioCtx.currentTime,.35);
    });
  }
}

/* ═══════════════════════════════════════════════════
   INPUT EVENTS
═══════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();fullReset();}
  if(e.code==='KeyH'){hudOn=!hudOn;}
  if(e.code==='KeyS'){toggleAudio();}
});

// Mouse drag → rotate; click (no drag) → reset
let dragDist=0;
glCv.addEventListener('mousedown',e=>{mDown=true;lmx=e.clientX;lmy=e.clientY;dragDist=0;});
document.addEventListener('mouseup',()=>mDown=false);
document.addEventListener('mousemove',e=>{
  if(!mDown)return;
  const dx=e.clientX-lmx,dy=e.clientY-lmy;
  dragDist+=Math.hypot(dx,dy);
  rotY+=dx*.008; rotX+=dy*.008;
  rotX=Math.max(-Math.PI*.48,Math.min(Math.PI*.48,rotX));
  lmx=e.clientX;lmy=e.clientY;
});
glCv.addEventListener('click',()=>{if(dragDist<5)fullReset();});

// Touch support
let td=false,ltx=0,lty=0,tDrag=0,lastTap=0;
glCv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){td=true;ltx=e.touches[0].clientX;lty=e.touches[0].clientY;tDrag=0;}
  const now=Date.now();
  if(now-lastTap<320)fullReset();
  lastTap=now;
},{passive:false});
document.addEventListener('touchend',()=>td=false);
document.addEventListener('touchmove',e=>{
  if(!td||e.touches.length!==1)return;
  const dx=e.touches[0].clientX-ltx,dy=e.touches[0].clientY-lty;
  tDrag+=Math.hypot(dx,dy);
  rotY+=dx*.008; rotX+=dy*.008;
  rotX=Math.max(-Math.PI*.48,Math.min(Math.PI*.48,rotX));
  ltx=e.touches[0].clientX;lty=e.touches[0].clientY;
},{passive:true});

/* ═══════════════════════════════════════════════════
   LAUNCH
═══════════════════════════════════════════════════ */
gl.clearColor(0,0,0,1);
gl.enable(gl.BLEND);
requestAnimationFrame(render);
</script>
