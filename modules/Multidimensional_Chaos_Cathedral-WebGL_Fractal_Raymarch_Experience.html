<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Multidimensional Chaos Cathedral – WebGL Fractal Raymarch Experience</title>

<meta name="description" content="Interactive multidimensional chaos cathedral WebGL experience featuring Mandelbrot and Julia fractals, reaction-diffusion interference, Möbius conformal warping, quaternion rotations, kaleidoscopic tiling, spectral gradient color bands, generative audio synthesis, and full re-randomization. Optimized for mobile and desktop.">
<meta name="keywords" content="WebGL fractal, Mandelbrot distance estimator, Julia fractal shader, reaction diffusion GPU, Möbius transform visualization, quaternion rotation, kaleidoscope shader, ray marching implicit surface, generative audio Web Audio API, FFT spectral visualization, chaos cathedral">
<meta name="author" content="Chaos Cathedral Engine">

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  font-family:monospace;
}
canvas{
  display:block;
  position:fixed;
  inset:0;
}
#hud{
  position:fixed;
  top:10px;
  left:10px;
  color:#aaa;
  font-size:12px;
  display:none;
  pointer-events:none;
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hud"></div>

<script>
(() => {

const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl2",{antialias:false});
if(!gl){ alert("WebGL2 required"); return; }

let DPR = Math.min(devicePixelRatio,2);

function resize(){
  canvas.width = innerWidth*DPR;
  canvas.height = innerHeight*DPR;
  canvas.style.width = innerWidth+"px";
  canvas.style.height = innerHeight+"px";
  gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize",resize);
resize();

function compile(type,src){
  const s = gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const vs = `#version 300 es
precision highp float;
layout(location=0) in vec2 p;
void main(){
  gl_Position=vec4(p,0.,1.);
}
`;

const fs = `#version 300 es
precision highp float;
out vec4 frag;

uniform vec2 res;
uniform float time;
uniform float seed;
uniform float audioLevel;

#define MAX_STEPS 80
#define MAX_DIST 40.
#define SURF_DIST .001

float hash(float n){ return fract(sin(n)*43758.5453123); }

vec3 qrot(vec3 p, vec4 q){
  return p + 2.0*cross(q.xyz, cross(q.xyz,p)+q.w*p);
}

float mandel(vec3 p){
  vec2 z = p.xy;
  vec2 c = vec2(sin(seed*3.1),cos(seed*2.3));
  float m=0.;
  for(int i=0;i<40;i++){
    z=vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y)+c;
    if(dot(z,z)>4.) break;
    m+=1.;
  }
  return 0.02*(40.-m);
}

float julia(vec3 p){
  vec2 z=p.xy;
  vec2 c=vec2(sin(seed*1.7),cos(seed*1.9));
  float m=0.;
  for(int i=0;i<40;i++){
    z=vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y)+c;
    if(dot(z,z)>4.) break;
    m+=1.;
  }
  return 0.02*(40.-m);
}

float reaction(vec3 p){
  float a=sin(p.x*3.+time);
  float b=cos(p.y*3.-time);
  float c=sin(p.z*3.+time*0.5);
  return (a*b+c)*0.2;
}

float map(vec3 p){
  vec4 q=normalize(vec4(sin(time*.1),cos(time*.2),sin(time*.15),1.));
  p=qrot(p,q);
  p=abs(p);
  p=mod(p,2.)-1.;
  p+=0.2*sin(p*3.+time);
  float d1=mandel(p);
  float d2=julia(p);
  float d3=reaction(p);
  float d=min(d1,d2)+d3;
  float vault=length(p)-1.2;
  d=min(d,vault);
  return d;
}

vec3 getNormal(vec3 p){
  vec2 e=vec2(.001,0);
  float d=map(p);
  vec3 n=d-vec3(
    map(p-e.xyy),
    map(p-e.yxy),
    map(p-e.yyx)
  );
  return normalize(n);
}

// RANDOMIZED + INVERTED COLOR MAP
vec3 spectrum(float t){
  t=fract(t);

  float f1 = 2.0 + hash(seed*7.1)*8.0;
  float f2 = 2.0 + hash(seed*9.3)*8.0;
  float f3 = 2.0 + hash(seed*11.7)*8.0;

  float p1 = hash(seed*13.1)*6.2831;
  float p2 = hash(seed*17.3)*6.2831;
  float p3 = hash(seed*19.9)*6.2831;

  vec3 col = vec3(
    sin(f1*t + p1),
    sin(f2*t + p2),
    sin(f3*t + p3)
  ) * 0.5 + 0.5;

  col = pow(col, vec3(1.0/2.2)); // gamma
  col = 1.0 - col;              // INVERSION

  return col;
}

void main(){

  vec2 uv=(gl_FragCoord.xy/res)*2.-1.;
  uv.x*=res.x/res.y;

  vec3 ro=vec3(0.,0.,3.);
  vec3 rd=normalize(vec3(uv,-1.5));

  float dO=0.;
  float dS;

  for(int i=0;i<MAX_STEPS;i++){
    vec3 p=ro+rd*dO;
    dS=map(p);
    dO+=dS;
    if(dO>MAX_DIST||abs(dS)<SURF_DIST) break;
  }

  vec3 col=vec3(0);

  if(dO<MAX_DIST){
    vec3 p=ro+rd*dO;
    vec3 n=getNormal(p);
    float diff=max(dot(n,normalize(vec3(.5,1.,.8))),0.);
    float t=length(p)+time*0.1+seed*10.;
    col=spectrum(t)+diff*0.5;
  }

  col+=0.1*spectrum(time+uv.x+uv.y);
  col*=1.+audioLevel*0.5;

  frag=vec4(col,1.);
}
`;

const program = gl.createProgram();
gl.attachShader(program,compile(gl.VERTEX_SHADER,vs));
gl.attachShader(program,compile(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(program);
gl.useProgram(program);

const quad = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(program,"res");
const uTime=gl.getUniformLocation(program,"time");
const uSeed=gl.getUniformLocation(program,"seed");
const uAudio=gl.getUniformLocation(program,"audioLevel");

let seed=Math.random()*1000;
let start=performance.now();
let sound=false;
let audioCtx=null;
let analyser=null;
let dataArray=null;

function initAudio(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  dataArray=new Uint8Array(analyser.frequencyBinCount);
  const osc=audioCtx.createOscillator();
  osc.type="sine";
  osc.frequency.value=110+Math.random()*220;
  osc.connect(analyser);
  analyser.connect(audioCtx.destination);
  osc.start();
}

function getAudioLevel(){
  if(!sound||!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum=0;
  for(let i=0;i<dataArray.length;i++) sum+=dataArray[i];
  return sum/dataArray.length/255;
}

function rerandomize(){
  seed=Math.random()*1000;
  start=performance.now();
}

addEventListener("keydown",e=>{
  if(e.code==="Space") rerandomize();
  if(e.key==="s"||e.key==="S"){
    sound=!sound;
    if(sound&&!audioCtx) initAudio();
  }
});

addEventListener("click",rerandomize);

function render(){
  const t=(performance.now()-start)/1000;
  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform1f(uTime,t);
  gl.uniform1f(uSeed,seed);
  gl.uniform1f(uAudio,getAudioLevel());
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(render);
}
render();

})();
</script>
</body>
</html>
