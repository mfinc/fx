<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voronoi Mechanical Plasma Network — Generative Audiovisual Physics Art</title>

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta name="description" content="Voronoi Mechanical Plasma Network is a generative audiovisual physics simulation where Voronoi tessellation structures become a charged mechanical plasma lattice. Electrostatic repulsion, spring constraints and particle turbulence generate evolving lightning-like energy flows, glowing cellular webs and spatialized electronic sound derived from the physics dynamics.">

<meta name="keywords" content="voronoi generative art, plasma simulation visualization, computational audiovisual physics art, voronoi tessellation art, generative plasma network, algorithmic art, neon plasma simulation, physics based generative visuals, interactive audiovisual system">

<style>
html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
font-family:monospace;
}
canvas{
display:block;
}
#hud{
position:fixed;
top:10px;
left:10px;
color:#0ff;
font-size:12px;
pointer-events:none;
opacity:.8;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="hud"></div>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")
const hud = document.getElementById("hud")

let W,H

function resize(){
W=canvas.width=window.innerWidth
H=canvas.height=window.innerHeight
}
window.addEventListener("resize",resize)
resize()

let points=[]
let springs=[]
let sparks=[]

let palette=[]
let gradient

let hudVisible=false
let soundEnabled=false

let audioCtx
let masterGain

let tensionOsc
let sparkNoise

function rand(a,b){return a+Math.random()*(b-a)}

function randomPalette(){
let base=Math.random()*360
palette=[]
for(let i=0;i<6;i++){
palette.push(`hsl(${(base+i*rand(20,80))%360},100%,${rand(45,70)}%)`)
}
}

function createGradient(){
gradient=ctx.createLinearGradient(0,0,W,H)
for(let i=0;i<palette.length;i++){
gradient.addColorStop(i/(palette.length-1),palette[i])
}
}

function createPoints(n){

points=[]

for(let i=0;i<n;i++){

points.push({

x:rand(0,W),
y:rand(0,H),

vx:rand(-1,1),
vy:rand(-1,1),

charge:rand(0.5,2),

mass:rand(.5,2)

})
}
}

function buildSprings(){

springs=[]

for(let i=0;i<points.length;i++){

let neighbors=[]

for(let j=0;j<points.length;j++){

if(i===j)continue

let dx=points[j].x-points[i].x
let dy=points[j].y-points[i].y
let d=Math.hypot(dx,dy)

neighbors.push({j,d})
}

neighbors.sort((a,b)=>a.d-b.d)

for(let k=0;k<3;k++){

let j=neighbors[k].j

if(i<j){

springs.push({

a:i,
b:j,
rest:neighbors[k].d,
k:rand(.001,.01)

})
}
}
}
}

function spawnSpark(x,y,energy){

sparks.push({

x,y,

vx:rand(-2,2),
vy:rand(-2,2),

life:rand(20,60),

energy

})
}

function physics(){

let electro=200

for(let i=0;i<points.length;i++){

let p=points[i]

for(let j=i+1;j<points.length;j++){

let q=points[j]

let dx=q.x-p.x
let dy=q.y-p.y
let d=Math.hypot(dx,dy)+.01

let f=electro*(p.charge*q.charge)/(d*d)

let fx=f*dx/d
let fy=f*dy/d

p.vx-=fx/p.mass
p.vy-=fy/p.mass

q.vx+=fx/q.mass
q.vy+=fy/q.mass
}
}

for(let s of springs){

let p=points[s.a]
let q=points[s.b]

let dx=q.x-p.x
let dy=q.y-p.y
let d=Math.hypot(dx,dy)+.01

let stretch=d-s.rest

let f=s.k*stretch

let fx=f*dx/d
let fy=f*dy/d

p.vx+=fx
p.vy+=fy

q.vx-=fx
q.vy-=fy

if(Math.abs(stretch)>30){
spawnSpark((p.x+q.x)/2,(p.y+q.y)/2,Math.abs(stretch))
audioSpark(Math.abs(stretch))
}
}

for(let p of points){

p.vx+=rand(-.05,.05)
p.vy+=rand(-.05,.05)

p.vx*=.99
p.vy*=.99

p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>W)p.vx*=-1
if(p.y<0||p.y>H)p.vy*=-1
}
}

function draw(){

ctx.fillStyle="rgba(0,0,0,.15)"
ctx.fillRect(0,0,W,H)

ctx.strokeStyle=gradient
ctx.lineWidth=1.5

for(let s of springs){

let p=points[s.a]
let q=points[s.b]

ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.lineTo(q.x,q.y)
ctx.stroke()
}

for(let p of points){

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle=palette[Math.floor(rand(0,palette.length))]
ctx.fill()
}

for(let i=sparks.length-1;i>=0;i--){

let s=sparks[i]

ctx.beginPath()
ctx.arc(s.x,s.y,2,0,Math.PI*2)
ctx.fillStyle=palette[Math.floor(rand(0,palette.length))]
ctx.fill()

s.x+=s.vx
s.y+=s.vy

s.vx*=.96
s.vy*=.96

s.life--

if(s.life<=0)sparks.splice(i,1)
}

if(hudVisible){

hud.innerHTML=
`Voronoi Mechanical Plasma Network
points:${points.length}
springs:${springs.length}
sparks:${sparks.length}
sound:${soundEnabled}
H toggle HUD
S toggle sound
SPACE/click regenerate`

}else hud.innerHTML=""
}

function loop(){

physics()
draw()

audioUpdate()

requestAnimationFrame(loop)
}

function initAudio(){

audioCtx=new(window.AudioContext||window.webkitAudioContext)()

masterGain=audioCtx.createGain()
masterGain.gain.value=.2
masterGain.connect(audioCtx.destination)

tensionOsc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

tensionOsc.type="sine"
tensionOsc.frequency.value=100

gain.gain.value=0

tensionOsc.connect(gain)
gain.connect(masterGain)

tensionOsc.start()

sparkNoise=audioCtx.createBufferSource()
}

function audioUpdate(){

if(!soundEnabled)return

let energy=0

for(let s of springs){

let p=points[s.a]
let q=points[s.b]

let dx=q.x-p.x
let dy=q.y-p.y
let d=Math.hypot(dx,dy)

energy+=Math.abs(d-s.rest)
}

let freq=100+energy*.2

tensionOsc.frequency.setTargetAtTime(freq,audioCtx.currentTime,.05)
}

function audioSpark(e){

if(!soundEnabled)return

let osc=audioCtx.createOscillator()
let g=audioCtx.createGain()

osc.type="triangle"
osc.frequency.value=rand(300,2000)

g.gain.value=.2

osc.connect(g)
g.connect(masterGain)

osc.start()

g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.2)

osc.stop(audioCtx.currentTime+.2)
}

function regenerate(){

randomPalette()
createGradient()

createPoints(Math.floor(rand(35,70)))
buildSprings()
}

window.addEventListener("keydown",e=>{

if(e.code==="Space")regenerate()

if(e.key==="h"||e.key==="H")hudVisible=!hudVisible

if(e.key==="s"||e.key==="S"){

soundEnabled=!soundEnabled

if(soundEnabled && !audioCtx) initAudio()

if(audioCtx) audioCtx.resume()
}
})

window.addEventListener("click",regenerate)

regenerate()
loop()

</script>

</body>
</html>
