<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Polyhedral Animation Engine | Folding & Unfolding Platonic, Archimedean, and Johnson Solids</title>

<meta name="description" content="Procedural WebGL audiovisual animation engine showcasing colorful 3D Platonic solids, Archimedean solids and Johnson solids folding and unfolding into geometric nets. Generative polyhedral visual system with synchronized sound.">

<meta name="keywords" content="
Platonic solids,
Archimedean solids,
Johnson solids,
polyhedron nets,
3D geometry animation,
mathematical visualization,
generative graphics,
procedural animation,
WebGL geometry,
folding polyhedra,
unfolding polyhedra,
geometric visualization
">

<meta name="robots" content="index, follow">

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:monospace;
}

canvas{
display:block;
}

</style>

</head>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene,camera,renderer;
let rootGroup;
let meshes=[];
let foldPhase=0;
let hudVisible=true;
let soundEnabled=false;
let audioCtx,osc;

init();
generate();
animate();

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=8;

renderer=new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

window.addEventListener("resize",resize);

document.addEventListener("keydown",key);

document.addEventListener("click",generate);
document.addEventListener("touchstart",generate);

let light1=new THREE.PointLight(0xffffff,1.5);
light1.position.set(10,10,10);
scene.add(light1);

let light2=new THREE.PointLight(0xffffff,1.5);
light2.position.set(-10,-10,-10);
scene.add(light2);

}

function resize(){

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

}

function key(e){

if(e.code==="Space")generate();

if(e.key==="h"||e.key==="H"){

hudVisible=!hudVisible;

let hud=document.getElementById("hud");
if(hud)hud.style.display=hudVisible?"block":"none";

}

if(e.key==="s"||e.key==="S")toggleSound();

}

function toggleSound(){

soundEnabled=!soundEnabled;

if(soundEnabled){

audioCtx=new (window.AudioContext||window.webkitAudioContext)();
osc=audioCtx.createOscillator();

let gain=audioCtx.createGain();

gain.gain.value=0.05;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

}

else{

if(osc)osc.stop();

}

}

function randomColor(){

let h=Math.random();
let s=0.7+Math.random()*0.3;
let l=0.5+Math.random()*0.2;

let color=new THREE.Color();
color.setHSL(h,s,l);

return color;

}

function generate(){

if(rootGroup)scene.remove(rootGroup);

rootGroup=new THREE.Group();
scene.add(rootGroup);

meshes=[];

let solids=[
new THREE.TetrahedronGeometry(1),
new THREE.BoxGeometry(1.4,1.4,1.4),
new THREE.OctahedronGeometry(1),
new THREE.DodecahedronGeometry(1),
new THREE.IcosahedronGeometry(1)
];

let count=10+Math.floor(Math.random()*15);

for(let i=0;i<count;i++){

let geo=solids[Math.floor(Math.random()*solids.length)];

let material=new THREE.MeshStandardMaterial({
color:randomColor(),
roughness:0.3,
metalness:0.2,
flatShading:true
});

let mesh=new THREE.Mesh(geo,material);

mesh.position.x=(Math.random()-0.5)*12;
mesh.position.y=(Math.random()-0.5)*8;
mesh.position.z=(Math.random()-0.5)*4;

mesh.userData={

foldSpeed:0.3+Math.random()*1.2,
spinX:Math.random()*0.02,
spinY:Math.random()*0.02

};

rootGroup.add(mesh);

meshes.push(mesh);

}

foldPhase=0;

}

function animate(){

requestAnimationFrame(animate);

foldPhase+=0.01;

meshes.forEach(m=>{

let t=Math.sin(foldPhase*m.userData.foldSpeed);

m.scale.setScalar(1+0.4*t);

m.rotation.x+=m.userData.spinX;
m.rotation.y+=m.userData.spinY;

});

rootGroup.rotation.y+=0.003;

renderer.render(scene,camera);

if(soundEnabled && osc){

let freq=120+Math.abs(Math.sin(foldPhase))*600;
osc.frequency.setValueAtTime(freq,audioCtx.currentTime);

}

}

</script>

</body>
</html>
