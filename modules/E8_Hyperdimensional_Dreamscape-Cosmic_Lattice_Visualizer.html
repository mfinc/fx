<script>
/* ═══════════════════════════════════════════════════════════════════════
   E8 HYPERDIMENSIONAL DREAMSCAPE
   ─────────────────────────────
   WebGL2 fragment-shader cosmic visualizer
   Mathematical engine: E8 root lattice · Coxeter polytope reflections
   · Spherical harmonics Y_l^m · Bessel functions J₀ J₁ J₂
   · Möbius / Riemannian manifold warps · Complex phase portraits
   · Modular arithmetic color bands · Thin-film interference
   · Ricci-curvature approximation via Laplacian
   Audio: 8-oscillator harmonic resonance network · spectral filtering
   · Laplace-envelope LFOs · Z-transform geometric decay · noise texture
   Controls: SPACE / CLICK = regenerate · H = HUD · S = sound
═══════════════════════════════════════════════════════════════════════ */
(function () {
'use strict';

/* ── Canvas / GL ─────────────────────────────────────────────────── */
const canvas = document.getElementById('c');
const hud    = document.getElementById('hud');
const hudDat = document.getElementById('hud-data');
const toast  = document.getElementById('toast');

const gl = canvas.getContext('webgl2', { antialias: false, powerPreference: 'high-performance' });
if (!gl) {
  document.body.innerHTML =
    '<div style="color:#adf;padding:48px;font-family:monospace;font-size:14px">' +
    'WebGL2 is required. Please use Chrome, Firefox, Edge, or Safari 15+.</div>';
  return;
}

/* ── Vertex shader (trivial fullscreen quad) ─────────────────────── */
const VS = `#version 300 es
in vec2 aPos;
void main(){gl_Position=vec4(aPos,0.,1.);}`;

/* ── Fragment shader — the entire mathematical universe ──────────── */
const FS = `#version 300 es
precision highp float;
out vec4 O;

uniform vec2  uRes;
uniform float uT;
uniform float uSeed;
uniform float uSym;
uniform float uSpeed;
uniform float uWarp;
uniform float uHue;
uniform float uBsF;
uniform float uHL;
uniform float uHM;
uniform float uZmod;
uniform float uPhase;
uniform float uRipple;
uniform float uFracMix;

const float PI  = 3.14159265358979323846;
const float TAU = 6.28318530717958647692;
const float PHI = 1.61803398874989484820;
const float E   = 2.71828182845904523536;

/* ── Complex arithmetic ─────────────────────────────────────────── */
vec2 cMul(vec2 a,vec2 b){return vec2(a.x*b.x-a.y*b.y,a.x*b.y+a.y*b.x);}
vec2 cSqr(vec2 z){return vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y);}
vec2 cPow3(vec2 z){return cMul(cSqr(z),z);}
vec2 cInv(vec2 z){float d=dot(z,z)+1e-9;return vec2(z.x,-z.y)/d;}
vec2 cExp(vec2 z){return exp(z.x)*vec2(cos(z.y),sin(z.y));}
vec2 cLog(vec2 z){return vec2(log(length(z)+1e-9),atan(z.y,z.x));}

/* ── Möbius transformation (unit-disk automorphism) ─────────────── */
vec2 mobius(vec2 z,vec2 a){
  vec2 num=z-a;
  vec2 den=vec2(1.,0.)-cMul(vec2(a.x,-a.y),z);
  float d2=dot(den,den)+1e-9;
  return vec2(dot(num,den),(num.y*den.x-num.x*den.y))/d2;
}

/* ── Bessel J0 (Abramowitz & Stegun 9.4) ───────────────────────── */
float J0(float x){
  float ax=abs(x);
  if(ax<8.){
    float y=x*x;
    float p=57568490574.+y*(-13362590354.+y*(651619640.7+y*(-11214424.18+y*(77392.33017-184.9052456*y))));
    float q=57568490411.+y*(1029532985.+y*(9494680.718+y*(59272.64853+y*(267.8532712+y))));
    return p/q;
  }
  float z=8./ax,y=z*z,xx=ax-.7853981634;
  float p=1.+y*(-1.098628627e-3+y*(2.734510407e-5+y*(-2.073370639e-6+2.093887211e-7*y)));
  float q=-1.562499995e-2+y*(1.430488765e-4+y*(-6.911147651e-6+y*(7.621095161e-7-9.34945152e-8*y)));
  return sqrt(0.636619772/ax)*(cos(xx)*p-z*sin(xx)*q);
}

/* ── Bessel J1 ──────────────────────────────────────────────────── */
float J1(float x){
  float ax=abs(x);
  if(ax<8.){
    float y=x*x;
    float p=x*(72362614232.+y*(-7895059235.+y*(242396853.1+y*(-2972611.439+y*(15704.4826-30.16036606*y)))));
    float q=144725228442.+y*(2300535178.+y*(18583304.74+y*(99447.43394+y*(376.9991397+y))));
    return p/q;
  }
  float z=8./ax,y=z*z,xx=ax-2.356194491;
  float p=1.+y*(1.83105e-3+y*(-3.516396496e-5+y*(2.457520174e-6-2.40337019e-7*y)));
  float q=4.687499995e-2+y*(-2.002690873e-4+y*(8.449199096e-6+y*(-8.8228987e-7+1.05787412e-7*y)));
  float r=sqrt(0.636619772/ax)*(cos(xx)*p-z*sin(xx)*q);
  return x<0.?-r:r;
}

/* ── Bessel J2 (via recurrence: J2 = 2/x·J1 - J0) ─────────────── */
float J2(float x){
  float ax=abs(x);
  if(ax<1e-6) return 0.;
  return (2./x)*J1(x)-J0(x);
}

/* ── Spherical harmonic real part Y_l^m(theta,phi) (l=0..5) ────── */
float sphY(float l,float m,float theta,float phi){
  float ct=cos(theta), st=clamp(sin(theta),0.,1.);
  float P=0.;
  float am=abs(m);
  if(l<.5)                         P=1.;
  else if(l<1.5&&am<.5)            P=ct;
  else if(l<1.5)                   P=-st;
  else if(l<2.5&&am<.5)            P=.5*(3.*ct*ct-1.);
  else if(l<2.5&&am<1.5)           P=-3.*ct*st;
  else if(l<2.5)                   P=3.*st*st;
  else if(l<3.5&&am<.5)            P=.5*(5.*ct*ct*ct-3.*ct);
  else if(l<3.5&&am<1.5)           P=-1.5*(5.*ct*ct-1.)*st;
  else if(l<3.5&&am<2.5)           P=15.*ct*st*st;
  else if(l<3.5)                   P=-15.*st*st*st;
  else if(l<4.5&&am<.5)            P=.125*(35.*ct*ct*ct*ct-30.*ct*ct+3.);
  else if(l<4.5&&am<1.5)           P=-2.5*(7.*ct*ct*ct-3.*ct)*st;
  else if(l<4.5&&am<2.5)           P=7.5*(7.*ct*ct-1.)*st*st;
  else if(l<4.5&&am<3.5)           P=-105.*ct*st*st*st;
  else if(l<4.5)                   P=105.*st*st*st*st;
  else if(l<5.5&&am<.5)            P=.125*(63.*ct*ct*ct*ct*ct-70.*ct*ct*ct+15.*ct);
  else if(l<5.5&&am<1.5)           P=-1.875*(21.*ct*ct*ct*ct-14.*ct*ct+1.)*st;
  else if(l<5.5&&am<2.5)           P=52.5*(3.*ct*ct*ct-ct)*st*st;
  else if(l<5.5&&am<3.5)           P=-52.5*(9.*ct*ct-1.)*st*st*st;
  else if(l<5.5&&am<4.5)           P=945.*ct*st*st*st*st;
  else                             P=-945.*st*st*st*st*st;
  return P*cos(m*phi);
}

/* ── N-fold kaleidoscope ────────────────────────────────────────── */
vec2 kfold(vec2 p,float n){
  float a0=PI/n;
  float a=mod(atan(p.y,p.x)+TAU,TAU);
  a=mod(a,2.*a0);
  if(a>a0) a=2.*a0-a;
  return length(p)*vec2(cos(a),sin(a));
}

/* ── Coxeter polytope reflections ───────────────────────────────── */
vec2 coxeter(vec2 p,float n,float t){
  for(int i=0;i<7;i++){
    float a=float(i)*PI/n+t*.035+uPhase*.2;
    vec2 nrm=vec2(cos(a),sin(a));
    float d=dot(p,nrm)-.25;
    if(d<0.) p-=2.*d*nrm;
  }
  return p;
}

/* ── E8 root lattice: 8 root-system projections ─────────────────── */
float e8(vec2 p,float t){
  float v=0.;
  for(int i=0;i<8;i++){
    float a=float(i)*PI*.25+t*.062+uPhase;
    vec2 ax=vec2(cos(a),sin(a));
    float proj=dot(p,ax);
    // two-root system per axis → cos wave + cos at double freq
    v+=.5+.5*cos(proj*TAU*2.4+t*.22);
    v+=.5+.5*cos(proj*TAU*4.8-t*.14)*.5;
  }
  return v/12.;
}

/* ── Ricci curvature proxy: Laplacian of log|z| ─────────────────── */
float ricci(vec2 p){
  float eps=.012;
  float f =log(length(p)      +1e-6);
  float fx=log(length(p+vec2(eps,0.))+1e-6);
  float fy=log(length(p+vec2(0.,eps))+1e-6);
  float bx=log(length(p-vec2(eps,0.))+1e-6);
  float by=log(length(p-vec2(0.,eps))+1e-6);
  return clamp((fx+fy+bx+by-4.*f)/(eps*eps)*.008+.5,0.,1.);
}

/* ── Thin-film / color-band interference ─────────────────────────── */
vec3 thinFilm(float d,float ang,float t){
  float opd=d*(1.+.28*cos(ang+t*.18));
  float r=.5+.5*cos(TAU*opd*1.72);
  float g=.5+.5*cos(TAU*opd*1.72+TAU/3.);
  float b=.5+.5*cos(TAU*opd*1.72+TAU*2./3.);
  return clamp(vec3(r,g,b),0.,1.);
}

/* ── Complex iterated map (phase portrait / escape) ──────────────── */
struct CPV{float orbit;float angle;float mdist;};
CPV complexOrbit(vec2 z,vec2 c){
  float orbit=0.,md=1e9;
  for(int i=0;i<12;i++){
    z=cSqr(z)+c;
    float zl=length(z);
    if(zl>8.) break;
    orbit+=1.; md=min(md,zl);
  }
  return CPV(orbit/12.,atan(z.y,z.x)/TAU+.5,clamp(md,0.,1.));
}

/* ── Visible-spectrum color (full rainbow) ───────────────────────── */
vec3 spectrum(float t){
  t=fract(t);
  float r=smoothstep(.0,.18,t)-smoothstep(.44,.70,t)+smoothstep(.84,1.,t);
  float g=smoothstep(.08,.40,t)-smoothstep(.60,.86,t);
  float b=(1.-smoothstep(.0,.10,t))+smoothstep(.50,.76,t)-smoothstep(.90,1.,t);
  return clamp(vec3(r,g,b),0.,1.);
}

/* ── Hyper-iridescent multi-spectral blend ───────────────────────── */
vec3 iridescent(float h,float shift,float sat){
  vec3 a=spectrum(h);
  vec3 b=spectrum(h+shift);
  return mix(a,b,sat);
}

/* ── Z-transform-inspired modular phase ──────────────────────────── */
float zPhase(float r,float mod_,float t){
  return fract(r*mod_+t*.38);
}

/* ══════════════════════════════════════════════════════════════════ */
void main(){
  vec2 uv=(gl_FragCoord.xy-.5*uRes)/min(uRes.x,uRes.y);
  float t   = uT*uSpeed;
  float r0  = length(uv);
  float ang0= atan(uv.y,uv.x);

  /* 1 ── Riemannian warp via Möbius (manifold curvature proxy) */
  vec2 mA = uWarp*.42*vec2(cos(t*.11+uPhase), sin(t*.157+uPhase));
  vec2 mB = uWarp*.18*vec2(cos(t*.23+uPhase*PHI), sin(t*.19-uPhase));
  vec2 pw = mobius(uv*.88, mA);
  pw = mobius(pw, mB*.3);

  /* 2 ── E8 primary kaleidoscope fold */
  vec2 pf  = kfold(pw, uSym);
  float rf = length(pf);

  /* 3 ── Secondary sub-fold for inner complexity */
  float sym2 = max(2., floor(uSym*.5));
  vec2 pf2  = kfold(pf+uRipple*.02*vec2(sin(t*.22),cos(t*.19)), sym2);
  float rf2 = length(pf2);

  /* 4 ── Third hyper-fold (golden-ratio symmetry) */
  float sym3 = max(3., floor(uSym*PHI*.333));
  vec2 pf3  = kfold(pf2, sym3);
  float rf3 = length(pf3);

  /* 5 ── Coxeter polytope reflection */
  vec2 pc = coxeter(pw, uSym, t);
  float rc = length(pc);

  /* 6 ── Bessel function radial rings (J0, J1, J2) */
  float bArg0 = rf *uBsF*(1.+.22*sin(t*.13+uPhase));
  float bArg1 = rf2*uBsF*PHI*(1.+.18*cos(t*.17));
  float bArg2 = rf3*uBsF*.62*(1.+.14*sin(t*.31+uPhase*2.));
  float bArg3 = rc *uBsF*1.38*(1.+.10*cos(t*.24));
  float b0=J0(bArg0), b1=J1(bArg1), b2=J2(bArg2), b3=J0(bArg3);
  float besA = (b0*.5+.5)*(b1*.5+.5);   // primary ring pattern
  float besB = b2*.5+.5;                 // secondary
  float besC = b3*.5+.5;                 // tertiary (Coxeter-linked)

  /* 7 ── Spherical harmonics Y_l^m angular modulation */
  float sTheta = acos(clamp(pf2.y/(rf2+1e-5),-1.,1.));
  float sPhi   = atan(pf2.y,pf2.x)+t*.043;
  float sh0 = sphY(uHL,    uHM,    sTheta, sPhi          )*.5+.5;
  float sh1 = sphY(uHL+1., uHM*.7, sTheta, sPhi+t*.031   )*.5+.5;
  float sh2 = sphY(uHL,   -uHM,    sTheta, sPhi*PHI+t*.02)*.5+.5;

  /* 8 ── Complex phase portrait (Mandelbrot-type orbit) */
  vec2 zz = uFracMix>0.5 ? pf3*1.15 : pf*1.15;
  vec2 cc = .40*vec2(cos(t*.072+uPhase*2.), sin(t*.109+uPhase));
  CPV cp = complexOrbit(zz, cc*(.42+.58*sin(t*.048)));

  /* 9 ── E8 root lattice interference */
  float e8a = e8(pf*2.1, t);
  float e8b = e8(pf2*3.4+vec2(sin(t*.07),cos(t*.05)), t*.6);

  /* 10 ── Ricci curvature overlay */
  float ric = ricci(pf3+.001);

  /* 11 ── Modular arithmetic color bands (ℤ-lattice mapping) */
  float mv0 = zPhase(rf,  uZmod,                 t);
  float mv1 = zPhase(rf2, uZmod*PHI,              t*.7+sh0);
  float mv2 = zPhase(rf3, uZmod*PHI*PHI,          t*.5+cp.orbit);
  float mv3 = zPhase(rc,  uZmod*.618,             -t*.4+e8a);

  /* 12 ── Compose hue channels (3-way spectral interference) */
  float h0 = fract(uHue       + besA*.32 + cp.angle*.22 + e8a*.18 + t*.012);
  float h1 = fract(uHue+.333  + sh0*.38  + mv0*.28      + ric*.16  - t*.009);
  float h2 = fract(uHue+.667  + mv1*.44  + cp.orbit*.30 + besB*.22 + t*.007);
  float h3 = fract(uHue+.167  + sh2*.35  + mv2*.32      + e8b*.20  + t*.015);
  float h4 = fract(uHue+.500  + besC*.40 + mv3*.25      + sh1*.18  - t*.011);

  /* 13 ── Thin-film spectral interference */
  vec3 tf0 = thinFilm(rf *(1.+e8a*.55), sPhi+t*.12, t);
  vec3 tf1 = thinFilm(rf2*(1.+sh0*.42), sPhi*PHI  , t*.7);

  /* 14 ── Mixing weights (perceptually motivated) */
  float w0 = smoothstep(.2,.8,besA)*(0.5+.5*e8a);
  float w1 = smoothstep(.1,.9,sh0) *(0.4+.6*mv0);
  float w2 = cp.orbit*(0.5+.5*mv1);
  float w3 = smoothstep(.25,.75,besB)*(0.45+.55*e8b);
  float w4 = smoothstep(.2,.8,sh2) *(0.3+.7*mv3);
  float wS = w0+w1+w2+w3+w4+1e-6;

  vec3 c0 = iridescent(h0,.08,sh0*.4);
  vec3 c1 = iridescent(h1,.12,mv0*.5);
  vec3 c2 = iridescent(h2,.07,cp.orbit*.35);
  vec3 c3 = iridescent(h3,.10,e8b*.45);
  vec3 c4 = iridescent(h4,.09,sh1*.4);

  vec3 col = (c0*w0+c1*w1+c2*w2+c3*w3+c4*w4)/wS;

  /* 15 ── Thin-film iridescence blend */
  float tfMix = .18+.14*sin(t*.22);
  col = mix(col, mix(tf0,tf1,.5), tfMix);

  /* 16 ── Chromatic aberration (radial RGB split) */
  float cab = .0035*(1.+.6*sin(t*.73+uPhase));
  float rShift = J0(r0*(1.+cab)*uBsF*1.08)*.5+.5;
  float bShift = J0(r0*(1.-cab)*uBsF*.93)*.5+.5;
  col.r = mix(col.r, col.r*rShift, .28);
  col.b = mix(col.b, col.b*bShift, .28);

  /* 17 ── Saturation hyper-boost */
  float lum=dot(col,vec3(.299,.587,.114));
  col=mix(vec3(lum),col,2.05);

  /* 18 ── Central singularity glow */
  float glow = exp(-r0*2.2)*0.75;
  float glowPulse = .85+.15*sin(t*1.4+uPhase);
  col += glow*glowPulse*iridescent(h0+.5+t*.03,.15,.6)*1.35;

  /* 19 ── Fold-line luminous seams (symmetry-breaking glow) */
  float foldGlow0 = exp(-rf *28.)*0.55;
  float foldGlow1 = exp(-rf2*32.)*0.45;
  float foldGlow2 = exp(-rf3*36.)*0.35;
  col += foldGlow0*spectrum(h1+.3)*0.9;
  col += foldGlow1*spectrum(h3+.5)*0.7;
  col += foldGlow2*spectrum(h4+.7)*0.5;

  /* 20 ── Coxeter reflection boundary glow */
  float coxGlow = exp(-rc*20.)*0.3;
  col += coxGlow*tf1*.8;

  /* 21 ── Radial vignette */
  col *= smoothstep(1.85,.04,r0);

  /* 22 ── Subtle angular shimmer (symmetry-breaking perturbation) */
  float shimmer = .5+.5*sin(ang0*uSym*2.+t*.8+uPhase);
  col *= (.92+.08*shimmer);

  /* 23 ── Reinhard tone mapping + slight gamma lift */
  col = col/(col+.72);
  col = pow(clamp(col,0.,1.),vec3(.82));

  O = vec4(col, 1.);
}`;

/* ── Compile & link ──────────────────────────────────────────── */
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:\n' + gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error('Program link error:\n' + gl.getProgramInfoLog(prog));
  return;
}
gl.useProgram(prog);

/* Fullscreen quad */
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

/* Uniform cache */
const U = {};
['uRes','uT','uSeed','uSym','uSpeed','uWarp','uHue','uBsF',
 'uHL','uHM','uZmod','uPhase','uRipple','uFracMix']
  .forEach(n => U[n] = gl.getUniformLocation(prog, n));

/* ── State ─────────────────────────────────────────────────── */
let W, H;
const DPR = Math.min(devicePixelRatio || 1, 2);
let t0 = performance.now();
let seed = Math.random();
let P = {};
let hudOn = false, sndOn = false;
let actx = null, audioNodes = [], toastTid = null;
const TAU = Math.PI * 2;
const SYMS = [4, 5, 6, 7, 8, 9, 10, 12, 14, 16, 18, 20, 24];

/* ── Utilities ─────────────────────────────────────────────── */
function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

/* ── Randomize universe ────────────────────────────────────── */
function regen() {
  seed = Math.random();
  t0 = performance.now();
  const hl = Math.floor(rand(0, 6));
  const maxM = hl;
  P = {
    sym:     pick(SYMS),
    speed:   rand(0.08, 0.55),
    warp:    rand(0.05, 0.85),
    hue:     Math.random(),
    bsF:     rand(4, 32),
    hl,
    hm:      (rand(0,1) > 0.5 ? 1 : -1) * Math.floor(rand(0, maxM + 1)),
    zmod:    rand(3, 26),
    phase:   rand(0, TAU),
    ripple:  rand(0.3, 1.5),
    fracMix: Math.random() > 0.5 ? 1 : 0,
  };
  if (sndOn) rebuildAudio();
  refreshHUD();
}

/* ── Resize ────────────────────────────────────────────────── */
function resize() {
  W = canvas.width  = Math.round(window.innerWidth  * DPR);
  H = canvas.height = Math.round(window.innerHeight * DPR);
  gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

/* ── Render loop ───────────────────────────────────────────── */
function draw() {
  const t = (performance.now() - t0) * 0.001;
  gl.uniform2f(U.uRes,    W, H);
  gl.uniform1f(U.uT,      t);
  gl.uniform1f(U.uSeed,   seed);
  gl.uniform1f(U.uSym,    P.sym    || 8);
  gl.uniform1f(U.uSpeed,  P.speed  || 0.25);
  gl.uniform1f(U.uWarp,   P.warp   || 0.35);
  gl.uniform1f(U.uHue,    P.hue    || 0);
  gl.uniform1f(U.uBsF,    P.bsF    || 12);
  gl.uniform1f(U.uHL,     P.hl     || 3);
  gl.uniform1f(U.uHM,     P.hm     || 2);
  gl.uniform1f(U.uZmod,   P.zmod   || 9);
  gl.uniform1f(U.uPhase,  P.phase  || 0);
  gl.uniform1f(U.uRipple, P.ripple || 1);
  gl.uniform1f(U.uFracMix,P.fracMix|| 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(draw);
}

/* ══════════════════════════════════════════════════════════════
   AUDIO ENGINE
   ─────────────
   Architecture:
   8 harmonic oscillators (E8 root system) with golden-ratio
   amplitude decay (Z-transform geometric series) and
   Laplace-envelope LFO modulation, filtered through a
   spectral resonance bank, with bandpass-filtered noise
   texture and a delay-feedback reverb tail. Filter evolution
   is linked to visual geometric phase.
══════════════════════════════════════════════════════════════ */
function buildAudio() {
  if (!sndOn) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  /* Master chain */
  const master  = actx.createGain();      master.gain.value  = 0.11;
  const limiter = actx.createDynamicsCompressor();
  limiter.threshold.value = -3;
  limiter.knee.value      = 3;
  limiter.ratio.value     = 12;
  limiter.attack.value    = 0.003;
  limiter.release.value   = 0.15;

  /* Lowpass spectral filter */
  const lpf = actx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 3200;
  lpf.Q.value = 1.2;

  /* Delay/feedback reverb */
  const del1 = actx.createDelay(2.0); del1.delayTime.value = 0.41;
  const del2 = actx.createDelay(2.0); del2.delayTime.value = 0.57;
  const fb1  = actx.createGain();     fb1.gain.value  = 0.38;
  const fb2  = actx.createGain();     fb2.gain.value  = 0.28;
  const revMix = actx.createGain();   revMix.gain.value = 0.22;
  del1.connect(fb1); fb1.connect(del1);
  del2.connect(fb2); fb2.connect(del2);
  master.connect(del1); master.connect(del2);
  del1.connect(revMix); del2.connect(revMix);

  /* Routing */
  master.connect(lpf);
  revMix.connect(lpf);
  lpf.connect(limiter);
  limiter.connect(actx.destination);

  /* ── Noise texture (filtered atmospheric bed) ── */
  const nLen = actx.sampleRate * 4;
  const nBuf = actx.createBuffer(2, nLen, actx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = nBuf.getChannelData(ch);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0; // pink noise filter state
    for (let i = 0; i < nLen; i++) {
      const w = Math.random() * 2 - 1;
      b0=.99886*b0+w*.0555179; b1=.99332*b1+w*.0750759;
      b2=.96900*b2+w*.1538520; b3=.86650*b3+w*.3104856;
      b4=.55000*b4+w*.5329522; b5=-.7616*b5-w*.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*.5362)*0.11;
      b6 = w * 0.115926;
    }
  }
  const noiseS = actx.createBufferSource();
  noiseS.buffer = nBuf; noiseS.loop = true;
  const nbp = actx.createBiquadFilter();
  nbp.type = 'bandpass';
  nbp.frequency.value = 220 + seed * 600;
  nbp.Q.value = 22;
  const ng = actx.createGain(); ng.gain.value = 0.018;
  noiseS.connect(nbp); nbp.connect(ng); ng.connect(master);
  noiseS.start();
  audioNodes.push(noiseS);

  /* ── 8 harmonic oscillators (E8 root system) ── */
  const baseFreq = 44 + seed * 88; // ~55–143 Hz
  const oscTypes = ['sine','sine','sine','triangle','sine','sine','triangle','sawtooth'];
  const hpf = actx.createBiquadFilter();
  hpf.type = 'highpass'; hpf.frequency.value = 40;
  hpf.connect(master);

  for (let i = 0; i < 8; i++) {
    /* Z-transform geometric amplitude decay: a_n = A · r^n, r = 1/PHI */
    const amp  = 0.16 * Math.pow(0.618, i);
    const harm = i + 1;
    const freq = baseFreq * harm * (1 + (seed - 0.5) * 0.07);

    const osc  = actx.createOscillator();
    osc.type = oscTypes[i];
    osc.frequency.value = freq;

    /* Laplace-envelope LFO: slow exponential oscillation */
    const lfoRate = 0.038 + i * 0.022 + seed * 0.06;
    const lfo  = actx.createOscillator();
    const lfoG = actx.createGain();
    lfo.type = i % 2 === 0 ? 'sine' : 'triangle';
    lfo.frequency.value = lfoRate;
    lfoG.gain.value = freq * 0.007 * (1 + i * 0.2);
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    lfo.start();
    audioNodes.push(lfo);

    /* Spectral peaking filter (harmonic resonance) */
    const pk = actx.createBiquadFilter();
    pk.type = 'peaking'; pk.frequency.value = freq;
    pk.Q.value = 9 + i * 1.5; pk.gain.value = 4 + i * 0.5;

    const g = actx.createGain(); g.gain.value = amp;
    osc.connect(pk); pk.connect(g); g.connect(hpf);
    osc.start();
    audioNodes.push(osc);
  }

  /* ── Geometric-phase-linked filter evolution ── */
  let evolveTid;
  function evolveAudio() {
    if (!sndOn || !actx) return;
    const elapsed = (performance.now() - t0) * 0.001;
    const phi  = Math.sin(elapsed * (P.speed || 0.25) * 0.48);
    const phi2 = Math.cos(elapsed * (P.speed || 0.25) * 0.31);
    const now  = actx.currentTime;
    lpf.frequency.linearRampToValueAtTime(
      1600 + 1800 * (phi * 0.5 + 0.5), now + 0.18);
    nbp.frequency.linearRampToValueAtTime(
      180 + 720 * (phi2 * 0.5 + 0.5), now + 0.18);
    evolveTid = setTimeout(evolveAudio, 140);
  }
  evolveAudio();
  audioNodes._evolveTid = evolveTid;
}

function stopAudio() {
  clearTimeout(audioNodes._evolveTid);
  audioNodes.forEach(n => { try { n.stop(0); } catch (_) {} });
  audioNodes = [];
  if (actx) { actx.close(); actx = null; }
}

function rebuildAudio() {
  stopAudio();
  if (sndOn) buildAudio();
}

/* ── HUD ───────────────────────────────────────────────────── */
function refreshHUD() {
  hudDat.innerHTML =
    `<div>Symmetry  <span>${P.sym}-fold</span></div>` +
    `<div>Bessel ω  <span>${(P.bsF||0).toFixed(2)}</span></div>` +
    `<div>Y_l^m     <span>Y(${P.hl}, ${P.hm})</span></div>` +
    `<div>Warp      <span>${(P.warp||0).toFixed(3)}</span></div>` +
    `<div>ℤ mod     <span>${(P.zmod||0).toFixed(2)}</span></div>` +
    `<div>Base hue  <span>${((P.hue||0)*360).toFixed(1)}°</span></div>` +
    `<div>Speed     <span>${(P.speed||0).toFixed(3)}</span></div>` +
    `<div>Phase Φ   <span>${(P.phase||0).toFixed(3)}</span></div>` +
    `<div>Audio     <span style="color:${sndOn?'rgba(80,255,160,.9)':'rgba(255,100,80,.9)'}">${sndOn?'♪ ACTIVE':'✗ MUTED'}</span></div>`;
}

function hudToggle() {
  hudOn = !hudOn;
  hud.className = hudOn ? 'on' : '';
}

/* ── Toast ─────────────────────────────────────────────────── */
function showToast(msg) {
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toastTid);
  toastTid = setTimeout(() => { toast.style.opacity = '0'; }, 2400);
}

/* ── Input handling ────────────────────────────────────────── */
window.addEventListener('keydown', e => {
  const k = e.key;
  if (k === ' ') {
    e.preventDefault();
    regen();
    showToast('✦  New universe instantiated');
  }
  if (k === 'h' || k === 'H') { hudToggle(); }
  if (k === 's' || k === 'S') {
    sndOn = !sndOn;
    if (sndOn && actx && actx.state === 'suspended') actx.resume();
    rebuildAudio();
    refreshHUD();
    showToast(sndOn ? '♪  Harmonic resonance engaged' : '✗  Audio muted');
  }
});

canvas.addEventListener('click', () => {
  regen();
  showToast('✦  New universe instantiated');
});

/* ── Boot ──────────────────────────────────────────────────── */
regen();
draw();
showToast('SPACE / CLICK — new cosmos · H — HUD · S — audio');

})();
</script>
</body>
</html>
