<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pseudo Molecular Reverie</title>
<meta name="description" content="Interactive 3D molecular model visualizer with real-time WebGL rendering. Explore stunning full-color rotating molecules with randomized atoms, bonds, materials, and styles. Press Space or click to generate a new molecule instantly.">
<meta name="keywords" content="3D molecular model, molecule visualizer, WebGL chemistry, interactive science, rotating molecule, ball and stick model, spacefill model, CPK colors, molecular structure, chemistry visualization, three.js molecule, browser molecular viewer, procedural chemistry, atom bonds, neon molecule">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    cursor: crosshair;
  }
  canvas { display: block; }
  #hud {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #molecule-name {
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 8px;
    transition: opacity 0.6s;
  }
  #hint {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.18);
  }
  #flash {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.08s;
  }
  #stats {
    position: fixed;
    top: 28px;
    right: 32px;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    text-align: right;
    line-height: 1.8;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>
<div id="hud">
  <div id="molecule-name">Loading…</div>
  <div id="hint">SPACE / CLICK to randomize</div>
</div>
<div id="stats" id="stats"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene Setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 500);
camera.position.z = 18;

function resize() {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ─── Lighting Rig ────────────────────────────────────────────────────────────
let lights = [];
function buildLights(palette) {
  lights.forEach(l => scene.remove(l));
  lights = [];

  const ambient = new THREE.AmbientLight(0xffffff, 0.15);
  scene.add(ambient); lights.push(ambient);

  const positions = [
    [8, 10, 12], [-8, -6, 10], [0, -12, -6], [10, 4, -10]
  ];
  positions.forEach((pos, i) => {
    const col = palette[i % palette.length];
    const pt = new THREE.PointLight(col, 1.8, 80);
    pt.position.set(...pos);
    scene.add(pt); lights.push(pt);
  });

  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5, 10, 8);
  dir.castShadow = true;
  scene.add(dir); lights.push(dir);
}

// ─── Molecule State ──────────────────────────────────────────────────────────
let molecule = null;
let config = {};
let time = 0;
let autoRotX = 0.003, autoRotY = 0.006, autoRotZ = 0.001;

const MOLECULE_NAMES = [
  'Caffeine', 'Dopamine', 'Serotonin', 'ATP', 'Ethanol',
  'Aspirin', 'Melatonin', 'Cortisol', 'Adrenaline', 'Glucose',
  'Penicillin', 'Cholesterol', 'Testosterone', 'Oxytocin', 'Morphine',
  'Sucrose', 'Benzene', 'Vitamin C', 'Hemoglobin', 'Buckminsterfullerene'
];

const RENDER_STYLES = ['ball-and-stick', 'spacefill', 'wireframe-glow', 'ribbon', 'neon'];
const PALETTES = [
  [0xff3366, 0x33ffcc, 0x6633ff, 0xffaa00],
  [0x00f5ff, 0xff6b6b, 0xffd93d, 0x6bcb77],
  [0xff9ff3, 0x54a0ff, 0x5f27cd, 0xff9f43],
  [0x00d2d3, 0xff6348, 0xeccc68, 0xa29bfe],
  [0x55efc4, 0xfd79a8, 0xfdcb6e, 0x74b9ff],
  [0xe17055, 0x00cec9, 0xa29bfe, 0x81ecec],
  [0xffeaa7, 0xdfe6e9, 0xb2bec3, 0x636e72],
  [0xff7675, 0x6c5ce7, 0x00b894, 0xffeaa7],
];

const ELEMENT_COLORS = {
  C: 0x333333, H: 0xffffff, O: 0xff2200, N: 0x1155ff,
  S: 0xffdd00, P: 0xff8800, F: 0x00ff88, Cl: 0x44ff44,
  Br: 0xaa2200, I: 0x550099, Fe: 0xcc8800, Cu: 0xff6600,
  Mg: 0x44ffaa, Ca: 0x88aaff, Na: 0x886600, K: 0x885599,
  Zn: 0x669966, Si: 0xaa9988, Au: 0xffcc00, Ag: 0xdddddd,
};

const ELEMENT_RADII = {
  C: 0.77, H: 0.31, O: 0.73, N: 0.75, S: 1.02, P: 1.06,
  F: 0.71, Cl: 0.99, Br: 1.14, I: 1.33,
};

function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function randFloat(a, b) { return Math.random() * (b - a) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── Generate Molecule Geometry ──────────────────────────────────────────────
function generateAtoms(count, style) {
  const atoms = [];
  const elements = Object.keys(ELEMENT_COLORS);

  // Use a procedural approach: random walk + spatial repulsion for nice spread
  const positions = [];
  const spread = Math.cbrt(count) * config.spread;

  for (let i = 0; i < count; i++) {
    let pos;
    let attempts = 0;
    do {
      if (positions.length === 0 || Math.random() < 0.2) {
        pos = new THREE.Vector3(
          randFloat(-spread, spread),
          randFloat(-spread, spread),
          randFloat(-spread, spread)
        );
      } else {
        const parent = pick(positions);
        const angle1 = randFloat(0, Math.PI * 2);
        const angle2 = randFloat(0, Math.PI);
        const dist = randFloat(config.bondLen * 0.8, config.bondLen * 1.4);
        pos = new THREE.Vector3(
          parent.x + dist * Math.sin(angle2) * Math.cos(angle1),
          parent.y + dist * Math.sin(angle2) * Math.sin(angle1),
          parent.z + dist * Math.cos(angle2)
        );
      }
      attempts++;
    } while (attempts < 10 && positions.some(p => p.distanceTo(pos) < config.bondLen * 0.6));

    const el = attempts < 5 ? pick(['C','C','C','N','O','H','H','S','P']) : pick(elements);
    const baseRadius = (ELEMENT_RADII[el] || 0.7) * config.atomScale;
    positions.push(pos);
    atoms.push({ pos, el, radius: baseRadius });
  }
  return atoms;
}

function generateBonds(atoms) {
  const bonds = [];
  for (let i = 0; i < atoms.length; i++) {
    for (let j = i + 1; j < atoms.length; j++) {
      const d = atoms[i].pos.distanceTo(atoms[j].pos);
      if (d < config.bondLen * 1.6 && bonds.filter(b => b.a === i || b.b === i).length < 4) {
        bonds.push({ a: i, b: j, dist: d });
      }
    }
  }
  return bonds;
}

// ─── Build Three.js Objects ──────────────────────────────────────────────────
function makeBondMesh(p1, p2, color, style) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);

  let geo, mat;

  if (style === 'wireframe-glow' || style === 'neon') {
    geo = new THREE.CylinderGeometry(0.045, 0.045, len, 6);
    mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85 });
  } else {
    geo = new THREE.CylinderGeometry(0.07 * config.atomScale, 0.07 * config.atomScale, len, 8);
    mat = new THREE.MeshStandardMaterial({
      color,
      metalness: config.metalness,
      roughness: config.roughness,
      emissive: color,
      emissiveIntensity: 0.05,
    });
  }

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(mid);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  return mesh;
}

function makeAtomMesh(atom, style, palette) {
  let color;
  if (config.useElementColors) {
    color = ELEMENT_COLORS[atom.el] || 0xffffff;
  } else {
    color = pick(palette);
  }

  const r = style === 'spacefill' ? atom.radius * 1.8 : atom.radius;
  const segs = config.highDetail ? 32 : 16;

  let geo, mat;

  if (style === 'wireframe-glow') {
    geo = new THREE.IcosahedronGeometry(r, 1);
    mat = new THREE.MeshBasicMaterial({ color, wireframe: true, transparent: true, opacity: 0.7 });
  } else if (style === 'neon') {
    geo = new THREE.SphereGeometry(r, segs, segs);
    mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.5 });
  } else {
    geo = new THREE.SphereGeometry(r, segs, segs);
    mat = new THREE.MeshStandardMaterial({
      color,
      metalness: config.metalness,
      roughness: config.roughness,
      envMapIntensity: 1.0,
      emissive: color,
      emissiveIntensity: style === 'spacefill' ? 0.02 : 0.08,
    });
  }

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(atom.pos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh._basePos = atom.pos.clone();
  mesh._phaseOffset = Math.random() * Math.PI * 2;
  mesh._color = color;
  return mesh;
}

// ─── Randomize Everything ────────────────────────────────────────────────────
function randomize() {
  // Flash effect
  const flash = document.getElementById('flash');
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 80);

  if (molecule) {
    scene.remove(molecule);
    molecule.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
  }

  const palette = pick(PALETTES);
  const style = pick(RENDER_STYLES);
  const atomCount = randInt(8, 80);

  config = {
    atomCount,
    style,
    palette,
    atomScale: randFloat(0.5, 1.4),
    bondLen: randFloat(1.4, 2.4),
    spread: randFloat(1.2, 2.5),
    metalness: randFloat(0.1, 0.95),
    roughness: randFloat(0.05, 0.6),
    useElementColors: Math.random() < 0.5,
    highDetail: atomCount < 40,
    wobble: randFloat(0.002, 0.025),
    wobbleFreq: randFloat(0.4, 1.8),
  };

  autoRotX = randFloat(-0.008, 0.008);
  autoRotY = randFloat(0.003, 0.012) * (Math.random() < 0.5 ? 1 : -1);
  autoRotZ = randFloat(-0.004, 0.004);

  buildLights(palette.map(c => new THREE.Color(c)));

  // Background gradient
  scene.background = new THREE.Color(
    Math.random() < 0.3 ? pick([0x050510, 0x0a0505, 0x050a05, 0x080510]) : 0x000000
  );

  const atoms = generateAtoms(atomCount, style);
  const bonds = generateBonds(atoms);

  molecule = new THREE.Group();

  // Add bonds
  bonds.forEach(b => {
    const col = config.useElementColors ? 0x888888 : pick(palette);
    if (style !== 'spacefill') {
      const bm = makeBondMesh(atoms[b.a].pos, atoms[b.b].pos, col, style);
      molecule.add(bm);
    }
  });

  // Add atoms
  atoms.forEach(atom => {
    const mesh = makeAtomMesh(atom, style, palette);
    molecule.add(mesh);

    // Neon: add glow sphere
    if (style === 'neon') {
      const glowGeo = new THREE.SphereGeometry(atom.radius * 2.2, 16, 16);
      const glowMat = new THREE.MeshBasicMaterial({
        color: mesh._color,
        transparent: true,
        opacity: 0.07,
      });
      const glow = new THREE.Mesh(glowGeo, glowMat);
      glow.position.copy(atom.pos);
      molecule.add(glow);
    }
  });

  // Center the molecule
  const box = new THREE.Box3().setFromObject(molecule);
  const center = box.getCenter(new THREE.Vector3());
  molecule.children.forEach(c => c.position.sub(center));

  // Scale to fit nicely
  const size = box.getSize(new THREE.Vector3()).length();
  const targetSize = 10;
  molecule.scale.setScalar(targetSize / size);

  scene.add(molecule);

  // Update HUD
  const name = pick(MOLECULE_NAMES);
  document.getElementById('molecule-name').textContent = name;
  document.getElementById('stats').innerHTML =
    `ATOMS ${atomCount}<br>BONDS ${bonds.length}<br>STYLE ${style.toUpperCase()}<br>DETAIL ${config.highDetail ? 'HIGH' : 'MED'}`;
}

// ─── Animation Loop ──────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  if (molecule) {
    molecule.rotation.x += autoRotX;
    molecule.rotation.y += autoRotY;
    molecule.rotation.z += autoRotZ;

    // Wobble atoms
    molecule.children.forEach((child, i) => {
      if (child._basePos) {
        const t = time * config.wobbleFreq + child._phaseOffset;
        child.position.set(
          child._basePos.x + Math.sin(t * 1.1) * config.wobble,
          child._basePos.y + Math.cos(t * 0.9) * config.wobble,
          child._basePos.z + Math.sin(t * 1.3 + 1) * config.wobble,
        );
      }
    });

    // Animate lights
    lights.forEach((l, i) => {
      if (l.isPointLight) {
        const a = time * 0.3 + i * 1.5;
        const r = 14;
        l.position.x = Math.cos(a) * r;
        l.position.z = Math.sin(a * 0.7) * r;
        l.position.y = Math.sin(a * 1.3) * 8;
      }
    });
  }

  renderer.render(scene, camera);
}

// ─── Input ───────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); randomize(); }});
window.addEventListener('click', randomize);

// ─── Init ────────────────────────────────────────────────────────────────────
randomize();
animate();
</script>
</body>
</html>
