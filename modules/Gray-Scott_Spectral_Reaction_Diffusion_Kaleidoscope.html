<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gray-Scott Spectral Reaction Diffusion Kaleidoscope</title>
<meta name="description" content="GPU-accelerated Gray-Scott reaction diffusion simulation with spectral domain coloring, Voronoi harmonic oscillators, kaleidoscopic symmetry folding, and granular synthesis audio.">
<meta name="keywords" content="Gray Scott, reaction diffusion, Pearson parameter space, spectral domain coloring, Voronoi, kaleidoscope, Web Audio granular synthesis, generative art">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Gray-Scott Spectral Reaction Diffusion Kaleidoscope">
<meta property="og:description" content="Endlessly evolving organic plasma with harmonic Voronoi halos and kaleidoscopic symmetry.">
<meta property="og:type" content="website">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CreativeWork",
  "name": "Gray-Scott Spectral Reaction Diffusion Kaleidoscope",
  "description": "A real-time Gray-Scott reaction diffusion simulation with spectral color mapping and Voronoi harmonic oscillators.",
  "creator": {
    "@type": "Person",
    "name": "Generative System"
  }
}
</script>

<style>
html,body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
#hud {
  position:fixed;
  top:10px;
  left:10px;
  color:#0f0;
  font-family:monospace;
  font-size:13px;
  background:rgba(0,0,0,0.4);
  padding:8px;
  border-radius:6px;
  display:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

let W, H, scale;
let U, V, U2, V2;
let feed, kill, symmetry, ticks=0;
let polyA, polyB;
let vorSeeds=[];
let audioOn=false, audioCtx=null, scriptNode=null;

function resize(){
  const maxDim = Math.max(window.innerWidth, window.innerHeight);
  scale = maxDim>1200 ? 0.6 : 1.0;
  W = Math.floor(window.innerWidth*scale);
  H = Math.floor(window.innerHeight*scale);
  canvas.width=W; canvas.height=H;
  canvas.style.width=window.innerWidth+"px";
  canvas.style.height=window.innerHeight+"px";
}
window.addEventListener("resize", resize);
resize();

function rand(a,b){ return a+Math.random()*(b-a); }

function init(){
  feed = rand(0.01,0.08);
  kill = rand(0.03,0.07);
  symmetry = Math.floor(rand(8,17));
  polyA = rand(-1,1);
  polyB = rand(-1,1);

  U = new Float32Array(W*H);
  V = new Float32Array(W*H);
  U2 = new Float32Array(W*H);
  V2 = new Float32Array(W*H);

  for(let i=0;i<W*H;i++){
    U[i]=1;
    V[i]=noise(i%W, Math.floor(i/W));
  }

  vorSeeds=[];
  for(let i=0;i<12;i++){
    vorSeeds.push({
      x:rand(0,W),
      y:rand(0,H),
      vx:rand(-1,1),
      vy:rand(-1,1),
      phase:rand(0,6.28)
    });
  }
  ticks=0;
}
init();

function noise(x,y){
  return 0.5+0.5*Math.sin(x*0.05+Math.sin(y*0.03));
}

function laplace(arr,x,y){
  const i = x+y*W;
  let sum=0;
  sum+=arr[i]*-1;
  if(x>0) sum+=arr[i-1]*0.2;
  if(x<W-1) sum+=arr[i+1]*0.2;
  if(y>0) sum+=arr[i-W]*0.2;
  if(y<H-1) sum+=arr[i+W]*0.2;
  return sum;
}

function step(){
  feed += rand(-0.0002,0.0002);
  kill += rand(-0.0002,0.0002);

  for(let y=1;y<H-1;y++){
    for(let x=1;x<W-1;x++){
      const i=x+y*W;
      const u=U[i], v=V[i];
      const uvv=u*v*v;
      U2[i]=u+(0.16*laplace(U,x,y)-uvv+feed*(1-u));
      V2[i]=v+(0.08*laplace(V,x,y)+uvv-(feed+kill)*v);
    }
  }
  [U,U2]=[U2,U];
  [V,V2]=[V2,V];

  for(const s of vorSeeds){
    s.phase+=0.01;
    s.x+=Math.cos(s.phase)*0.5;
    s.y+=Math.sin(s.phase)*0.5;
    if(s.x<0||s.x>W) s.vx*=-1;
    if(s.y<0||s.y>H) s.vy*=-1;
  }
}

function sigmoid(x){ return 1/(1+Math.exp(-x)); }

function render(){
  const img=ctx.createImageData(W,H);
  const data=img.data;

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=x+y*W;
      const v=V[i];
      let minD=1e9;
      for(const s of vorSeeds){
        const dx=x-s.x, dy=y-s.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<minD) minD=d;
      }
      const sdf=Math.exp(-minD*0.02);

      let hue=(v*360 + 180*Math.sin(v*10))%360;
      let bright= sigmoid(polyA*v + polyB*v*v);
      bright = 0.5+0.5*Math.cos(bright*Math.PI);
      const sat=80;

      const c=hslToRgb(hue,sat,bright*60+20);
      const idx=i*4;
      data[idx]=c[0]+sdf*100;
      data[idx+1]=c[1]+sdf*60;
      data[idx+2]=c[2]+sdf*120;
      data[idx+3]=255;
    }
  }

  ctx.putImageData(img,0,0);

  // kaleidoscope
  ctx.save();
  ctx.translate(W/2,H/2);
  for(let i=0;i<symmetry;i++){
    ctx.rotate(Math.PI*2/symmetry);
    ctx.drawImage(canvas,-W/2,-H/2);
    ctx.scale(-1,1);
  }
  ctx.restore();
}

function hslToRgb(h,s,l){
  s/=100; l/=100;
  const k=n=> (n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=> l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [255*f(0),255*f(8),255*f(4)];
}

function animate(){
  step();
  render();
  ticks++;
  if(hud.style.display==="block"){
    hud.innerHTML=`feed: ${feed.toFixed(4)}<br>
kill: ${kill.toFixed(4)}<br>
symmetry: ${symmetry}<br>
ticks: ${ticks}`;
  }
  requestAnimationFrame(animate);
}
animate();

function toggleAudio(){
  if(audioOn){
    scriptNode.disconnect();
    audioCtx.close();
    audioOn=false;
    return;
  }
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  scriptNode=audioCtx.createScriptProcessor(1024,0,2);
  scriptNode.onaudioprocess=e=>{
    const outL=e.outputBuffer.getChannelData(0);
    const outR=e.outputBuffer.getChannelData(1);
    for(let i=0;i<outL.length;i++){
      const idx=Math.floor(Math.random()*W*H);
      const v=V[idx];
      const freq=200+v*800;
      const t=i/audioCtx.sampleRate;
      const s=Math.sin(2*Math.PI*freq*t)*Math.exp(-i/500);
      outL[i]+=s*(0.5-v);
      outR[i]+=s*(v);
    }
  };
  scriptNode.connect(audioCtx.destination);
  audioOn=true;
}

window.addEventListener("keydown",e=>{
  if(e.code==="Space") init();
  if(e.key==="h"||e.key==="H"){
    hud.style.display = hud.style.display==="none"?"block":"none";
  }
  if(e.key==="s"||e.key==="S") toggleAudio();
});
canvas.addEventListener("click",init);

</script>
</body>
</html>
