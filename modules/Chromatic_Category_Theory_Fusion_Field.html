<script>
'use strict';
// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', {alpha:false});
let W, H, cx, cy;

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// ─── STATE ────────────────────────────────────────────────────────────────────
let t = 0, frame = 0, fps = 0, lastFPS = performance.now();
let entropy = Math.random();
let hudVisible = false;
let soundOn = false;
let audioCtx = null;

// ─── COLOR SPACE CONVERSIONS ──────────────────────────────────────────────────
const CS = {
  // RGB → HSV
  rgb2hsv(r,g,b){
    r/=255;g/=255;b/=255;
    const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
    let h=0,s=max===0?0:d/max,v=max;
    if(d!==0){
      if(max===r) h=((g-b)/d)%6;
      else if(max===g) h=(b-r)/d+2;
      else h=(r-g)/d+4;
      h*=60; if(h<0)h+=360;
    }
    return [h,s,v];
  },
  hsv2rgb(h,s,v){
    const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
    let r=0,g=0,b=0;
    if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}
    else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}
    return [(r+m)*255,(g+m)*255,(b+m)*255];
  },
  // RGB → CMYK
  rgb2cmyk(r,g,b){
    r/=255;g/=255;b/=255;
    const k=1-Math.max(r,g,b);
    if(k===1) return[0,0,0,1];
    return [(1-r-k)/(1-k),(1-g-k)/(1-k),(1-b-k)/(1-k),k];
  },
  cmyk2rgb(c,m,y,k){
    return[(1-c)*(1-k)*255,(1-m)*(1-k)*255,(1-y)*(1-k)*255];
  },
  // RGB → CIELab (via XYZ)
  rgb2lab(r,g,b){
    r/=255;g/=255;b/=255;
    r=r>0.04045?Math.pow((r+0.055)/1.055,2.4):r/12.92;
    g=g>0.04045?Math.pow((g+0.055)/1.055,2.4):g/12.92;
    b=b>0.04045?Math.pow((b+0.055)/1.055,2.4):b/12.92;
    let x=(r*0.4124+g*0.3576+b*0.1805)/0.95047;
    let y=(r*0.2126+g*0.7152+b*0.0722)/1.00000;
    let z=(r*0.0193+g*0.1192+b*0.9505)/1.08883;
    const f=v=>v>0.008856?Math.cbrt(v):(7.787*v+16/116);
    x=f(x);y=f(y);z=f(z);
    return[116*y-16,500*(x-y),200*(y-z)];
  },
  lab2rgb(L,a,b){
    let y=(L+16)/116,x=a/500+y,z=y-b/200;
    const f=v=>v*v*v>0.008856?v*v*v:(v-16/116)/7.787;
    x=f(x)*0.95047;y=f(y)*1.00000;z=f(z)*1.08883;
    let r=x*3.2406+y*-1.5372+z*-0.4986;
    let g=x*-0.9689+y*1.8758+z*0.0415;
    let bl=x*0.0557+y*-0.2040+z*1.0570;
    const g2=v=>v>0.0031308?1.055*Math.pow(v,1/2.4)-0.055:12.92*v;
    return[Math.max(0,Math.min(255,g2(r)*255)),Math.max(0,Math.min(255,g2(g)*255)),Math.max(0,Math.min(255,g2(bl)*255))];
  }
};

// ─── COLOR SYSTEMS ────────────────────────────────────────────────────────────
const COLOR_SYSTEMS = ['RGB','CMYK','CIELAB','HSV'];
const SYSTEM_COLORS = {
  RGB:   [255,60,60],
  CMYK:  [60,200,255],
  CIELAB:[255,200,60],
  HSV:   [160,255,120]
};

// ─── NODE & EDGE CLASSES ──────────────────────────────────────────────────────
class ColorNode {
  constructor(id, system){
    this.id = id;
    this.system = system;
    // Random init in color space
    this.r = Math.random()*255;
    this.g = Math.random()*255;
    this.b = Math.random()*255;
    // Position on screen (orbit-based)
    const angle = Math.random()*Math.PI*2;
    const radius = 80 + Math.random()*Math.min(W,H)*0.3;
    this.bx = cx + Math.cos(angle)*radius;
    this.by = cy + Math.sin(angle)*radius;
    this.x = this.bx;
    this.y = this.by;
    this.vx = (Math.random()-0.5)*0.4;
    this.vy = (Math.random()-0.5)*0.4;
    this.orbit = angle;
    this.orbitR = radius;
    this.orbitSpeed = (Math.random()-0.5)*0.004 + (Math.random()<0.5?-0.002:0.002);
    this.phase = Math.random()*Math.PI*2;
    this.size = 18 + Math.random()*22;
    this.wheelAngle = Math.random()*Math.PI*2;
    this.wheelSpeed = (Math.random()-0.5)*0.03;
    this.trail = [];
    this.maxTrail = 60 + Math.floor(Math.random()*60);
    this.swatches = [];
    this.swatchTimer = 0;
    this.pulsePhase = Math.random()*Math.PI*2;
    this.morphTarget = {r:Math.random()*255,g:Math.random()*255,b:Math.random()*255};
    this.morphSpeed = 0.005 + Math.random()*0.008;
  }
  update(t, ent){
    // Morph color
    const ms = this.morphSpeed*(1+ent);
    this.r += (this.morphTarget.r - this.r)*ms;
    this.g += (this.morphTarget.g - this.g)*ms;
    this.b += (this.morphTarget.b - this.b)*ms;
    if(Math.abs(this.r-this.morphTarget.r)<2&&Math.abs(this.g-this.morphTarget.g)<2){
      this.morphTarget.r=Math.random()*255;
      this.morphTarget.g=Math.random()*255;
      this.morphTarget.b=Math.random()*255;
    }
    // Stochastic perturbation
    if(Math.random()<0.005*ent){
      this.vx += (Math.random()-0.5)*2;
      this.vy += (Math.random()-0.5)*2;
    }
    // Orbit
    this.orbit += this.orbitSpeed*(1+ent*0.5);
    this.bx = cx + Math.cos(this.orbit)*this.orbitR*(0.9+0.1*Math.sin(t*0.3+this.phase));
    this.by = cy + Math.sin(this.orbit)*this.orbitR*(0.9+0.1*Math.cos(t*0.2+this.phase));
    // Velocity drift
    this.vx += (this.bx-this.x)*0.004;
    this.vy += (this.by-this.y)*0.004;
    this.vx *= 0.92; this.vy *= 0.92;
    this.x += this.vx; this.y += this.vy;
    // Bounds softclamp
    const pad=60;
    if(this.x<pad){this.vx+=0.5}if(this.x>W-pad){this.vx-=0.5}
    if(this.y<pad){this.vy+=0.5}if(this.y>H-pad){this.vy-=0.5}
    // Trail
    this.trail.push({x:this.x,y:this.y,r:this.r,g:this.g,b:this.b,t});
    if(this.trail.length>this.maxTrail) this.trail.shift();
    // Wheel
    this.wheelAngle += this.wheelSpeed;
    this.pulsePhase += 0.04;
    // Swatches
    this.swatchTimer++;
    if(this.swatchTimer>8){
      this.swatchTimer=0;
      this.swatches.push({
        x:this.x+(Math.random()-0.5)*this.size*2,
        y:this.y+(Math.random()-0.5)*this.size*2,
        r:this.r+(Math.random()-0.5)*40,
        g:this.g+(Math.random()-0.5)*40,
        b:this.b+(Math.random()-0.5)*40,
        life:1,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2-0.5,
        size:4+Math.random()*8
      });
    }
    this.swatches=this.swatches.filter(s=>{
      s.x+=s.vx;s.y+=s.vy;s.life-=0.012;return s.life>0;
    });
  }
  draw(ctx,t){
    // Trail
    if(this.trail.length>2){
      for(let i=1;i<this.trail.length;i++){
        const a=this.trail[i-1],b=this.trail[i];
        const prog=i/this.trail.length;
        const alpha=prog*0.55;
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(${Math.round(b.r)},${Math.round(b.g)},${Math.round(b.b)},${alpha})`;
        ctx.lineWidth=1.5+prog*3;
        ctx.stroke();
      }
    }
    // Swatches
    for(const s of this.swatches){
      const sc=Math.max(0,Math.min(255,s.r)),sg=Math.max(0,Math.min(255,s.g)),sb=Math.max(0,Math.min(255,s.b));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);
      ctx.fillStyle=`rgba(${Math.round(sc)},${Math.round(sg)},${Math.round(sb)},${s.life*0.7})`;
      ctx.fill();
    }
    const pulse=1+0.12*Math.sin(this.pulsePhase);
    const sz=this.size*pulse;
    // Color wheel embedded in node
    this.drawWheel(ctx,this.x,this.y,sz*1.6,this.wheelAngle,t);
    // Node glow
    const grd=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,sz*2.5);
    grd.addColorStop(0,`rgba(${Math.round(this.r)},${Math.round(this.g)},${Math.round(this.b)},0.7)`);
    grd.addColorStop(0.4,`rgba(${Math.round(this.r)},${Math.round(this.g)},${Math.round(this.b)},0.18)`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(this.x,this.y,sz*2.5,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();
    // Core
    ctx.beginPath();ctx.arc(this.x,this.y,sz,0,Math.PI*2);
    const coreGrd=ctx.createRadialGradient(this.x-sz*0.3,this.y-sz*0.3,0,this.x,this.y,sz);
    coreGrd.addColorStop(0,`rgba(255,255,255,0.95)`);
    coreGrd.addColorStop(0.25,`rgba(${Math.round(this.r)},${Math.round(this.g)},${Math.round(this.b)},0.9)`);
    coreGrd.addColorStop(1,`rgba(${Math.round(this.r*0.4)},${Math.round(this.g*0.4)},${Math.round(this.b*0.4)},0.85)`);
    ctx.fillStyle=coreGrd;ctx.fill();
    // Ring
    ctx.beginPath();ctx.arc(this.x,this.y,sz,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,0.35)`;ctx.lineWidth=1;ctx.stroke();
    // System label
    const sc2=SYSTEM_COLORS[this.system];
    ctx.fillStyle=`rgba(${sc2[0]},${sc2[1]},${sc2[2]},0.9)`;
    ctx.font=`bold ${Math.round(sz*0.45)}px 'Courier New'`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.system,this.x,this.y);
  }
  drawWheel(ctx,x,y,r,angle,t){
    const slices=36;
    for(let i=0;i<slices;i++){
      const a0=angle+i/slices*Math.PI*2;
      const a1=angle+(i+1)/slices*Math.PI*2;
      const hue=(i/slices*360+t*30)%360;
      // Map hue through current system
      const [rr,rg,rb]=CS.hsv2rgb(hue,0.85,0.9);
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.arc(x,y,r,a0,a1);
      ctx.closePath();
      ctx.fillStyle=`rgba(${Math.round(rr)},${Math.round(rg)},${Math.round(rb)},0.22)`;
      ctx.fill();
    }
    // Transparent ring overlay
    const ringGrd=ctx.createRadialGradient(x,y,r*0.5,x,y,r);
    ringGrd.addColorStop(0,'rgba(0,0,0,0)');
    ringGrd.addColorStop(1,'rgba(0,0,0,0.18)');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=ringGrd;ctx.fill();
  }
}

class Morphism {
  constructor(a, b, type){
    this.a = a; // source node
    this.b = b; // target node
    this.type = type; // 'complementary','triadic','analogous','split'
    this.phase = Math.random()*Math.PI*2;
    this.pulseSpeed = 0.03+Math.random()*0.04;
    this.particles = [];
    this.particleTimer = 0;
    this.complexity = 0;
  }
  update(t,ent){
    this.phase += this.pulseSpeed*(1+ent*0.3);
    this.particleTimer++;
    const freq = Math.max(2,8-Math.floor(ent*6));
    if(this.particleTimer>freq){
      this.particleTimer=0;
      // Spawn particle along edge
      const prog=Math.random();
      const x=this.a.x+(this.b.x-this.a.x)*prog;
      const y=this.a.y+(this.b.y-this.a.y)*prog;
      // Blend color between nodes
      const r=this.a.r*(1-prog)+this.b.r*prog;
      const g=this.a.g*(1-prog)+this.b.g*prog;
      const b=this.a.b*(1-prog)+this.b.b*prog;
      // Apply harmonic transformation
      let hr=r,hg=g,hb=b;
      if(this.type==='complementary'){
        [hr,hg,hb]=this.complementary(r,g,b);
      } else if(this.type==='triadic'){
        [hr,hg,hb]=this.triadic(r,g,b,prog);
      } else if(this.type==='analogous'){
        [hr,hg,hb]=this.analogous(r,g,b);
      }
      this.particles.push({
        x,y,r:hr,g:hg,b:hb,
        vx:(Math.random()-0.5)*2,
        vy:(Math.random()-0.5)*2,
        life:1,size:2+Math.random()*4
      });
    }
    this.particles=this.particles.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;
      p.life-=0.025;return p.life>0;
    });
    this.complexity=this.particles.length;
  }
  complementary(r,g,b){
    const [h,s,v]=CS.rgb2hsv(r,g,b);
    return CS.hsv2rgb((h+180)%360,s,v);
  }
  triadic(r,g,b,prog){
    const [h,s,v]=CS.rgb2hsv(r,g,b);
    const shift=prog<0.5?120:240;
    return CS.hsv2rgb((h+shift)%360,s,v);
  }
  analogous(r,g,b){
    const [h,s,v]=CS.rgb2hsv(r,g,b);
    return CS.hsv2rgb((h+30)%360,s*0.9,v);
  }
  draw(ctx, t){
    const ax=this.a.x,ay=this.a.y,bx=this.b.x,by=this.b.y;
    const pulse=0.5+0.5*Math.sin(this.phase);
    // Main edge
    const steps=40;
    for(let i=0;i<steps;i++){
      const prog=i/steps;
      const np=(i+1)/steps;
      const x1=ax+(bx-ax)*prog,y1=ay+(by-ay)*prog;
      const x2=ax+(bx-ax)*np, y2=ay+(by-ay)*np;
      const r=this.a.r*(1-prog)+this.b.r*prog;
      const g=this.a.g*(1-prog)+this.b.g*prog;
      const b=this.a.b*(1-prog)+this.b.b*prog;
      // Pulse wave along edge
      const wave=Math.sin(this.phase-prog*Math.PI*4);
      const alpha=0.2+0.35*Math.abs(wave)*pulse;
      const lw=1+2*Math.abs(wave)*pulse;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
      ctx.strokeStyle=`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${alpha})`;
      ctx.lineWidth=lw;ctx.stroke();
    }
    // Particles
    for(const p of this.particles){
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      ctx.fillStyle=`rgba(${Math.round(p.r)},${Math.round(p.g)},${Math.round(p.b)},${p.life*0.8})`;
      ctx.fill();
    }
    // Harmony indicator at midpoint
    const mx=(ax+bx)/2,my=(ay+by)/2;
    const ic=HARMONY_COLORS[this.type]||[255,255,255];
    ctx.beginPath();ctx.arc(mx,my,3+2*pulse,0,Math.PI*2);
    ctx.fillStyle=`rgba(${ic[0]},${ic[1]},${ic[2]},${0.5+0.4*pulse})`;
    ctx.fill();
  }
}

const HARMONY_COLORS={
  complementary:[255,100,100],
  triadic:[100,255,200],
  analogous:[200,100,255],
  split:[255,220,80]
};

// ─── GLOBAL ROTATION WHEELS ───────────────────────────────────────────────────
class GlobalWheel {
  constructor(){
    this.x = cx + (Math.random()-0.5)*W*0.4;
    this.y = cy + (Math.random()-0.5)*H*0.4;
    this.r = 60+Math.random()*120;
    this.angle = Math.random()*Math.PI*2;
    this.speed = (Math.random()-0.5)*0.008;
    this.opacity = 0.06+Math.random()*0.1;
    this.colorSystem = COLOR_SYSTEMS[Math.floor(Math.random()*4)];
  }
  update(t){
    this.angle+=this.speed;
    // Drift slowly
    this.x+=Math.sin(t*0.1+this.angle)*0.3;
    this.y+=Math.cos(t*0.13+this.angle)*0.3;
  }
  draw(ctx,t){
    const slices=60;
    ctx.save();
    ctx.globalAlpha=this.opacity;
    for(let i=0;i<slices;i++){
      const a0=this.angle+i/slices*Math.PI*2;
      const a1=this.angle+(i+1)/slices*Math.PI*2;
      const hue=(i/slices*360+t*20)%360;
      let rr,rg,rb;
      if(this.colorSystem==='RGB'){
        [rr,rg,rb]=CS.hsv2rgb(hue,1,1);
      } else if(this.colorSystem==='CMYK'){
        const [c2,m2,y2,k2]=CS.rgb2cmyk(...CS.hsv2rgb(hue,1,1));
        [rr,rg,rb]=CS.cmyk2rgb(c2,m2,y2,k2);
      } else if(this.colorSystem==='CIELAB'){
        const [L,a,b]=CS.rgb2lab(...CS.hsv2rgb(hue,1,1));
        [rr,rg,rb]=CS.lab2rgb(L,a,b);
      } else {
        [rr,rg,rb]=CS.hsv2rgb(hue,0.9,0.9);
      }
      ctx.beginPath();ctx.moveTo(this.x,this.y);
      ctx.arc(this.x,this.y,this.r,a0,a1);ctx.closePath();
      ctx.fillStyle=`rgb(${Math.round(Math.max(0,Math.min(255,rr)))},${Math.round(Math.max(0,Math.min(255,rg)))},${Math.round(Math.max(0,Math.min(255,rb)))})`;
      ctx.fill();
    }
    ctx.restore();
    // Ring outline
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,255,255,${this.opacity*0.5})`;
    ctx.lineWidth=0.5;ctx.stroke();
  }
}

// ─── SCENE ────────────────────────────────────────────────────────────────────
let nodes=[], morphisms=[], wheels=[];
const NODE_COUNT = 12;

function buildScene(){
  nodes=[];morphisms=[];wheels=[];
  for(let i=0;i<NODE_COUNT;i++){
    const sys=COLOR_SYSTEMS[i%4];
    nodes.push(new ColorNode(i,sys));
  }
  // Create morphisms — category-theoretic: composition between systems
  const types=['complementary','triadic','analogous','split'];
  const used=new Set();
  // System-to-system edges
  for(let a=0;a<nodes.length;a++){
    for(let b=a+1;b<nodes.length;b++){
      const key=a+'-'+b;
      if(used.has(key)) continue;
      // Connect across systems more frequently
      if(nodes[a].system!==nodes[b].system || Math.random()<0.25){
        if(Math.random()<0.45){
          used.add(key);
          morphisms.push(new Morphism(nodes[a],nodes[b],types[Math.floor(Math.random()*4)]));
        }
      }
    }
  }
  // Global background wheels
  for(let i=0;i<8;i++) wheels.push(new GlobalWheel());
  entropy=Math.random();
}

// ─── AUDIO SYNTHESIS ──────────────────────────────────────────────────────────
let audioNodes={};
function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function getAudioComplexity(){
  let total=0;
  for(const m of morphisms) total+=m.complexity;
  return Math.min(1,total/600);
}

let audioTicker=0;
function updateAudio(){
  if(!soundOn||!audioCtx) return;
  audioTicker++;
  if(audioTicker%4!==0) return;
  const complexity=getAudioComplexity();
  const baseFreq=80+entropy*200;
  const harmonics=[1,1.5,2,2.5,3,4];
  if(Math.random()<0.15+complexity*0.3){
    const harmonic=harmonics[Math.floor(Math.random()*harmonics.length)];
    const freq=baseFreq*harmonic*(0.95+Math.random()*0.1);
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    const filter=audioCtx.createBiquadFilter();
    osc.type=['sine','triangle','sawtooth'][Math.floor(Math.random()*3)];
    osc.frequency.value=freq;
    filter.type='bandpass';
    filter.frequency.value=freq*2;
    filter.Q.value=5+complexity*15;
    gain.gain.setValueAtTime(0,audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.04+complexity*0.06,audioCtx.currentTime+0.05);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4+complexity*0.6);
    osc.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);
    osc.start();osc.stop(audioCtx.currentTime+0.5+complexity*0.7);
  }
}

// ─── HARMONIC CYCLE ───────────────────────────────────────────────────────────
let harmonicPhase=0;
function harmonicCycle(t){
  harmonicPhase=t;
  // Shift entropy harmonically + stochastic nudge
  entropy=0.3+0.3*Math.sin(t*0.08)+0.2*Math.sin(t*0.031)+0.05*Math.sin(t*0.19);
  if(Math.random()<0.002) entropy=Math.min(1,entropy+Math.random()*0.4);
  entropy=Math.max(0,Math.min(1,entropy));
  // Periodically re-morph node targets
  for(const n of nodes){
    if(Math.random()<0.001*entropy){
      n.morphTarget.r=Math.random()*255;
      n.morphTarget.g=Math.random()*255;
      n.morphTarget.b=Math.random()*255;
    }
    // Cross-system color injection
    if(Math.random()<0.0005){
      const donor=nodes[Math.floor(Math.random()*nodes.length)];
      if(donor!==n){
        // Remap donor color through this node's system
        let [rr,rg,rb]=[donor.r,donor.g,donor.b];
        if(n.system==='HSV'){
          const [h,s,v]=CS.rgb2hsv(rr,rg,rb);
          [rr,rg,rb]=CS.hsv2rgb((h+t*10)%360,s,v);
        } else if(n.system==='CMYK'){
          const [c,m,y,k]=CS.rgb2cmyk(rr,rg,rb);
          [rr,rg,rb]=CS.cmyk2rgb(c,m,y,k*0.8);
        } else if(n.system==='CIELAB'){
          const [L,a,b]=CS.rgb2lab(rr,rg,rb);
          [rr,rg,rb]=CS.lab2rgb(Math.min(100,L+20),a,b);
        }
        n.morphTarget.r=rr;n.morphTarget.g=rg;n.morphTarget.b=rb;
      }
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function drawBackground(t){
  // Deep space gradient
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H));
  const phi=t*0.015;
  const r1=Math.round(10+8*Math.sin(phi));
  const r2=Math.round(4+3*Math.sin(phi*1.3));
  bg.addColorStop(0,`rgb(${r1},${r1},${r1+5})`);
  bg.addColorStop(0.5,`rgb(${r2+3},${r2},${r2+6})`);
  bg.addColorStop(1,'rgb(0,0,0)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
}

function drawCategoryLabels(t){
  // Corner labels for color systems
  const positions=[
    {x:20,y:20,sys:'RGB',align:'left'},
    {x:W-20,y:20,sys:'CMYK',align:'right'},
    {x:20,y:H-20,sys:'CIELAB',align:'left'},
    {x:W-20,y:H-20,sys:'HSV',align:'right'}
  ];
  for(const p of positions){
    const sc=SYSTEM_COLORS[p.sys];
    const pulse=0.4+0.3*Math.sin(t*0.7+positions.indexOf(p));
    ctx.fillStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},${pulse})`;
    ctx.font=`9px 'Courier New'`;ctx.letterSpacing='0.2em';
    ctx.textAlign=p.align;ctx.textBaseline=p.y<cy?'top':'bottom';
    ctx.fillText(p.sys,p.x,p.y);
    // Small axis indicator
    const ax2=p.align==='left'?p.x+30:p.x-30;
    ctx.beginPath();ctx.moveTo(p.x,p.y+(p.y<cy?12:-12));ctx.lineTo(ax2,p.y+(p.y<cy?12:-12));
    ctx.strokeStyle=`rgba(${sc[0]},${sc[1]},${sc[2]},${pulse*0.5})`;
    ctx.lineWidth=0.5;ctx.stroke();
  }
}

function drawSpectralGrid(t){
  // Subtle background grid that cycles through hues
  ctx.save();ctx.globalAlpha=0.03+0.02*Math.sin(t*0.05);
  const gridSize=80;
  for(let x=0;x<W;x+=gridSize){
    for(let y=0;y<H;y+=gridSize){
      const hue=(x/W*360+y/H*120+t*10)%360;
      const [r2,g2,b2]=CS.hsv2rgb(hue,0.7,0.8);
      ctx.fillStyle=`rgb(${Math.round(r2)},${Math.round(g2)},${Math.round(b2)})`;
      ctx.fillRect(x,y,1,1);
    }
  }
  ctx.restore();
}

function drawMorphismArrows(t){
  // Draw directional arrows on morphisms
  for(const m of morphisms){
    const ax=m.a.x,ay=m.a.y,bx=m.b.x,by=m.b.y;
    const prog=(Math.sin(m.phase)*0.5+0.5);
    const px=ax+(bx-ax)*prog,py=ay+(by-ay)*prog;
    const ang=Math.atan2(by-ay,bx-ax);
    const arrowSize=5+3*Math.sin(m.phase);
    const ic=HARMONY_COLORS[m.type]||[255,255,255];
    const alpha=0.4+0.3*Math.sin(m.phase*1.3);
    ctx.save();ctx.translate(px,py);ctx.rotate(ang);
    ctx.beginPath();
    ctx.moveTo(arrowSize,0);
    ctx.lineTo(-arrowSize,-arrowSize*0.5);
    ctx.lineTo(-arrowSize,arrowSize*0.5);
    ctx.closePath();
    ctx.fillStyle=`rgba(${ic[0]},${ic[1]},${ic[2]},${alpha})`;
    ctx.fill();
    ctx.restore();
  }
}

// ─── HUD UPDATE ───────────────────────────────────────────────────────────────
let hudUpdateTimer=0;
function updateHUD(){
  if(!hudVisible) return;
  hudUpdateTimer++;
  if(hudUpdateTimer%6!==0) return;
  document.getElementById('h-nodes').textContent=nodes.length;
  document.getElementById('h-edges').textContent=morphisms.length;
  document.getElementById('h-phase').textContent=(harmonicPhase%628).toFixed(1);
  document.getElementById('h-entropy').textContent=entropy.toFixed(3);
  document.getElementById('h-cycle').textContent=Math.floor(t/100)%8+1;
  document.getElementById('h-audio').textContent=soundOn?'ON':'OFF';
  document.getElementById('h-fps').textContent=fps.toFixed(0);
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(timestamp){
  requestAnimationFrame(loop);
  const dt=Math.min(50,timestamp-lastTime);lastTime=timestamp;
  t+=dt*0.016;frame++;
  // FPS
  if(frame%30===0){
    fps=30000/(timestamp-lastFPS);lastFPS=timestamp;
  }
  harmonicCycle(t);
  drawBackground(t);
  drawSpectralGrid(t);
  // Background wheels
  for(const w of wheels){w.update(t);w.draw(ctx,t);}
  // Morphisms
  for(const m of morphisms){m.update(t,entropy);m.draw(ctx,t);}
  drawMorphismArrows(t);
  // Nodes
  for(const n of nodes){n.update(t,entropy);n.draw(ctx,t);}
  // Category labels
  drawCategoryLabels(t);
  // Audio
  updateAudio();
  // HUD
  updateHUD();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(()=>el.classList.remove('show'),1800);
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function reset(){
  buildScene();
  toast('SCENE RESET · ' + NODE_COUNT + ' NODES · ' + morphisms.length + ' MORPHISMS');
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='r'||e.key==='R'){e.preventDefault();reset();}
  if(e.key==='h'||e.key==='H'){
    hudVisible=!hudVisible;
    document.getElementById('hud').classList.toggle('visible',hudVisible);
    toast('HUD ' + (hudVisible?'ON':'OFF'));
  }
  if(e.key==='s'||e.key==='S'){
    if(!soundOn){initAudio();}
    soundOn=!soundOn;
    toast('SOUND ' + (soundOn?'ON':'OFF'));
  }
});
canvas.addEventListener('click',()=>reset());
canvas.addEventListener('touchend',e=>{e.preventDefault();reset();},{passive:false});

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildScene();
requestAnimationFrame(loop);
</script>
