<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cosmological Maze–Mechanism Cybernetic Singularity</title>
<meta name="description" content="Real-time cosmological simulation combining n-body gravity, maze tilings, cybernetic evolution, mechanical systems, and audiovisual synthesis.">
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
  touch-action: none;
}
canvas {
  display: block;
}
#hud {
  position: fixed;
  top: 0;
  left: 0;
  color: #0ff;
  font-family: monospace;
  font-size: 11px;
  padding: 6px;
  background: rgba(0,0,0,0.4);
  display: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = canvas.width = innerWidth * DPR;
  H = canvas.height = innerHeight * DPR;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
}
resize();
addEventListener('resize', resize);

// ---------- STATE ----------
let particles = [];
let maze = [];
let pendulum = {a:0, v:0};
let gears = [];
let humanNodes = [];
let t = 0;
let showHUD = false;
let soundEnabled = false;

// ---------- INIT ----------
function randomize(){
  particles = [];
  maze = [];
  gears = [];
  humanNodes = [];

  const count = 140; // mobile optimized
  for(let i=0;i<count;i++){
    particles.push({
      x: Math.random()*W,
      y: Math.random()*H,
      vx: (Math.random()-0.5)*0.3,
      vy: (Math.random()-0.5)*0.3,
      m: Math.random()*1.5 + 0.5
    });
  }

  // maze grid
  const cols = 18, rows = 32;
  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      maze.push({
        x, y,
        open: Math.random() > 0.35
      });
    }
  }

  // gears
  for(let i=0;i<6;i++){
    gears.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: 20 + Math.random()*40,
      angle: Math.random()*Math.PI,
      speed: (Math.random()-0.5)*0.02
    });
  }

  // human cybernetic nodes
  for(let i=0;i<60;i++){
    humanNodes.push({
      x: Math.random()*W,
      y: Math.random()*H,
      phase: Math.random()*Math.PI*2
    });
  }
}
randomize();

// ---------- AUDIO ----------
let audioCtx, osc, gain;

function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.value = 0;
}
initAudio();

// ---------- INPUT ----------
function toggleSound(){
  soundEnabled = !soundEnabled;
  gain.gain.value = soundEnabled ? 0.02 : 0;
}

addEventListener('keydown', e=>{
  if(e.code === 'Space') randomize();
  if(e.key === 'h' || e.key === 'H') {
    showHUD = !showHUD;
    hud.style.display = showHUD ? 'block' : 'none';
  }
  if(e.key === 's' || e.key === 'S') toggleSound();
});

canvas.addEventListener('click', randomize);
canvas.addEventListener('touchstart', randomize);

// ---------- PHYSICS ----------
function step(){
  // N-body gravity (approximate)
  for(let i=0;i<particles.length;i++){
    let p = particles[i];
    for(let j=i+1;j<particles.length;j++){
      let q = particles[j];
      let dx = q.x - p.x;
      let dy = q.y - p.y;
      let d2 = dx*dx + dy*dy + 0.01;
      let f = 0.05 / d2;

      p.vx += dx * f * q.m;
      p.vy += dy * f * q.m;
      q.vx -= dx * f * p.m;
      q.vy -= dy * f * p.m;
    }
  }

  // pendulum
  pendulum.v += -Math.sin(pendulum.a) * 0.01;
  pendulum.v *= 0.999;
  pendulum.a += pendulum.v;

  // update particles
  particles.forEach(p=>{
    p.vx += Math.cos(pendulum.a)*0.002;
    p.vy += Math.sin(pendulum.a)*0.002;

    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0||p.x>W) p.vx *= -1;
    if(p.y<0||p.y>H) p.vy *= -1;
  });

  // gears influence
  gears.forEach(g=>{
    g.angle += g.speed;
  });

  // cybernetic transformation oscillation
  humanNodes.forEach(n=>{
    n.phase += 0.03;
    n.x += Math.cos(n.phase)*0.5;
    n.y += Math.sin(n.phase)*0.5;
  });
}

// ---------- RENDER ----------
function draw(){
  t += 0.01;

  // fade trail
  ctx.fillStyle = "rgba(0,0,0,0.15)";
  ctx.fillRect(0,0,W,H);

  // spectral gradient
  let grad = ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,W/2);
  grad.addColorStop(0, `hsl(${t*50%360},100%,50%)`);
  grad.addColorStop(1, `hsl(${(t*50+180)%360},100%,10%)`);
  ctx.fillStyle = grad;
  ctx.globalAlpha = 0.15;
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha = 1;

  // maze tiling
  const cellW = W/18, cellH = H/32;
  ctx.strokeStyle = "rgba(0,255,255,0.15)";
  maze.forEach(c=>{
    if(c.open){
      ctx.strokeRect(c.x*cellW, c.y*cellH, cellW, cellH);
    }
  });

  // particles (galaxy swarms)
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.fillStyle = `hsl(${(p.x+p.y+t*200)%360},100%,60%)`;
    ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
    ctx.fill();
  });

  // connections (cosmic web)
  for(let i=0;i<particles.length;i+=3){
    let a = particles[i];
    let b = particles[(i+5)%particles.length];
    ctx.strokeStyle = "rgba(0,200,255,0.1)";
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
  }

  // gears
  gears.forEach(g=>{
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.angle);
    ctx.strokeStyle = "rgba(255,200,0,0.5)";
    ctx.beginPath();
    ctx.arc(0,0,g.r,0,Math.PI*2);
    ctx.stroke();
    for(let i=0;i<8;i++){
      ctx.rotate(Math.PI/4);
      ctx.beginPath();
      ctx.moveTo(g.r,0);
      ctx.lineTo(g.r+10,0);
      ctx.stroke();
    }
    ctx.restore();
  });

  // cybernetic human network
  ctx.strokeStyle = "rgba(0,255,150,0.25)";
  humanNodes.forEach((n,i)=>{
    let m = humanNodes[(i+1)%humanNodes.length];
    ctx.beginPath();
    ctx.moveTo(n.x,n.y);
    ctx.lineTo(m.x,m.y);
    ctx.stroke();
  });

  humanNodes.forEach(n=>{
    ctx.fillStyle = "rgba(0,255,150,0.6)";
    ctx.fillRect(n.x,n.y,2,2);
  });

  // audio modulation
  if(soundEnabled){
    let energy = particles.reduce((s,p)=>s+Math.abs(p.vx)+Math.abs(p.vy),0);
    osc.frequency.value = 100 + energy*2;
  }

  // HUD
  if(showHUD){
    hud.innerText =
      "Particles: "+particles.length+
      "\nMaze cells: "+maze.length+
      "\nGears: "+gears.length+
      "\nSound: "+(soundEnabled?"ON":"OFF")+
      "\nSPACE/tap: randomize\nH: HUD\nS: sound";
  }
}

// ---------- LOOP ----------
function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
