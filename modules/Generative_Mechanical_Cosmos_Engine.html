<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Generative Mechanical Cosmos Engine</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<meta name="description" content="GPU accelerated generative art cosmos synthesizing tilings, puzzles, mechanical linkages, quasicrystals, cellular automata and ornamental geometry into a living mathematical universe.">

<meta name="keywords" content="generative art, procedural graphics, quasicrystal tilings, penrose tiling, algorithmic geometry, mathematical art, cellular automata, reaction diffusion, fractal patterns, sacred geometry, mechanical simulation, computational art">

<style>
html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
}
canvas{
display:block;
}
#hud{
position:fixed;
top:10px;
left:12px;
color:#0f0;
font-family:monospace;
font-size:12px;
pointer-events:none;
opacity:0.85;
display:none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud"></div>

<script>

const canvas = document.getElementById("c")
const gl = canvas.getContext("webgl",{antialias:false})

const hud = document.getElementById("hud")

let soundEnabled = false
let hudVisible = false

function resize(){
canvas.width = window.innerWidth
canvas.height = window.innerHeight
gl.viewport(0,0,canvas.width,canvas.height)
}

window.addEventListener("resize",resize)
resize()

/* ---------- SHADER UTIL ---------- */

function shader(type,src){
let s = gl.createShader(type)
gl.shaderSource(s,src)
gl.compileShader(s)
return s
}

function program(v,f){
let p = gl.createProgram()
gl.attachShader(p,shader(gl.VERTEX_SHADER,v))
gl.attachShader(p,shader(gl.FRAGMENT_SHADER,f))
gl.linkProgram(p)
return p
}

/* ---------- SHADERS ---------- */

const vertexSrc = `
attribute vec2 p;
void main(){
gl_Position=vec4(p,0.,1.);
}
`

const fragSrc = `
precision highp float;

uniform vec2 r;
uniform float t;

uniform vec4 seedA;
uniform vec4 seedB;
uniform vec4 seedC;

#define TAU 6.28318530718

vec2 rot(vec2 p,float a){
float c=cos(a);
float s=sin(a);
return vec2(c*p.x-s*p.y,s*p.x+c*p.y);
}

float hash(vec2 p){
return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);
}

float noise(vec2 p){
vec2 i=floor(p);
vec2 f=fract(p);
float a=hash(i);
float b=hash(i+vec2(1,0));
float c=hash(i+vec2(0,1));
float d=hash(i+vec2(1,1));
vec2 u=f*f*(3.-2.*f);
return mix(a,b,u.x)+
(c-a)*u.y*(1.-u.x)+
(d-b)*u.x*u.y;
}

float voronoi(vec2 x){
vec2 n=floor(x);
vec2 f=fract(x);

float md=1.0;

for(int j=-1;j<=1;j++)
for(int i=-1;i<=1;i++){

vec2 g=vec2(float(i),float(j));
vec2 o=vec2(hash(n+g));
vec2 r=g+o-f;

md=min(md,dot(r,r));
}

return md;
}

float quasicrystal(vec2 p){

float sum=0.;

for(int i=0;i<7;i++){

float a=float(i)/7.*TAU;

vec2 d=vec2(cos(a),sin(a));

sum+=cos(dot(p,d)*seedA.x + t*seedB.x);

}

return sum/7.;
}

float braid(vec2 p){

float a=sin(p.x*seedA.y + t*seedB.y);
float b=cos(p.y*seedA.z - t*seedB.z);

return sin(a+b);
}

float reaction(vec2 p){

float n=noise(p*2.+t*.2);

float v=sin(p.x*seedC.x)+cos(p.y*seedC.y);

return n+v*.5;
}

float hyper(vec2 p){

float r=length(p);

p/=1.+r*r*seedC.z;

return sin(p.x*seedB.w)+cos(p.y*seedA.w);

}

void main(){

vec2 uv=(gl_FragCoord.xy-.5*r)/r.y;

vec2 p=uv*3.;

p=rot(p,t*.1);

float q=quasicrystal(p*seedA.x);

float v=voronoi(p*seedB.y);

float b=braid(p*seedA.y);

float rd=reaction(p*seedC.x);

float h=hyper(p);

float field=q+v+b+rd+h;

vec3 col;

col.r=sin(field*3.+t*seedA.z)*.5+.5;
col.g=sin(field*4.+t*seedB.z)*.5+.5;
col.b=sin(field*5.+t*seedC.z)*.5+.5;

float glow=exp(-abs(field)*2.);

col+=glow*.6;

gl_FragColor=vec4(col,1.);
}
`

const prog = program(vertexSrc,fragSrc)

gl.useProgram(prog)

/* ---------- FULLSCREEN TRIANGLE ---------- */

const buf = gl.createBuffer()

gl.bindBuffer(gl.ARRAY_BUFFER,buf)

gl.bufferData(
gl.ARRAY_BUFFER,
new Float32Array([
-1,-1,
3,-1,
-1,3
]),
gl.STATIC_DRAW
)

const loc = gl.getAttribLocation(prog,"p")

gl.enableVertexAttribArray(loc)

gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)

/* ---------- UNIFORMS ---------- */

const ur = gl.getUniformLocation(prog,"r")
const ut = gl.getUniformLocation(prog,"t")

const seedA = gl.getUniformLocation(prog,"seedA")
const seedB = gl.getUniformLocation(prog,"seedB")
const seedC = gl.getUniformLocation(prog,"seedC")

/* ---------- RANDOM UNIVERSE ---------- */

let seeds = {}

function randomize(){

seeds = {

A:[
Math.random()*4+1,
Math.random()*3,
Math.random()*2,
Math.random()*5
],

B:[
Math.random()*3,
Math.random()*4,
Math.random()*3,
Math.random()*4
],

C:[
Math.random()*2,
Math.random()*3,
Math.random()*4,
Math.random()*3
]

}

}

randomize()

/* ---------- AUDIO ---------- */

let ctx,osc,gain

function startSound(){

if(soundEnabled) return

ctx = new (window.AudioContext||window.webkitAudioContext)()

osc = ctx.createOscillator()
gain = ctx.createGain()

osc.type="sine"

osc.connect(gain)
gain.connect(ctx.destination)

gain.gain.value=0.05

osc.start()

soundEnabled=true
}

function stopSound(){

if(!soundEnabled) return

osc.stop()

ctx.close()

soundEnabled=false
}

/* ---------- INPUT ---------- */

function restart(){
randomize()
}

window.addEventListener("keydown",e=>{

if(e.code==="Space") restart()

if(e.key==="h"||e.key==="H"){
hudVisible=!hudVisible
hud.style.display=hudVisible?"block":"none"
}

if(e.key==="s"||e.key==="S"){
if(soundEnabled) stopSound()
else startSound()
}

})

canvas.addEventListener("click",restart)
canvas.addEventListener("touchstart",restart)

/* ---------- RENDER LOOP ---------- */

let start = performance.now()

function draw(){

let time=(performance.now()-start)/1000

gl.uniform2f(ur,canvas.width,canvas.height)

gl.uniform1f(ut,time)

gl.uniform4fv(seedA,seeds.A)
gl.uniform4fv(seedB,seeds.B)
gl.uniform4fv(seedC,seeds.C)

gl.drawArrays(gl.TRIANGLES,0,3)

if(hudVisible){

hud.innerHTML =
"Generative Mechanical Cosmos<br>"+
"Resolution: "+canvas.width+"x"+canvas.height+"<br>"+
"Sound: "+(soundEnabled?"ON":"OFF")+"<br>"+
"Controls: SPACE / Click = Regenerate | H = HUD | S = Sound"

}

if(soundEnabled && osc){

osc.frequency.value =
120 + 80*Math.sin(time*seeds.A[0]) +
60*Math.sin(time*seeds.B[1])

}

requestAnimationFrame(draw)

}

draw()

</script>
</body>
</html>
