<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pac-Man Visual Symphony — Procedural Audiovisual Engine</title>

<meta name="description" content="Pac-Man inspired ultra complex procedural audiovisual animation system. A mesmerizing real-time generative graphics symphony featuring Pac-Man entities, ghosts, pellets and evolving mazes with synchronized audio.">

<meta name="keywords" content="pacman animation, generative art, procedural graphics, pacman visualizer, webgl animation, realtime audiovisual synthesis, pacman art, experimental graphics">

<meta name="robots" content="index, follow">

<style>

html,body{
margin:0;
padding:0;
background:#000;
overflow:hidden;
font-family:monospace;
}

canvas{
position:absolute;
top:0;
left:0;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:#0f0;
font-size:12px;
pointer-events:none;
opacity:0;
}

</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="hud"></div>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")
const hud = document.getElementById("hud")

let W,H
let pacmen=[]
let pellets=[]
let ghosts=[]

let seed=Math.random()*9999

let hudVisible=false
let soundEnabled=false

let audioCtx
let osc
let gain

function resize(){
W=canvas.width=window.innerWidth
H=canvas.height=window.innerHeight
}

window.addEventListener("resize",resize)
resize()

function rand(a,b){return a+Math.random()*(b-a)}

function regen(){

pacmen=[]
pellets=[]
ghosts=[]

let count=80+Math.random()*120

for(let i=0;i<count;i++){
pacmen.push({

x:rand(0,W),
y:rand(0,H),

r:rand(10,50),

angle:rand(0,Math.PI*2),

speed:rand(.2,2),

phase:rand(0,10),

orbit:rand(20,200),

color:`hsl(${rand(0,360)},100%,60%)`

})
}

for(let i=0;i<600;i++){

pellets.push({

x:rand(0,W),
y:rand(0,H),

r:rand(1,3),

phase:rand(0,10)

})

}

for(let i=0;i<40;i++){

ghosts.push({

x:rand(0,W),
y:rand(0,H),

r:rand(50,200),

phase:rand(0,10),

color:`hsla(${rand(0,360)},100%,50%,0.15)`

})

}

seed=Math.random()*9999
}

regen()

function drawPacman(p){

let mouth=Math.abs(Math.sin(p.phase))*0.8

ctx.fillStyle=p.color

ctx.beginPath()

ctx.moveTo(p.x,p.y)

ctx.arc(p.x,p.y,p.r,p.angle+mouth,p.angle+Math.PI*2-mouth)

ctx.closePath()

ctx.fill()

}

function drawGhost(g){

ctx.fillStyle=g.color

ctx.beginPath()

ctx.arc(g.x,g.y,g.r,0,Math.PI*2)

ctx.fill()

}

function update(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,W,H)

let t=performance.now()*0.001

for(let g of ghosts){

g.phase+=0.01

g.x+=Math.sin(g.phase)*0.5
g.y+=Math.cos(g.phase)*0.5

drawGhost(g)

}

for(let p of pellets){

p.phase+=0.03

let r=p.r+Math.sin(p.phase)*0.8

ctx.fillStyle="#fff"

ctx.beginPath()
ctx.arc(p.x,p.y,r,0,Math.PI*2)
ctx.fill()

}

let activity=0

for(let p of pacmen){

p.phase+=0.1
p.angle+=0.03

p.x+=Math.cos(p.angle)*p.speed
p.y+=Math.sin(p.angle)*p.speed

p.x=(p.x+W)%W
p.y=(p.y+H)%H

drawPacman(p)

activity+=Math.abs(Math.sin(p.phase))

}

if(soundEnabled && audioCtx){

let v=activity/pacmen.length

osc.frequency.value=120+v*800

gain.gain.value=.05+v*.1

}

if(hudVisible){

hud.innerHTML=

`PACMAN ENTITIES: ${pacmen.length}<br>
PELLETS: ${pellets.length}<br>
GHOST FIELDS: ${ghosts.length}<br>
AUDIO: ${soundEnabled ? "ON":"OFF"}`

}

requestAnimationFrame(update)

}

update()

function initAudio(){

audioCtx=new (window.AudioContext||window.webkitAudioContext)()

osc=audioCtx.createOscillator()
gain=audioCtx.createGain()

osc.type="sawtooth"

osc.connect(gain)
gain.connect(audioCtx.destination)

gain.gain.value=0.05

osc.start()

}

window.addEventListener("keydown",e=>{

if(e.code==="Space")regen()

if(e.key==="h"||e.key==="H"){

hudVisible=!hudVisible
hud.style.opacity=hudVisible?1:0

}

if(e.key==="s"||e.key==="S"){

soundEnabled=!soundEnabled

if(soundEnabled && !audioCtx){
initAudio()
}

}

})

window.addEventListener("click",regen)
window.addEventListener("touchstart",regen)

</script>

</body>
</html>
