// ─── AUDIO ──────────────────────────────────────────────────────────────────
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function beep(freq=440,dur=0.08,type='square',vol=0.06){
  if(!soundOn||!audioCtx) return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ─── UTILITIES ──────────────────────────────────────────────────────────────
function rnd(a,b){ return a+(b-a)*Math.random(); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function atariCol(){ return ATARI[Math.floor(Math.random()*ATARI.length)]; }
function lerp(a,b,t){ return a+(b-a)*t; }
function hsl(h,s,l,a=1){ return `hsla(${h},${s}%,${l}%,${a})`; }
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function atariRgba(hex,a=1){
  const [r,g,b]=hexToRgb(hex);
  return `rgba(${r},${g},${b},${a})`;
}

// ─── COLOR WHEEL ─────────────────────────────────────────────────────────────
function makeColorWheel(x,y,r,speed,type,alpha){
  return { x,y,r,speed,type,alpha,angle:Math.random()*Math.PI*2,
    slices: 12+Math.floor(Math.random()*24),
    hueOffset: Math.random()*360,
    innerR: r*(0.1+Math.random()*0.4),
    mode: Math.floor(Math.random()*4) // 0=harmony,1=complementary,2=triadic,3=atari
  };
}

function drawColorWheel(w){
  const {x,y,r,angle,slices,hueOffset,innerR,mode,alpha} = w;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  ctx.rotate(angle);
  const step = (Math.PI*2)/slices;
  for(let i=0;i<slices;i++){
    const a0 = i*step, a1 = a0+step;
    let col;
    if(mode===3){
      col = atariRgba(ATARI[(i*(ATARI.length/slices)|0)%ATARI.length], 0.7);
    } else {
      const h = (hueOffset+i*(360/slices))%360;
      const s = 80+Math.sin(t*0.5+i)*15;
      const l = mode===0?50:mode===1?(i%2===0?65:35):45;
      col = `hsla(${h},${s}%,${l}%,0.72)`;
    }
    // outer ring
    ctx.beginPath();
    ctx.moveTo(Math.cos(a0)*innerR, Math.sin(a0)*innerR);
    ctx.arc(0,0,r,a0,a1);
    ctx.arc(0,0,innerR,a1,a0,true);
    ctx.closePath();
    ctx.fillStyle = col;
    ctx.fill();
    // spoke lines
    ctx.beginPath();
    ctx.moveTo(Math.cos(a0)*innerR*0.5, Math.sin(a0)*innerR*0.5);
    ctx.lineTo(Math.cos(a0)*r, Math.sin(a0)*r);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // center circle
  ctx.beginPath();
  ctx.arc(0,0,innerR*0.5,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fill();
  ctx.restore();
}

// ─── POLYTOPE PROJECTOR ──────────────────────────────────────────────────────
function make4DVertices(n){
  const verts=[];
  // random polytope-ish 4D cloud
  for(let i=0;i<n;i++){
    const θ=Math.random()*Math.PI*2, φ=Math.random()*Math.PI, ψ=Math.random()*Math.PI*2;
    const r=0.8+Math.random()*0.2;
    verts.push([
      r*Math.sin(φ)*Math.cos(θ),
      r*Math.sin(φ)*Math.sin(θ),
      r*Math.cos(φ),
      r*Math.sin(ψ)
    ]);
  }
  return verts;
}

function project4D(v, t, scale, cx2, cy2){
  // 4D → 3D rotation
  const c1=Math.cos(t*0.7), s1=Math.sin(t*0.7);
  const c2=Math.cos(t*0.4), s2=Math.sin(t*0.4);
  const x=v[0]*c1-v[3]*s1, w=v[0]*s1+v[3]*c1;
  const y=v[1]*c2-v[2]*s2, z=v[1]*s2+v[2]*c2;
  // 3D → 2D perspective
  const d=3.5, persp=d/(d+z+w*0.5);
  return [cx2+x*scale*persp, cy2+y*scale*persp, persp];
}

function makePolytope(x,y,size,color,name){
  const n=8+Math.floor(Math.random()*16);
  const verts=make4DVertices(n);
  const edges=[];
  for(let i=0;i<n;i++)
    for(let j=i+1;j<n;j++)
      if(Math.random()<0.25) edges.push([i,j]);
  return {x,y,size,color,name,verts,edges,speed:rnd(0.3,1.2),phase:Math.random()*10};
}

function drawPolytope(p){
  const lt = t*p.speed+p.phase;
  const projected = p.verts.map(v=>project4D(v,lt,p.size,p.x,p.y));
  ctx.save();
  ctx.globalAlpha=0.55;
  // edges
  for(const [i,j] of p.edges){
    const a=projected[i], b=projected[j];
    const lum=Math.floor(lerp(40,95,a[2]));
    ctx.beginPath();
    ctx.moveTo(a[0],a[1]);
    ctx.lineTo(b[0],b[1]);
    ctx.strokeStyle=p.color.replace(')',`,${0.3+a[2]*0.5})`).replace('rgb','rgba');
    ctx.lineWidth=0.8+a[2];
    ctx.stroke();
  }
  // vertices
  for(const v of projected){
    ctx.beginPath();
    ctx.arc(v[0],v[1],1.5+v[2]*2,0,Math.PI*2);
    ctx.fillStyle=p.color;
    ctx.fill();
  }
  // label
  ctx.font=`9px 'Courier New'`;
  ctx.fillStyle='rgba(180,255,200,0.5)';
  ctx.fillText(p.name, p.x-p.size*0.5, p.y+p.size+12);
  ctx.restore();
}

// ─── PCB CIRCUIT ─────────────────────────────────────────────────────────────
function makePCB(){
  const nodes=[], edges=[];
  const rows=Math.floor(H/60), cols=Math.floor(W/80);
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++){
      const jitter=20;
      nodes.push({
        x: c*80+40+rnd(-jitter,jitter),
        y: r*60+30+rnd(-jitter,jitter),
        r: rnd(2,6),
        type: Math.random()<0.3?'via':Math.random()<0.2?'ic':'pad',
        col: ATARI[Math.floor(Math.random()*16)*4 % ATARI.length],
        pulse: Math.random()*Math.PI*2
      });
    }
  // connect nearby nodes
  for(let i=0;i<nodes.length;i++)
    for(let j=i+1;j<nodes.length;j++){
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<130&&Math.random()<0.25)
        edges.push({a:i,b:j,
          active:false,
          activePct:0,
          speed:rnd(0.4,2.5),
          col:ATARI[Math.floor(Math.random()*ATARI.length)],
          delay:Math.random()*6
        });
    }
  return {nodes,edges};
}

function drawPCB(pcb){
  ctx.save();
  ctx.globalAlpha=0.28;
  // substrate
  ctx.fillStyle='rgba(0,20,8,0.18)';
  ctx.fillRect(0,0,W,H);
  // edges / traces
  for(const e of pcb.edges){
    const a=pcb.nodes[e.a], b=pcb.nodes[e.b];
    // manhattan routing
    const mx=a.x, my=b.y;
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(mx,my);
    ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=atariRgba(e.col,0.4);
    ctx.lineWidth=0.8;
    ctx.stroke();
    // signal pulse
    if(t>e.delay){
      const pct=((t-e.delay)*e.speed*0.3)%1;
      const px=lerp(lerp(a.x,mx,Math.min(pct*2,1)),b.x,Math.max((pct*2-1),0));
      const py=lerp(lerp(a.y,my,Math.min(pct*2,1)),b.y,Math.max((pct*2-1),0));
      ctx.beginPath();
      ctx.arc(px,py,2.5,0,Math.PI*2);
      ctx.fillStyle=atariRgba(e.col,0.9);
      ctx.fill();
    }
  }
  // nodes
  for(const n of pcb.nodes){
    const pulse=Math.sin(t*2+n.pulse)*0.5+0.5;
    ctx.beginPath();
    if(n.type==='ic'){
      ctx.rect(n.x-n.r*2,n.y-n.r*1.5,n.r*4,n.r*3);
      ctx.strokeStyle=atariRgba(n.col,0.8);
      ctx.lineWidth=1;
      ctx.stroke();
      // IC pins
      for(let p=0;p<4;p++){
        ctx.beginPath();
        ctx.moveTo(n.x-n.r*2+p*(n.r*4/3),n.y-n.r*1.5);
        ctx.lineTo(n.x-n.r*2+p*(n.r*4/3),n.y-n.r*2.5);
        ctx.strokeStyle=atariRgba(n.col,0.6);
        ctx.stroke();
      }
    } else {
      ctx.arc(n.x,n.y,n.r*(1+pulse*0.3),0,Math.PI*2);
      ctx.fillStyle=atariRgba(n.col,0.7+pulse*0.2);
      ctx.fill();
      if(n.type==='via'){
        ctx.beginPath();
        ctx.arc(n.x,n.y,n.r*0.5,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.8)';
        ctx.fill();
      }
    }
  }
  ctx.restore();
}

// ─── TRON GRID ───────────────────────────────────────────────────────────────
function makeTronGrid(){
  const segs=[];
  const cols=['#00ffff','#ff6600','#ffff00','#00ff88','#ff00aa','#00aaff'];
  const W2=W, H2=H;
  for(let i=0;i<60+Math.floor(Math.random()*40);i++){
    const x=Math.random()*W2, y=Math.random()*H2;
    const dir=Math.random()<0.5?0:1; // 0=h,1=v
    const len=50+Math.random()*300;
    segs.push({
      x,y,dir,len,
      col:pick(cols),
      speed:rnd(0.5,3),
      phase:Math.random()*Math.PI*2,
      width:rnd(0.5,2.5),
      glow:Math.random()<0.3
    });
  }
  // recognizer silhouettes
  const recs=[];
  for(let i=0;i<3+Math.floor(Math.random()*4);i++){
    recs.push({
      x:Math.random()*W, y:Math.random()*H,
      size:40+Math.random()*80,
      col:pick(cols),
      rot:Math.random()*Math.PI,
      speed:rnd(-0.01,0.01)
    });
  }
  return {segs,recs};
}

function drawTronGrid(tron){
  ctx.save();
  ctx.globalAlpha=0.35;
  // perspective grid lines
  const vp={x:W*0.5,y:H*0.4};
  const nLines=16;
  for(let i=0;i<=nLines;i++){
    const lx=lerp(0,W,i/nLines);
    ctx.beginPath();
    ctx.moveTo(lx,H);
    ctx.lineTo(vp.x+(lx-vp.x)*0.0,vp.y);
    ctx.strokeStyle=`rgba(0,200,255,${0.04+0.06*(i%4===0?1:0.3)})`;
    ctx.lineWidth=i%4===0?0.8:0.3;
    ctx.stroke();
  }
  const hLines=10;
  for(let i=0;i<=hLines;i++){
    const ly=lerp(vp.y,H,i/hLines);
    const frac=i/hLines;
    const lx0=lerp(vp.x,0,frac), lx1=lerp(vp.x,W,frac);
    ctx.beginPath();
    ctx.moveTo(lx0,ly);
    ctx.lineTo(lx1,ly);
    ctx.strokeStyle=`rgba(0,200,255,${0.03+0.08*frac})`;
    ctx.lineWidth=0.4;
    ctx.stroke();
  }
  // moving segments
  for(const s of tron.segs){
    const pct=((t*s.speed*0.1)+s.phase)%1;
    let x0,y0,x1,y1;
    if(s.dir===0){ x0=s.x; y0=s.y; x1=s.x+s.len*pct; y1=s.y; }
    else { x0=s.x; y0=s.y; x1=s.x; y1=s.y+s.len*pct; }
    ctx.beginPath();
    ctx.moveTo(x0,y0); ctx.lineTo(x1,y1);
    ctx.strokeStyle=s.col;
    ctx.lineWidth=s.width;
    ctx.stroke();
    if(s.glow){
      ctx.shadowBlur=8; ctx.shadowColor=s.col;
      ctx.stroke();
      ctx.shadowBlur=0;
    }
    // head dot
    ctx.beginPath();
    ctx.arc(x1,y1,s.width*2,0,Math.PI*2);
    ctx.fillStyle=s.col;
    ctx.fill();
  }
  // recognizers
  for(const r of tron.recs){
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.rotate(r.rot + t*r.speed);
    ctx.globalAlpha=0.5;
    // body
    ctx.beginPath();
    ctx.rect(-r.size*0.3,-r.size*0.5,r.size*0.6,r.size);
    ctx.strokeStyle=r.col;
    ctx.lineWidth=1.5;
    ctx.stroke();
    // legs
    for(let leg=0;leg<2;leg++){
      const side=leg===0?-1:1;
      ctx.beginPath();
      ctx.moveTo(side*r.size*0.3,-r.size*0.2);
      ctx.lineTo(side*r.size*0.7,-r.size*0.4);
      ctx.lineTo(side*r.size*0.7,-r.size*0.1);
      ctx.strokeStyle=r.col;
      ctx.lineWidth=1;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(side*r.size*0.3,r.size*0.2);
      ctx.lineTo(side*r.size*0.7,r.size*0.4);
      ctx.lineTo(side*r.size*0.7,r.size*0.1);
      ctx.stroke();
    }
    // eye
    ctx.beginPath();
    ctx.arc(0,-r.size*0.05,r.size*0.08,0,Math.PI*2);
    ctx.fillStyle=r.col;
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

// ─── 6502 ASM OVERLAY ────────────────────────────────────────────────────────
function makeAsmLines(){
  const lines=[];
  const count=18+Math.floor(Math.random()*20);
  for(let i=0;i<count;i++){
    lines.push({
      x:rnd(20,W-200), y:rnd(20,H-20),
      text:'',
      maxAge:rnd(3,12),
      age:0,
      col:ATARI[Math.floor(Math.random()*ATARI.length)],
      alpha:rnd(0.25,0.65),
      size:rnd(8,13),
      addr:`$${rHex(4)}`,
      opcode:`${rHex(2)} ${rHex(2)} ${rHex(2)}`,
      mnemonic:rAsm()
    });
    lines[i].text=`${lines[i].addr}  ${lines[i].opcode}   ${lines[i].mnemonic}`;
  }
  return lines;
}

function updateAsmLines(lines){
  for(const l of lines){
    l.age+=0.016;
    if(l.age>l.maxAge){
      l.age=0; l.x=rnd(20,W-200); l.y=rnd(20,H-20);
      l.col=ATARI[Math.floor(Math.random()*ATARI.length)];
      l.mnemonic=rAsm(); l.addr=`$${rHex(4)}`; l.opcode=`${rHex(2)} ${rHex(2)} ${rHex(2)}`;
      l.text=`${l.addr}  ${l.opcode}   ${l.mnemonic}`;
    }
  }
}

function drawAsmLines(lines){
  ctx.save();
  for(const l of lines){
    const fade=Math.min(l.age,l.maxAge-l.age,1);
    ctx.font=`${l.size}px 'Courier New'`;
    ctx.fillStyle=atariRgba(l.col, l.alpha*Math.max(fade,0));
    ctx.fillText(l.text, l.x, l.y);
    // cursor blink
    if(Math.floor(t*3)%2===0&&fade>0.5){
      ctx.fillStyle=atariRgba(l.col,0.9);
      ctx.fillRect(l.x+ctx.measureText(l.text).width+2, l.y-l.size+2, 6, l.size);
    }
  }
  ctx.restore();
}

// ─── MAZE ────────────────────────────────────────────────────────────────────
function makeMaze(cols,rows){
  const cells=Array.from({length:rows*cols},(_,i)=>({
    visited:false,
    walls:[true,true,true,true] // N E S W
  }));
  const idx=(c,r)=>r*cols+c;
  const stack=[[0,0]]; cells[0].visited=true; let visitedCount=1;
  while(stack.length){
    const [cc,cr]=stack[stack.length-1];
    const nbrs=[];
    if(cr>0&&!cells[idx(cc,cr-1)].visited) nbrs.push([cc,cr-1,0,2]);
    if(cc<cols-1&&!cells[idx(cc+1,cr)].visited) nbrs.push([cc+1,cr,1,3]);
    if(cr<rows-1&&!cells[idx(cc,cr+1)].visited) nbrs.push([cc,cr+1,2,0]);
    if(cc>0&&!cells[idx(cc-1,cr)].visited) nbrs.push([cc-1,cr,3,1]);
    if(nbrs.length){
      const [nc,nr,d,od]=nbrs[Math.floor(Math.random()*nbrs.length)];
      cells[idx(cc,cr)].walls[d]=false;
      cells[idx(nc,nr)].walls[od]=false;
      cells[idx(nc,nr)].visited=true;
      stack.push([nc,nr]); visitedCount++;
    } else stack.pop();
  }
  return {cells,cols,rows};
}

function drawMaze(maze, ox,oy,cw,ch, alpha){
  const {cells,cols,rows}=maze;
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.strokeStyle='rgba(0,220,160,0.55)';
  ctx.lineWidth=1;
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++){
      const cell=cells[r*cols+c];
      const x=ox+c*cw, y=oy+r*ch;
      if(cell.walls[0]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+cw,y);ctx.stroke();}
      if(cell.walls[1]){ctx.beginPath();ctx.moveTo(x+cw,y);ctx.lineTo(x+cw,y+ch);ctx.stroke();}
      if(cell.walls[2]){ctx.beginPath();ctx.moveTo(x+cw,y+ch);ctx.lineTo(x,y+ch);ctx.stroke();}
      if(cell.walls[3]){ctx.beginPath();ctx.moveTo(x,y+ch);ctx.lineTo(x,y);ctx.stroke();}
    }
  ctx.restore();
}

// ─── ROBOT ───────────────────────────────────────────────────────────────────
function makeRobot(x,y,scale,col){
  return {x,y,scale,col,angle:0,speed:rnd(-0.02,0.02),
    armAngle:0,legAngle:0,walk:Math.random()*Math.PI*2,
    eyeColor:ATARI[Math.floor(Math.random()*ATARI.length)]};
}

function drawRobot(r){
  const {x,y,scale:s,col,walk,eyeColor}=r;
  const lt=t+r.walk;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(r.angle);
  ctx.globalAlpha=0.75;
  // body
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.rect(-s*0.4,-s*0.5,s*0.8,s*0.7);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=0.8;
  ctx.stroke();
  // head
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.rect(-s*0.3,-s*0.9,s*0.6,s*0.4);
  ctx.fill();
  // eyes
  for(let i=0;i<2;i++){
    ctx.beginPath();
    ctx.arc((i===0?-1:1)*s*0.12,-s*0.72,s*0.07,0,Math.PI*2);
    ctx.fillStyle=eyeColor;
    ctx.fill();
    const blink=Math.sin(lt*3+i*1.5)>0.9?0.1:1;
    ctx.globalAlpha=0.75*blink;
    ctx.beginPath();
    ctx.arc((i===0?-1:1)*s*0.12,-s*0.72,s*0.04,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.8)';
    ctx.fill();
    ctx.globalAlpha=0.75;
  }
  // antenna
  ctx.beginPath();
  ctx.moveTo(0,-s*0.9);
  ctx.lineTo(0,-s*1.15);
  ctx.strokeStyle=col;
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0,-s*1.18,s*0.04,0,Math.PI*2);
  ctx.fillStyle=eyeColor;
  ctx.fill();
  // arms
  for(let arm=0;arm<2;arm++){
    const side=arm===0?-1:1;
    const aAngle=Math.sin(lt*2+arm*Math.PI)*0.4;
    ctx.save();
    ctx.translate(side*s*0.4,-s*0.35);
    ctx.rotate(aAngle);
    ctx.beginPath();
    ctx.rect(side*0,-s*0.05,side*s*0.35,s*0.1);
    ctx.fillStyle=col;
    ctx.fill();
    ctx.restore();
  }
  // legs
  for(let leg=0;leg<2;leg++){
    const side=leg===0?-1:1;
    const lAngle=Math.sin(lt*3+leg*Math.PI)*0.5;
    ctx.save();
    ctx.translate(side*s*0.2,s*0.2);
    ctx.rotate(lAngle);
    ctx.beginPath();
    ctx.rect(-s*0.1,0,s*0.2,s*0.4);
    ctx.fillStyle=col;
    ctx.fill();
    ctx.restore();
  }
  // chest panel
  for(let row=0;row<3;row++)
    for(let col2=0;col2<3;col2++){
      const on=Math.sin(lt*4+row+col2)>0;
      ctx.beginPath();
      ctx.rect(-s*0.27+col2*s*0.18,-s*0.38+row*s*0.2,s*0.13,s*0.13);
      ctx.fillStyle=on?atariRgba(ATARI[(row*3+col2)*4%ATARI.length],0.9):'rgba(0,0,0,0.5)';
      ctx.fill();
    }
  ctx.restore();
}

// ─── CATEGORY THEORY GRAPH ───────────────────────────────────────────────────
function makeCatGraph(){
  const nodes=[];
  const n=6+Math.floor(Math.random()*8);
  for(let i=0;i<n;i++){
    const angle=(Math.PI*2*i/n);
    const r=100+Math.random()*80;
    nodes.push({
      x:cx+Math.cos(angle)*r*(W/900),
      y:cy+Math.sin(angle)*r*(H/600),
      label:pick(CAT_LABELS),
      col:ATARI[Math.floor(Math.random()*ATARI.length)],
      symbol:pick(MATH),
      r:12+Math.random()*10
    });
  }
  const arrows=[];
  for(let i=0;i<n;i++)
    for(let j=i+1;j<n;j++)
      if(Math.random()<0.45)
        arrows.push({a:i,b:j,bidirectional:Math.random()<0.3,label:pick(MATH)});
  return {nodes,arrows};
}

function drawCatGraph(cg){
  ctx.save();
  ctx.globalAlpha=0.5;
  // arrows
  for(const a of cg.arrows){
    const n0=cg.nodes[a.a], n1=cg.nodes[a.b];
    const dx=n1.x-n0.x, dy=n1.y-n0.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/d, uy=dy/d;
    ctx.beginPath();
    ctx.moveTo(n0.x+ux*n0.r, n0.y+uy*n0.r);
    ctx.lineTo(n1.x-ux*n1.r, n1.y-uy*n1.r);
    ctx.strokeStyle=`rgba(180,220,255,0.4)`;
    ctx.lineWidth=1;
    ctx.stroke();
    // arrowhead
    const ax=n1.x-ux*n1.r, ay=n1.y-uy*n1.r;
    ctx.beginPath();
    ctx.moveTo(ax,ay);
    ctx.lineTo(ax-ux*8+uy*5, ay-uy*8-ux*5);
    ctx.lineTo(ax-ux*8-uy*5, ay-uy*8+ux*5);
    ctx.closePath();
    ctx.fillStyle='rgba(180,220,255,0.5)';
    ctx.fill();
    // label
    ctx.font='8px Courier New';
    ctx.fillStyle='rgba(220,255,220,0.6)';
    ctx.fillText(a.label,(n0.x+n1.x)/2,(n0.y+n1.y)/2);
  }
  // nodes
  for(const n of cg.nodes){
    const pulse=Math.sin(t*1.5+n.x*0.01)*3;
    ctx.beginPath();
    ctx.arc(n.x,n.y,n.r+pulse,0,Math.PI*2);
    ctx.strokeStyle=atariRgba(n.col,0.8);
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fill();
    ctx.font=`bold ${n.r*0.9}px Courier New`;
    ctx.fillStyle=atariRgba(n.col,0.9);
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(n.symbol,n.x,n.y);
    ctx.font=`7px Courier New`;
    ctx.fillStyle='rgba(200,230,200,0.6)';
    ctx.fillText(n.label,n.x,n.y+n.r+10);
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';
  }
  ctx.restore();
}

// ─── IMPLANT RINGS ───────────────────────────────────────────────────────────
function makeImplantRings(){
  const rings=[];
  for(let i=0;i<4+Math.floor(Math.random()*5);i++){
    const x=rnd(100,W-100), y=rnd(100,H-100);
    const r=30+Math.random()*100;
    rings.push({
      x,y,r,
      speed:rnd(-1,1)*0.8,
      phase:Math.random()*Math.PI*2,
      col:ATARI[Math.floor(Math.random()*ATARI.length)],
      ticks:Math.floor(rnd(8,32)),
      label:CAT_LABELS[Math.floor(Math.random()*CAT_LABELS.length)].slice(0,12),
      segments:Math.floor(rnd(3,16)),
      innerData:Array.from({length:12},()=>Math.random())
    });
  }
  return rings;
}

function drawImplantRing(ring){
  const {x,y,r,speed,phase,col,ticks,segments,innerData}=ring;
  const angle=t*speed+phase;
  ctx.save();
  ctx.translate(x,y);
  ctx.globalAlpha=0.6;
  // outer ring
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle=atariRgba(col,0.6);
  ctx.lineWidth=1;
  ctx.stroke();
  // tick marks
  for(let i=0;i<ticks;i++){
    const a=angle+i*(Math.PI*2/ticks);
    const inner=i%4===0?r*0.85:r*0.92;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*inner, Math.sin(a)*inner);
    ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    ctx.strokeStyle=atariRgba(col, i%4===0?0.9:0.4);
    ctx.lineWidth=i%4===0?1.5:0.5;
    ctx.stroke();
  }
  // inner segments (like antikythera gear)
  for(let i=0;i<segments;i++){
    const a0=angle+i*(Math.PI*2/segments);
    const a1=a0+(Math.PI*2/segments)*0.8;
    const ri=r*0.55, ro=r*0.78;
    ctx.beginPath();
    ctx.arc(0,0,ro,a0,a1);
    ctx.arc(0,0,ri,a1,a0,true);
    ctx.closePath();
    ctx.fillStyle=atariRgba(col,0.15+innerData[i%12]*0.25);
    ctx.fill();
    ctx.strokeStyle=atariRgba(col,0.5);
    ctx.lineWidth=0.5;
    ctx.stroke();
  }
  // center hub
  ctx.beginPath();
  ctx.arc(0,0,r*0.3,0,Math.PI*2);
  ctx.strokeStyle=atariRgba(col,0.5);
  ctx.lineWidth=0.8;
  ctx.stroke();
  // data bars (bar chart inside)
  for(let i=0;i<innerData.length;i++){
    const a=angle+i*(Math.PI*2/innerData.length);
    const barLen=r*0.25*innerData[i];
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*barLen, Math.sin(a)*barLen);
    ctx.strokeStyle=atariRgba(col,0.7);
    ctx.lineWidth=2;
    ctx.stroke();
  }
  // label
  ctx.font=`7px Courier New`;
  ctx.fillStyle=atariRgba(col,0.7);
  ctx.textAlign='center';
  ctx.fillText(ring.label,0,r+14);
  ctx.textAlign='left';
  ctx.restore();
}

// ─── COSMOLOGY / STAR FIELD ───────────────────────────────────────────────────
let stars=[];
function makeStars(){
  stars=[];
  for(let i=0;i<200;i++)
    stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5,
      v:rnd(0.02,0.15),col:ATARI[Math.floor(Math.random()*4)*16%ATARI.length]});
}

function drawStars(){
  ctx.save();
  ctx.globalAlpha=0.5;
  for(const s of stars){
    s.y+=s.v;
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
    const twinkle=0.4+0.6*Math.sin(t*3+s.x);
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=atariRgba(s.col,twinkle);
    ctx.fill();
  }
  ctx.restore();
}

// ─── ESOTERIC MECHANISMS ──────────────────────────────────────────────────────
let mechanisms=[];
function makeMechanisms(){
  mechanisms=[];
  for(let i=0;i<5+Math.floor(Math.random()*6);i++){
    const x=rnd(80,W-80), y=rnd(80,H-80);
    const r=20+Math.random()*50;
    const teeth=Math.floor(rnd(8,24));
    mechanisms.push({
      x,y,r,teeth,
      speed:rnd(-1.5,1.5),
      phase:Math.random()*Math.PI*2,
      col:ATARI[Math.floor(Math.random()*ATARI.length)],
      inner:Math.random()<0.5,
      connected:i>0&&Math.random()<0.6?Math.floor(Math.random()*i):null
    });
  }
}

function drawGear(gx,gy,gr,teeth,angle,col,showInner){
  const toothH=gr*0.25, toothW=(Math.PI*2/teeth)*0.4;
  ctx.save();
  ctx.translate(gx,gy);
  ctx.rotate(angle);
  ctx.beginPath();
  for(let i=0;i<teeth;i++){
    const a0=i*(Math.PI*2/teeth);
    const a1=a0+toothW, a2=a0+(Math.PI*2/teeth)-toothW, a3=a0+(Math.PI*2/teeth);
    ctx.arc(0,0,gr,a0,a1);
    ctx.lineTo(Math.cos(a1)*(gr+toothH), Math.sin(a1)*(gr+toothH));
    ctx.lineTo(Math.cos(a2)*(gr+toothH), Math.sin(a2)*(gr+toothH));
    ctx.arc(0,0,gr,a2,a3);
  }
  ctx.closePath();
  ctx.strokeStyle=atariRgba(col,0.7);
  ctx.lineWidth=1.2;
  ctx.stroke();
  ctx.fillStyle=atariRgba(col,0.07);
  ctx.fill();
  if(showInner){
    ctx.beginPath();
    ctx.arc(0,0,gr*0.55,0,Math.PI*2);
    ctx.strokeStyle=atariRgba(col,0.4);
    ctx.lineWidth=0.7;
    ctx.stroke();
    for(let s=0;s<6;s++){
      const sa=angle+s*(Math.PI/3);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(sa)*gr*0.52,Math.sin(sa)*gr*0.52);
      ctx.strokeStyle=atariRgba(col,0.3);
      ctx.lineWidth=0.7;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(0,0,gr*0.15,0,Math.PI*2);
    ctx.fillStyle=atariRgba(col,0.5);
    ctx.fill();
  }
  ctx.restore();
}

function drawMechanisms(){
  ctx.save();
  ctx.globalAlpha=0.5;
  for(let i=0;i<mechanisms.length;i++){
    const m=mechanisms[i];
    const angle=t*m.speed+m.phase;
    drawGear(m.x,m.y,m.r,m.teeth,angle,m.col,m.inner);
    // belt/chain to connected gear
    if(m.connected!==null){
      const m2=mechanisms[m.connected];
      ctx.beginPath();
      ctx.moveTo(m.x,m.y); ctx.lineTo(m2.x,m2.y);
      ctx.strokeStyle=atariRgba(m.col,0.15);
      ctx.lineWidth=0.5;
      ctx.setLineDash([4,6]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  ctx.restore();
}

// ─── SCANLINES & VIGNETTE ────────────────────────────────────────────────────
function drawScanlines(){
  ctx.save();
  ctx.globalAlpha=0.03;
  for(let y=0;y<H;y+=2){
    ctx.fillStyle='rgba(0,0,0,1)';
    ctx.fillRect(0,y,W,1);
  }
  // vignette
  const vg=ctx.createRadialGradient(cx,cy,H*0.2,cx,cy,H*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.globalAlpha=1;
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ─── RANDOMIZE EVERYTHING ────────────────────────────────────────────────────
function randomize(){
  seed=Math.random()*0xFFFFFF|0;
  colorWheels=[];
  const nw=4+Math.floor(Math.random()*6);
  for(let i=0;i<nw;i++){
    colorWheels.push(makeColorWheel(
      rnd(100,W-100), rnd(100,H-100),
      rnd(60,Math.min(W,H)*0.22),
      rnd(0.2,1.2),
      ['harmony','complementary','triadic','atari'][Math.floor(Math.random()*4)],
      rnd(0.12,0.32)
    ));
  }
  polytopes=[];
  const np=3+Math.floor(Math.random()*5);
  for(let i=0;i<np;i++){
    polytopes.push(makePolytope(
      rnd(80,W-80), rnd(80,H-80),
      rnd(60,150),
      `hsl(${Math.random()*360},80%,60%)`,
      pick(POLYTOPES)
    ));
  }
  pcbNodes=[]; pcbEdges=[];
  const pcb=makePCB(); pcbNodes=pcb.nodes; pcbEdges=pcb.edges;
  tronSegs=makeTronGrid();
  asmLines=makeAsmLines();
  mazeGrid=makeMaze(Math.floor(W/30),Math.floor(H/30));
  robotParts=[];
  const nr=3+Math.floor(Math.random()*5);
  const robotCols=['hsl(200,70%,55%)','hsl(120,60%,45%)','hsl(340,70%,55%)','hsl(40,80%,50%)','hsl(280,60%,55%)'];
  for(let i=0;i<nr;i++)
    robotParts.push(makeRobot(rnd(60,W-60),rnd(80,H-80),rnd(20,55),pick(robotCols)));
  catNodes=makeCatGraph();
  implantRings=makeImplantRings();
  makeMechanisms();
  makeStars();
  beep(220+Math.random()*440,0.15,'sawtooth',0.05);
  updateHUD();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD(){
  if(!hudOn) return;
  document.getElementById('h-frame').textContent=frame;
  document.getElementById('h-seed').textContent=seed.toString(16).toUpperCase();
  document.getElementById('h-wheels').textContent=colorWheels.length;
  document.getElementById('h-poly').textContent=polytopes.length;
  document.getElementById('h-asm').textContent=asmLines.length;
  document.getElementById('h-pcb').textContent=pcbNodes.length;
  document.getElementById('h-tron').textContent=tronSegs.segs.length;
  document.getElementById('h-omega').textContent=(t%100).toFixed(1);
  document.getElementById('h-layer').textContent='∞';
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,H);

  // 1. Stars / cosmology
  drawStars();

  // 2. Tron grid
  if(tronSegs) drawTronGrid(tronSegs);

  // 3. PCB circuits
  if(pcbNodes.length) drawPCB({nodes:pcbNodes,edges:pcbEdges});

  // 4. Maze
  if(mazeGrid){
    const cw=W/mazeGrid.cols, ch=H/mazeGrid.rows;
    drawMaze(mazeGrid,0,0,cw,ch,0.12);
  }

  // 5. Category theory graph
  if(catNodes) drawCatGraph(catNodes);

  // 6. Esoteric mechanisms / gears
  drawMechanisms();

  // 7. Polytopes
  for(const p of polytopes) drawPolytope(p);

  // 8. Color wheels
  for(const w of colorWheels){
    w.angle+=w.speed*0.005;
    drawColorWheel(w);
  }

  // 9. Implant rings / antikythera
  for(const r of implantRings) drawImplantRing(r);

  // 10. Robots
  for(const r of robotParts){
    r.angle+=r.speed;
    drawRobot(r);
  }

  // 11. 6502 ASM overlay
  updateAsmLines(asmLines);
  drawAsmLines(asmLines);

  // 12. Math symbols floating
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.font='bold 22px Courier New';
  for(let i=0;i<MATH.length;i++){
    const mx=Math.sin(t*0.12+i*0.8)*W*0.4+cx;
    const my=Math.cos(t*0.09+i*1.1)*H*0.4+cy;
    ctx.fillStyle=ATARI[(i*7)%ATARI.length];
    ctx.fillText(MATH[i],mx,my);
  }
  ctx.restore();

  // 13. Scanlines & vignette
  drawScanlines();

  // 14. Border / frame
  ctx.save();
  ctx.globalAlpha=0.4;
  ctx.strokeStyle='rgba(0,255,180,0.2)';
  ctx.lineWidth=1;
  ctx.strokeRect(1,1,W-2,H-2);
  ctx.restore();

  t+=0.016; frame++;
  if(frame%60===0) updateHUD();
  requestAnimationFrame(render);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
function handleKey(e){
  if(e.code==='Space'||e.key===' '){ e.preventDefault(); randomize(); }
  if(e.key==='h'||e.key==='H'){
    hudOn=!hudOn;
    document.getElementById('hud').classList.toggle('active',hudOn);
    updateHUD();
  }
  if(e.key==='s'||e.key==='S'){
    soundOn=!soundOn;
    initAudio();
    beep(880,0.1,'sine',0.05);
  }
}
window.addEventListener('keydown',handleKey);
canvas.addEventListener('click',()=>{ initAudio(); randomize(); });
canvas.addEventListener('touchend',e=>{ e.preventDefault(); initAudio(); randomize(); },{passive:false});

// ─── BOOT ────────────────────────────────────────────────────────────────────
randomize();
render();
</script>
</body>
</html>
