// ── Engine globals ───────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,t=0,frame=0,rng=Math.random;
let hudVisible=false,soundOn=false;
let audioCtx=null,masterGain=null;
let params={};
let effects=[];
let hintTimeout;

// ── RNG seeded ───────────────────────────────────────────────────────────────
let seed=Date.now();
function srng(s){seed=s>>>0}
function rand(){seed=(seed^(seed<<13))>>>0;seed=(seed^(seed>>>17))>>>0;seed=(seed^(seed<<5))>>>0;return seed/4294967296}
function rr(a,b){return a+rand()*(b-a)}
function ri(a,b){return Math.floor(rr(a,b+1))}
function rp(){return ATARI_PALETTE[ri(0,127)]}
function rhex(c){return`#${c.toString(16).padStart(6,'0')}`}
function rc(){return rhex(rp())}

// ── Resize ───────────────────────────────────────────────────────────────────
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
window.addEventListener('resize',()=>{resize();reset()});

// ── Pick random palette subset ───────────────────────────────────────────────
function palette(n){
  const a=[];
  const used=new Set();
  while(a.length<n){const i=ri(0,127);if(!used.has(i)){used.add(i);a.push(rhex(ATARI_PALETTE[i]))}}
  return a;
}

// ── Effect classes ───────────────────────────────────────────────────────────

// 1. TIA SCAN LINE CASCADE
class ScanlineOrbit{
  constructor(){
    this.cols=palette(ri(6,12));
    this.speed=rr(0.3,2.5);
    this.thickness=ri(1,5);
    this.count=ri(20,80);
    this.phase=rand()*Math.PI*2;
    this.warp=rr(0,0.4);
    this.drift=rr(-1,1);
  }
  draw(t){
    const lines=this.count;
    for(let i=0;i<lines;i++){
      const y=(i/lines*H+(t*this.speed*50))%H;
      const c=this.cols[i%this.cols.length];
      const xoff=Math.sin(y*0.02+t*this.drift+this.phase)*this.warp*W*0.5;
      ctx.fillStyle=c;
      ctx.globalAlpha=rr(0.05,0.3);
      ctx.fillRect(xoff,y,W,this.thickness);
    }
    ctx.globalAlpha=1;
  }
}

// 2. CHROMA BURST RINGS
class ChromaBurstRings{
  constructor(){
    this.cx=rr(0.2,0.8)*W;
    this.cy=rr(0.2,0.8)*H;
    this.cols=palette(ri(8,16));
    this.speed=rr(0.5,3);
    this.rings=ri(20,80);
    this.spread=rr(0.5,2);
    this.wobble=rr(0,3);
    this.rot=rr(-1,1);
  }
  draw(t){
    for(let i=0;i<this.rings;i++){
      const r=(i/this.rings)*Math.max(W,H)*this.spread+((t*this.speed*40)%(Math.max(W,H)*this.spread));
      const c=this.cols[i%this.cols.length];
      ctx.strokeStyle=c;
      ctx.lineWidth=rr(0.5,3);
      ctx.globalAlpha=Math.max(0,1-r/(Math.max(W,H)*this.spread))*0.6;
      ctx.beginPath();
      const pts=ri(3,8);
      for(let j=0;j<=pts*8;j++){
        const a=j/pts*Math.PI*2+t*this.rot;
        const rr2=r*(1+Math.sin(j*2.7+t*this.wobble)*0.15);
        const x=this.cx+Math.cos(a)*rr2;
        const y=this.cy+Math.sin(a)*rr2;
        j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// 3. PLASMA LUMA FIELD
class PlasmaLuma{
  constructor(){
    this.freq1=rr(0.005,0.02);
    this.freq2=rr(0.003,0.015);
    this.freq3=rr(0.002,0.01);
    this.speed=rr(0.5,2);
    this.cols=palette(ri(6,12));
    this.tileW=ri(4,12);
    this.tileH=ri(4,12);
  }
  draw(t){
    const tw=this.tileW,th=this.tileH;
    const cols=W/tw+1,rows=H/th+1;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const x=c*tw,y=r*th;
        const v=Math.sin(x*this.freq1+t*this.speed)+
                Math.sin(y*this.freq2+t*this.speed*0.7)+
                Math.sin((x+y)*this.freq3+t*this.speed*1.3)+
                Math.sin(Math.sqrt(x*x+y*y)*this.freq1*0.5+t);
        const idx=Math.floor((v+4)/8*this.cols.length)%this.cols.length;
        ctx.fillStyle=this.cols[Math.abs(idx)%this.cols.length];
        ctx.globalAlpha=0.15;
        ctx.fillRect(x,y,tw,th);
      }
    }
    ctx.globalAlpha=1;
  }
}

// 4. TIA SPRITE MATRIX
class SpriteMatrix{
  constructor(){
    this.cols=palette(ri(4,8));
    this.count=ri(40,200);
    this.sprites=Array.from({length:this.count},()=>({
      x:rr(0,W),y:rr(0,H),
      w:ri(8,48),h:ri(8,48),
      vx:rr(-3,3),vy:rr(-3,3),
      rot:rand()*Math.PI*2,
      rotV:rr(-0.05,0.05),
      ci:ri(0,this.cols.length-1),
      shape:ri(0,4),
      alpha:rr(0.3,0.9)
    }));
  }
  draw(t){
    for(const s of this.sprites){
      s.x=(s.x+s.vx+W)%W;
      s.y=(s.y+s.vy+H)%H;
      s.rot+=s.rotV;
      ctx.save();
      ctx.translate(s.x,s.y);
      ctx.rotate(s.rot);
      ctx.fillStyle=this.cols[s.ci];
      ctx.globalAlpha=s.alpha*0.5;
      const w=s.w,h=s.h;
      switch(s.shape){
        case 0:ctx.fillRect(-w/2,-h/2,w,h);break;
        case 1:ctx.beginPath();ctx.arc(0,0,w/2,0,Math.PI*2);ctx.fill();break;
        case 2:ctx.beginPath();ctx.moveTo(0,-h/2);ctx.lineTo(w/2,h/2);ctx.lineTo(-w/2,h/2);ctx.closePath();ctx.fill();break;
        case 3:ctx.beginPath();for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.lineTo(Math.cos(a)*w/2,Math.sin(a)*h/2);}ctx.closePath();ctx.fill();break;
        case 4:ctx.beginPath();for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;const a2=(i+0.5)/5*Math.PI*2-Math.PI/2;ctx.lineTo(Math.cos(a)*w/2,Math.sin(a)*h/2);ctx.lineTo(Math.cos(a2)*w/4,Math.sin(a2)*h/4);}ctx.closePath();ctx.fill();break;
      }
      ctx.restore();
    }
    ctx.globalAlpha=1;
  }
}

// 5. NTSC CHROMA PHASE SPIRAL
class ChromaPhaseSpiral{
  constructor(){
    this.cx=W/2;this.cy=H/2;
    this.cols=palette(ri(8,16));
    this.turns=ri(3,12);
    this.segments=ri(200,800);
    this.speed=rr(0.3,2);
    this.r0=rr(10,50);
    this.r1=rr(0.2,0.5)*Math.min(W,H);
    this.width=rr(1,6);
    this.wobble=rr(0,5);
    this.secondary=ri(0,1)===1;
  }
  draw(t){
    const n=this.segments;
    for(let i=0;i<n;i++){
      const p=i/n;
      const a=p*this.turns*Math.PI*2+t*this.speed;
      const r=this.r0+(this.r1-this.r0)*p+Math.sin(p*30+t*this.wobble)*10;
      const x=this.cx+Math.cos(a)*r;
      const y=this.cy+Math.sin(a)*r;
      const ci=Math.floor(p*this.cols.length)%this.cols.length;
      ctx.fillStyle=this.cols[ci];
      ctx.globalAlpha=(0.2+0.4*Math.sin(p*Math.PI))*0.7;
      const sz=this.width*(1+Math.sin(p*20+t)*0.3);
      ctx.fillRect(x-sz/2,y-sz/2,sz,sz);
      if(this.secondary){
        const a2=a+Math.PI;
        ctx.fillStyle=this.cols[(ci+3)%this.cols.length];
        ctx.fillRect(this.cx+Math.cos(a2)*r-sz/2,this.cy+Math.sin(a2)*r-sz/2,sz,sz);
      }
    }
    ctx.globalAlpha=1;
  }
}

// 6. COLOR BURST EXPLOSION
class ColorBurst{
  constructor(){
    this.cx=rr(0.1,0.9)*W;
    this.cy=rr(0.1,0.9)*H;
    this.cols=palette(ri(8,16));
    this.rays=ri(16,64);
    this.len=rr(0.2,0.6)*Math.min(W,H);
    this.speed=rr(0.3,2);
    this.wobble=rr(0,8);
    this.width=rr(0.5,4);
  }
  draw(t){
    for(let i=0;i<this.rays;i++){
      const a=i/this.rays*Math.PI*2+t*this.speed;
      const len=this.len*(0.6+0.4*Math.sin(i*1.7+t*this.wobble));
      const c=this.cols[i%this.cols.length];
      const grad=ctx.createLinearGradient(this.cx,this.cy,this.cx+Math.cos(a)*len,this.cy+Math.sin(a)*len);
      grad.addColorStop(0,c);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.strokeStyle=grad;
      ctx.lineWidth=this.width*(1+Math.sin(i*3.1+t)*0.5);
      ctx.globalAlpha=0.4;
      ctx.beginPath();
      ctx.moveTo(this.cx,this.cy);
      ctx.lineTo(this.cx+Math.cos(a)*len,this.cy+Math.sin(a)*len);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// 7. PLAYFIELD MOSAIC
class PlayfieldMosaic{
  constructor(){
    this.cols=palette(ri(4,8));
    this.cellW=ri(8,32);
    this.cellH=ri(8,32);
    this.speed=rr(0.5,3);
    this.pattern=ri(0,3);
    this.scroll=rr(-2,2);
  }
  draw(t){
    const cols=Math.ceil(W/this.cellW)+2;
    const rows=Math.ceil(H/this.cellH)+2;
    const offX=(t*this.scroll*20)%this.cellW;
    const offY=(t*this.scroll*10)%this.cellH;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const x=c*this.cellW-offX;
        const y=r*this.cellH-offY;
        let ci;
        switch(this.pattern){
          case 0:ci=(r+c+Math.floor(t*this.speed))%this.cols.length;break;
          case 1:ci=Math.floor((Math.sin(r*0.5+t)+Math.cos(c*0.5+t))*2+2)%this.cols.length;break;
          case 2:ci=(r^c)%this.cols.length;break;
          case 3:ci=Math.floor(Math.sqrt(r*r+c*c)+t*this.speed)%this.cols.length;break;
        }
        ctx.fillStyle=this.cols[Math.abs(ci)%this.cols.length];
        ctx.globalAlpha=0.12;
        ctx.fillRect(x,y,this.cellW-1,this.cellH-1);
      }
    }
    ctx.globalAlpha=1;
  }
}

// 8. VOLTAGE ARCS
class VoltageArcs{
  constructor(){
    this.cols=palette(ri(4,8));
    this.arcs=ri(4,16);
    this.speed=rr(1,4);
    this.nodes=Array.from({length:ri(4,12)},()=>({x:rr(0,W),y:rr(0,H)}));
  }
  draw(t){
    const arcs=this.arcs;
    for(let a=0;a<arcs;a++){
      const n1=this.nodes[a%this.nodes.length];
      const n2=this.nodes[(a+1)%this.nodes.length];
      ctx.strokeStyle=this.cols[a%this.cols.length];
      ctx.lineWidth=rr(0.5,2);
      ctx.globalAlpha=0.3;
      ctx.beginPath();
      ctx.moveTo(n1.x,n1.y);
      const segs=ri(4,12);
      let px=n1.x,py=n1.y;
      for(let s=1;s<=segs;s++){
        const p=s/segs;
        const bx=n1.x+(n2.x-n1.x)*p;
        const by=n1.y+(n2.y-n1.y)*p;
        const jitter=40*Math.sin(s*7.3+t*this.speed+a);
        const jy=40*Math.cos(s*5.1+t*this.speed*0.8+a);
        ctx.lineTo(bx+jitter,by+jy);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// 9. COLOR CLOCK MANDALA
class ColorClockMandala{
  constructor(){
    this.cx=rr(0.2,0.8)*W;
    this.cy=rr(0.2,0.8)*H;
    this.cols=palette(ri(8,16));
    this.arms=ri(6,24);
    this.r=rr(50,200);
    this.speed=rr(0.1,1.5);
    this.petals=ri(4,12);
    this.depth=ri(2,5);
  }
  draw(t){
    for(let d=0;d<this.depth;d++){
      const r=this.r*(1-d/this.depth*0.5);
      const rot=t*this.speed*(d%2===0?1:-1);
      for(let a=0;a<this.arms;a++){
        const ang=a/this.arms*Math.PI*2+rot;
        const c=this.cols[(a+d*3)%this.cols.length];
        for(let p=0;p<this.petals;p++){
          const pa=ang+p/this.petals*Math.PI*0.5;
          const pr=r*(0.5+0.5*Math.sin(p/this.petals*Math.PI));
          ctx.fillStyle=c;
          ctx.globalAlpha=0.08+0.05*d;
          ctx.beginPath();
          ctx.arc(this.cx+Math.cos(pa)*pr,this.cy+Math.sin(pa)*pr,r*0.15,0,Math.PI*2);
          ctx.fill();
        }
      }
    }
    ctx.globalAlpha=1;
  }
}

// 10. LISSAJOUS RIVER
class LissajousRiver{
  constructor(){
    this.cols=palette(ri(6,12));
    this.ax=ri(1,8);
    this.ay=ri(1,8);
    this.delta=rand()*Math.PI;
    this.speed=rr(0.2,1.5);
    this.pts=ri(500,3000);
    this.rx=rr(0.2,0.45)*W;
    this.ry=rr(0.2,0.45)*H;
    this.cx=rr(0.3,0.7)*W;
    this.cy=rr(0.3,0.7)*H;
    this.width=rr(0.5,3);
    this.trail=rr(0.5,0.8);
  }
  draw(t){
    const n=this.pts;
    const speed=t*this.speed;
    for(let i=0;i<n;i++){
      const p=i/n;
      const a=p*Math.PI*2+speed;
      const x=this.cx+Math.sin(this.ax*a+this.delta)*this.rx;
      const y=this.cy+Math.sin(this.ay*a)*this.ry;
      const ci=Math.floor(p*this.cols.length)%this.cols.length;
      ctx.fillStyle=this.cols[ci];
      ctx.globalAlpha=0.04*(1+Math.sin(p*20+t)*0.3);
      ctx.fillRect(x,y,this.width,this.width);
    }
    ctx.globalAlpha=1;
  }
}

// 11. PIXEL RAIN MATRIX
class PixelRainMatrix{
  constructor(){
    this.cols=palette(ri(4,8));
    this.col_size=ri(4,16);
    this.drops=[];
    const cols=Math.ceil(W/this.col_size);
    for(let c=0;c<cols;c++){
      this.drops.push({x:c*this.col_size,y:rr(-H,0),speed:rr(50,300),ci:ri(0,this.cols.length-1)});
    }
    this.speed_mult=rr(0.5,2);
  }
  draw(t,dt){
    for(const d of this.drops){
      d.y+=d.speed*dt;
      if(d.y>H){d.y=-rr(0,H);d.ci=ri(0,this.cols.length-1)}
      ctx.fillStyle=this.cols[d.ci];
      ctx.globalAlpha=0.15;
      ctx.fillRect(d.x,d.y,this.col_size-1,this.col_size*rr(2,8));
      // head glow
      ctx.fillStyle='#ffffff';
      ctx.globalAlpha=0.1;
      ctx.fillRect(d.x,d.y,this.col_size-1,this.col_size);
    }
    ctx.globalAlpha=1;
  }
}

// 12. HYPERBOLOID WIRE
class HyperboloidWire{
  constructor(){
    this.cx=rr(0.2,0.8)*W;
    this.cy=rr(0.2,0.8)*H;
    this.cols=palette(ri(6,12));
    this.lines=ri(20,60);
    this.h=rr(100,300);
    this.r=rr(50,200);
    this.speed=rr(0.3,1.5);
    this.tilt=rr(0.2,0.8);
  }
  draw(t){
    const n=this.lines;
    for(let i=0;i<n;i++){
      const a1=i/n*Math.PI*2+t*this.speed;
      const a2=a1+Math.PI*this.tilt;
      const x1=this.cx+Math.cos(a1)*this.r;
      const y1=this.cy-this.h/2+Math.sin(a1)*this.r*0.3;
      const x2=this.cx+Math.cos(a2)*this.r;
      const y2=this.cy+this.h/2+Math.sin(a2)*this.r*0.3;
      const c=this.cols[i%this.cols.length];
      ctx.strokeStyle=c;
      ctx.lineWidth=rr(0.5,2);
      ctx.globalAlpha=0.25;
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// 13. QUANTUM FIELD DOTS
class QuantumFieldDots{
  constructor(){
    this.cols=palette(ri(6,12));
    this.gridW=ri(20,60);
    this.gridH=ri(15,45);
    this.speed=rr(0.5,3);
    this.amp=rr(5,30);
    this.freq=rr(0.1,0.5);
    this.dotR=rr(2,8);
  }
  draw(t){
    const gw=this.gridW,gh=this.gridH;
    const cw=W/gw,ch=H/gh;
    for(let r=0;r<gh;r++){
      for(let c=0;c<gw;c++){
        const bx=(c+0.5)*cw,by=(r+0.5)*ch;
        const phase=Math.sin(c*this.freq+t*this.speed)+Math.cos(r*this.freq*0.7+t*this.speed*0.8);
        const ox=Math.sin(phase*3.7)*this.amp;
        const oy=Math.cos(phase*2.9)*this.amp;
        const ci=Math.floor(((phase+2)/4)*this.cols.length)%this.cols.length;
        const r2=this.dotR*(0.5+0.5*(phase+1));
        ctx.fillStyle=this.cols[Math.abs(ci)];
        ctx.globalAlpha=0.2*(0.5+0.5*(phase+1));
        ctx.beginPath();
        ctx.arc(bx+ox,by+oy,r2,0,Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
}

// 14. COLOR WORMHOLE TUNNEL
class WormholeTunnel{
  constructor(){
    this.cx=rr(0.3,0.7)*W;
    this.cy=rr(0.3,0.7)*H;
    this.cols=palette(ri(6,12));
    this.rings=ri(20,60);
    this.speed=rr(1,4);
    this.warp=rr(0.3,1.5);
    this.rot=rr(-1,1);
    this.scale=rr(0.3,0.7)*Math.min(W,H);
  }
  draw(t){
    for(let i=0;i<this.rings;i++){
      const p=((i/this.rings+t*this.speed*0.05)%1);
      const r=Math.pow(p,this.warp)*this.scale;
      const c=this.cols[Math.floor(p*this.cols.length)%this.cols.length];
      const a=t*this.rot+p*Math.PI*2;
      ctx.strokeStyle=c;
      ctx.lineWidth=2*(1-p)*3;
      ctx.globalAlpha=(1-p)*0.4;
      ctx.beginPath();
      const sides=ri(4,8)+Math.floor(p*4);
      for(let j=0;j<=sides*2;j++){
        const ang=j/sides*Math.PI+a;
        const x=this.cx+Math.cos(ang)*r*(1+Math.sin(j+t)*0.1);
        const y=this.cy+Math.sin(ang)*r*(1+Math.cos(j*1.3+t)*0.1);
        j===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// 15. ELECTRIC PALETTE WEAVE
class PaletteWeave{
  constructor(){
    this.cols=palette(ri(8,16));
    this.threads=ri(8,32);
    this.speed=rr(0.5,3);
    this.amp=rr(20,80);
    this.freq=rr(1,5);
  }
  draw(t){
    for(let i=0;i<this.threads;i++){
      const ci=this.cols[i%this.cols.length];
      const phase=i/this.threads*Math.PI*2;
      ctx.strokeStyle=ci;
      ctx.lineWidth=rr(1,4);
      ctx.globalAlpha=0.2;
      ctx.beginPath();
      for(let x=0;x<=W;x+=4){
        const y=H/2*(i/this.threads)+(H/4)*Math.sin(x*this.freq*0.01+t*this.speed+phase)*this.amp/80;
        x===0?ctx.moveTo(x,y+H*0.1):ctx.lineTo(x,y+H*0.1);
      }
      ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

// ── Effect pool ───────────────────────────────────────────────────────────────
const EFFECT_CLASSES=[
  ScanlineOrbit,ChromaBurstRings,PlasmaLuma,SpriteMatrix,
  ChromaPhaseSpiral,ColorBurst,PlayfieldMosaic,VoltageArcs,
  ColorClockMandala,LissajousRiver,PixelRainMatrix,HyperboloidWire,
  QuantumFieldDots,WormholeTunnel,PaletteWeave
];

// ── Reset / init ──────────────────────────────────────────────────────────────
function reset(){
  seed=Date.now()^(Math.random()*0xFFFFFFFF)|0;
  t=0;frame=0;
  effects=[];
  const n=ri(4,9);
  const chosen=[];
  const pool=[...EFFECT_CLASSES];
  for(let i=0;i<n;i++){
    const idx=ri(0,pool.length-1);
    chosen.push(pool.splice(idx,1)[0]);
  }
  for(const EC of chosen) effects.push(new EC());

  // BG color
  params.bgCol=rhex(ATARI_PALETTE[ri(0,7)]); // very dark palette entries
  params.bgAlpha=rr(0.05,0.15);
  params.vignetteStrength=rr(0.3,0.8);
  params.scanlineAlpha=rr(0.02,0.08);

  showHint();
}

// ── Vignette ──────────────────────────────────────────────────────────────────
function drawVignette(strength){
  const grad=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.8);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(1,`rgba(0,0,0,${strength})`);
  ctx.fillStyle=grad;
  ctx.globalAlpha=1;
  ctx.fillRect(0,0,W,H);
}

// ── CRT scanlines overlay ─────────────────────────────────────────────────────
function drawCRTLines(alpha){
  ctx.globalAlpha=alpha;
  ctx.fillStyle='#000';
  for(let y=0;y<H;y+=4){
    ctx.fillRect(0,y,W,2);
  }
  ctx.globalAlpha=1;
}

// ── HUD display ───────────────────────────────────────────────────────────────
const hud=document.getElementById('hud');
function updateHUD(){
  if(!hudVisible){hud.style.display='none';return;}
  hud.style.display='block';
  hud.innerHTML=`
ATARI 2600 TIA COLOR SCIENCE VISUAL ENGINE &nbsp;|&nbsp; Frame: ${frame} &nbsp;|&nbsp; T: ${t.toFixed(2)}s
Effects: ${effects.map(e=>e.constructor.name).join(', ')}
Palette: ${ATARI_PALETTE.length} colors &nbsp;|&nbsp; Seed: ${seed} &nbsp;|&nbsp; Sound: ${soundOn?'ON':'OFF'}
TIA Chip: NTSC 3.58MHz chroma &nbsp;|&nbsp; Scanlines: 262 &nbsp;|&nbsp; Colors: 128
  `.trim();
}

// ── Audio engine ──────────────────────────────────────────────────────────────
function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.08;
  masterGain.connect(audioCtx.destination);
  // TIA-style drone
  createTIATone(55,0.3,'sawtooth');
  createTIATone(110,0.2,'square');
  createTIATone(220,0.1,'sawtooth');
  createArpeggio();
}
function createTIATone(freq,gain,type){
  const osc=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  osc.type=type;
  osc.frequency.value=freq;
  g.gain.value=gain;
  osc.connect(g);g.connect(masterGain);
  osc.start();
}
function createArpeggio(){
  const notes=[130,196,262,330,392,523];
  let ni=0;
  const play=()=>{
    if(!soundOn)return;
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.type='square';
    osc.frequency.value=notes[ni%notes.length];
    g.gain.setValueAtTime(0.15,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
    osc.connect(g);g.connect(masterGain);
    osc.start();osc.stop(audioCtx.currentTime+0.12);
    ni++;
    setTimeout(play,ri(80,300));
  };
  play();
}
function toggleSound(){
  soundOn=!soundOn;
  if(soundOn){
    initAudio();
    masterGain&&(masterGain.gain.value=0.08);
  } else {
    masterGain&&(masterGain.gain.value=0);
  }
}

// ── Hint fade ─────────────────────────────────────────────────────────────────
const hint=document.getElementById('hint');
function showHint(){
  hint.style.opacity='1';
  clearTimeout(hintTimeout);
  hintTimeout=setTimeout(()=>{hint.style.opacity='0';},4000);
}

// ── Animation loop ────────────────────────────────────────────────────────────
let lastTime=0;
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  t+=dt;
  frame++;

  // Background fade
  ctx.fillStyle='#000000';
  ctx.globalAlpha=params.bgAlpha||0.08;
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;

  // Draw all effects
  for(const e of effects){
    try{
      if(e instanceof PixelRainMatrix) e.draw(t,dt);
      else e.draw(t);
    }catch(_){}
  }

  // CRT overlay
  drawCRTLines(params.scanlineAlpha||0.04);
  drawVignette(params.vignetteStrength||0.5);

  // Occasional palette flash
  if(frame%180===0){
    const c=ATARI_PALETTE[ri(0,127)];
    ctx.fillStyle=rhex(c);
    ctx.globalAlpha=0.02;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=1;
  }

  updateHUD();
}

// ── Input events ──────────────────────────────────────────────────────────────
function handleReset(e){
  if(e&&e.preventDefault)e.preventDefault();
  reset();
}
window.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();reset();}
  if(e.key==='h'||e.key==='H'){hudVisible=!hudVisible;updateHUD();}
  if(e.key==='s'||e.key==='S'){toggleSound();}
});
canvas.addEventListener('click',handleReset);
canvas.addEventListener('touchstart',handleReset,{passive:false});

// ── Boot ──────────────────────────────────────────────────────────────────────
resize();
reset();
requestAnimationFrame(loop);
</script>
