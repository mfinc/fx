// ===================== COLOR HELPERS =====================
function hsl(h,s,l,a=1){return `hsla(${h%360},${s}%,${l}%,${a})`;}
function hsv2hsl(h,s,v){let l=(2-s)*v/2;let ss=l&&l<1?s*v/(l<0.5?l*2:2-l*2):s;return [h,ss*100,l*100];}
function lerp(a,b,t){return a+(b-a)*t;}
function atariColor(idx){return ATARI[((idx||0)+ATARI.length)%ATARI.length];}

// Munsell-like mapping
function munsellHue(t){
  const hues=['5R','10R','5YR','10YR','5Y','10Y','5GY','10GY','5G','10G','5BG','10BG','5B','10B','5PB','10PB','5P','10P','5RP','10RP'];
  return hues[Math.floor(t/360*hues.length)%hues.length];
}

// CIE chromaticity coords (simplified horseshoe points)
function chromaPoint(lambda) {
  // Very simplified: map wavelength 380-700 to xy
  const t = (lambda-380)/320;
  const x = 0.174+0.682*Math.sin(t*Math.PI)*Math.pow(t,0.4);
  const y = 0.005+0.838*Math.sin(t*Math.PI*0.9)*Math.pow(t,0.5)*(1-t*0.3);
  return [x,y];
}

// ===================== DRAW FUNCTIONS =====================

// --- Background gradient ---
function drawBackground() {
  const h = (P.timeHue + T*10) % 360;
  const grad = ctx.createRadialGradient(CX,CY,0,CX,CY,Math.max(W,H)*0.8);
  grad.addColorStop(0, hsl(h,20,6));
  grad.addColorStop(0.5, hsl((h+60)%360,15,4));
  grad.addColorStop(1, hsl((h+120)%360,10,2));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

// --- Tron game grid ---
function drawTronGrid() {
  const sp = P.gridSpacing||50;
  const shift = (T*P.gridSpeed*30)%sp;
  ctx.save();
  ctx.globalAlpha = P.gridAlpha;
  ctx.strokeStyle = P.gridColor;
  ctx.lineWidth = 0.5;
  for(let x=-sp+shift%sp; x<W+sp; x+=sp){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let y=-sp+(shift*0.7)%sp; y<H+sp; y+=sp){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // Tron-style bright intersections
  ctx.globalAlpha = P.gridAlpha*1.5;
  ctx.fillStyle = P.gridColor;
  for(let x=-sp+shift%sp; x<W+sp; x+=sp){
    for(let y=-sp+(shift*0.7)%sp; y<H+sp; y+=sp){
      ctx.beginPath(); ctx.arc(x,y,1.2,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

// --- Atari 2600 scanlines ---
function drawAtariScanlines() {
  ctx.save();
  ctx.globalAlpha = P.atariAlpha;
  const idx0 = P.atariPalIdx||0;
  const blockH = Math.max(2, Math.floor(H/64));
  for(let i=0;i<H;i+=blockH){
    const ci = (idx0 + Math.floor(i/blockH))%ATARI.length;
    ctx.fillStyle = ATARI[ci];
    ctx.fillRect(0,i,W,blockH);
  }
  ctx.restore();
}

// --- Chromaticity Diagram ---
function drawChromaticity(ox,oy,scale,alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(ox,oy);
  // Draw horseshoe
  ctx.beginPath();
  for(let lam=380;lam<=700;lam+=5){
    const [x,y] = chromaPoint(lam);
    const px = (x-0.18)*scale*2.2;
    const py = -(y-0.02)*scale*2.2;
    lam===380?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  // Fill with gradient
  const grad = ctx.createLinearGradient(-scale,scale,-scale*0.2,-scale*0.6);
  grad.addColorStop(0,'rgba(255,0,0,0.3)');
  grad.addColorStop(0.16,'rgba(255,128,0,0.3)');
  grad.addColorStop(0.33,'rgba(255,255,0,0.3)');
  grad.addColorStop(0.5,'rgba(0,255,0,0.3)');
  grad.addColorStop(0.66,'rgba(0,128,255,0.3)');
  grad.addColorStop(0.83,'rgba(0,0,255,0.3)');
  grad.addColorStop(1,'rgba(128,0,255,0.3)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#fff4';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // D65 white point
  ctx.beginPath();
  ctx.arc((0.3127-0.18)*scale*2.2,-(0.3290-0.02)*scale*2.2,4,0,Math.PI*2);
  ctx.fillStyle='#fffb';
  ctx.fill();
  ctx.restore();
}

// --- Color Harmony Wheel ---
function drawColorWheel(cx,cy,r,segments,rotation,alpha,system,hueOffset) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const segAngle = (Math.PI*2)/segments;
  for(let i=0;i<segments;i++){
    const a0 = i*segAngle + rotation;
    const a1 = a0+segAngle;
    const hue = (hueOffset + i/segments*360)%360;
    let color;
    if(system===0) color = hsl(hue,90,50); // RGB
    else if(system===1) color = hsl((hue+180)%360,80,50); // CMY
    else if(system===2) color = hsl(hue,70,40); // CMYK approx
    else if(system===3){ const [hh,ss,ll]=hsv2hsl(hue,0.9,0.9); color=hsl(hh,ss,ll); }
    else if(system===4) color = hsl(hue,65,55); // HSL
    else if(system===5) color = hsl(hue*1.1%360,50+20*Math.sin(hue/60),55); // Munsell
    else if(system===6) color = ATARI[Math.floor(i/segments*ATARI.length)]; // Atari palette
    else if(system===7) color = hsl(hue,100,50+20*Math.sin(T)); // Perceptual
    else if(system===8) color = hsl((hue+T*30)%360,80,50); // Temporal
    else color = hsl((hue + i*7 + T*20)%360, 70+30*Math.sin(i*0.5), 50);

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a0,a1);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();

    // Inner ring — complementary tint
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r*0.55,a0,a1);
    ctx.closePath();
    ctx.fillStyle = hsl((hue+180)%360,60,60,0.4);
    ctx.fill();
  }
  // Wheel border
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='#fff2'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

// --- Multi-layer rotating color wheel system ---
function drawWheelSystems() {
  for(let w=0;w<P.numWheels;w++){
    const wx = (P.wheelX[w]||0.5)*W;
    const wy = (P.wheelY[w]||0.5)*H;
    const rot = P.wheelOffsets[w] + T*P.wheelSpeeds[w]*60;
    drawColorWheel(wx,wy,P.wheelRadii[w],P.wheelSegments[w],rot,P.wheelAlphas[w],P.wheelSystems[w]%10, w*37);

    // Second counter-rotating ring
    drawColorWheel(wx,wy,P.wheelRadii[w]*0.7,Math.max(6,P.wheelSegments[w]>>1),-rot*0.7,P.wheelAlphas[w]*0.6,(P.wheelSystems[w]+3)%10, w*73+120);
  }
}

function rotatePt3(v,rx,ry,rz){
  let [x,y,z]=v;
  // rotate Z
  let x2=x*Math.cos(rz)-y*Math.sin(rz), y2=x*Math.sin(rz)+y*Math.cos(rz); x=x2;y=y2;
  // rotate X
  let y3=y*Math.cos(rx)-z*Math.sin(rx), z3=y*Math.sin(rx)+z*Math.cos(rx); y=y3;z=z3;
  // rotate Y
  let x4=x*Math.cos(ry)+z*Math.sin(ry), z4=-x*Math.sin(ry)+z*Math.cos(ry); return [x4,y,z4];
}

function project3(v,d=4){
  const [x,y,z]=v; const zz=z+d; return [x/zz,y/zz];
}

function drawPolytope(){
  const pt = P.polyType||0;
  const verts = POLY_VERTS[pt] || POLY_VERTS[0];
  const edges = POLY_EDGES[pt] || POLY_EDGES[0];
  const ox=(P.polyX||0.5)*W, oy=(P.polyY||0.5)*H;
  const sc = P.polyScale||100;
  const rx=T*P.polySpeed*0.7, ry=T*P.polySpeed, rz=T*P.polySpeed*0.4;

  ctx.save();
  ctx.globalAlpha = P.polyAlpha;

  // 4D hypercube gets extra w rotation
  const projected = verts.map(v=>{
    let rv;
    if(pt===5 && v.length===4){
      // rotate in 4D then project to 3D
      const [x,y,z,w] = v;
      const xw = x*Math.cos(T*0.3)-w*Math.sin(T*0.3);
      const ww = x*Math.sin(T*0.3)+w*Math.cos(T*0.3);
      const yw = y*Math.cos(T*0.2)-z*Math.sin(T*0.2);
      const zw = y*Math.sin(T*0.2)+z*Math.cos(T*0.2);
      rv = rotatePt3([xw/(ww+3),yw/(ww+3),zw/(ww+3)],rx,ry,rz);
    } else {
      rv = rotatePt3(v.slice(0,3),rx,ry,rz);
    }
    const [px,py]=project3(rv,3);
    return [ox+px*sc, oy+py*sc, rv[2]];
  });

  edges.forEach(([a,b],i)=>{
    if(!projected[a]||!projected[b]) return;
    const hue = (i/edges.length*360 + T*40)%360;
    ctx.beginPath();
    ctx.moveTo(projected[a][0], projected[a][1]);
    ctx.lineTo(projected[b][0], projected[b][1]);
    ctx.strokeStyle = hsl(hue,90,65);
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });
  projected.forEach(([px,py,pz],i)=>{
    const hue=(i/projected.length*360+T*60)%360;
    ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle=hsl(hue,100,80,0.9); ctx.fill();
  });
  ctx.restore();
}

// --- PCB Circuit board traces ---
const pcbTraces = [];
function initPCBTraces(){
  pcbTraces.length=0;
  const n=P.numPCBTraces||20;
  for(let i=0;i<n;i++){
    pcbTraces.push({
      x:Math.random()*W, y:Math.random()*H,
      dx:(Math.random()-.5)*3, dy:(Math.random()-.5)*3,
      len:20+Math.random()*120, life:0, maxLife:80+Math.random()*120,
      hue:ri(80,180), pulse:Math.random()*Math.PI*2,
    });
  }
}
function ri(a,b){return Math.floor(a+Math.random()*(b-a));}
function drawPCB(){
  ctx.save();
  ctx.globalAlpha = P.pcbAlpha;
  pcbTraces.forEach(tr=>{
    tr.life += P.pcbSpeed*0.6;
    tr.pulse += 0.05;
    if(tr.life>tr.maxLife){
      tr.x=Math.random()*W; tr.y=Math.random()*H;
      tr.dx=(Math.random()-.5)*3; tr.dy=(Math.random()-.5)*3;
      tr.life=0; tr.hue=ri(80,180);
    }
    const prog=tr.life/tr.maxLife;
    const glow = 0.4+0.6*Math.sin(tr.pulse);
    ctx.strokeStyle=`hsla(${tr.hue},100%,${50+20*glow}%,${(1-prog)*0.8})`;
    ctx.lineWidth=1+glow;
    // Right-angle traces (PCB style)
    ctx.beginPath();
    const lx = tr.x + tr.dx*tr.life;
    const ly = tr.y + tr.dy*tr.life*0.3;
    ctx.moveTo(tr.x,tr.y);
    ctx.lineTo(lx,tr.y); // horizontal
    ctx.lineTo(lx,ly);   // then vertical
    ctx.stroke();
    // Via dot
    ctx.beginPath(); ctx.arc(lx,ly,2+glow,0,Math.PI*2);
    ctx.fillStyle=`hsla(${tr.hue+40},100%,80%,${(1-prog)*0.9})`;
    ctx.fill();
    // Pad circle at start
    ctx.beginPath(); ctx.arc(tr.x,tr.y,3,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${tr.hue},80%,60%,0.6)`;
    ctx.lineWidth=1; ctx.stroke();
  });
  ctx.restore();
}

// --- Robot / Cyborg entity ---
class Robot {
  constructor(i){
    this.reset(i);
  }
  reset(i){
    this.x=Math.random()*W; this.y=Math.random()*H;
    this.size=20+Math.random()*40;
    this.speed=(P.robotSpeeds?.[i]||1)*1.2;
    this.hue=parseInt((P.robotColors?.[i]||'hsl(180,90%,60%)').match(/\d+/)?.[0]||'180');
    this.angle=Math.random()*Math.PI*2;
    this.turnSpeed=(Math.random()-.5)*0.08;
    this.type=Math.floor(Math.random()*4); // 0=biped,1=spider,2=humanoid,3=ufo-bot
    this.frame=0; this.frameRate=0.12+Math.random()*0.1;
    this.trail=[];
    this.augments=Math.floor(Math.random()*4);
  }
  update(){
    this.angle+=this.turnSpeed;
    this.x+=Math.cos(this.angle)*this.speed;
    this.y+=Math.sin(this.angle)*this.speed;
    if(this.x<-60||this.x>W+60||this.y<-60||this.y>H+60){
      this.x=(Math.random()*0.8+0.1)*W;
      this.y=(Math.random()*0.8+0.1)*H;
    }
    this.frame+=this.frameRate;
    this.trail.unshift({x:this.x,y:this.y});
    if(this.trail.length>18) this.trail.pop();
  }
  draw(){
    const s=this.size, h=this.hue, f=this.frame;
    // Trail
    this.trail.forEach((pt,i)=>{
      ctx.beginPath(); ctx.arc(pt.x,pt.y,s*0.12*(1-i/18),0,Math.PI*2);
      ctx.fillStyle=hsl(h,90,60,0.05+(1-i/18)*0.08); ctx.fill();
    });
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle+Math.PI/2);
    if(this.type===0) this.drawBiped(s,h,f);
    else if(this.type===1) this.drawSpider(s,h,f);
    else if(this.type===2) this.drawHumanoid(s,h,f);
    else this.drawUFOBot(s,h,f);
    // Cybernetic augment modules
    for(let a=0;a<this.augments;a++){
      const ax=Math.cos(a/this.augments*Math.PI*2)*s*0.6;
      const ay=Math.sin(a/this.augments*Math.PI*2)*s*0.6;
      ctx.beginPath(); ctx.rect(ax-4,ay-4,8,8);
      ctx.strokeStyle=hsl((h+60)%360,100,80,0.8);
      ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=hsl((h+120)%360,100,60,0.5); ctx.fill();
      // Neural link line
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(ax,ay);
      ctx.strokeStyle=hsl(h,100,70,0.3); ctx.lineWidth=0.5; ctx.stroke();
    }
    ctx.restore();
  }
  drawBiped(s,h,f){
    // Body
    ctx.fillStyle=hsl(h,80,40,0.85);
    ctx.fillRect(-s*.18,-s*.35,s*.36,s*.45);
    ctx.strokeStyle=hsl(h,100,70,0.9); ctx.lineWidth=1.2; ctx.strokeRect(-s*.18,-s*.35,s*.36,s*.45);
    // Head
    ctx.fillStyle=hsl(h,70,55,0.9);
    ctx.fillRect(-s*.14,-s*.55,s*.28,s*.22);
    ctx.strokeRect(-s*.14,-s*.55,s*.28,s*.22);
    // Eyes
    ctx.fillStyle=hsl((h+180)%360,100,80);
    ctx.fillRect(-s*.10,-s*.49,s*.07,s*.08);
    ctx.fillRect(s*.03,-s*.49,s*.07,s*.08);
    // Legs
    const lk=Math.sin(f)*s*.15;
    ctx.strokeStyle=hsl(h,90,60,0.8); ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-s*.1,s*.1); ctx.lineTo(-s*.15,s*.35+lk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.1,s*.1); ctx.lineTo(s*.15,s*.35-lk); ctx.stroke();
    // Arms
    ctx.beginPath(); ctx.moveTo(-s*.18,s*.0); ctx.lineTo(-s*.32,-s*.1+lk*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.18,s*.0); ctx.lineTo(s*.32,-s*.1-lk*0.5); ctx.stroke();
  }
  drawSpider(s,h,f){
    ctx.fillStyle=hsl(h,75,35,0.85);
    ctx.beginPath(); ctx.ellipse(0,0,s*.28,s*.18,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=hsl(h,100,65,0.8); ctx.lineWidth=1; ctx.stroke();
    // Eyes
    for(let e=0;e<6;e++){
      ctx.beginPath(); ctx.arc((e-2.5)*s*.07,-s*.1,s*.03,0,Math.PI*2);
      ctx.fillStyle=hsl((h+90)%360,100,80); ctx.fill();
    }
    // Legs
    for(let l=0;l<8;l++){
      const side=l<4?-1:1; const idx=l<4?l:l-4;
      const a=(idx-1.5)*0.35+Math.sin(f+l)*0.1;
      ctx.strokeStyle=hsl(h,80,50,0.7); ctx.lineWidth=1.2;
      ctx.beginPath();
      ctx.moveTo(side*s*.24,a*s*.4);
      ctx.lineTo(side*s*.5,a*s*.8+s*.1*Math.sin(f*2+l));
      ctx.lineTo(side*s*.7,a*s*1.2);
      ctx.stroke();
    }
  }
  drawHumanoid(s,h,f){
    // Torso
    ctx.fillStyle=hsl(h,60,30,0.85);
    ctx.beginPath(); ctx.ellipse(0,0,s*.2,s*.3,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=hsl(h,100,60,0.9); ctx.lineWidth=1; ctx.stroke();
    // Head
    ctx.beginPath(); ctx.arc(0,-s*.38,s*.16,0,Math.PI*2);
    ctx.fillStyle=hsl(h,50,50,0.9); ctx.fill(); ctx.stroke();
    // Visor
    ctx.fillStyle=hsl((h+100)%360,100,70,0.7);
    ctx.fillRect(-s*.1,-s*.42,s*.2,s*.08);
    // Neuro-implant crown
    for(let n=0;n<5;n++){
      ctx.beginPath(); ctx.moveTo(Math.cos(n/5*Math.PI*2)*s*.14,-s*.38+Math.sin(n/5*Math.PI*2)*s*.14);
      ctx.lineTo(Math.cos(n/5*Math.PI*2)*s*.22,-s*.38+Math.sin(n/5*Math.PI*2)*s*.22);
      ctx.strokeStyle=hsl((h+60)%360,100,80,0.9); ctx.lineWidth=2; ctx.stroke();
    }
    // Arms & legs
    const lk=Math.sin(f)*s*.12;
    ctx.strokeStyle=hsl(h,80,55,0.8); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-s*.18,-s*.05); ctx.lineTo(-s*.3,s*.25+lk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.18,-s*.05); ctx.lineTo(s*.3,s*.25-lk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-s*.12,s*.28); ctx.lineTo(-s*.15,s*.55+lk); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*.12,s*.28); ctx.lineTo(s*.15,s*.55-lk); ctx.stroke();
  }
  drawUFOBot(s,h,f){
    // Saucer
    ctx.fillStyle=hsl(h,60,30,0.8);
    ctx.beginPath(); ctx.ellipse(0,0,s*.4,s*.12,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=hsl(h,100,65,0.9); ctx.lineWidth=1.2; ctx.stroke();
    // Dome
    ctx.beginPath(); ctx.arc(0,-s*.06,s*.2,Math.PI,0);
    ctx.fillStyle=hsl((h+120)%360,70,55,0.7); ctx.fill();
    ctx.strokeStyle=hsl(h,100,80); ctx.stroke();
    // Rotating lights
    for(let l=0;l<6;l++){
      const a=f*0.5+l/6*Math.PI*2;
      ctx.beginPath(); ctx.arc(Math.cos(a)*s*.3,Math.sin(a)*s*.07+s*.02,s*.04,0,Math.PI*2);
      ctx.fillStyle=hsl((h+l*60)%360,100,70,(0.5+0.5*Math.sin(f+l))); ctx.fill();
    }
    // Beam
    ctx.beginPath();
    ctx.moveTo(-s*.1,s*.08); ctx.lineTo(-s*.2,s*.45); ctx.lineTo(s*.2,s*.45); ctx.lineTo(s*.1,s*.08);
    ctx.fillStyle=hsl(h,100,80,0.08+(0.1*Math.sin(f))); ctx.fill();
  }
}

// --- Maze / game grid ---
function drawMaze(){
  const mw=P.mazeW||12, mh=P.mazeH||8;
  const cw=W/mw, ch=H/mh;
  ctx.save();
  ctx.globalAlpha=P.mazeAlpha;
  ctx.strokeStyle=P.mazeColor;
  ctx.lineWidth=1.5;
  // Simple maze walls using seeded pattern
  for(let r=0;r<mh;r++){
    for(let c=0;c<mw;c++){
      const seed=(r*mw+c)*2654435761|0;
      const x=c*cw, y=r*ch;
      if((seed>>3)&1) { ctx.beginPath(); ctx.moveTo(x+cw,y); ctx.lineTo(x+cw,y+ch); ctx.stroke(); }
      if((seed>>5)&1) { ctx.beginPath(); ctx.moveTo(x,y+ch); ctx.lineTo(x+cw,y+ch); ctx.stroke(); }
    }
  }
  ctx.restore();
}

// --- Color swatch grid ---
function drawColorSwatches(){
  const rows=P.swatchRows||6, cols=P.swatchCols||12;
  const sw=W/cols, sh=H/rows;
  ctx.save();
  ctx.globalAlpha=P.swatchAlpha;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const hue=(c/cols*360 + r/rows*60 + T*15)%360;
      const sat=60+30*Math.sin(r*0.8+T*0.5);
      const lit=30+30*Math.cos(c*0.5+T*0.3);
      ctx.fillStyle=hsl(hue,sat,lit);
      ctx.fillRect(c*sw,r*sh,sw-0.5,sh-0.5);
    }
  }
  ctx.restore();
}

// --- Neurotechnology implants ---
function drawNeuralImplants(){
  const n=P.numImplants||5;
  for(let i=0;i<n;i++){
    const angle=i/n*Math.PI*2+T*0.1;
    const dist=Math.min(W,H)*0.35;
    const x=CX+Math.cos(angle)*dist*(0.5+0.5*Math.sin(T*0.3+i));
    const y=CY+Math.sin(angle)*dist*(0.5+0.5*Math.cos(T*0.2+i));
    const s=15+10*Math.sin(T*0.5+i*1.3);

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(T*0.3+i*0.7);
    ctx.globalAlpha=P.implantAlpha;

    // Implant body
    const hue=(P.timeHue+i*60+T*20)%360;
    ctx.strokeStyle=hsl(hue,100,65,0.9);
    ctx.lineWidth=1;
    ctx.strokeRect(-s,-s/2,s*2,s);
    ctx.fillStyle=hsl(hue,80,20,0.5);
    ctx.fillRect(-s,-s/2,s*2,s);

    // Circuit lines inside implant
    ctx.strokeStyle=hsl((hue+90)%360,100,75,0.6);
    ctx.lineWidth=0.7;
    for(let l=0;l<4;l++){
      ctx.beginPath();
      ctx.moveTo(-s+l*s*.5,-s/2);
      ctx.lineTo(-s+l*s*.5,s/2);
      ctx.stroke();
    }
    // Neural connection lines
    ctx.strokeStyle=hsl(hue,80,60,0.15);
    ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(CX-x,CY-y); ctx.stroke();

    // Status LEDs
    for(let led=0;led<3;led++){
      ctx.beginPath();
      ctx.arc(-s+led*s*0.6,0,2,0,Math.PI*2);
      ctx.fillStyle=hsl((hue+led*120)%360,100,80,(0.4+0.6*Math.sin(T*2+i+led)));
      ctx.fill();
    }
    ctx.restore();
  }
}

// --- Category theory morphisms ---
function drawCategoryMorphisms(){
  const n=P.morphCount||8;
  ctx.save();
  ctx.globalAlpha=P.morphAlpha;
  for(let i=0;i<n;i++){
    const a1=i/n*Math.PI*2+T*0.07;
    const a2=(i+1)/n*Math.PI*2+T*0.07;
    const r=Math.min(W,H)*0.4;
    const x1=CX+Math.cos(a1)*r, y1=CY+Math.sin(a1)*r;
    const x2=CX+Math.cos(a2)*r, y2=CY+Math.sin(a2)*r;
    const hue=(i/n*360+T*25)%360;

    // Objects (circles)
    ctx.beginPath(); ctx.arc(x1,y1,6,0,Math.PI*2);
    ctx.fillStyle=hsl(hue,100,65,0.8); ctx.fill();

    // Morphism arrows
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    const cpx=CX*(0.3+0.7*Math.sin(T*0.2+i));
    const cpy=CY*(0.3+0.7*Math.cos(T*0.15+i));
    ctx.quadraticCurveTo(cpx,cpy,x2,y2);
    ctx.strokeStyle=hsl(hue,80,60,0.5);
    ctx.lineWidth=0.8; ctx.stroke();

    // Functor labels
    ctx.font='8px Courier New';
    ctx.fillStyle=hsl(hue,100,75,0.6);
    ctx.fillText(`F${i}`,cpx-8,cpy-8);
  }
  ctx.restore();
}

// --- Harmonic color oscillation ---
function drawHarmonicOscillations(){
  const freqs=P.harmonicFreqs||[1,2,3,5,8];
  const amps=P.harmonicAmps||[1,0.7,0.5,0.3,0.2];
  ctx.save();
  for(let f=0;f<freqs.length;f++){
    ctx.globalAlpha=0.07;
    ctx.beginPath();
    for(let x=0;x<=W;x+=2){
      const t=x/W*Math.PI*2;
      const y=CY + amps[f]*H*0.25*Math.sin(freqs[f]*t+T*freqs[f]*0.5);
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=hsl((f/freqs.length*360+T*30)%360,90,65);
    ctx.lineWidth=1+f*0.3; ctx.stroke();
  }
  ctx.restore();
}

// --- Temporal color evolution swatches (Delta-E gradient bar) ---
function drawTemporalSwatches(){
  const bw=W*0.6, bh=12;
  const bx=(W-bw)/2, by=H-30;
  ctx.save();
  ctx.globalAlpha=0.35;
  const grad=ctx.createLinearGradient(bx,0,bx+bw,0);
  for(let i=0;i<=20;i++){
    const hue=(i/20*360+T*20)%360;
    grad.addColorStop(i/20, hsl(hue,90,55));
  }
  ctx.fillStyle=grad;
  ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle='#fff3'; ctx.lineWidth=0.5; ctx.strokeRect(bx,by,bw,bh);

  // Label
  ctx.globalAlpha=0.5;
  ctx.font='8px Courier New'; ctx.fillStyle='#0ff';
  ctx.fillText(`ΔE=${(P.deltaE||0).toFixed(1)} | TEMPORAL COLOR EVOLUTION`, bx, by-3);
  ctx.restore();
}

// --- Munsell color wheel (special) ---
function drawMunsellWheel(){
  const cx=W*0.18, cy=H*0.82, r=Math.min(W,H)*0.12;
  ctx.save();
  ctx.globalAlpha=0.18;
  const hues=['5R','10R','5YR','10YR','5Y','10Y','5GY','10GY','5G','10G','5BG','10BG','5B','10B','5PB','10PB','5P','10P','5RP','10RP'];
  const n=hues.length;
  hues.forEach((name,i)=>{
    const a0=i/n*Math.PI*2-Math.PI/2+T*0.02;
    const a1=a0+Math.PI*2/n;
    const hue=i/n*360;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a0,a1); ctx.closePath();
    ctx.fillStyle=hsl(hue,75,50); ctx.fill();
    ctx.strokeStyle='#fff2'; ctx.lineWidth=0.5; ctx.stroke();
  });
  // Center label
  ctx.globalAlpha=0.5;
  ctx.font='7px Courier New'; ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.fillText('MUNSELL',cx,cy+r+10);
  ctx.textAlign='left';
  ctx.restore();
}

// --- Opponent process color model ---
function drawOpponentProcess(){
  const cx=W*0.85, cy=H*0.18, r=50;
  ctx.save();
  ctx.globalAlpha=0.25;
  ctx.translate(cx,cy);
  // Red-Green axis
  const grad1=ctx.createLinearGradient(-r,0,r,0);

  ctx.fillStyle=grad2; ctx.fillRect(-r/3,-r,r*0.67,r*2);

  ctx.globalAlpha=0.5;

  ctx.fillText('OPPONENT PROCESS',0,r+12);

}

// --- Tron Recognizer silhouette ---
function drawTronRecognizer(x,y,s,hue,alpha){
  ctx.save();
  ctx.translate(x,y); ctx.globalAlpha=alpha;
  const c=hsl(hue,100,55,0.9);
  ctx.strokeStyle=c; ctx.fillStyle=hsl(hue,100,15,0.5);
  ctx.lineWidth=1.5;
  // Body
  ctx.beginPath();
  ctx.moveTo(-s*.4,-s*.5);
  ctx.lineTo(s*.4,-s*.5);
  ctx.lineTo(s*.5,-s*.2);
  ctx.lineTo(s*.5,s*.2);
  ctx.lineTo(s*.4,s*.5);
  ctx.lineTo(-s*.4,s*.5);
  ctx.lineTo(-s*.5,s*.2);
  ctx.lineTo(-s*.5,-s*.2);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // "Leg" brackets
  ctx.beginPath();
  ctx.moveTo(-s*.5,s*.3); ctx.lineTo(-s*.7,s*.7); ctx.lineTo(-s*.4,s*.7); ctx.lineTo(-s*.4,s*.5);
  ctx.moveTo(s*.5,s*.3); ctx.lineTo(s*.7,s*.7); ctx.lineTo(s*.4,s*.7); ctx.lineTo(s*.4,s*.5);
  ctx.stroke();
  // Eye slit
  ctx.fillStyle=hsl(hue,100,75,0.8);
  ctx.fillRect(-s*.25,-s*.12,s*.5,s*.08);
  // Glow
  ctx.shadowColor=c; ctx.shadowBlur=8;
  ctx.strokeRect(-s*.25,-s*.12,s*.5,s*.08);
  ctx.restore();
}

function drawTronRecognizers(){
  const n=P.numUFOs||3;
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2+T*P.ufoSpeeds[i]*0.2;
    const r=Math.min(W,H)*0.42;
    const x=CX+Math.cos(a)*r*0.7;
    const y=CY+Math.sin(a)*r*0.5;
    const hue=(i/n*360+T*15)%360;
    drawTronRecognizer(x,y,30+20*Math.sin(T*0.3+i),hue,0.4+0.2*Math.sin(T+i));
  }
}

// --- Color gamut / CIE plot (corner) ---
function drawGamutPlot(){
  ctx.save();
  const ox=W*0.82, oy=H*0.82, sc=Math.min(W,H)*0.12;
  ctx.globalAlpha=0.22;
  drawChromaticity(ox,oy,sc,1);
  // sRGB triangle
  ctx.beginPath();
  ctx.moveTo(ox+(0.64-0.18)*sc*2.2, oy-(0.33-0.02)*sc*2.2);
  ctx.lineTo(ox+(0.30-0.18)*sc*2.2, oy-(0.60-0.02)*sc*2.2);
  ctx.lineTo(ox+(0.15-0.18)*sc*2.2, oy-(0.06-0.02)*sc*2.2);
  ctx.closePath();
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1; ctx.stroke();
  ctx.globalAlpha=0.4;
  ctx.font='7px Courier New'; ctx.fillStyle='#0ff'; ctx.textAlign='center';
  ctx.fillText('CIE CHROMATICITY',ox,oy+sc+12);
  ctx.textAlign='left';
  ctx.restore();
}

// --- Tiling / tessellation background ---
function drawTiling(){
  const step=48;
  ctx.save();
  ctx.globalAlpha=0.04;
  const sh=(T*15)%step;
  for(let x=-step+sh%step;x<W+step;x+=step){
    for(let y=-step+sh*0.6%step;y<H+step;y+=step){
      const hue=(x+y+T*20)%360;
      ctx.fillStyle=hsl(hue,60,40);
      // Hexagonal-ish tiles
      ctx.beginPath();
      for(let v=0;v<6;v++){
        const a=v/6*Math.PI*2;
        v===0?ctx.moveTo(x+Math.cos(a)*22,y+Math.sin(a)*22):ctx.lineTo(x+Math.cos(a)*22,y+Math.sin(a)*22);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle=hsl((hue+180)%360,50,60,0.15);
      ctx.lineWidth=0.5; ctx.stroke();
    }
  }
  ctx.restore();
}

// --- Stepped color scale swatches ---
function drawSteppedScale(){
  const n=16, sw=W/(n+2), sh=20;
  ctx.save(); ctx.globalAlpha=0.28;
  for(let i=0;i<n;i++){
    const t=i/n;
    const hue=(P.timeHue+t*240+T*10)%360;
    ctx.fillStyle=hsl(hue,85,20+t*50);
    ctx.fillRect(sw+i*sw,5,sw-1,sh);
    // Step label
    ctx.globalAlpha=0.5;
    ctx.font='6px Courier New'; ctx.fillStyle='#fff7'; ctx.textAlign='center';
    ctx.fillText(Math.floor(t*100),sw+i*sw+sw/2,sh+12);
    ctx.globalAlpha=0.28; ctx.textAlign='left';
  }
  ctx.restore();
}

// ===================== MAIN ANIMATION LOOP =====================
function frame(ts){
  requestAnimationFrame(frame);
  dT = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts;
  T += dT;

  // FPS
  fpsArr.push(1/dT);
  if(fpsArr.length>30) fpsArr.shift();
  fps=fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length;

  ctx.clearRect(0,0,W,H);

  // Layer order: back → front
  drawBackground();
  drawAtariScanlines();
  drawTiling();
  drawTronGrid();
  drawColorSwatches();
  drawSteppedScale();
  drawHarmonicOscillations();
  drawMaze();
  drawWheelSystems();
  drawChromaticity(W*0.5,H*0.5,Math.min(W,H)*0.28,0.1);
  drawPolytope();
  drawPCB();
  drawCategoryMorphisms();
  drawNeuralImplants();
  drawTronRecognizers();
  drawRobots();
  drawMunsellWheel();
  drawOpponentProcess();
  drawGamutPlot();
  drawASM();
  drawTemporalSwatches();

  // HUD
  if(hudOn && ts-fpsLast>500){ fpsLast=ts; updateHUD(); }
}

// ===================== INPUT =====================
function doRandomize(){
  randomize();
  initRobots();
  initPCBTraces();
  initASM();
  if(soundOn) playRandomSound();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();doRandomize();}
  if(e.key==='h'||e.key==='H'){
    hudOn=!hudOn;
    document.getElementById('hud').style.display=hudOn?'block':'none';
    if(hudOn) updateHUD();
  }
  if(e.key==='s'||e.key==='S'){
    soundOn=!soundOn;
    if(soundOn && !audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
});
document.addEventListener('click',e=>{doRandomize();});
document.addEventListener('touchstart',e=>{e.preventDefault();doRandomize();},{passive:false});

// ===================== SOUND =====================
function playRandomSound(){
  if(!audioCtx) return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    const freqs=[220,261,293,329,349,392,440,523,587,659,698,784,880];
    o.frequency.value=freqs[Math.floor(Math.random()*freqs.length)];
    o.type=['sine','square','sawtooth','triangle'][Math.floor(Math.random()*4)];
    g.gain.setValueAtTime(0.06,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
    o.start(); o.stop(audioCtx.currentTime+0.3);
  }catch(e){}
}

// ===================== BOOT =====================
doRandomize();
requestAnimationFrame(frame);
</script>
