<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hyperdimensional Fractal Plasma Storm</title>
<meta name="description" content="Real-time hyperdimensional fractal plasma storm WebGL audiovisual engine."/>
<style>
html,body{margin:0;padding:0;background:#000;overflow:hidden;font-family:monospace}
canvas{position:fixed;inset:0}
#hud{position:fixed;top:0;left:0;padding:10px;background:rgba(0,0,0,.5);color:#0ff;font-size:12px;display:none}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hud"></div>

<script>
'use strict';

const canvas=document.getElementById('gl');
const hud=document.getElementById('hud');
let gl,program;
let audioCtx,osc,gain;
let audioOn=false,showHUD=false;
let last=performance.now(),fps=0,frames=0,accum=0;

const PHI=(1+Math.sqrt(5))/2;
const rand=(a=1,b=0)=>Math.random()*(a-b)+b;

let params={};
function reseed(){
  params={
    mix:Math.random(),
    cx:rand(1,-1),
    cy:rand(1,-1),
    iter:Math.floor(rand(180,80)),
    hueSpeed:rand(.4,.05),
    bands:Math.floor(rand(10,3)),
    sym:Math.floor(rand(16,5))
  };
}
reseed();

function resize(){
  const dpr=Math.min(devicePixelRatio,1.5);
  canvas.width=innerWidth*dpr;
  canvas.height=innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize',resize);

function initGL(){
  gl=canvas.getContext('webgl',{antialias:false});
  if(!gl){alert("WebGL not supported");return;}

  const vs=`
  attribute vec2 p;
  varying vec2 v;
  void main(){
    v=p*0.5+0.5;
    gl_Position=vec4(p,0.0,1.0);
  }`;

  const fs=`
  precision mediump float;
  varying vec2 v;
  uniform float t;
  uniform vec2 res;
  uniform vec4 p0;
  uniform vec4 p1;

  vec3 hsv(float h,float s,float v){
    vec3 k=vec3(1.,2./3.,1./3.);
    vec3 p=abs(fract(h+k)*6.-3.);
    return v*mix(vec3(1.),clamp(p-1.,0.,1.),s);
  }

  void main(){
    vec2 uv=(v-0.5)*2.0;
    uv.x*=res.x/res.y;

    float angle=atan(uv.y,uv.x);
    float radius=length(uv);
    float k=p1.z;
    angle=abs(mod(angle,6.28318/k)-3.14159/k);
    uv=vec2(cos(angle),sin(angle))*radius;

    vec2 z=uv;
    vec2 c=mix(z,vec2(p0.x,p0.y),p0.z);

    float i=0.0;
    for(int n=0;n<256;n++){
      if(float(n)>p1.x) break;
      z=vec2(z.x*z.x - z.y*z.y,2.0*z.x*z.y)+c;
      if(dot(z,z)>4.0){i=float(n);break;}
      i=float(n);
    }

    float esc=i/p1.x;
    float phase=atan(z.y,z.x)/6.28318 + t*p1.y;
    float band=cos(p1.w*esc*3.14159);

    vec3 col=hsv(phase+band*0.2,1.0,1.0-esc);
    col+=0.2*sin(t+uv.xyx*3.0);

    gl_FragColor=vec4(col,1.0);
  }`;

  function compile(type,src){
    const s=gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
      alert(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }

  const v=compile(gl.VERTEX_SHADER,vs);
  const f=compile(gl.FRAGMENT_SHADER,fs);
  program=gl.createProgram();
  gl.attachShader(program,v);
  gl.attachShader(program,f);
  gl.linkProgram(program);
  gl.useProgram(program);

  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(program,'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

  program.uTime=gl.getUniformLocation(program,'t');
  program.uRes=gl.getUniformLocation(program,'res');
  program.uP0=gl.getUniformLocation(program,'p0');
  program.uP1=gl.getUniformLocation(program,'p1');
}

function initAudio(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  osc=audioCtx.createOscillator();
  gain=audioCtx.createGain();
  gain.gain.value=0;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
}

function loop(t){
  const dt=(t-last)*.001;
  last=t;
  frames++;accum+=dt;
  if(accum>1){fps=frames/accum;frames=0;accum=0;}

  gl.useProgram(program);
  gl.uniform1f(program.uTime,t*.001);
  gl.uniform2f(program.uRes,canvas.width,canvas.height);
  gl.uniform4f(program.uP0,params.cx,params.cy,params.mix,0.0);
  gl.uniform4f(program.uP1,params.iter,params.hueSpeed,params.sym,params.bands);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  if(audioOn){
    osc.frequency.setTargetAtTime(
      110*Math.pow(PHI,params.mix*3),
      audioCtx.currentTime,.05
    );
  }

  if(showHUD){
    hud.innerHTML=
      "FPS:"+fps.toFixed(1)+"<br>"+
      "Iter:"+params.iter+"<br>"+
      "Sym:"+params.sym+"<br>"+
      "Audio:"+(audioOn?"ON":"OFF");
  }

  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  if(e.code==='Space')reseed();
  if(e.key==='h'||e.key==='H'){
    showHUD=!showHUD;
    hud.style.display=showHUD?'block':'none';
  }
  if(e.key==='s'||e.key==='S'){
    audioOn=!audioOn;
    if(audioOn){
      if(!audioCtx)initAudio();
      gain.gain.setTargetAtTime(.15,audioCtx.currentTime,.1);
    }else if(gain){
      gain.gain.setTargetAtTime(0,audioCtx.currentTime,.05);
    }
  }
});
canvas.addEventListener('click',reseed);

initGL();
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
