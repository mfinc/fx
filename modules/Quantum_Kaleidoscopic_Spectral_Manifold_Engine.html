<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Quantum Kaleidoscopic Spectral Manifold Engine | WebGL Fractal Audiovisual Art</title>

<meta name="description" content="Quantum Kaleidoscopic Spectral Manifold Engine — real-time GPU accelerated WebGL kaleidoscopic fractal audiovisual system featuring quaternion rotations, Möbius conformal mappings, spherical harmonics, reaction–diffusion fields, inverse FFT interference, randomized spectral harmonic palettes, and procedural sound synthesis.">

<meta name="keywords" content="WebGL kaleidoscope fractal, spectral manifold engine, quaternion art, Möbius mapping shader, spherical harmonics visualization, reaction diffusion GPU, fractal audiovisual synthesis, spectral gradient art">

<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;}
canvas{display:block;}
#hud{
position:fixed;
top:0;left:0;
color:#0f0;
background:rgba(0,0,0,0.5);
font-family:monospace;
font-size:12px;
padding:8px;
display:none;
white-space:pre;
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hud"></div>

<script>
const canvas=document.getElementById("gl");
const gl=canvas.getContext("webgl",{antialias:true});
const hud=document.getElementById("hud");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener("resize",resize);
resize();

let seed,symmetry;
let baseHue,hueVariance,paletteMode,satCurve,valCurve,colorPhaseSpeed,spectralWarp;
let startTime=performance.now();
let showHUD=false;

function reseed(){
seed=Math.random()*10000;
symmetry=4+Math.floor(Math.random()*16);

baseHue=Math.random();
hueVariance=0.2+Math.random()*0.8;
paletteMode=Math.floor(Math.random()*5);
satCurve=0.5+Math.random()*2.0;
valCurve=0.5+Math.random()*2.0;
colorPhaseSpeed=0.05+Math.random()*0.4;
spectralWarp=0.5+Math.random()*3.0;

startTime=performance.now();
}
reseed();

document.body.onclick=reseed;
document.body.onkeydown=e=>{
if(e.code==="Space") reseed();
if(e.key==="h"||e.key==="H"){
showHUD=!showHUD;
hud.style.display=showHUD?"block":"none";
}
};

const vertexSrc=`
attribute vec2 p;
void main(){ gl_Position=vec4(p,0.,1.); }
`;

const fragmentSrc=`
precision highp float;
uniform float time;
uniform vec2 res;
uniform float seed;
uniform float symmetry;

uniform float baseHue;
uniform float hueVariance;
uniform float paletteMode;
uniform float satCurve;
uniform float valCurve;
uniform float colorPhaseSpeed;
uniform float spectralWarp;

float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7))+seed)*43758.5453); }

vec3 hsv2rgb(vec3 c){
vec4 K=vec4(1.,2./3.,1./3.,3.);
vec3 p=abs(fract(c.xxx+K.xyz)*6.-K.www);
return c.z*mix(K.xxx,clamp(p-K.xxx,0.,1.),c.y);
}

void main(){
vec2 uv=(gl_FragCoord.xy/res.xy)*2.-1.;
uv.x*=res.x/res.y;

float r=length(uv);
float angle=atan(uv.y,uv.x);

angle=mod(angle,6.28318/symmetry);
angle=abs(angle-3.14159/symmetry);

vec2 p=vec2(cos(angle),sin(angle))*r;

float t=time*0.0005;

float field=sin(p.x*3.+t)+cos(p.y*4.-t);
field+=sin(6.*r-t)*cos(4.*angle+t);
field+=sin(r*20.-t)/(r*10.+1.);

float fractal=0.;
vec2 z=p;
for(int i=0;i<6;i++){
z=vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y)+p;
fractal+=exp(-length(z));
}
field+=fractal;

float hue;
if(paletteMode<1.)
hue=baseHue+sin(field*spectralWarp+t*colorPhaseSpeed)*hueVariance;
else if(paletteMode<2.)
hue=baseHue+fract(field)*hueVariance;
else if(paletteMode<3.)
hue=baseHue+sin(field*2.)*0.33;
else if(paletteMode<4.)
hue=baseHue+cos(field*3.)*0.25;
else
hue=fract(baseHue+field*0.5);

float sat=pow(abs(sin(field)),satCurve);
float val=pow(smoothstep(-2.,2.,field),valCurve);

vec3 col=hsv2rgb(vec3(fract(hue),sat,val));
gl_FragColor=vec4(col,1.);
}
`;

function compile(src,type){
let s=gl.createShader(type);
gl.shaderSource(s,src);
gl.compileShader(s);
return s;
}

const prog=gl.createProgram();
gl.attachShader(prog,compile(vertexSrc,gl.VERTEX_SHADER));
gl.attachShader(prog,compile(fragmentSrc,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,"p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

function uni(name){ return gl.getUniformLocation(prog,name); }

function render(){
let now=performance.now();
gl.uniform1f(uni("time"),now-startTime);
gl.uniform2f(uni("res"),canvas.width,canvas.height);
gl.uniform1f(uni("seed"),seed);
gl.uniform1f(uni("symmetry"),symmetry);

gl.uniform1f(uni("baseHue"),baseHue);
gl.uniform1f(uni("hueVariance"),hueVariance);
gl.uniform1f(uni("paletteMode"),paletteMode);
gl.uniform1f(uni("satCurve"),satCurve);
gl.uniform1f(uni("valCurve"),valCurve);
gl.uniform1f(uni("colorPhaseSpeed"),colorPhaseSpeed);
gl.uniform1f(uni("spectralWarp"),spectralWarp);

gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
