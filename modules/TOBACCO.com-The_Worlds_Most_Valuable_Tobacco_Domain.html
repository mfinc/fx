const C = document.getElementById('c');
const G = C.getContext('2d');
let W, H, cx, cy, seed, t=0, frame=0, fps=60, lastTime=0;

let rng; // seeded RNG

// ---- SEEDED RNG ----
function mulberry32(s){
  return function(){
    s|=0;s=s+0x6D2B79F5|0;
    let t=Math.imul(s^s>>>15,1|s);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return((t^t>>>14)>>>0)/4294967296;
  }
}
function newSeed(){
  seed=Math.floor(Math.random()*0xFFFFFF);
  rng=mulberry32(seed);
  if(document.getElementById('hud-seed'))
    document.getElementById('hud-seed').textContent='SEED: '+seed.toString(16).toUpperCase();
}

// ---- AUDIO ----
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0;
  masterGain.connect(audioCtx.destination);
}
function toggleSound(){
  SOUNDon=!SOUNDon;
  if(SOUNDon){initAudio();masterGain.gain.setTargetAtTime(0.18,audioCtx.currentTime,0.5);}
  else if(masterGain){masterGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.4);}
}
function playTone(freq,type,dur,vol){
  if(!SOUNDon||!audioCtx)return;
  try{
    let o=audioCtx.createOscillator();
    let g=audioCtx.createGain();
    o.type=type||'sine';
    o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*(0.5+rng()*1.5),audioCtx.currentTime+dur);
    g.gain.setValueAtTime(vol||0.08,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(masterGain);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function playNoise(dur,vol){
  if(!SOUNDon||!audioCtx)return;
  try{
    let buf=audioCtx.createBuffer(1,audioCtx.sampleRate*dur,audioCtx.sampleRate);
    let d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(vol||0.05);
    let s=audioCtx.createBufferSource();
    let f=audioCtx.createBiquadFilter();
    f.type='bandpass';f.frequency.value=200+rng()*2000;f.Q.value=1;
    let g=audioCtx.createGain();
    g.gain.setValueAtTime(vol||0.05,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+dur);
    s.buffer=buf;s.connect(f);f.connect(g);g.connect(masterGain);
    s.start();
  }catch(e){}
}

// ---- COLOR PALETTES (per mode) ----
const PALETTES=[
  ['#FF8C00','#FFD700','#FF4500','#FFA500','#FFEC8B','#FF6347'],
  ['#00FF41','#39FF14','#ADFF2F','#7FFF00','#00FA9A','#FFD700'],
  ['#FFD700','#FFF8DC','#FFFACD','#FF8C00','#DAA520','#B8860B'],
  ['#00BFFF','#1E90FF','#7B68EE','#9400D3','#FF00FF','#FFD700'],
  ['#FFD700','#FFC200','#FFAA00','#FF8800','#FF6600','#FF4400'],
  ['#FF00FF','#FF1493','#C71585','#FFD700','#FF4500','#FFFFFF'],
  ['#00FFFF','#0088FF','#FFD700','#FF4500','#FFFFFF','#7FFFD4'],
  ['#FFFFFF','#FFD700','#FF8C00','#FF4500','#FF1493','#9400D3'],
  ['#FFD700','#C0C0C0','#CD7F32','#FFFACD','#FF8C00','#FFFFFF'],
  ['#FF4500','#FFD700','#FFFFFF','#00BFFF','#FF1493','#7B68EE'],
];

function pal(m,i){ return PALETTES[m%PALETTES.length][i%6]; }
function palR(m){ return pal(m,Math.floor(rng()*6)); }

// ---- MATH HELPERS ----
const PI=Math.PI, TAU=PI*2;
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function noise1(x){return Math.sin(x*1.7)*Math.cos(x*0.9+1.3)+Math.sin(x*3.1+0.7)*0.5;}
function noise2(x,y){return Math.sin(x*1.3+y*0.9)*Math.cos(y*1.1-x*0.7);}

// ---- PARTICLE SYSTEM ----
class Particle{
  constructor(x,y,vx,vy,col,life,size,type){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.col=col;this.life=life;this.maxLife=life;
    this.size=size||2;this.type=type||0;
    this.angle=rng()*TAU;this.spin=( rng()-0.5)*0.3;
    this.trail=[];this.maxTrail=type===2?12:0;
    this.glow=rng()>0.5;
    this.morse=rng()>0.7;
  }
  update(dt){
    this.x+=this.vx*dt*60;
    this.y+=this.vy*dt*60;
    this.vy+=0.012*dt*60*(this.type===3?-1:1);
    this.vx*=0.992;this.vy*=0.992;
    this.angle+=this.spin*dt*60;
    this.life-=dt;
    if(this.maxTrail>0){
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>this.maxTrail)this.trail.shift();
    }
  }
  draw(G){
    let a=clamp(this.life/this.maxLife,0,1);
    let sz=this.size*a;
    if(sz<0.3)return;
    G.save();
    if(this.glow){
      G.shadowBlur=sz*5;
      G.shadowColor=this.col;
    }
    // trail
    if(this.trail.length>1){
      for(let i=1;i<this.trail.length;i++){
        let ta=i/this.trail.length*a*0.6;
        G.beginPath();
        G.strokeStyle=this.col.replace(')',`,${ta})`).replace('rgb','rgba');
        G.lineWidth=sz*(i/this.trail.length)*0.7;
        G.moveTo(this.trail[i-1].x,this.trail[i-1].y);
        G.lineTo(this.trail[i].x,this.trail[i].y);
        G.stroke();
      }
    }
    G.globalAlpha=a;
    G.translate(this.x,this.y);G.rotate(this.angle);
    G.fillStyle=this.col;
    if(this.type===1){
      // diamond
      G.beginPath();
      G.moveTo(0,-sz);G.lineTo(sz,0);G.lineTo(0,sz);G.lineTo(-sz,0);
      G.closePath();G.fill();
    } else if(this.type===2){
      // star
      let s=sz*0.5,l=sz;
      G.beginPath();
      for(let i=0;i<5;i++){
        let a1=i*TAU/5-PI/2,a2=a1+TAU/10;
        G.lineTo(Math.cos(a1)*l,Math.sin(a1)*l);
        G.lineTo(Math.cos(a2)*s,Math.sin(a2)*s);
      }
      G.closePath();G.fill();
    } else if(this.type===3){
      // dollar sign burst
      G.font=`bold ${sz*2}px serif`;
      G.textAlign='center';G.textBaseline='middle';
      G.fillText('$',0,0);
    } else {
      G.beginPath();G.arc(0,0,sz,0,TAU);G.fill();
    }
    G.restore();
  }
}

// ---- TENDRIL ----
class Tendril{
  constructor(x,y,angle,col,len,width){
    this.pts=[{x,y}];
    this.angle=angle;this.col=col;
    this.len=len||120;this.width=width||2;
    this.life=1;this.decay=0.008+rng()*0.012;
    this.growing=true;this.seg=0;
    this.maxSeg=Math.floor(this.len/6);
    this.noiseOff=rng()*100;
  }
  update(dt){
    if(this.growing&&this.seg<this.maxSeg){
      let last=this.pts[this.pts.length-1];
      let n=noise1(this.seg*0.3+this.noiseOff+t*0.5)*0.8;
      this.angle+=n*dt*60;
      let nx=last.x+Math.cos(this.angle)*6;
      let ny=last.y+Math.sin(this.angle)*6;
      this.pts.push({x:nx,y:ny});
      this.seg++;
      if(this.seg>=this.maxSeg)this.growing=false;
    } else {
      this.life-=this.decay*dt*60;
    }
  }
  draw(G){
    if(this.pts.length<2)return;
    G.save();
    G.globalAlpha=this.life*0.85;
    G.shadowBlur=8;G.shadowColor=this.col;
    G.strokeStyle=this.col;
    G.lineWidth=this.width*this.life;
    G.lineCap='round';
    G.beginPath();
    G.moveTo(this.pts[0].x,this.pts[0].y);
    for(let i=1;i<this.pts.length;i++) G.lineTo(this.pts[i].x,this.pts[i].y);
    G.stroke();
    G.restore();
  }
}

// ---- BEAM ----
class Beam{
  constructor(x1,y1,x2,y2,col,w,life){
    this.x1=x1;this.y1=y1;this.x2=x2;this.y2=y2;
    this.col=col;this.w=w||1.5;
    this.life=life||0.8;this.maxLife=this.life;
    this.seg=Math.floor(3+rng()*5);
  }
  update(dt){this.life-=dt*1.5;}
  draw(G){
    let a=clamp(this.life/this.maxLife,0,1);
    G.save();G.globalAlpha=a;
    G.shadowBlur=12;G.shadowColor=this.col;
    G.strokeStyle=this.col;G.lineWidth=this.w;
    // jagged lightning
    G.beginPath();
    let px=this.x1,py=this.y1;
    G.moveTo(px,py);
    for(let i=1;i<this.seg;i++){
      let fx=i/this.seg,mx=lerp(this.x1,this.x2,fx),my=lerp(this.y1,this.y2,fx);
      let perp=Math.atan2(this.y2-this.y1,this.x2-this.x1)+PI/2;
      let off=(rng()-0.5)*(1-fx)*80;
      G.lineTo(mx+Math.cos(perp)*off,my+Math.sin(perp)*off);
    }
    G.lineTo(this.x2,this.y2);
    G.stroke();
    G.restore();
  }
}

// ---- RING ----
class Ring{
  constructor(x,y,r0,r1,col,speed,life){
    this.x=x;this.y=y;this.r=r0;this.maxR=r1;
    this.col=col;this.speed=speed||1.5;
    this.life=life||1;this.maxLife=this.life;
    this.rot=rng()*TAU;this.rotSpeed=(rng()-0.5)*0.04;
    this.sides=Math.floor(3+rng()*8);
    this.type=Math.floor(rng()*3);
  }
  update(dt){
    this.r+=this.speed*dt*60;
    this.life-=(this.speed/(this.maxR-this.r+1))*dt*60*0.012;
    this.rot+=this.rotSpeed*dt*60;
  }
  draw(G){
    let a=clamp(this.life/this.maxLife,0,1)*(1-this.r/this.maxR);
    if(a<0.01)return;
    G.save();G.globalAlpha=a;
    G.translate(this.x,this.y);G.rotate(this.rot);
    G.shadowBlur=20;G.shadowColor=this.col;
    G.strokeStyle=this.col;G.lineWidth=2.5;
    if(this.type===0){
      G.beginPath();G.arc(0,0,this.r,0,TAU);G.stroke();
    } else if(this.type===1){
      G.beginPath();
      for(let i=0;i<=this.sides;i++){
        let a2=i/this.sides*TAU;
        i===0?G.moveTo(Math.cos(a2)*this.r,Math.sin(a2)*this.r):
               G.lineTo(Math.cos(a2)*this.r,Math.sin(a2)*this.r);
      }
      G.stroke();
    } else {
      // double ring
      G.beginPath();G.arc(0,0,this.r,0,TAU);G.stroke();
      G.beginPath();G.arc(0,0,this.r*0.85,0,TAU);
      G.globalAlpha=a*0.5;G.stroke();
    }
    G.restore();
  }
}

// ---- GLYPH (floating text elements) ----
const GLYPHTEXTS=[
  'TOBACCO.COM','$1 TRILLION','PER YEAR','GLOBAL INDUSTRY',
  'APEX DOMAIN','BRAND VALUE','PRICELESS','.COM','TOBACCO',
  '¥¥¥','$$$','€€€','#1 DOMAIN','WORLD MARKET',
  'PREMIUM BRAND','ULTRA RARE','ICONIC DOMAIN','TOP TIER',
  '1,000,000,000,000','INDUSTRY LEADER','GLOBAL REACH'
];
class Glyph{
  constructor(){
    this.text=GLYPHTEXTS[Math.floor(rng()*GLYPHTEXTS.length)];
    this.x=rng()*W;this.y=rng()*H;
    this.vx=(rng()-0.5)*0.5;this.vy=(rng()-0.5)*0.5;
    this.size=clamp(12+rng()*48,14,60)*Math.min(W,H)/800;
    this.col=palR(mode);
    this.alpha=0;this.targetAlpha=0.15+rng()*0.55;
    this.life=3+rng()*8;this.maxLife=this.life;
    this.rot=(rng()-0.5)*0.4;
    this.scale=0.01;this.targetScale=0.8+rng()*0.4;
    this.burst=rng()>0.6;
    this.important=this.text==='TOBACCO.COM'||this.text==='$1 TRILLION';
    if(this.important){
      this.size*=1.8;this.targetAlpha=0.9;
    }
  }
  update(dt){
    this.x+=this.vx*dt*60;this.y+=this.vy*dt*60;
    this.life-=dt;
    let progress=1-this.life/this.maxLife;
    if(progress<0.15)this.alpha=lerp(this.alpha,this.targetAlpha,0.08);
    else if(this.life<0.8)this.alpha=lerp(this.alpha,0,0.05);
    this.scale=lerp(this.scale,this.targetScale,0.06);
  }
  draw(G){
    if(this.alpha<0.01)return;
    G.save();
    G.globalAlpha=this.alpha;
    G.translate(this.x,this.y);G.rotate(this.rot);G.scale(this.scale,this.scale);
    let fs=this.important?`900 ${this.size}px 'Georgia',serif`:`700 ${this.size*0.7}px 'Courier New',monospace`;
    G.font=fs;
    G.textAlign='center';G.textBaseline='middle';
    if(this.important){
      G.shadowBlur=30;G.shadowColor=this.col;
      // gradient text
      let grd=G.createLinearGradient(-200,0,200,0);
      grd.addColorStop(0,palR(mode));
      grd.addColorStop(0.5,'#FFFFFF');
      grd.addColorStop(1,palR(mode));
      G.fillStyle=grd;
    } else {
      G.shadowBlur=10;G.shadowColor=this.col;
      G.fillStyle=this.col;
    }
    G.fillText(this.text,0,0);
    G.restore();
  }
}

// ---- CENTRAL BRAND DISPLAY ----
let brandPulse=0, brandScale=1, brandRot=0;
let brandColorShift=0;

function drawBrand(){
  brandPulse+=0.03;
  brandScale=1+Math.sin(brandPulse)*0.04+Math.sin(brandPulse*2.7)*0.015;
  brandRot+=0.001;
  brandColorShift+=0.005;

  let sz=Math.min(W,H)*0.11;
  let P=PALETTES[mode%PALETTES.length];

  // --- Decorative rotating layer (rings, petals, geometry) ---
  G.save();
  G.translate(cx,cy);G.rotate(brandRot*0.3);G.scale(brandScale,brandScale);

  // Outer glow rings
  for(let i=0;i<5;i++){
    let r=sz*(1.5+i*0.45)+Math.sin(brandPulse*1.2+i)*sz*0.08;
    let a=0.12-i*0.02;
    G.beginPath();G.arc(0,0,r,0,TAU);
    G.strokeStyle=P[i%6];
    G.globalAlpha=a*(0.5+0.5*Math.sin(brandPulse+i));
    G.lineWidth=2+i*0.5;
    G.shadowBlur=20;G.shadowColor=P[i%6];
    G.stroke();
  }

  // Rotating petals
  G.globalAlpha=0.18;
  let petals=8;
  for(let i=0;i<petals;i++){
    let angle=brandRot*2+i*TAU/petals;
    let r=sz*1.1;
    G.save();G.rotate(angle);
    G.beginPath();
    G.ellipse(r,0,sz*0.35,sz*0.1,0,0,TAU);
    G.fillStyle=P[i%6];G.shadowBlur=15;G.shadowColor=P[i%6];
    G.fill();G.restore();
  }

  // Inner sacred geometry
  G.globalAlpha=0.35;
  G.save();G.rotate(brandRot*1.5);
  for(let n=3;n<=7;n++){
    G.beginPath();
    for(let i=0;i<=n;i++){
      let a2=i/n*TAU-PI/2;
      let r2=sz*(0.3+n*0.07);
      i===0?G.moveTo(Math.cos(a2)*r2,Math.sin(a2)*r2):G.lineTo(Math.cos(a2)*r2,Math.sin(a2)*r2);
    }
    G.strokeStyle=P[n%6];G.lineWidth=1.2;G.shadowBlur=8;G.shadowColor=P[n%6];
    G.stroke();
  }
  G.restore();

  G.restore(); // end rotating decorative layer

  // --- Text layer: translated to center, NO rotation, scale only ---
  G.save();
  G.translate(cx,cy);G.scale(brandScale,brandScale);

  // Main text glow background
  G.globalAlpha=1;
  let bgR=sz*1.05;
  let radGrad=G.createRadialGradient(0,0,0,0,0,bgR);
  radGrad.addColorStop(0,`rgba(0,0,0,0.85)`);
  radGrad.addColorStop(0.6,`rgba(0,0,0,0.5)`);
  radGrad.addColorStop(1,`rgba(0,0,0,0)`);
  G.fillStyle=radGrad;
  G.beginPath();G.arc(0,0,bgR,0,TAU);G.fill();

  // TOBACCO.COM text
  G.globalAlpha=1;
  let mainSize=sz*0.58;
  G.font=`900 ${mainSize}px 'Georgia',serif`;
  G.textAlign='center';G.textBaseline='middle';

  // Chromatic aberration effect
  for(let ab=0;ab<3;ab++){
    let off=[{x:-2,y:0,c:'rgba(255,0,0,0.3)'},{x:2,y:0,c:'rgba(0,255,255,0.3)'},{x:0,y:0,c:null}][ab];
    if(off.c===null){
      let tGrad=G.createLinearGradient(-sz*2,0,sz*2,0);
      let c1=P[Math.floor(brandColorShift*3)%6];
      let c2=P[(Math.floor(brandColorShift*3)+1)%6];
      let c3=P[(Math.floor(brandColorShift*3)+2)%6];
      tGrad.addColorStop(0,c1);tGrad.addColorStop(0.5,c2);tGrad.addColorStop(1,c3);
      G.fillStyle=tGrad;
      G.shadowBlur=sz*0.5;G.shadowColor=P[0];
    } else {
      G.fillStyle=off.c;
      G.shadowBlur=0;
    }
    G.fillText('TOBACCO.COM',off.x,off.y-sz*0.05);
  }

  // Subtitle
  G.globalAlpha=0.85;
  let subSize=sz*0.13;
  G.font=`600 ${subSize}px 'Courier New',monospace`;
  G.letterSpacing='0.2em';
  let subGrad=G.createLinearGradient(-sz,0,sz,0);
  subGrad.addColorStop(0,P[3]);subGrad.addColorStop(0.5,'#FFFFFF');subGrad.addColorStop(1,P[4]);
  G.fillStyle=subGrad;
  G.shadowBlur=sz*0.12;G.shadowColor=P[2];
  G.fillText('THE WORLD\'S APEX TOBACCO DOMAIN',0,sz*0.38);

  // Revenue line
  G.globalAlpha=0.9;
  let revSize=sz*0.17;
  G.font=`800 ${revSize}px 'Georgia',serif`;
  let revGrad=G.createLinearGradient(-sz,0,sz,0);
  revGrad.addColorStop(0,P[4]);revGrad.addColorStop(0.5,'#FFFACD');revGrad.addColorStop(1,P[0]);
  G.fillStyle=revGrad;
  G.shadowBlur=sz*0.2;G.shadowColor='#FFD700';
  G.fillText('$1 TRILLION / YEAR',0,sz*0.62);

  G.restore();
}

// ---- MODE-SPECIFIC FX ----
function modeEffects(dt){
  let m=mode;
  // spawn particles
  let spawnR=()=>{
    let angle=rng()*TAU;
    let r=Math.min(W,H)*0.1*(0.5+rng()*2);
    let spd=0.8+rng()*2.5;
    let types=[0,1,2,3];
    particles.push(new Particle(
      cx+Math.cos(angle)*r*0.3+( rng()-0.5)*W*0.5,
      cy+Math.sin(angle)*r*0.3+( rng()-0.5)*H*0.5,
      Math.cos(angle+PI)*spd*(rng()+0.2),
      Math.sin(angle+PI)*spd*(rng()+0.2),
      palR(m),
      1+rng()*3,
      2+rng()*8,
      types[Math.floor(rng()*types.length)]
    ));
  };

  // Base particle spawn
  let baseSpawn=3;
  if(m===0)baseSpawn=8;
  else if(m===1)baseSpawn=12;
  else if(m===4)baseSpawn=15;
  else if(m===7)baseSpawn=20;

  for(let i=0;i<baseSpawn;i++) spawnR();

  // Mode-specific
  if(m===0){ // NEBULA FORGE
    if(frame%3===0){
      let angle=rng()*TAU;
      let r=Math.min(W,H)*0.15;
      tendrils.push(new Tendril(
        cx+Math.cos(angle)*r,cy+Math.sin(angle)*r,
        angle+PI+( rng()-0.5)*0.8,
        palR(m),80+rng()*120,1.5+rng()*2
      ));
    }
  }
  if(m===1){ // DOLLAR MATRIX
    if(frame%2===0){
      particles.push(new Particle(
        rng()*W,(rng()-0.5)*H+cy,
        0,1+rng()*3,
        palR(m),2+rng()*2,14+rng()*10,3
      ));
    }
  }
  if(m===2){ // BRAND CORONA
    if(frame%4===0){
      let angle=rng()*TAU;
      let r=Math.min(W,H)*0.12;
      beams.push(new Beam(
        cx+Math.cos(angle)*r,cy+Math.sin(angle)*r,
        cx+Math.cos(angle)*(r+80+rng()*200),cy+Math.sin(angle)*(r+80+rng()*200),
        palR(m),1+rng()*2,0.6
      ));
    }
  }
  if(m===3){ // QUANTUM LATTICE
    if(frame%6===0){
      rings.push(new Ring(cx,cy,10,Math.min(W,H)*0.6,palR(m),1.2+rng()*1.5,1.2));
    }
  }
  if(m===4){ // GOLD STORM
    if(frame%2===0){
      let a=rng()*TAU,r=30+rng()*Math.min(W,H)*0.45;
      particles.push(new Particle(
        cx+Math.cos(a)*r,cy+Math.sin(a)*r,
        (rng()-0.5)*3,(rng()-0.5)*3,
        '#FFD700',1.5+rng()*3,3+rng()*10,1
      ));
    }
  }
  if(m===5){ // DOMAIN PULSE
    if(frame%8===0){
      rings.push(new Ring(cx,cy,5,Math.min(W,H)*0.5,palR(m),2+rng()*2,1));
      rings.push(new Ring(cx,cy,5,Math.min(W,H)*0.3,palR(m),3+rng()*3,0.8));
    }
  }
  if(m===6){ // TRILLION WAVE
    if(frame%3===0){
      let y=rng()*H;
      beams.push(new Beam(0,y,W,y+( rng()-0.5)*100,palR(m),1.5,0.5));
    }
    if(frame%5===0){
      let x=rng()*W;
      beams.push(new Beam(x,0,x+( rng()-0.5)*100,H,palR(m),1,0.4));
    }
  }
  if(m===7){ // APEX SINGULARITY
    if(frame%1===0){
      let angle=rng()*TAU;
      let r=rng()*Math.max(W,H)*0.7;
      let tx=cx+Math.cos(angle)*r,ty=cy+Math.sin(angle)*r;
      beams.push(new Beam(tx,ty,cx,cy,palR(m),0.5+rng()*2,0.4));
    }
  }
  if(m===8){ // VORTEX CROWN
    if(frame%3===0){
      let a=rng()*TAU;
      let r=50+rng()*Math.min(W,H)*0.35;
      tendrils.push(new Tendril(
        cx+Math.cos(a)*r,cy+Math.sin(a)*r,
        a+PI/2+(rng()-0.5)*0.5,
        palR(m),60+rng()*100,2
      ));
    }
  }
  if(m===9){ // CHROME EMPIRE
    if(frame%5===0){
      rings.push(new Ring(
        cx+( rng()-0.5)*W*0.4,cy+( rng()-0.5)*H*0.4,
        5,80+rng()*200,palR(m),1.5+rng()*2,0.9
      ));
    }
    if(frame%10===0){
      let a1=rng()*TAU,a2=rng()*TAU;
      let r1=50+rng()*200,r2=50+rng()*200;
      beams.push(new Beam(
        cx+Math.cos(a1)*r1,cy+Math.sin(a1)*r1,
        cx+Math.cos(a2)*r2,cy+Math.sin(a2)*r2,
        palR(m),1+rng(),0.5
      ));
    }
  }

  // Global extra FX triggers
  if(frame%90===0){
    playTone(100+rng()*600,['sine','sawtooth','square','triangle'][Math.floor(rng()*4)],0.8+rng()*0.8,0.06);
  }
  if(frame%30===0&&rng()>0.6){
    playNoise(0.1+rng()*0.2,0.03);
  }
  // Glyph spawn
  if(frame%60===0||(frame%20===0&&rng()>0.8)){
    glyphs.push(new Glyph());
  }
}

// ---- BACKGROUND ----
function drawBackground(){
  // Deep space / radial gradient based on mode
  let P=PALETTES[mode%PALETTES.length];
  let bg=G.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.8);
  bg.addColorStop(0,`rgba(5,3,2,0.92)`);
  bg.addColorStop(0.5,`rgba(2,2,6,0.88)`);
  bg.addColorStop(1,`rgba(0,0,0,0.95)`);
  G.fillStyle=bg;
  G.fillRect(0,0,W,H);

  // Radial grid lines
  G.save();
  G.globalAlpha=0.04;
  G.strokeStyle=P[0];
  G.lineWidth=0.5;
  let gridN=16;
  for(let i=0;i<gridN;i++){
    let a=i/gridN*TAU+t*0.01;
    G.beginPath();G.moveTo(cx,cy);
    G.lineTo(cx+Math.cos(a)*Math.max(W,H),cy+Math.sin(a)*Math.max(W,H));
    G.stroke();
  }
  // Concentric ovals
  for(let i=1;i<=12;i++){
    G.beginPath();
    G.ellipse(cx,cy,i*W/13,i*H/13,t*0.005,0,TAU);
    G.stroke();
  }
  G.restore();

  // Nebula-like noise patches
  G.save();
  G.globalAlpha=0.03+0.02*Math.sin(t*0.2);
  for(let i=0;i<4;i++){
    let nx=cx+Math.sin(t*0.05+i*1.7)*W*0.3;
    let ny=cy+Math.cos(t*0.04+i*2.1)*H*0.3;
    let nr=W*0.2+Math.sin(t*0.1+i)*W*0.1;
    let ng=G.createRadialGradient(nx,ny,0,nx,ny,nr);
    ng.addColorStop(0,P[i%6]);
    ng.addColorStop(1,'transparent');
    G.fillStyle=ng;
    G.beginPath();G.arc(nx,ny,nr,0,TAU);G.fill();
  }
  G.restore();
}

// ---- SCANLINES ----
function drawScanlines(){
  G.save();
  G.globalAlpha=0.025;
  G.fillStyle='#000';
  for(let y=0;y<H;y+=4){
    G.fillRect(0,y,W,2);
  }
  G.restore();
}

// ---- VIGNETTE ----
function drawVignette(){
  let vg=G.createRadialGradient(cx,cy,Math.min(W,H)*0.3,cx,cy,Math.max(W,H)*0.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.72)');
  G.fillStyle=vg;G.fillRect(0,0,W,H);
}

// ---- HUD UPDATE ----
function updateHUD(){
  if(!HUDon)return;
  document.getElementById('hud-mode').textContent='MODE: '+MODES[mode];
  document.getElementById('hud-phase').textContent='PHASE: '+(globalPhase*100).toFixed(1)+'%';
  document.getElementById('hud-fps').textContent='FPS: '+fps.toFixed(1);
  document.getElementById('hud-particles').textContent=
    'PARTICLES: '+particles.length+'  RINGS: '+rings.length+'  BEAMS: '+beams.length;
  document.getElementById('hud-time').textContent='T: '+t.toFixed(3)+'s';
}

// ---- REGENERATE ----
function regenerate(){
  newSeed();
  mode=Math.floor(rng()*MODES.length);
  particles=[];beams=[];rings=[];glyphs=[];tendrils=[];
  phaseT=0;globalPhase=0;
  brandPulse=rng()*TAU;
  playTone(220+rng()*440,'sawtooth',0.3,0.12);
  playNoise(0.15,0.08);
  // Reset instructions fade
  let ins=document.getElementById('instructions');
  ins.style.opacity=1;
  setTimeout(()=>ins.style.opacity=0,3000);
}

// ---- MAIN LOOP ----
function loop(now){
  requestAnimationFrame(loop);
  let dt=Math.min((now-(lastTime||now))/1000,0.05);
  lastTime=now;
  t+=dt;
  frame++;

  // FPS
  fps=lerp(fps,1/dt,0.05);

  // Phase progression
  phaseT+=dt*0.025;
  globalPhase=phaseT%1;
  if(phaseT>1&&frame%200===0){ // subtle mode drift
    if(rng()>0.7) mode=(mode+1)%MODES.length;
  }

  // Clear
  G.clearRect(0,0,W,H);

  // Background
  drawBackground();

  // Update + draw tendrils
  tendrils=tendrils.filter(t2=>{
    t2.update(dt);t2.draw(G);
    return t2.life>0&&t2.pts.length>0;
  });

  // Update + draw rings
  rings=rings.filter(r=>{
    r.update(dt);r.draw(G);
    return r.life>0&&r.r<r.maxR;
  });

  // Update + draw beams
  beams=beams.filter(b=>{
    b.update(dt);b.draw(G);
    return b.life>0;
  });

  // Update + draw particles
  particles=particles.filter(p=>{
    p.update(dt);p.draw(G);
    return p.life>0;
  });

  // Update + draw glyphs
  glyphs=glyphs.filter(g=>{
    g.update(dt);g.draw(G);
    return g.life>0;
  });

  // Mode effects (spawning)
  modeEffects(dt);

  // Brand center
  drawBrand();

  // Overlay FX: edge lightning
  if(frame%45===0){
    let edge=Math.floor(rng()*4);
    let ex1,ey1,ex2,ey2;
    if(edge===0){ex1=rng()*W;ey1=0;ex2=cx+(rng()-0.5)*W*0.5;ey2=cy+(rng()-0.5)*H*0.5;}
    else if(edge===1){ex1=W;ey1=rng()*H;ex2=cx+(rng()-0.5)*W*0.5;ey2=cy+(rng()-0.5)*H*0.5;}
    else if(edge===2){ex1=rng()*W;ey1=H;ex2=cx+(rng()-0.5)*W*0.5;ey2=cy+(rng()-0.5)*H*0.5;}
    else{ex1=0;ey1=rng()*H;ex2=cx+(rng()-0.5)*W*0.5;ey2=cy+(rng()-0.5)*H*0.5;}
    beams.push(new Beam(ex1,ey1,ex2,ey2,palR(mode),0.8+rng()*1.5,0.4+rng()*0.3));
  }

  // Cap collections
  if(particles.length>1200)particles.splice(0,particles.length-1200);
  if(rings.length>80)rings.splice(0,rings.length-80);
  if(beams.length>200)beams.splice(0,beams.length-200);
  if(glyphs.length>30)glyphs.splice(0,glyphs.length-30);
  if(tendrils.length>60)tendrils.splice(0,tendrils.length-60);

  // Post
  drawScanlines();
  drawVignette();
  updateHUD();
}

// ---- CONTROLS ----
window.addEventListener('keydown',e=>{
  let k=e.key.toUpperCase();
  if(k==='H'){
    HUDon=!HUDon;
    document.getElementById('hud').style.display=HUDon?'block':'none';
  }
  if(k==='S') toggleSound();
  if(k===' '){e.preventDefault();regenerate();}
});
window.addEventListener('click',regenerate);
window.addEventListener('touchstart',e=>{e.preventDefault();regenerate();},{passive:false});

// ---- INIT ----
newSeed();
mode=Math.floor(Math.random()*MODES.length);
setTimeout(()=>{
  document.getElementById('instructions').style.opacity=0;
},3500);
requestAnimationFrame(loop);
</script>
