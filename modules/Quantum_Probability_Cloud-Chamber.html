<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Probability Cloud-Chamber | Quantum Generative Art</title>

<meta name="description" content="Quantum Cloud-Chamber — A GPU accelerated generative art simulation visualizing Schrödinger wavefunctions, probability density clouds, and warped spacetime Voronoi structures.">
<meta name="keywords" content="Quantum Generative Art, Schrödinger Wavefunction, Feynman Path Integral, WebGL GLSL Art, Probability Density Visualization, Quantum Cloud Chamber">
<meta name="author" content="Quantum Generative Engine">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
touch-action:none;
}
canvas{
display:block;
}
#hud{
position:fixed;
top:0;
left:0;
color:white;
font-family:monospace;
font-size:12px;
background:rgba(0,0,0,0.5);
padding:10px;
display:none;
z-index:10;
}
</style>
</head>
<body>

<div id="hud"></div>
<canvas id="gl"></canvas>

<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl",{antialias:false});
let W,H;

function resize(){
W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;
gl.viewport(0,0,W,H);
}
window.onresize=resize;
resize();

/* ---------- Utility ---------- */
function rand(min,max){return Math.random()*(max-min)+min;}
function randInt(min,max){return Math.floor(rand(min,max));}

/* ---------- Quantum State ---------- */
let state;
function resetQuantum(){
state={
phase: rand(0,6.28),
mass: rand(0.5,5.0),
coupling: rand(0.2,3.0),
voronoiWarp: rand(0.5,3.0),
schwarzschild: rand(0.2,2.0),
hueShift: rand(0,360),
banding: rand(4,20),
noiseScale: rand(1,6),
seed: rand(0,1000),
timeScale: rand(0.2,1.2)
};
}
resetQuantum();

/* ---------- Shader Setup ---------- */
function compile(type,src){
let s=gl.createShader(type);
gl.shaderSource(s,src);
gl.compileShader(s);
return s;
}

const vert = compile(gl.VERTEX_SHADER,`
attribute vec2 pos;
void main(){
gl_Position=vec4(pos,0.0,1.0);
}
`);

const frag = compile(gl.FRAGMENT_SHADER,`
precision highp float;

uniform vec2 res;
uniform float time;
uniform float phase;
uniform float mass;
uniform float coupling;
uniform float voronoiWarp;
uniform float schwarzschild;
uniform float hueShift;
uniform float banding;
uniform float noiseScale;
uniform float seed;

#define PI 3.14159265359

/* HSL -> RGB */
vec3 hsl2rgb(vec3 c){
vec3 rgb=clamp(abs(mod(c.x*6.0+vec3(0,4,2),6.0)-3.0)-1.0,0.0,1.0);
return c.z + c.y*(rgb-0.5)*(1.0-abs(2.0*c.z-1.0));
}

/* Random */
float hash(vec2 p){
return fract(sin(dot(p,vec2(127.1,311.7))) * 43758.5453 + seed);
}

/* Voronoi */
float voronoi(vec2 x){
vec2 n=floor(x);
vec2 f=fract(x);
float md=1.0;
for(int j=-1;j<=1;j++)
for(int i=-1;i<=1;i++){
vec2 g=vec2(float(i),float(j));
vec2 o=hash(n+g)*vec2(1.0);
vec2 r=g+o-f;
float d=dot(r,r);
md=min(md,d);
}
return md;
}

/* Schwarzschild warp */
vec2 warp(vec2 uv){
float r=length(uv);
float rs=schwarzschild;
float factor=1.0/(1.0-rs/(r+0.1));
return uv*factor;
}

void main(){
vec2 uv=(gl_FragCoord.xy/res.xy)*2.0-1.0;
uv.x*=res.x/res.y;

uv=warp(uv);

float r=length(uv);
float theta=atan(uv.y,uv.x);

/* Schrödinger-like wavefunction */
float psi=exp(-mass*r*r)*cos(10.0*r - time*phase);
float prob=psi*psi;

/* Higgs perturbation */
float higgs=sin(r*coupling - time*0.5);

/* Voronoi distortion */
float v=voronoi(uv*voronoiWarp + time*0.1);

/* Combine */
float density=prob + 0.3*higgs + 0.2*v;
density=abs(density);

/* Spectral banding */
float h=fract(hueShift/360.0 + density*banding*0.1);
vec3 col=hsl2rgb(vec3(h,1.0,0.5));

col*=density*2.0;

gl_FragColor=vec4(col,1.0);
}
`);

const prog=gl.createProgram();
gl.attachShader(prog,vert);
gl.attachShader(prog,frag);
gl.linkProgram(prog);
gl.useProgram(prog);

/* Fullscreen Quad */
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
-1,-1,
1,-1,
-1,1,
1,1
]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,"pos");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

/* Uniforms */
function uni(name,val){
let l=gl.getUniformLocation(prog,name);
if(typeof val==="number") gl.uniform1f(l,val);
else gl.uniform2f(l,val[0],val[1]);
}

/* ---------- Audio ---------- */
let audioCtx=null, osc=null, gain=null;
let soundOn=false;

function initSound(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
osc=audioCtx.createOscillator();
gain=audioCtx.createGain();
osc.type="sine";
osc.connect(gain);
gain.connect(audioCtx.destination);
gain.gain.value=0.0;
osc.start();
}

function toggleSound(){
if(!audioCtx) initSound();
soundOn=!soundOn;
if(soundOn) gain.gain.value=0.1;
else gain.gain.value=0.0;
}

/* ---------- HUD ---------- */
let hudOn=false;
const hud=document.getElementById("hud");

function updateHUD(){
hud.innerHTML=
"Quantum Cloud-Chamber\n"+
"mass: "+state.mass.toFixed(2)+"\n"+
"coupling: "+state.coupling.toFixed(2)+"\n"+
"voronoiWarp: "+state.voronoiWarp.toFixed(2)+"\n"+
"schwarzschild: "+state.schwarzschild.toFixed(2)+"\n"+
"banding: "+state.banding.toFixed(2);
}

/* ---------- Controls ---------- */
window.addEventListener("keydown",e=>{
if(e.code==="Space"){resetQuantum();}
if(e.key==="h"||e.key==="H"){
hudOn=!hudOn;
hud.style.display=hudOn?"block":"none";
}
if(e.key==="s"||e.key==="S"){
toggleSound();
}
});
canvas.addEventListener("click",resetQuantum);

/* ---------- Render Loop ---------- */
let start=performance.now();

function render(){
let t=(performance.now()-start)/1000 * state.timeScale;

uni("res",[W,H]);
uni("time",t);
uni("phase",state.phase);
uni("mass",state.mass);
uni("coupling",state.coupling);
uni("voronoiWarp",state.voronoiWarp);
uni("schwarzschild",state.schwarzschild);
uni("hueShift",state.hueShift + t*20.0);
uni("banding",state.banding);
uni("noiseScale",state.noiseScale);
uni("seed",state.seed);

gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

if(soundOn && osc){
osc.frequency.value=200 + state.mass*100 + Math.sin(t)*100;
}

if(hudOn) updateHUD();

requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
