// HYPERBOLIC MECHANICAL KALEIDOSPHERE ENGINE
// WebGL 1.0 / GLSL ES 1.00 compatible
// ============================================================
'use strict';

const canvas = document.getElementById('c');
const hud    = document.getElementById('hud');
let gl, ext_deriv;
let audioCtx, masterGain;
let soundOn = false, hudOn = false;
let W, H, frame = 0, lastTime = 0, fps = 60;
let universe = null;

// ── WebGL init ───────────────────────────────────────────────
function initGL() {
  const opts = { antialias: false, powerPreference: 'high-performance', alpha: false };
  gl = canvas.getContext('webgl2', opts) || canvas.getContext('webgl', opts);
  if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:24px;font-family:sans-serif">WebGL unavailable</p>'; return false; }
  ext_deriv = gl.getExtension('OES_standard_derivatives');
  resize();
  return true;
}
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (gl) gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);

// ── Vertex shader ────────────────────────────────────────────
const VS = `
attribute vec2 a_pos;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// ── Fragment shader ──────────────────────────────────────────
// Rules followed for strict GLSL ES 1.00 compatibility:
//   - No round() → replaced with floor(x+0.5)
//   - No int mod/arithmetic with mismatched types
//   - dFdx/dFdy only used if OES_standard_derivatives present
//   - All literal integers in float context are written as floats
//   - Dynamic array indexing via float step() selection
//   - No integer uniform for mode (use float u_modeF)
const FS = `
#ifdef GL_OES_standard_derivatives
#extension GL_OES_standard_derivatives : enable
#endif
precision highp float;
varying vec2 v_uv;

uniform float u_time;
uniform vec2  u_res;
uniform float u_seed;
uniform float u_modeF;
uniform float u_pal[6];
uniform float u_energy;

#define PI  3.14159265358979
#define TAU 6.28318530717959
#define PHI 1.61803398874989

// ── Hash / noise ────────────────────────────────────────────
float h1(float n){ return fract(sin(n)*43758.5453123); }
float h2(vec2 p) { return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  f=f*f*(3.0-2.0*f);
  return mix(mix(h2(i),h2(i+vec2(1,0)),f.x),mix(h2(i+vec2(0,1)),h2(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){
  float v=0.0,a=0.5;
  for(int i=0;i<5;i++){v+=a*vnoise(p);p=p*2.1+vec2(1.3,0.7);a*=0.5;}
  return v;
}

// ── Colour ──────────────────────────────────────────────────
vec3 hsv(vec3 c){
  vec3 p=abs(fract(c.xxx+vec3(1.0,0.6667,0.3333))*6.0-3.0);
  return c.z*mix(vec3(1.0),clamp(p-1.0,0.0,1.0),c.y);
}
vec3 pal(float t){
  float tt=mod(t+u_time*0.05,1.0);
  float seg=floor(tt*3.0); float ft=fract(tt*3.0);
  float h=(seg<1.0)?mix(u_pal[0],u_pal[1],ft):(seg<2.0)?mix(u_pal[1],u_pal[2],ft):mix(u_pal[2],u_pal[0],ft);
  float s=(seg<1.0)?mix(u_pal[3],u_pal[4],ft):(seg<2.0)?mix(u_pal[4],u_pal[5],ft):mix(u_pal[5],u_pal[3],ft);
  return hsv(vec3(h,s,0.85+0.15*sin(t*TAU)));
}

// ── Geometry helpers ────────────────────────────────────────
float myRound(float x){ return floor(x+0.5); }
float sel(float m,float target){ return step(abs(m-target),0.45); }

// ── Patterns ────────────────────────────────────────────────

// Hyperbolic disk tiling
float hypTile(vec2 uv, float p, float q){
  float r=length(uv); if(r>=0.999) return 0.0;
  float angle=atan(uv.y,uv.x);
  float sector=TAU/p;
  float sa=mod(angle,sector)-sector*0.5;
  // acosh via log formula
  vec2 diff=uv; float la=dot(diff,diff);
  float rat=1.0+2.0*la/max(1.0-la,0.0001);
  float dist=log(rat+sqrt(max(rat*rat-1.0,0.0)));
  float band=fract(dist*q*0.25);
  return smoothstep(0.05,0.0,min(abs(band-0.5)-0.4,abs(sa)-sector*0.45));
}

// Penrose P3 via 5-grid
float penrose(vec2 p, float scale){
  p*=scale; float f=0.0;
  for(int i=0;i<5;i++){
    float a=float(i)*TAU/5.0;
    float pr=dot(p,vec2(cos(a),sin(a)));
    f+=cos(pr*PI*PHI)*cos(pr*PI);
  }
  return f/5.0;
}

// Islamic star
float islamic(vec2 p, float n){
  p=fract(p*0.5)*2.0-1.0;
  float f=0.0, step2=TAU/n;
  for(int i=0;i<12;i++){
    if(float(i)>=n) break;
    float a=float(i)*step2;
    float s=abs(dot(p,vec2(cos(a),sin(a))))-0.85;
    f=max(f,smoothstep(0.05,0.0,abs(s)));
  }
  float r=length(p);
  float star=cos(atan(p.y,p.x)*n*0.5)*0.3+0.7;
  return max(f,smoothstep(0.05,0.0,abs(r-star*0.5)));
}

// Hilbert approx
float hilbert(vec2 p){
  float d=0.0;
  for(int i=0;i<6;i++){
    vec2 cell=floor(p*pow(2.0,float(i)+1.0));
    d+=mod(cell.x+cell.y,2.0)*pow(0.5,float(i)+1.0);
  }
  return d;
}

// Celtic knot
float celtic(vec2 p){
  p=fract(p)*2.0-1.0;
  float r=length(p),a=atan(p.y,p.x);
  float band=smoothstep(0.05,0.0,abs(r-0.5)*2.0-0.6);
  return band*max(sin(a*4.0+r*8.0)*0.5+0.5,cos(a*4.0-r*8.0)*0.5+0.5);
}

// Doyle spiral
float doyle(vec2 p){
  float r=length(p); if(r<0.001) return 0.0;
  float a=atan(p.y,p.x);
  return mix(sin(log(r)*8.0-a*3.0)*0.5+0.5, sin(r*20.0)*0.5+0.5, 0.5);
}

// Maori koru
float maori(vec2 p){
  float r=length(p),a=atan(p.y,p.x);
  float sp=sin(a*3.0+log(max(r,0.01))*6.0);
  return smoothstep(0.05,0.0,abs(r-0.5+sp*0.1)-0.08);
}

// Gothic tracery
float gothic(vec2 p){
  p=fract(p*1.5)*2.0-1.0;
  float f=smoothstep(0.03,0.0,abs(length(p-vec2(0.0,0.3))-0.7)-0.04);
  f+=smoothstep(0.03,0.0,abs(length(p-vec2(0.0,-0.3))-0.7)-0.04);
  for(int i=0;i<6;i++){
    float aa=float(i)*TAU/6.0;
    f+=smoothstep(0.03,0.0,abs(length(p-vec2(cos(aa),sin(aa))*0.5)-0.2)-0.03);
  }
  return clamp(f,0.0,1.0);
}

// Cantor fractal
float cantor(vec2 p){
  float f=1.0;
  for(int i=0;i<5;i++){
    vec2 q=fract(p*pow(3.0,float(i)));
    f*=(1.0-step(0.3333,q.x)*step(q.x,0.6667));
  }
  return f;
}

// Four-bar linkage point
vec2 fourBar(float t, float s){
  float a=0.4+s*0.1,b=0.3+s*0.05,c=0.35,d=0.5;
  vec2 C=vec2(a*cos(t*TAU),a*sin(t*TAU));
  vec2 BC=vec2(d,0.0)-C;
  float dist=max(length(BC),0.01);
  float cosA=clamp((b*b+dist*dist-c*c)/(2.0*b*dist),-1.0,1.0);
  float base=atan(BC.y,BC.x);
  return C+b*vec2(cos(base+acos(cosA)),sin(base+acos(cosA)));
}

// Peaucellier-Lipkin
vec2 peaucellier(float t){
  vec2 piv=vec2(0.4*cos(t*TAU),0.4*sin(t*TAU));
  return piv*(0.04/max(dot(piv,piv),0.0001));
}

// Double pendulum attractor
float pendulum(vec2 p, float t){
  float a=sin(t*1.7)*1.2+cos(t*0.9)*0.8;
  float b=sin(t*2.3+a)*0.9+cos(t*1.1)*0.6;
  vec2 tip=vec2(sin(a)*0.4+sin(a+b)*0.25,-cos(a)*0.4-cos(a+b)*0.25);
  return smoothstep(0.08,0.0,length(p-tip));
}

// Sashiko
float sashiko(vec2 p){
  p*=3.0;
  vec2 q=fract(p)*2.0-1.0;
  float g=smoothstep(0.08,0.04,abs(q.x))+smoothstep(0.08,0.04,abs(q.y));
  vec2 q2=fract(p+0.5)*2.0-1.0;
  g+=smoothstep(0.08,0.04,abs(q2.x+q2.y)*0.707);
  g+=smoothstep(0.08,0.04,abs(q2.x-q2.y)*0.707);
  return clamp(g,0.0,1.0);
}

// Batik
float batik(vec2 p, float t){
  float wax=fbm(p*2.0+t*0.05);
  float cr=fbm(p*6.0-t*0.03+wax);
  return smoothstep(0.4,0.6,fbm(p*1.5+vec2(cr,wax))+sin(cr*10.0)*0.1);
}

// Art Nouveau
float artNou(vec2 p){
  p=fract(p*0.8)*2.0-1.0;
  float r=length(p),a=atan(p.y,p.x);
  float sc=sin(a*5.0+r*8.0)*0.15;
  return smoothstep(0.04,0.0,abs(r-0.4-sc)-0.06)+smoothstep(0.04,0.0,abs(r-0.6+sc*0.5)-0.04);
}

// Möbius maze
float mobius(vec2 p){
  float u=atan(p.y,p.x)/TAU+0.5;
  float v=length(p)-0.6;
  if(u>0.5) v=-v;
  float cell=floor(u*16.0);
  float mz=h1(cell+floor((v+1.0)*8.0)*17.0+u_seed);
  return max(smoothstep(0.08,0.04,abs(v)-0.08*mz),
             smoothstep(0.02,0.0,abs(fract(u*16.0)-0.5)-0.45*mz));
}

// Persian mosaic  (uses myRound instead of round)
float persian(vec2 p){
  p=fract(p*0.6)*2.0-1.0;
  float f=0.0,n=8.0;
  for(int i=0;i<8;i++){
    float a=float(i)*TAU/n;
    float pr=dot(p,vec2(cos(a),sin(a)));
    float snap=myRound(pr*4.0)/4.0;
    f+=smoothstep(0.05,0.0,abs(pr-snap)-0.02);
  }
  float r=length(p);
  f+=smoothstep(0.04,0.0,abs(r-0.3)-0.03);
  f+=smoothstep(0.04,0.0,abs(r-0.6)-0.03);
  f+=smoothstep(0.04,0.0,abs(r-0.9)-0.03);
  return clamp(f,0.0,1.0);
}

// Mughal arabesque
float mughal(vec2 p, float t){
  p=fract(p*0.7+t*0.01)*2.0-1.0;
  float r=length(p),a=atan(p.y,p.x),f=0.0;
  for(int i=0;i<3;i++){
    float ri=0.3+float(i)*0.2;
    f+=smoothstep(0.04,0.0,abs(r-cos(a*8.0)*0.05-ri)-0.03);
  }
  f+=smoothstep(0.03,0.0,abs(r-0.7-sin(a*5.0+r*10.0)*0.02)-0.02);
  return clamp(f,0.0,1.0);
}

// Socolar-Taylor 12-fold approx
float socolar(vec2 p, float t){
  p*=1.5; float f=0.0;
  for(int i=0;i<12;i++){
    float a=float(i)*TAU/12.0;
    float pr=dot(p,vec2(cos(a),sin(a)));
    f+=cos(pr*PI)*cos(pr*PI*1.732);
  }
  f/=12.0;
  f+=sin(length(p)*6.0-atan(p.y,p.x)*12.0+t*0.3)*0.2;
  return f;
}

// ── Layer selectors (step-based for GLSL ES 1.00) ───────────
float L1(vec2 ku, vec2 pu, float m, float t){
  return
    hypTile(pu,5.0,4.0)                          *sel(m, 0.0)+
    penrose(ku,2.0+sin(t*0.1)*0.5)               *sel(m, 1.0)+
    islamic(ku*0.8,8.0+floor(h1(u_seed+1.0)*4.0)*2.0)*sel(m, 2.0)+
    persian(ku)                                   *sel(m, 3.0)+
    gothic(ku*0.7)                                *sel(m, 4.0)+
    sashiko(ku*0.6)                               *sel(m, 5.0)+
    batik(ku,t)                                   *sel(m, 6.0)+
    mughal(ku,t)                                  *sel(m, 7.0)+
    hypTile(pu,7.0,3.0)                           *sel(m, 8.0)+
    islamic(ku*1.2,12.0)                          *sel(m, 9.0)+
    socolar(ku,t)                                 *sel(m,10.0)+
    penrose(ku*1.5,3.0)                           *sel(m,11.0);
}
float L2(vec2 ku, vec2 uv, float m, float t){
  float m2=mod(m+4.0,12.0);
  return
    celtic(ku*0.6)                                 *sel(m2, 0.0)+
    doyle(ku+vec2(cos(t*0.05),sin(t*0.07)))        *sel(m2, 1.0)+
    maori(ku*1.2)                                  *sel(m2, 2.0)+
    artNou(ku*0.8)                                 *sel(m2, 3.0)+
    mobius(uv*0.9)                                 *sel(m2, 4.0)+
    celtic(ku*0.9)                                 *sel(m2, 5.0)+
    doyle(ku*1.3)                                  *sel(m2, 6.0)+
    maori(ku*0.8)                                  *sel(m2, 7.0)+
    artNou(ku*1.2)                                 *sel(m2, 8.0)+
    sashiko(ku)                                    *sel(m2, 9.0)+
    celtic(ku)                                     *sel(m2,10.0)+
    mobius(uv)                                     *sel(m2,11.0);
}

// ── Main ────────────────────────────────────────────────────
void main(){
  vec2 uv=(v_uv-0.5)*vec2(u_res.x/u_res.y,1.0)*2.2;
  float t=u_time;
  float r=length(uv);
  float a=atan(uv.y,uv.x);

  // Kaleidoscope fold
  float sym=3.0+floor(h1(u_seed)*5.0)*2.0;
  float sector=TAU/sym;
  float ka=mod(a,sector);
  ka=(mod(floor(a/sector),2.0)>0.5)?(sector-ka):ka;
  vec2 kuv=vec2(cos(ka),sin(ka))*r;
  vec2 puv=kuv*0.8;
  float dmask=smoothstep(1.0,0.95,length(puv));

  float layer1=L1(kuv,puv,u_modeF,t);
  float layer2=L2(kuv,uv,u_modeF,t);
  float layer3=mix(hilbert(kuv*0.5+0.5),cantor(kuv*0.5+0.5),sin(t*0.07)*0.5+0.5)*0.7;

  // Physics traces
  float t4=t*0.3;
  float ltr=0.0;
  for(int i=0;i<6;i++){
    float ti=t4+float(i)*0.5;
    vec2 lp=(fourBar(fract(ti),h1(u_seed+float(i)))-vec2(0.5))*2.0;
    float la=atan(lp.y,lp.x);
    float lka=mod(la,sector);
    lka=(mod(floor(la/sector),2.0)>0.5)?(sector-lka):lka;
    vec2 klp=vec2(cos(lka),sin(lka))*length(lp)*0.5;
    ltr+=smoothstep(0.05,0.0,length(kuv-klp));
  }
  vec2 peau=peaucellier(fract(t4*0.7));
  ltr+=smoothstep(0.06,0.0,length(kuv-peau*0.4));
  float chaos=pendulum(kuv*1.5,t*0.4)*u_energy;
  float layer4=clamp(ltr+chaos,0.0,1.0);

  float breath=0.9+0.1*sin(t*0.3);
  float comp=(layer1*0.35+layer2*0.28+layer3*0.18+layer4*0.19)*breath*dmask;
  float glow=comp*comp*1.5;

  float cp=mod(comp+layer4*0.3+r*0.15+t*0.04,1.0);
  vec3 col=pal(cp);

  // Edge highlight: use dFdx if available, else manual approx
  float edge=0.0;
#ifdef GL_OES_standard_derivatives
  edge=length(vec2(dFdx(comp),dFdy(comp)))*80.0;
#else
  float eps=2.0/min(u_res.x,u_res.y);
  vec2 uvE=(v_uv+vec2(eps,eps)-0.5)*vec2(u_res.x/u_res.y,1.0)*2.2;
  float rE=length(uvE);
  float aE=atan(uvE.y,uvE.x);
  float kaE=mod(aE,sector);
  kaE=(mod(floor(aE/sector),2.0)>0.5)?(sector-kaE):kaE;
  vec2 kuvE=vec2(cos(kaE),sin(kaE))*rE;
  float compE=(L1(kuvE,kuvE*0.8,u_modeF,t)*0.35+L2(kuvE,uvE,u_modeF,t)*0.28)*0.9*smoothstep(1.0,0.95,length(kuvE*0.8));
  edge=abs(comp-compE)*40.0;
#endif

  col+=pal(cp+0.5)*edge*0.45;
  col+=pal(cp+0.3)*glow*0.38;

  vec3 bg=pal(fbm(uv*0.5+t*0.01)*0.15+0.6)*0.14;
  col=mix(bg,col,clamp(smoothstep(0.0,0.15,comp)+layer4*0.5,0.0,1.0));
  col*=1.0-smoothstep(0.55,1.35,r);
  col=col/(col+0.5);
  col=pow(col,vec3(0.9));
  gl_FragColor=vec4(col,1.0);
}
`;

// ── Shader compilation ──────────────────────────────────────
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader compile error:\n' + gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}
function createProgram(vsrc, fsrc) {
  const sv = compileShader(gl.VERTEX_SHADER, vsrc);
  const sf = compileShader(gl.FRAGMENT_SHADER, fsrc);
  if (!sv || !sf) return null;
  const p = gl.createProgram();
  gl.attachShader(p, sv);
  gl.attachShader(p, sf);
  gl.linkProgram(p);
  gl.deleteShader(sv);
  gl.deleteShader(sf);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Program link error:\n' + gl.getProgramInfoLog(p));
    gl.deleteProgram(p);
    return null;
  }
  return p;
}

// ── Universe ────────────────────────────────────────────────
const ALGO = [

function generateUniverse() {
  const seed = Math.random() * 999 + 1;
  const mode = Math.floor(Math.random() * 12);
  const pt   = Math.floor(Math.random() * 6);
  let pal = PALDATA[pt];
  if (!pal) {
    const h = Math.random();
    pal = [h, (h+0.33)%1, (h+0.66)%1,
           0.8+Math.random()*0.2, 0.75+Math.random()*0.2, 0.7+Math.random()*0.2];
  }
  return { seed, mode, pal:[...pal], palName:PALNAMES[pt],
           algoName:ALGO[mode], overlayName:OVL[(mode+4)%12],
           energy:0.5+Math.random()*0.5 };
}

// ── Physics ─────────────────────────────────────────────────
const pends = [];
let physE = 0, physCol = 0;
function initPends() {
  pends.length = 0;
  for (let i=0;i<5;i++) pends.push({
    a:(Math.random()-0.5)*Math.PI*2, v:(Math.random()-0.5)*0.5,
    l:0.15+Math.random()*0.25, m:0.5+Math.random()
  });
}
function stepPends(dt) {
  const g=9.8*0.35; let E=0, col=0;
  for (let i=0;i<pends.length;i++){
    const p=pends[i], par=i>0?pends[i-1]:null;
    const cp=par?Math.sin(p.a-par.a)*0.4:0;
    p.v+=(-g/p.l*Math.sin(p.a)-0.004*p.v+cp)*dt;
    p.v*=0.9995;
    const oa=p.a; p.a+=p.v*dt;
    E+=0.5*p.m*p.v*p.v+p.m*g*p.l*(1-Math.cos(p.a));
    if(oa*p.a<0) col++;
  }
  return {E:Math.min(E*0.08,1), col};
}

const parts=[], sprgs=[];
function initParts(n){
  parts.length=0; sprgs.length=0;
  for(let i=0;i<n;i++) parts.push({x:Math.random(),y:Math.random(),px:Math.random(),py:Math.random(),m:0.5+Math.random()});
  for(let i=0;i<n;i++){
    const j=(i+1+Math.floor(Math.random()*3))%n;
    const dx=parts[i].x-parts[j].x,dy=parts[i].y-parts[j].y;
    sprgs.push({a:i,b:j,r:Math.sqrt(dx*dx+dy*dy)});
  }
}
function stepParts(dt){
  const g=0.003;
  for(const p of parts){
    const vx=(p.x-p.px)*0.985,vy=(p.y-p.py)*0.985;
    p.px=p.x;p.py=p.y;p.x+=vx;p.y+=vy+g*dt;
    if(p.x<0){p.x=0;p.px=p.x+vx*0.3;} if(p.x>1){p.x=1;p.px=p.x+vx*0.3;}
    if(p.y<0){p.y=0;p.py=p.y+vy*0.3;} if(p.y>1){p.y=1;p.py=p.y+vy*0.3;}
  }
  for(let it=0;it<4;it++){
    for(const s of sprgs){
      const a=parts[s.a],b=parts[s.b];
      const dx=b.x-a.x,dy=b.y-a.y;
      const d=Math.sqrt(dx*dx+dy*dy)||0.001;
      const diff=(d-s.r)/d*0.5, mt=a.m+b.m;
      a.x+=dx*diff*b.m/mt; a.y+=dy*diff*b.m/mt;
      b.x-=dx*diff*a.m/mt; b.y-=dy*diff*a.m/mt;
    }
  }
}

// ── Audio ────────────────────────────────────────────────────
let oscs=[], anodes=[];
function initAudio(){
  if(!audioCtx){ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); masterGain=audioCtx.createGain(); masterGain.gain.value=0; masterGain.connect(audioCtx.destination); }
  else if(audioCtx.state==='suspended') audioCtx.resume();
  anodes.forEach(n=>{try{n.stop();}catch(e){}});
  anodes=[]; oscs=[];
  const seed=universe?universe.seed:100;
  const freqs=[80+(seed%120),180+(seed%220),320+(seed%180),490+(seed%310),770+(seed%250),1100+(seed%400)];
  freqs.forEach((f,i)=>{
    const osc=audioCtx.createOscillator(),g=audioCtx.createGain(),flt=audioCtx.createBiquadFilter();
    osc.type=['sine','triangle','sine','sine','triangle','sine'][i];
    osc.frequency.value=f; g.gain.value=0;
    flt.type='bandpass'; flt.frequency.value=f; flt.Q.value=18+i*4;
    osc.connect(flt); flt.connect(g); g.connect(masterGain);
    osc.start(); oscs.push({osc,g,f,i}); anodes.push(osc);
  });
  const lfo=audioCtx.createOscillator(),lfoG=audioCtx.createGain();
  lfo.frequency.value=0.07+Math.random()*0.06; lfoG.gain.value=1.8;
  lfo.connect(lfoG); oscs.forEach(o=>lfoG.connect(o.osc.frequency));
  lfo.start(); anodes.push(lfo);
}
function updateAudio(E,col,t){
  if(!soundOn||!audioCtx||!masterGain) return;
  const ct=audioCtx.currentTime;
  masterGain.gain.setTargetAtTime(0.2,ct,0.1);
  oscs.forEach((o,i)=>{
    const env=Math.max(0,E*(0.25+0.75*Math.sin(t*0.5+i*1.2)));
    o.g.gain.setTargetAtTime(env*0.07,ct,0.05);
    o.osc.frequency.setTargetAtTime(o.f*(1+E*0.1*Math.sin(t*0.3+i)),ct,0.1);
    if(col>0){o.g.gain.setTargetAtTime(env*0.14,ct,0.01);o.g.gain.setTargetAtTime(env*0.05,ct+0.06,0.12);}
  });
}
function stopAudio(){ if(masterGain) masterGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.4); }

// ── Renderer ─────────────────────────────────────────────────
let prog=null, qbuf=null, uloc={};
function initRenderer(){
  prog=createProgram(VS,FS);
  if(!prog){ console.error('Shader program failed'); return; }
  const q=new Float32Array([-1,-1,1,-1,-1,1,1,1]);
  qbuf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,qbuf);
  gl.bufferData(gl.ARRAY_BUFFER,q,gl.STATIC_DRAW);
  ['u_time','u_res','u_seed','u_modeF','u_pal','u_energy'].forEach(n=>{uloc[n]=gl.getUniformLocation(prog,n);});
}
function render(t){
  if(!prog||!universe) return;
  gl.useProgram(prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,qbuf);
  const loc=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  gl.uniform1f(uloc['u_time'],t*0.001);
  gl.uniform2f(uloc['u_res'],W,H);
  gl.uniform1f(uloc['u_seed'],universe.seed);
  gl.uniform1f(uloc['u_modeF'],universe.mode);
  gl.uniform1fv(uloc['u_pal'],universe.pal);
  gl.uniform1f(uloc['u_energy'],universe.energy);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ── HUD ──────────────────────────────────────────────────────
function updateHUD(fv,E){
  if(!hudOn||!universe){hud.innerHTML='';return;}
  hud.innerHTML=
    `<b style="color:#fff;letter-spacing:1px">KALEIDOSPHERE</b><br>`+
    `Tiling : ${universe.algoName}<br>`+
    `Overlay: ${universe.overlayName}<br>`+
    `Palette: ${universe.palName}<br>`+
    `Physics: Pendulum · Spring · Linkage<br>`+
    `FPS    : ${fv.toFixed(1)}<br>`+
    `Energy : ${(E*100).toFixed(0)}%<br>`+
    `Sound  : ${soundOn?'◉ ON':'○ OFF'}`;
}

// ── Regenerate ───────────────────────────────────────────────
function regenerate(){
  universe=generateUniverse();
  initPends(); initParts(14);
  if(soundOn) initAudio();
  frame=0;
}

// ── Loop ─────────────────────────────────────────────────────
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-lastTime)/1000,0.05); lastTime=t; frame++;
  fps=fps*0.95+(1/Math.max(dt,0.001))*0.05;
  if(dt>0&&universe){
    const r=stepPends(dt*60); stepParts(dt*60);
    physE=physE*0.9+r.E*0.1; physCol=r.col;
    universe.energy=0.3+physE*0.7;
  }
  if(soundOn) updateAudio(physE,physCol,t*0.001);
  render(t);
  updateHUD(fps,physE);
  // Auto-morph every ~40s
  if(frame%2400===0&&universe){
    universe.mode=(universe.mode+1)%12;
    universe.algoName=ALGO[universe.mode];
    universe.overlayName=OVL[(universe.mode+4)%12];
  }
}

// ── Input ────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.code==='Space'){e.preventDefault();regenerate();}
  else if(e.key==='h'||e.key==='H'){hudOn=!hudOn;hud.classList.toggle('on',hudOn);if(!hudOn)hud.innerHTML='';}
  else if(e.key==='s'||e.key==='S'){soundOn=!soundOn;if(soundOn)initAudio();else stopAudio();}
});
canvas.addEventListener('click',()=>regenerate());
canvas.addEventListener('touchend',e=>{e.preventDefault();regenerate();},{passive:false});

// ── Boot ─────────────────────────────────────────────────────
if(initGL()){
  initRenderer();
  regenerate();
  requestAnimationFrame(loop);
}
</script>
