<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector-Logic Human Modularization | CRISPR Neurotech Singularity</title>
    <meta name="description" content="A transcendental generative art engine merging 1980s vector-arcade aesthetics with CRISPR-based cybernetic neurotechnology and category-theory logic.">
    <meta name="keywords" content="generative art, vector arcade, CRISPR simulation, neurotechnology, category theory, HTML5 canvas, audiovisual, transhumanism">
    <style>
        :root { --neon: #0ff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; cursor: crosshair; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: crisp-edges; }
        #hud {
            position: absolute; top: 25px; left: 25px; pointer-events: none;
            color: var(--neon); font-family: 'Courier New', monospace; font-size: 10px;
            background: rgba(0, 5, 12, 0.95); padding: 20px; border: 1px solid var(--neon);
            display: none; z-index: 100; text-transform: uppercase; line-height: 2;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
        }
        .ui-overlay {
            position: absolute; bottom: 25px; width: 100%; text-align: center;
            color: rgba(255, 255, 255, 0.2); font-family: 'Segoe UI', sans-serif; 
            font-size: 9px; letter-spacing: 6px; pointer-events: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="hud">
        &gt; SYSTEM_STATUS: VECTOR_LOGIC_EVOLVED<br>
        &gt; CRISPR_MAPPING_SEED: <span id="h-seed">0</span><br>
        &gt; NEURO_NODES: <span id="h-nodes">0</span><br>
        &gt; FUNCTOR_MORPHISM_FLUX: <span id="h-flux">0</span><br>
        &gt; AUDIO_SYNC: <span id="h-audio">OFF</span>
    </div>
    <div class="ui-overlay">SPACE / CLICK: REGENERATE | H: HUD | S: SOUND</div>
    <canvas id="c"></canvas>

<script>
/**
 * VECTOR-LOGIC HUMAN MODULARIZATION (ULTIMATE VERSION)
 * A stochastic hybrid fusion of vector-arcades, CRISPR neuro-editing, and Category Theory.
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const hud = document.getElementById('hud');

let w, h, dpr;
let modules = [], particles = [], beams = [];
let audioCtx, masterGain, analyzer;
let audioEnabled = false, showHud = false;
let palette = [], seed, config = {};
let frame = 0;

function randomize() {
    seed = Math.floor(Math.random() * 1e8);
    // Fully randomized color architecture
    const baseHue = Math.random() * 360;
    const hueStep = 30 + Math.random() * 150;
    palette = Array.from({length: 5}, (_, i) => `hsla(${(baseHue + i * hueStep) % 360}, 100%, 50%, 0.8)`);
    document.documentElement.style.setProperty('--neon', palette[0]);

    // Randomize Simulation Physics
    config = {
        nodeCount: 15 + Math.floor(Math.random() * 30),
        particleDensity: 50 + Math.floor(Math.random() * 100),
        morphismReach: 150 + Math.random() * 300,
        flowSpeed: 0.01 + Math.random() * 0.05,
        beamCount: 5 + Math.floor(Math.random() * 15),
        vectorNoise: Math.random() * 10
    };

    modules = Array.from({length: config.nodeCount}, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        size: 20 + Math.random() * 40,
        color: palette[Math.floor(Math.random() * palette.length)],
        rot: Math.random() * Math.PI,
        rotV: (Math.random() - 0.5) * 0.04
    }));

    particles = Array.from({length: config.particleDensity}, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        z: 0.5 + Math.random() * 2,
        c: palette[Math.floor(Math.random() * palette.length)]
    }));

    beams = Array.from({length: config.beamCount}, () => ({
        y: Math.random() * window.innerHeight,
        v: (Math.random() - 0.5) * 10,
        c: palette[Math.floor(Math.random() * palette.length)]
    }));

    document.getElementById('h-seed').innerText = seed.toString(16).toUpperCase();
    document.getElementById('h-nodes').innerText = modules.length;
    document.getElementById('h-flux').innerText = (config.morphismReach).toFixed(0);
}

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    analyzer = audioCtx.createAnalyser();
    masterGain.gain.value = 0.15;
    masterGain.connect(analyzer);
    analyzer.connect(audioCtx.destination);
}

function playSyncedPulse(y, size) {
    if (!audioEnabled || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    
    // Frequency derived from spatial Y position and module size
    const freq = 60 + (1 - y/h) * 800 + (size * 2);
    osc.type = Math.random() > 0.5 ? 'square' : 'sawtooth';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.1, audioCtx.currentTime + 0.2);

    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
    
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
}

function update() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    
    // Background: Tron spectral interference
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);

    // Dynamic grid flow
    ctx.strokeStyle = palette[0];
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.05;
    const step = 80;
    for(let i=0; i<w; i+=step) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke();
    }
    for(let j=0; j<h; j+=step) {
        ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(w, j); ctx.stroke();
    }
    ctx.globalAlpha = 1.0;

    // Beams (Moiré interference)
    beams.forEach(b => {
        b.y = (b.y + b.v + h) % h;
        ctx.strokeStyle = b.c;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.15;
        ctx.beginPath();
        ctx.moveTo(0, b.y); ctx.lineTo(w, b.y);
        ctx.stroke();
    });

    // Particles (CRISPR modules)
    particles.forEach(p => {
        p.x = (p.x + p.z + w) % w;
        ctx.fillStyle = p.c;
        ctx.fillRect(p.x, p.y, p.z, p.z);
    });

    // Category Theory Morphisms (Connections)
    ctx.lineWidth = 1;
    for(let i=0; i<modules.length; i++) {
        for(let j=i+1; j<modules.length; j++) {
            const dx = modules[i].x - modules[j].x;
            const dy = modules[i].y - modules[j].y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < config.morphismReach) {
                ctx.strokeStyle = modules[i].color;
                ctx.globalAlpha = 1 - (dist / config.morphismReach);
                ctx.beginPath();
                ctx.moveTo(modules[i].x, modules[i].y);
                ctx.lineTo(modules[j].x, modules[j].y);
                ctx.stroke();
            }
        }
    }

    // Vector Modules (Transhuman silhouettes)
    modules.forEach(m => {
        m.x += m.vx; m.y += m.vy;
        m.rot += m.rotV;
        if(m.x < 0 || m.x > w) { m.vx *= -1; playSyncedPulse(m.y, m.size); }
        if(m.y < 0 || m.y > h) { m.vy *= -1; playSyncedPulse(m.y, m.size); }

        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.rotate(m.rot);
        ctx.strokeStyle = '#fff';
        ctx.globalAlpha = 0.8;
        ctx.lineWidth = 2;
        // Recursive Vector Geometry
        ctx.strokeRect(-m.size/2, -m.size/2, m.size, m.size);
        ctx.strokeStyle = m.color;
        ctx.beginPath();
        ctx.moveTo(0, -m.size); ctx.lineTo(0, m.size);
        ctx.moveTo(-m.size, 0); ctx.lineTo(m.size, 0);
        ctx.stroke();
        ctx.restore();
    });

    ctx.globalAlpha = 1.0;
    frame++;
    requestAnimationFrame(update);
}

// Controls
const handleRegen = () => { randomize(); if(audioEnabled) playSyncedPulse(h/2, 200); };

window.addEventListener('keydown', e => {
    if(e.code === 'Space') handleRegen();
    if(e.key.toLowerCase() === 'h') {
        showHud = !showHud;
        hud.style.display = showHud ? 'block' : 'none';
    }
    if(e.key.toLowerCase() === 's') {
        audioEnabled = !audioEnabled;
        if(audioEnabled) initAudio();
        document.getElementById('h-audio').innerText = audioEnabled ? 'SYNC_ACTIVE' : 'OFF';
    }
});

window.addEventListener('mousedown', handleRegen);
window.addEventListener('touchstart', e => { e.preventDefault(); handleRegen(); }, {passive:false});
window.addEventListener('resize', () => { w = window.innerWidth; h = window.innerHeight; });

// Genesis
randomize();
update();
</script>
</body>
</html>
