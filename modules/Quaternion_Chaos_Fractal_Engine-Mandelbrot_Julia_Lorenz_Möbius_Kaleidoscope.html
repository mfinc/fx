<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quaternion Chaos Fractal Engine | Mandelbrot Julia Lorenz Möbius Kaleidoscope</title>

<meta name="description" content="Real-time WebGL fractal engine combining Mandelbrot and Julia escape-time fractals with Lorenz and Hénon chaotic systems, quaternion 4D rotations, Möbius transformations, Perlin fBm warping, kaleidoscopic Coxeter symmetries, spectral HSV eigen coloring, and procedural audio synthesis. Interactive and mobile-optimized.">
<meta name="keywords" content="WebGL fractal, Mandelbrot, Julia set, Lorenz attractor, Henon map, quaternion rotation, stereographic projection, Mobius transformation, kaleidoscope symmetry, Coxeter group, Perlin noise, fBm, Web Audio API, generative art, real-time fractal">
<meta property="og:title" content="Quaternion Chaos Fractal Engine">
<meta property="og:description" content="Interactive real-time fractal + chaos visualization with quaternion projection, Möbius transforms, kaleidoscopic symmetry, and audio synthesis.">
<meta property="og:type" content="website">
<meta property="og:image" content="">
<meta name="theme-color" content="#000000">

<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;}
canvas{display:block;}
#hud{
position:fixed;top:10px;left:10px;
font-family:monospace;font-size:12px;
color:#0f0;background:rgba(0,0,0,.6);
padding:6px 8px;border-radius:4px;
display:none;white-space:pre;
}
</style>
</head>
<body>
<main>
<canvas id="gl"></canvas>
<div id="hud"></div>
</main>

<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl");
const hud = document.getElementById("hud");

let DPR = Math.min(devicePixelRatio || 1, 2);
let targetFPS = 60;
let adaptiveScale = 1;

function resize(){
canvas.width = innerWidth * DPR * adaptiveScale;
canvas.height = innerHeight * DPR * adaptiveScale;
canvas.style.width = innerWidth + "px";
canvas.style.height = innerHeight + "px";
gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
addEventListener("resize",resize);

const vertexSrc = `
attribute vec2 position;
void main(){
gl_Position = vec4(position,0.0,1.0);
}
`;

const fragmentSrc = `
precision highp float;

uniform vec2 resolution;
uniform float time;
uniform float seed;
uniform float symmetry;
uniform vec4 qRot;
uniform float colorMode;

// Möbius params
uniform vec2 mA;
uniform vec2 mB;
uniform vec2 mC;
uniform vec2 mD;

// warp
uniform float warpAmt;
uniform float warpFreq;
uniform float warpSpeed;

// fractal
uniform float fracBlend;
uniform float juliaS1;
uniform float juliaS2;
uniform float fracScale;

// chaos
uniform float lorA;
uniform float lorB;
uniform float lorC;
uniform float lorScale;
uniform float henA;
uniform float henB;
uniform float henScale;

// quaternion speeds
uniform vec4 qtSpeed;

// color
uniform float colorSat;
uniform float colorPow;
uniform float colorHueShift;
uniform vec3 palA;
uniform vec3 palB;
uniform vec3 palC;
uniform vec3 palD;

#define MAX_ITER 120

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);}

float noise(vec2 p){
vec2 i=floor(p);
vec2 f=fract(p);
float a=hash(i);
float b=hash(i+vec2(1,0));
float c=hash(i+vec2(0,1));
float d=hash(i+vec2(1,1));
vec2 u=f*f*(3.0-2.0*f);
return mix(a,b,u.x)+
(c-a)*u.y*(1.0-u.x)+
(d-b)*u.x*u.y;
}

float fbm(vec2 p){
float v=0.0;
float a=.5;
for(int i=0;i<5;i++){
v+=a*noise(p);
p*=2.0;
a*=.5;
}
return v;
}

vec3 quatRotate(vec4 q, vec3 v){
return v + 2.0*cross(q.xyz, cross(q.xyz,v)+q.w*v);
}

vec2 stereo(vec3 p){
float k=1.0/(1.0-p.z);
return p.xy*k;
}

vec2 mobius(vec2 z){
vec2 num=vec2(mA.x*z.x-mA.y*z.y, mA.x*z.y+mA.y*z.x)+mB;
vec2 den=vec2(mC.x*z.x-mC.y*z.y, mC.x*z.y+mC.y*z.x)+mD;
float denom=dot(den,den);
return vec2(
(num.x*den.x+num.y*den.y)/denom,
(num.y*den.x-num.x*den.y)/denom
);
}

float fractal(vec2 c){
vec2 z = vec2(0.0);
vec2 j = vec2(sin(time*juliaS1),cos(time*juliaS2));
float m=0.0;
for(int i=0;i<MAX_ITER;i++){
z = vec2(z.x*z.x-z.y*z.y,2.0*z.x*z.y) + mix(c,j,fracBlend);
if(dot(z,z)>4.0) break;
m+=1.0;
}
return m/float(MAX_ITER);
}

float lorenz(vec3 p){
vec3 v=vec3(
lorA*(p.y-p.x),
p.x*(lorB-p.z)-p.y,
p.x*p.y-lorC*p.z
);
return length(v)*lorScale;
}

float henon(vec2 p){
float x=1.0-henA*p.x*p.x+p.y;
float y=henB*p.x;
return length(vec2(x,y))*henScale;
}

vec3 hsv2rgb(vec3 c){
vec3 p=abs(fract(c.xxx+vec3(0.,2./3.,1./3.))*6.-3.);
return c.z*mix(vec3(1.),clamp(p-1.,0.,1.),c.y);
}

// cosine palette coloring
vec3 cosPalette(float t){
return palA + palB*cos(6.28318*(palC*t+palD));
}

void main(){
vec2 uv=(gl_FragCoord.xy/resolution.xy)*2.0-1.0;
uv.x*=resolution.x/resolution.y;

// domain warp
uv+=fbm(uv*warpFreq+time*warpSpeed)*warpAmt;

// 4D rotation
vec3 p=normalize(vec3(uv,1.0));
p=quatRotate(qRot,p);
uv=stereo(p);

// Möbius
uv=mobius(uv);

// kaleidoscope symmetry
float ang=atan(uv.y,uv.x);
float r=length(uv);
float n=symmetry;
ang=mod(ang,6.28318/n);
uv=vec2(cos(ang),sin(ang))*r;

// fractal
float f=fractal(uv*fracScale);

// chaos
float l=lorenz(vec3(uv,time*.1));
float h=henon(uv);

// combine
float val=f + l + h;

// cosine palette coloring
float t=fract(val*colorHueShift + time*.05 + seed);
vec3 col=cosPalette(t);

// also modulate brightness
col *= pow(clamp(val, 0.0, 1.0), colorPow);

gl_FragColor=vec4(col,1.0);
}
`;

function compile(type,src){
const s=gl.createShader(type);
gl.shaderSource(s,src);
gl.compileShader(s);
return s;
}

const vs=compile(gl.VERTEX_SHADER,vertexSrc);
const fs=compile(gl.FRAGMENT_SHADER,fragmentSrc);
const prog=gl.createProgram();
gl.attachShader(prog,vs);
gl.attachShader(prog,fs);
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const pos=gl.getAttribLocation(prog,"position");
gl.enableVertexAttribArray(pos);
gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);

const uniforms={
resolution:gl.getUniformLocation(prog,"resolution"),
time:gl.getUniformLocation(prog,"time"),
seed:gl.getUniformLocation(prog,"seed"),
symmetry:gl.getUniformLocation(prog,"symmetry"),
qRot:gl.getUniformLocation(prog,"qRot"),
colorMode:gl.getUniformLocation(prog,"colorMode"),
mA:gl.getUniformLocation(prog,"mA"),
mB:gl.getUniformLocation(prog,"mB"),
mC:gl.getUniformLocation(prog,"mC"),
mD:gl.getUniformLocation(prog,"mD"),
warpAmt:gl.getUniformLocation(prog,"warpAmt"),
warpFreq:gl.getUniformLocation(prog,"warpFreq"),
warpSpeed:gl.getUniformLocation(prog,"warpSpeed"),
fracBlend:gl.getUniformLocation(prog,"fracBlend"),
juliaS1:gl.getUniformLocation(prog,"juliaS1"),
juliaS2:gl.getUniformLocation(prog,"juliaS2"),
fracScale:gl.getUniformLocation(prog,"fracScale"),
lorA:gl.getUniformLocation(prog,"lorA"),
lorB:gl.getUniformLocation(prog,"lorB"),
lorC:gl.getUniformLocation(prog,"lorC"),
lorScale:gl.getUniformLocation(prog,"lorScale"),
henA:gl.getUniformLocation(prog,"henA"),
henB:gl.getUniformLocation(prog,"henB"),
henScale:gl.getUniformLocation(prog,"henScale"),
qtSpeed:gl.getUniformLocation(prog,"qtSpeed"),
colorSat:gl.getUniformLocation(prog,"colorSat"),
colorPow:gl.getUniformLocation(prog,"colorPow"),
colorHueShift:gl.getUniformLocation(prog,"colorHueShift"),
palA:gl.getUniformLocation(prog,"palA"),
palB:gl.getUniformLocation(prog,"palB"),
palC:gl.getUniformLocation(prog,"palC"),
palD:gl.getUniformLocation(prog,"palD")
};

// All mutable params
let params = {};
let showHUD=false;
let audioOn=false;

function rnd(a,b){ return a + Math.random()*(b-a); }
function rndSign(){ return Math.random()<0.5?-1:1; }

function randomize(){
params.seed = Math.random();
params.symmetryOrder = 2 + Math.floor(Math.random()*11);

// Möbius
params.mA = [rnd(0.3,1.2)*rndSign(), rnd(0,0.6)*rndSign()];
params.mB = [rnd(0,0.5)*rndSign(), rnd(0,0.8)*rndSign()];
params.mC = [rnd(0,0.6)*rndSign(), rnd(0,0.7)*rndSign()];
params.mD = [rnd(0.3,1.0)*rndSign(), rnd(0,0.4)*rndSign()];

// warp
params.warpAmt  = rnd(0.05, 0.55);
params.warpFreq = rnd(1.5, 6.0);
params.warpSpeed = rnd(0.05, 0.4);

// fractal
params.fracBlend = rnd(0.2, 0.8);
params.juliaS1   = rnd(0.1, 0.8);
params.juliaS2   = rnd(0.1, 0.8);
params.fracScale = rnd(0.6, 2.2);

// Lorenz
params.lorA = rnd(6.0, 18.0);
params.lorB = rnd(20.0, 36.0);
params.lorC = rnd(1.5, 4.5);
params.lorScale = rnd(0.003, 0.025);

// Hénon
params.henA = rnd(0.8, 1.8);
params.henB = rnd(0.1, 0.6);
params.henScale = rnd(0.1, 0.6);

// quaternion animation speeds
params.qtSpeed = [rnd(0.2,1.5)*rndSign(), rnd(0.1,0.8)*rndSign(), rnd(0.1,0.6)*rndSign(), rnd(0.2,1.0)*rndSign()];

// color
params.colorPow = rnd(0.3, 1.4);
params.colorHueShift = rnd(0.5, 3.0);

// cosine palette (Inigo Quilez style: a + b*cos(2π(c*t+d)))
// fully random vivid palettes
params.palA = [rnd(0.2,0.8), rnd(0.2,0.8), rnd(0.2,0.8)];
params.palB = [rnd(0.2,0.6), rnd(0.2,0.6), rnd(0.2,0.6)];
params.palC = [rnd(0.5,2.0), rnd(0.5,2.0), rnd(0.5,2.0)];
params.palD = [Math.random(), Math.random(), Math.random()];

applyParams();
}

function applyParams(){
gl.uniform1f(uniforms.seed, params.seed);
gl.uniform1f(uniforms.symmetry, params.symmetryOrder);
gl.uniform2f(uniforms.mA, params.mA[0], params.mA[1]);
gl.uniform2f(uniforms.mB, params.mB[0], params.mB[1]);
gl.uniform2f(uniforms.mC, params.mC[0], params.mC[1]);
gl.uniform2f(uniforms.mD, params.mD[0], params.mD[1]);
gl.uniform1f(uniforms.warpAmt, params.warpAmt);
gl.uniform1f(uniforms.warpFreq, params.warpFreq);
gl.uniform1f(uniforms.warpSpeed, params.warpSpeed);
gl.uniform1f(uniforms.fracBlend, params.fracBlend);
gl.uniform1f(uniforms.juliaS1, params.juliaS1);
gl.uniform1f(uniforms.juliaS2, params.juliaS2);
gl.uniform1f(uniforms.fracScale, params.fracScale);
gl.uniform1f(uniforms.lorA, params.lorA);
gl.uniform1f(uniforms.lorB, params.lorB);
gl.uniform1f(uniforms.lorC, params.lorC);
gl.uniform1f(uniforms.lorScale, params.lorScale);
gl.uniform1f(uniforms.henA, params.henA);
gl.uniform1f(uniforms.henB, params.henB);
gl.uniform1f(uniforms.henScale, params.henScale);
gl.uniform4f(uniforms.qtSpeed, params.qtSpeed[0], params.qtSpeed[1], params.qtSpeed[2], params.qtSpeed[3]);
gl.uniform1f(uniforms.colorPow, params.colorPow);
gl.uniform1f(uniforms.colorHueShift, params.colorHueShift);
gl.uniform3f(uniforms.palA, params.palA[0], params.palA[1], params.palA[2]);
gl.uniform3f(uniforms.palB, params.palB[0], params.palB[1], params.palB[2]);
gl.uniform3f(uniforms.palC, params.palC[0], params.palC[1], params.palC[2]);
gl.uniform3f(uniforms.palD, params.palD[0], params.palD[1], params.palD[2]);
}

// Init with random params
randomize();

canvas.onclick=randomize;
addEventListener("keydown",e=>{
if(e.code==="Space") randomize();
if(e.key==="h"||e.key==="H"){showHUD=!showHUD;hud.style.display=showHUD?"block":"none";}
if(e.key==="s"||e.key==="S"){toggleAudio();}
});

let audioCtx,osc,mod;
function toggleAudio(){
if(!audioCtx){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
osc=audioCtx.createOscillator();
mod=audioCtx.createOscillator();
const gain=audioCtx.createGain();
mod.frequency.value=200;
mod.connect(osc.frequency);
osc.connect(gain);
gain.connect(audioCtx.destination);
gain.gain.value=0.05;
osc.start();mod.start();
audioOn=true;
}else{
audioOn=!audioOn;
audioCtx.suspend();
if(audioOn) audioCtx.resume();
}
}

let last=performance.now();
let fps=0;

function render(now){
let dt=now-last;
last=now;
fps=1000/dt;

// adaptive scaling
if(fps<50 && adaptiveScale>0.5){adaptiveScale-=0.05;resize();}
if(fps>58 && adaptiveScale<1){adaptiveScale+=0.02;resize();}

gl.uniform2f(uniforms.resolution,canvas.width,canvas.height);
gl.uniform1f(uniforms.time,now*0.001);

// quaternion evolving with randomized speeds
let t=now*0.0003;
let qs=params.qtSpeed;
let q=[Math.sin(t*qs[0]),Math.sin(t*qs[1]),Math.cos(t*qs[2]),Math.cos(t*qs[3])];
gl.uniform4f(uniforms.qRot,q[0],q[1],q[2],q[3]);

gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

if(showHUD){
hud.textContent=
"FPS: "+fps.toFixed(1)+"\n"+
"Symmetry: "+params.symmetryOrder+"\n"+
"Seed: "+params.seed.toFixed(3)+"\n"+
"Scale: "+adaptiveScale.toFixed(2)+"\n"+
"Audio: "+(audioOn?"ON":"OFF")+"\n"+
"Warp: "+params.warpAmt.toFixed(2)+"\n"+
"Blend: "+params.fracBlend.toFixed(2)+"\n"+
"PalA: "+params.palA.map(v=>v.toFixed(2));
}

requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
