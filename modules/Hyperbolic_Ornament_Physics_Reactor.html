// ═══════════════════════════════════════════════════════════════════════

'use strict';

// ── GLOBALS ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2') || canvas.getContext('webgl', {
  alpha: false, antialias: false, powerPreference: 'high-performance'
});
const hud = document.getElementById('hud');
const hudInner = document.getElementById('hud-inner');
const keysEl = document.getElementById('keys');

let W, H, dpr;
let frame = 0, t = 0, lastT = 0, fps = 60;
let soundOn = false, hudOn = false;
let audioCtx = null, masterGain = null, oscillators = [];
let state = {};          // all randomised state
let THEME = {};          // colour / shader theme
let keysFading = false;

// ── RESIZE ───────────────────────────────────────────────────────────────
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  if (gl) gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ── MATH HELPERS ────────────────────────────────────────────────────────
const PI = Math.PI, TAU = PI * 2, PHI = (1 + Math.sqrt(5)) / 2;
const rnd  = (a = 1, b = 0) => Math.random() * (a - b) + b;
const rndI = (n) => Math.floor(Math.random() * n);
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const mod  = (a, n) => ((a % n) + n) % n;
const cos  = Math.cos, sin = Math.sin, abs = Math.abs, sqrt = Math.sqrt;
const hypot = Math.hypot;

function hslToRgb(h, s, l) {
  h = mod(h, 1); s = clamp(s, 0, 1); l = clamp(l, 0, 1);
  const c = (1 - abs(2 * l - 1)) * s;
  const x = c * (1 - abs(mod(h * 6, 2) - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 1/6)      { r = c; g = x; b = 0; }
  else if (h < 2/6) { r = x; g = c; b = 0; }
  else if (h < 3/6) { r = 0; g = c; b = x; }
  else if (h < 4/6) { r = 0; g = x; b = c; }
  else if (h < 5/6) { r = x; g = 0; b = c; }
  else              { r = c; g = 0; b = x; }
  return [r + m, g + m, b + m];
}

// ── THEMES ───────────────────────────────────────────────────────────────
const THEMES = [
  { name:'Stained Glass',  bg:[0,0,.03], h0:.6,  hs:.9,  hl:.6,  glow:1.6, contrast:1.4 },
  { name:'Solar Flare',    bg:[0,.03,0], h0:.05, hs:.95, hl:.55, glow:2.0, contrast:1.6 },
  { name:'Void Prism',     bg:[0,0,0],   h0:.75, hs:.85, hl:.5,  glow:1.4, contrast:1.8 },
  { name:'Bioluminescent', bg:[0,.02,.03],h0:.5, hs:.9,  hl:.6,  glow:2.2, contrast:1.3 },
  { name:'Magma Core',     bg:[.04,0,0], h0:.02, hs:1.0, hl:.5,  glow:2.4, contrast:1.5 },
  { name:'Aurora',         bg:[0,.02,.04],h0:.35,hs:.8,  hl:.65, glow:1.8, contrast:1.2 },
  { name:'Quantum Foam',   bg:[.01,0,.02],h0:.8, hs:.75, hl:.55, glow:1.5, contrast:1.7 },
  { name:'Deep Coral',     bg:[.03,.01,0],h0:.95,hs:.9,  hl:.6,  glow:1.9, contrast:1.4 },
];

// ── WEBGL SETUP ──────────────────────────────────────────────────────────
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.warn(gl.getShaderInfoLog(s));
  return s;
}
function makeProgram(vsrc, fsrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(gl.VERTEX_SHADER, vsrc));
  gl.attachShader(p, compileShader(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(p);
  return p;
}

// ── MAIN RENDER SHADER ──────────────────────────────────────────────────
const VERT = `
attribute vec2 aPos;
void main(){gl_Position=vec4(aPos,0,1);}
`;

const FRAG = `
precision highp float;

#define PI  3.14159265358979323846
#define TAU 6.28318530717958647692
#define PHI 1.61803398874989484820

uniform vec2 uRes;
uniform float uTime;
uniform float uSeed;
uniform vec3 uBg;
uniform float uH0;
uniform float uHs;
uniform float uHl;
uniform float uGlow;
uniform float uContrast;

// wave / physics uniforms
uniform float uVortex;
uniform float uReact;
uniform float uSymOrder;
uniform float uMorphT;
uniform float uPhysicsMode;
uniform float uTileMode;
uniform float uFlowSpeed;
uniform float uElasticAmp;

// ─ hash / noise ────────────────────────────────────────────────────────
float hash(float n){return fract(sin(n)*43758.5453);}
float hash2(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
vec2 hash2v(vec2 p){
  p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));
  return fract(sin(p)*43758.5453);
}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.-2.*f);
  float a=hash2(i),b=hash2(i+vec2(1,0)),c=hash2(i+vec2(0,1)),d=hash2(i+vec2(1,1));
  return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}
float fbm(vec2 p){
  float v=0.,a=.5;
  for(int i=0;i<6;i++){v+=a*noise(p);p*=2.01;a*=.5;}
  return v;
}

// ─ colour ─────────────────────────────────────────────────────────────
vec3 hsl(float h,float s,float l){
  h=fract(h);
  vec3 rgb=clamp(abs(mod(h*6.+vec3(0,4,2),6.)-3.)-1.,0.,1.);
  return l+s*(rgb-.5)*(1.-abs(2.*l-1.));
}

// ─ complex / Möbius ───────────────────────────────────────────────────
vec2 cmul(vec2 a,vec2 b){return vec2(a.x*b.x-a.y*b.y,a.x*b.y+a.y*b.x);}
vec2 cdiv(vec2 a,vec2 b){float d=dot(b,b);return vec2(dot(a,b),a.y*b.x-a.x*b.y)/d;}
vec2 mobius(vec2 z,vec2 a,vec2 b,vec2 c,vec2 d){
  return cdiv(cmul(a,z)+b,cmul(c,z)+d);
}

// ─ hyperbolic / Poincaré ──────────────────────────────────────────────
vec2 poincareReflect(vec2 z,vec2 c,float r){
  vec2 d=z-c; float m2=dot(d,d);
  return c+r*r*d/max(m2,1e-6);
}

// ─ tiling functions ───────────────────────────────────────────────────

// Penrose P3 – rhombus field
float penrose(vec2 p){
  float v=0.;
  vec2 q=p;
  for(int i=0;i<5;i++){
    float a=float(i)*PI*2./5.;
    v+=abs(sin(dot(p,vec2(cos(a),sin(a)))*PI*PHI+uTime*.12));
  }
  return v/5.;
}

// Ammann-Beenker quasi-lattice
float ammann(vec2 p){
  float v=0.;
  float s=sqrt(2.);
  for(int i=0;i<4;i++){
    float a=float(i)*PI*.25;
    v+=abs(cos(dot(p,vec2(cos(a),sin(a)))*PI*s+uTime*.09));
  }
  for(int i=0;i<4;i++){
    float a=float(i)*PI*.25+PI*.125;
    v+=abs(cos(dot(p,vec2(cos(a),sin(a)))*PI+uTime*.11));
  }
  return v/8.;
}

// Islamic star – rose / girih
float islamicStar(vec2 p,float n){
  float v=0.;
  for(int i=0;i<12;i++){
    if(float(i)>=n)break;
    float a=float(i)*TAU/n;
    v+=abs(sin(dot(p,vec2(cos(a),sin(a)))*PI*1.5+uTime*.08));
  }
  return v/n;
}

// Celtic knot weave
float celtic(vec2 p){
  vec2 q=fract(p*.5)*2.-1.;
  float d=length(q);
  float a=atan(q.y,q.x);
  float v=abs(sin(d*PI*3.+a*2.+uTime*.1))*.5+.5;
  v*=abs(cos(d*PI*2.-a*3.-uTime*.13))*.5+.5;
  return v;
}

// Apollonian circle packing
float apollonian(vec2 p){
  float scale=1.,d=1e9;
  for(int i=0;i<8;i++){
    p=abs(p)/dot(p,p)-1.;
    float l=length(p);
    d=min(d,abs(l-floor(l+.5)));
  }
  return clamp(d,0.,1.);
}

// Voronoi with soft edges
float voronoi(vec2 p){
  vec2 i=floor(p),f=fract(p);
  float d1=8.,d2=8.;
  for(int y=-2;y<=2;y++)for(int x=-2;x<=2;x++){
    vec2 g=vec2(x,y);
    vec2 o=hash2v(i+g);
    o=.5+.5*sin(uTime*.3+6.2831*o);
    vec2 r=g+o-f;
    float d=dot(r,r);
    if(d<d1){d2=d1;d1=d;}
    else if(d<d2){d2=d;}
  }
  return sqrt(d2)-sqrt(d1);
}

// Hilbert-like space-filling via iterated fold
float hilbert(vec2 p){
  float v=0.;
  vec2 q=p;
  for(int i=0;i<6;i++){
    q=abs(q);
    if(q.x<q.y)q=q.yx;
    q.x-=.5;q.y-=.5;
    q*=1.42;
    v+=sin(q.x*PI+uTime*.07)*cos(q.y*PI+uTime*.05)*.5;
  }
  return abs(v);
}

// Mughal rosette / arabesque
float mughal(vec2 p){
  float n=uSymOrder;
  float r=length(p);
  float a=atan(p.y,p.x);
  float v=sin(n*a+uTime*.06)*sin(r*PI*2.5-uTime*.12);
  v+=cos((n+2.)*a-uTime*.08)*cos(r*PI*1.8+uTime*.09);
  return abs(v);
}

// Triangular / hex grid
float triHex(vec2 p){
  vec2 q=p;
  q.x+=q.y*.5;
  vec2 i=floor(q); vec2 f=fract(q);
  float d=min(min(length(f),length(f-vec2(1,0))),length(f-vec2(0,1)));
  d=min(d,min(length(f-vec2(1,1)),length(f-vec2(.5,.5))));
  return 1.-d*2.;
}

// Reaction-diffusion Turing pattern (simulated)
float reactionDiff(vec2 p){
  float a=fbm(p*1.8+vec2(uTime*.04,0));
  float b=fbm(p*2.2-vec2(0,uTime*.05)+a*.5);
  float c=fbm(p*3.+b*.7+uTime*.03);
  return smoothstep(.3,.7,a-b+c*.3);
}

// Rayleigh-Bénard convection rolls
float convection(vec2 p){
  float v=sin(p.x*PI*1.2+sin(p.y*PI*.8+uTime*.15)*1.5);
  v+=cos(p.y*PI+cos(p.x*PI*.9+uTime*.1)*.8);
  v+=sin((p.x+p.y)*PI*.7+uTime*.13);
  return v*.33+.5;
}

// Lattice-Boltzmann vortex street
float lbm(vec2 p){
  float v=0.;
  for(int i=0;i<6;i++){
    vec2 c=vec2(sin(float(i)*1.047),cos(float(i)*1.047));
    c+=vec2(sin(uTime*.2+float(i)*.7),cos(uTime*.17+float(i)*1.1))*.3;
    float d=length(p-c);
    float a=atan((p-c).y,(p-c).x);
    v+=sin(a*3.+d*PI*2.-uTime*.25+float(i))*exp(-d*1.5);
  }
  return v*.5+.5;
}

// Spring-mass elastic distortion field
vec2 elastic(vec2 p){
  float amp=uElasticAmp;
  float dx=sin(p.y*PI*1.3+uTime*.14)*cos(p.x*PI*.9+uTime*.11)*amp;
  float dy=cos(p.x*PI*1.1+uTime*.13)*sin(p.y*PI*.8+uTime*.12)*amp;
  return p+vec2(dx,dy);
}

// Gyroscopic rotor / precession field
vec2 gyro(vec2 p){
  float r=length(p),a=atan(p.y,p.x);
  float omega=uTime*.3+r*2.;
  float prec=sin(r*PI*1.5)*cos(omega)*.15;
  a+=prec;
  return vec2(cos(a)*r,sin(a)*r);
}

// Electromagnetic vector field curl
float emField(vec2 p){
  float v=0.;
  for(int i=0;i<4;i++){
    float a=float(i)*PI*.5+uTime*.2;
    vec2 src=vec2(cos(a)*.7,sin(a)*.7);
    vec2 d=p-src;
    float r2=dot(d,d)+.001;
    v+=(-d.y*cos(uTime*.15+float(i))+(d.x)*sin(uTime*.12+float(i)))/r2;
  }
  return v*.1+.5;
}

// Wave resonance / standing wave
float waveRes(vec2 p){
  float v=0.;
  for(int i=0;i<8;i++){
    float a=float(i)*PI/4.+uTime*.05;
    v+=sin(dot(p,vec2(cos(a),sin(a)))*PI*2.5+uTime*.3+float(i))*.125;
  }
  return v+.5;
}

// Sliding puzzle matrix
float slidingPuzzle(vec2 p){
  vec2 g=fract(p*.4)*2.-1.;
  vec2 ci=floor(p*.4);
  float phase=hash2(ci+floor(uTime*.5));
  float dx=sin(phase*TAU+uTime*.8)*.4;
  float dy=cos(phase*TAU*1.3+uTime*.7)*.4;
  vec2 q=g-vec2(dx,dy);
  float d=length(q);
  return smoothstep(.8,.2,d);
}

// Hamiltonian path web (graph-like network)
float hamiltonWeb(vec2 p){
  float v=0.;
  for(int i=0;i<12;i++){
    float a=float(i)*PI/6.+uTime*.04;
    float b=float(i)*PI/4.3+uTime*.03;
    vec2 n1=vec2(cos(a)*.85,sin(a)*.85);
    vec2 n2=vec2(cos(b)*.85,sin(b)*.85);
    vec2 edge=n2-n1;
    float tpar=clamp(dot(p-n1,edge)/dot(edge,edge),0.,1.);
    float d=length(p-n1-edge*tpar);
    v+=exp(-d*d*30.);
    v+=exp(-dot(p-n1,p-n1)*20.)*.5;
  }
  return clamp(v,0.,1.);
}

// Planetary gear pattern
float planetaryGear(vec2 p){
  float r=length(p);
  float a=atan(p.y,p.x);
  int n=8;
  float teeth=sin(float(n)*a-uTime*.4)*sin(r*PI*4.);
  float ring=abs(fract(r*2.+uTime*.05)-.5)*2.;
  return abs(teeth*.5+ring*.5);
}

// Recursive maze / labyrinth
float labyrinth(vec2 p){
  vec2 q=p;
  float v=0.;
  for(int i=0;i<5;i++){
    q=abs(fract(q*.5+.5)*2.-1.);
    float s=float(i+1);
    v+=abs(sin(q.x*PI*s+uTime*.06)*cos(q.y*PI*s+uTime*.05))/(s);
  }
  return v;
}

// ─ vortex distortion ────────────────────────────────────────────────────
vec2 vortexDistort(vec2 p){
  float r=length(p);
  float a=atan(p.y,p.x);
  float swirl=uVortex*exp(-r*1.2)*(sin(uTime*.25)*.5+.5+.5);
  a+=swirl;
  return vec2(cos(a),sin(a))*r;
}

// ─ MAIN ─────────────────────────────────────────────────────────────────
void main(){
  vec2 uv=(gl_FragCoord.xy/uRes)*2.-1.;
  uv.x*=uRes.x/uRes.y;
  float asp=uRes.x/uRes.y;

  // seed-based variation
  float sd=fract(uSeed*.013);

  // ── distortions chain ──────────────────────────────────────────────
  vec2 p=uv;
  p=vortexDistort(p);
  p=gyro(p);
  p=elastic(p);

  // Möbius transform layer
  float mt=sin(uTime*.07+sd*6.)*.3;
  p=mobius(p,vec2(cos(mt),sin(mt)),vec2(.1*sin(uTime*.11),0),
             vec2(0,0),vec2(1,0));

  // scale / zoom morph
  float zoom=1.8+.6*sin(uTime*.04+sd*4.);
  p*=zoom;

  // ── tile pattern blend ─────────────────────────────────────────────
  float tm=mod(uTileMode,14.);
  float v=0.;

  if(tm<1.)       v=penrose(p);
  else if(tm<2.)  v=ammann(p);
  else if(tm<3.)  v=islamicStar(p,clamp(uSymOrder,5.,12.));
  else if(tm<4.)  v=celtic(p);
  else if(tm<5.)  v=apollonian(p*.5);
  else if(tm<6.)  v=voronoi(p*1.5);
  else if(tm<7.)  v=hilbert(p*.5);
  else if(tm<8.)  v=mughal(p);
  else if(tm<9.)  v=triHex(p*1.3);
  else if(tm<10.) v=slidingPuzzle(p);
  else if(tm<11.) v=hamiltonWeb(p*.9);
  else if(tm<12.) v=planetaryGear(p*.8);
  else if(tm<13.) v=labyrinth(p*.7);
  else            v=reactionDiff(p*.6);

  // ── physics overlay blend ──────────────────────────────────────────
  float pm=mod(uPhysicsMode,8.);
  float phys=0.;
  if(pm<1.)       phys=reactionDiff(p*.8+uTime*.02);
  else if(pm<2.)  phys=convection(p);
  else if(pm<3.)  phys=lbm(p*.9);
  else if(pm<4.)  phys=emField(p*.8);
  else if(pm<5.)  phys=waveRes(p*.7);
  else if(pm<6.)  phys=fbm(p*.9+uTime*.03);
  else if(pm<7.)  phys=reactionDiff(p*.5)*lbm(p*.6);
  else            phys=waveRes(p*.8)*convection(p*.9);

  float blend=.6+.4*sin(uTime*.08+sd*5.);
  v=mix(v,phys,blend*.4);

  // ── morphing cross-fade ────────────────────────────────────────────
  float mt2=clamp(uMorphT,0.,1.);
  float next=penrose(p*1.1+uTime*.02);
  v=mix(v,next,mt2*.25);

  // ── reaction-diffusion modulation ────────────────────────────────
  float rd=uReact;
  v+=rd*sin(v*PI*8.+uTime*.3)*.12;

  // ── colour mapping ─────────────────────────────────────────────────
  float vi=pow(clamp(v,0.,1.),1./uContrast);

  // spectral energy colour
  float hue=uH0+vi*.7+fbm(p*.4+uTime*.02)*.15+sd*.3;
  float sat=uHs*.9+vi*.1;
  float lit=uHl*vi*.95+.03;

  // time-drift hue shift
  hue+=uTime*.006+sd;

  // chromatic aberration / stained glass
  float r2=v+sin(hue*TAU+uTime*.2)*.05;
  float g2=v+sin(hue*TAU+2.094+uTime*.2)*.05;
  float b2=v+sin(hue*TAU+4.189+uTime*.2)*.05;
  vec3 col=vec3(
    hsl(hue,sat,lit*r2+.01).r,
    hsl(hue+.05,sat,lit*g2+.01).g,
    hsl(hue+.1,sat*.9,lit*b2+.01).b
  );

  // glow bloom
  float glow=exp(-length(uv)*uGlow*.7);
  col+=hsl(hue+.5,sat*.7,.5)*glow*.12;

  // edge luminance – derivative-free approximation
  float edge = abs(sin(v * PI * 24.0)) * 0.08;
  col += hsl(hue+.15,1.,.8)*clamp(edge,0.,1.)*.4;

  // vignette
  float vig=1.-dot(uv*.7,uv*.7);
  col*=vig*vig;

  // background tint
  col=mix(uBg,col,clamp(vi+.05,0.,1.));

  // gamma
  col=pow(max(col,vec3(0)),vec3(.45));

  gl_FragColor=vec4(col,1.);
}
`;

// ── WEBGL RESOURCES ──────────────────────────────────────────────────────
let prog, vao, vbuf;
let uLocs = {};

function initGL() {
  if (!gl) { console.error('WebGL not available'); return false; }
  // Enable derivative extension before compiling shaders (WebGL1 requires this)
  gl.getExtension('OES_standard_derivatives');
  prog = makeProgram(VERT, FRAG);
  gl.useProgram(prog);

  const verts = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  vbuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);

  const aPos = gl.getAttribLocation(prog, 'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const unis = ['uRes','uTime','uSeed','uBg','uH0','uHs','uHl','uGlow','uContrast',
    'uVortex','uReact','uSymOrder','uMorphT','uPhysicsMode','uTileMode','uFlowSpeed',
    'uElasticAmp'];
  unis.forEach(u => { uLocs[u] = gl.getUniformLocation(prog, u); });
  return true;
}

// ── SIMULATION STATE ─────────────────────────────────────────────────────
function randomiseState() {
  const th = THEMES[rndI(THEMES.length)];
  THEME = th;

  state = {
    seed:      Math.random() * 1000,
    tileMode:  rnd(14),
    physicsMode: rnd(8),
    symOrder:  rnd(12, 5),
    vortex:    rnd(4, 0.5),
    react:     rnd(0.5),
    morphT:    0,
    morphTarget: rnd(14),
    morphSpeed: rnd(0.008, 0.002),
    flowSpeed: rnd(1.5, 0.5),
    elasticAmp: rnd(0.18, 0.02),
    theme:     th,
    // transition tracking
    modeTimer: 0,
    modeDuration: rnd(12, 6),
    // wave resonance
    waveBeat:  0,
    beatFreq:  rnd(0.5, 0.1),
    // sound state
    baseFreq:  rnd(220, 55),
    chord:     rndI(4),
    // display
    themeName: th.name,
  };

  // rebuild audio if on
  if (soundOn && audioCtx) rebuildAudio();
}

// ── AUDIO ENGINE ─────────────────────────────────────────────────────────
const CHORDS = [
  [1, 5/4, 3/2, 7/4],   // dominant 7th
  [1, 6/5, 3/2, 9/5],   // minor 7th
  [1, 5/4, 3/2, 15/8],  // major 7th
  [1, 9/8, 3/2, 7/4],   // sus2 7th
];

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);
}

function rebuildAudio() {
  if (!audioCtx) return;
  oscillators.forEach(o => { try { o.osc.stop(); } catch(e){} });
  oscillators = [];

  const bf = state.baseFreq;
  const chord = CHORDS[state.chord];

  chord.forEach((ratio, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();

    filt.type = 'bandpass';
    filt.frequency.value = bf * ratio * 2;
    filt.Q.value = 8;

    osc.type = ['sine','triangle','sawtooth','square'][i % 4];
    osc.frequency.value = bf * ratio;

    gain.gain.value = 0.04 / chord.length;

    osc.connect(filt);
    filt.connect(gain);
    gain.connect(masterGain);
    osc.start();
    oscillators.push({ osc, gain, filt, ratio, baseFreq: bf });
  });
}

function setAudioOn(on) {
  soundOn = on;
  if (on) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    rebuildAudio();
    masterGain.gain.setTargetAtTime(0.7, audioCtx.currentTime, 0.5);
  } else {
    if (masterGain) masterGain.gain.setTargetAtTime(0.0001, audioCtx.currentTime, 0.3);
    oscillators.forEach(o => {
      try { o.osc.stop(audioCtx.currentTime + 0.5); } catch(e){}
    });
    oscillators = [];
  }
}

function updateAudio(dt) {
  if (!soundOn || !audioCtx || oscillators.length === 0) return;
  const now = audioCtx.currentTime;

  // modulate based on physics state
  const vort = state.vortex / 4;
  const beat = state.waveBeat;
  const morph = Math.sin(t * state.beatFreq);

  oscillators.forEach((o, i) => {
    const freqMod = 1 + morph * 0.04 * (i + 1) + vort * 0.08;
    o.osc.frequency.setTargetAtTime(o.baseFreq * o.ratio * freqMod, now, 0.1);
    const gainMod = 0.04 * (0.5 + 0.5 * Math.sin(beat + i * 1.2)) / oscillators.length;
    o.gain.gain.setTargetAtTime(gainMod, now, 0.15);
    o.filt.frequency.setTargetAtTime(o.baseFreq * o.ratio * 2 * (1 + vort), now, 0.2);
  });
}

// ── HUD UPDATE ────────────────────────────────────────────────────────────
function updateHUD() {
  if (!hudOn) return;
  const items = [
    ['THEME', THEME.name],
    ['TILE',  state.tileMode.toFixed(1)],
    ['PHYS',  state.physicsMode.toFixed(1)],
    ['SYM',   state.symOrder.toFixed(1)],
    ['VORTEX',state.vortex.toFixed(2)],
    ['REACT', state.react.toFixed(2)],
    ['FPS',   fps.toFixed(0)],
    ['TIME',  t.toFixed(1)],
    ['SOUND', soundOn ? 'ON' : 'OFF'],
  ];
  hudInner.innerHTML = items.map(([k,v]) =>
    `<span><span class="hv">${k}</span><span class="hd">${v}</span></span>`
  ).join('');
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────
function tick(ts) {
  requestAnimationFrame(tick);

  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  t += dt;
  fps = fps * 0.95 + (1 / dt) * 0.05;
  frame++;

  // ── state evolution ────────────────────────────────────────────────
  state.modeTimer += dt;
  state.waveBeat  += dt * state.beatFreq * TAU;

  // morph tiling
  state.morphT += state.morphSpeed;
  if (state.morphT >= 1) {
    state.morphT = 0;
    state.tileMode = state.morphTarget;
    state.morphTarget = rnd(14);
    state.morphSpeed  = rnd(0.008, 0.002);
  }

  // evolve vortex
  state.vortex += dt * (rnd(0.4, -0.2));
  state.vortex  = clamp(state.vortex, 0.1, 5);
  state.react  += dt * (rnd(0.06, -0.03));
  state.react   = clamp(state.react, 0, 0.6);

  // elastic amp pulse
  state.elasticAmp = 0.08 + 0.12 * (0.5 + 0.5 * Math.sin(t * 0.3 + state.seed));

  // periodic physics mode switch
  if (state.modeTimer > state.modeDuration) {
    state.modeTimer = 0;
    state.modeDuration = rnd(12, 5);
    state.physicsMode = rnd(8);
    if (Math.random() < 0.3) state.symOrder = rnd(12, 5);
  }

  // ── GL render ──────────────────────────────────────────────────────
  if (!gl) return;
  gl.useProgram(prog);

  const th = THEME;
  gl.uniform2f(uLocs.uRes, canvas.width, canvas.height);
  gl.uniform1f(uLocs.uTime, t);
  gl.uniform1f(uLocs.uSeed, state.seed);
  gl.uniform3f(uLocs.uBg, ...th.bg);
  gl.uniform1f(uLocs.uH0, th.h0);
  gl.uniform1f(uLocs.uHs, th.hs);
  gl.uniform1f(uLocs.uHl, th.hl);
  gl.uniform1f(uLocs.uGlow, th.glow);
  gl.uniform1f(uLocs.uContrast, th.contrast);
  gl.uniform1f(uLocs.uVortex,    state.vortex);
  gl.uniform1f(uLocs.uReact,     state.react);
  gl.uniform1f(uLocs.uSymOrder,  state.symOrder);
  gl.uniform1f(uLocs.uMorphT,    state.morphT);
  gl.uniform1f(uLocs.uPhysicsMode, state.physicsMode);
  gl.uniform1f(uLocs.uTileMode,  state.tileMode);
  gl.uniform1f(uLocs.uFlowSpeed, state.flowSpeed);
  gl.uniform1f(uLocs.uElasticAmp, state.elasticAmp);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // ── audio ──────────────────────────────────────────────────────────
  updateAudio(dt);

  // ── HUD ───────────────────────────────────────────────────────────
  if (hudOn && frame % 6 === 0) updateHUD();

  // ── fade hint ─────────────────────────────────────────────────────
  if (t > 5 && !keysFading) { keysFading = true; keysEl.classList.add('fade'); }
}

// ── FALLBACK 2D CANVAS (if no WebGL) ─────────────────────────────────────
function initCanvas2D() {
  const ctx = canvas.getContext('2d');
  if (!ctx) return;
  function draw2d(ts) {
    requestAnimationFrame(draw2d);
    t = ts / 1000;
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const n = 12;
    for (let i = 0; i < n; i++) {
      const a = (i / n) * TAU + t * 0.2;
      const r = 200 + Math.sin(t * 0.5 + i) * 80;
      const hue = (i / n + t * 0.05) % 1;
      ctx.strokeStyle = `hsl(${hue * 360},90%,60%)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let j = 0; j <= 60; j++) {
        const b = (j / 60) * TAU;
        const x = cx + Math.cos(b * n + a) * r * Math.cos(b) * 0.5;
        const y = cy + Math.sin(b * n + a) * r * Math.sin(b) * 0.5;
        j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }
  requestAnimationFrame(draw2d);
}

// ── RESTART ───────────────────────────────────────────────────────────────
function restart() {
  randomiseState();
  t = 0; frame = 0;
  // flash
  if (gl) {
    gl.clearColor(0, 0, 0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT);
  }
  // reset hint
  keysEl.classList.remove('fade');
  keysFading = false;
  setTimeout(() => { if (!keysFading && t > 5) keysEl.classList.add('fade'); }, 5000);
}

// ── INPUT ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter')  { e.preventDefault(); restart(); }
  if (e.key === 'h' || e.key === 'H')      { hudOn = !hudOn; hud.classList.toggle('visible', hudOn); if (!hudOn) hudInner.innerHTML = ''; }
  if (e.key === 's' || e.key === 'S')      { setAudioOn(!soundOn); }
});

let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, ts: Date.now() };
}, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const dist = Math.hypot(dx, dy);
  const dur  = Date.now() - touchStart.ts;
  if (dist < 20 && dur < 400) restart();
  touchStart = null;
}, { passive: true });

canvas.addEventListener('click', () => restart());

// ── BOOT ─────────────────────────────────────────────────────────────────
(function boot() {
  const ok = initGL();
  if (!ok) { initCanvas2D(); return; }
  randomiseState();
  requestAnimationFrame(ts => { lastT = ts; requestAnimationFrame(tick); });
})();
</script>
</body>
</html>
