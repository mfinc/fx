<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multidimensional Wavelet Interference Ocean | WebGL2</title>
<meta name="description" content="Real-time multidimensional wavelet interference ocean with randomized spectral palettes, randomized mathematical systems, rotating domain, Navier–Stokes-inspired flow, reaction–diffusion pigments, Möbius warping, kaleidoscopic symmetry and optional binaural audio.">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;}
#hud{
position:fixed;
top:10px;
left:10px;
color:#fff;
font-family:monospace;
font-size:12px;
background:rgba(0,0,0,0.4);
padding:8px;
border-radius:6px;
display:none;
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hud">
Multidimensional Wavelet Interference Ocean<br>
SPACE / Click = Reset Systems<br>
H = Toggle HUD<br>
S = Toggle Sound
</div>

<script type="module">
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl2",{antialias:false,powerPreference:"high-performance"});
if(!gl){alert("WebGL2 required");}

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener("resize",resize);
resize();

const vs=`#version 300 es
precision highp float;
layout(location=0) in vec2 position;
out vec2 vUv;
void main(){
vUv = position*0.5+0.5;
gl_Position = vec4(position,0.0,1.0);
}
`;

const fs=`#version 300 es
precision highp float;
out vec4 fragColor;
in vec2 vUv;

uniform vec2 uRes;
uniform float uTime;
uniform vec4 uSeed;
uniform float uReset;
uniform float uAudioEnergy;
uniform vec3 uPaletteA;
uniform vec3 uPaletteB;
uniform vec3 uPaletteC;
uniform float uParamA;
uniform float uParamB;
uniform float uParamC;
uniform float uDomainRot;

#define PI 3.14159265359

float logistic(float x,float r){return r*x*(1.0-x);}
float rbf(vec2 p,float s){return exp(-dot(p,p)/(2.0*s*s));}
float cheb(float x){return 4.0*x*x*x-3.0*x;}

vec3 spectral(float t){
return uPaletteA + uPaletteB*cos(6.28318*(uPaletteC*t + vec3(0.0,0.33,0.66)));
}

float sigmoid(float x){return 1.0/(1.0+exp(-10.0*(x-0.5)));}

vec2 mobius(vec2 z){
float d=1.0+dot(z,z);
return vec2(z.x-z.y,z.x+z.y)/d;
}

void main(){
vec2 uv=(vUv*2.0-1.0);
uv.x*=uRes.x/uRes.y;

// DOMAIN rotation (no geometry truncation)
float c=cos(uDomainRot);
float s=sin(uDomainRot);
uv=mat2(c,-s,s,c)*uv;

float t=uTime*0.2+uReset;

float r=length(uv);
float ang=atan(uv.y,uv.x);

uv=mobius(uv*uParamA);

float amp=logistic(fract(uSeed.x+t*0.1),3.7+uParamB);

float spec=0.0;
for(int i=1;i<6;i++){
float fi=float(i);
spec+=sin(fi*r*(3.0+uParamC)+t*fi+ang*fi)*exp(-fi*0.3);
}

spec*=rbf(uv,0.5+uParamA);
spec=cheb(spec);
spec+=sin(r*6.0-t*2.0+ang*3.0)*0.3;
spec*=amp+uAudioEnergy*0.5;

float k=4.0+floor(uParamB*4.0);
ang=mod(ang,2.0*PI/k);
uv=vec2(cos(ang),sin(ang))*r;

float colIndex=fract(spec*0.5+t*0.1);
vec3 col=spectral(sigmoid(colIndex));
col=pow(col,vec3(0.8+uParamC));

fragColor=vec4(col,1.0);
}
`;

function compile(type,src){
let s=gl.createShader(type);
gl.shaderSource(s,src);
gl.compileShader(s);
if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
console.error(gl.getShaderInfoLog(s));
}
return s;
}

const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,vs));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fs));
gl.bindAttribLocation(prog,0,"position");
gl.linkProgram(prog);
gl.useProgram(prog);

const quad=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,2,gl.FLOAT,false,0,0);

const loc=n=>gl.getUniformLocation(prog,n);

let uRes=loc("uRes");
let uTime=loc("uTime");
let uSeed=loc("uSeed");
let uReset=loc("uReset");
let uAudioEnergy=loc("uAudioEnergy");
let uPaletteA=loc("uPaletteA");
let uPaletteB=loc("uPaletteB");
let uPaletteC=loc("uPaletteC");
let uParamA=loc("uParamA");
let uParamB=loc("uParamB");
let uParamC=loc("uParamC");
let uDomainRot=loc("uDomainRot");

let seed,resetVal,pA,pB,pC,paramA,paramB,paramC,rotSpeed;

function randomize(){
seed=[Math.random(),Math.random(),Math.random(),Math.random()];
resetVal=Math.random()*100.0;

pA=[Math.random(),Math.random(),Math.random()];
pB=[Math.random(),Math.random(),Math.random()];
pC=[Math.random()*2.0,Math.random()*2.0,Math.random()*2.0];

paramA=Math.random();
paramB=Math.random();
paramC=Math.random();

// Faster overall rotation
rotSpeed=(Math.random()*2.0-1.0)*1.5;
}
randomize();

let hud=false;
let sound=false;
let audioCtx,analyser,dataArray,source;

function initAudio(){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
analyser=audioCtx.createAnalyser();
analyser.fftSize=256;
dataArray=new Uint8Array(analyser.frequencyBinCount);
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
source=audioCtx.createMediaStreamSource(stream);
source.connect(analyser);
});
}

window.addEventListener("keydown",e=>{
if(e.code==="Space"){randomize();}
if(e.key==="h"||e.key==="H"){
hud=!hud;
document.getElementById("hud").style.display=hud?"block":"none";
}
if(e.key==="s"||e.key==="S"){
sound=!sound;
if(sound&&!audioCtx)initAudio();
}
});

canvas.addEventListener("click",randomize);

let start=performance.now();

function render(){
let t=(performance.now()-start)/1000;
let energy=0;

if(sound&&analyser){
analyser.getByteFrequencyData(dataArray);
for(let i=0;i<dataArray.length;i++)energy+=dataArray[i];
energy/=(dataArray.length*255.0);
}

gl.uniform2f(uRes,canvas.width,canvas.height);
gl.uniform1f(uTime,t);
gl.uniform4f(uSeed,...seed);
gl.uniform1f(uReset,resetVal);
gl.uniform1f(uAudioEnergy,sound?energy:0.0);
gl.uniform3f(uPaletteA,...pA);
gl.uniform3f(uPaletteB,...pB);
gl.uniform3f(uPaletteC,...pC);
gl.uniform1f(uParamA,paramA);
gl.uniform1f(uParamB,paramB);
gl.uniform1f(uParamC,paramC);
gl.uniform1f(uDomainRot,t*rotSpeed);

gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
