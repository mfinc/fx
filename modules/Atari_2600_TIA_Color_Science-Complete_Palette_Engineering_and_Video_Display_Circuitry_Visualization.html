</div></div>

<script>
"use strict";
// ATARI 2600 TIA NTSC COLOR PALETTE — 128 colors: 16 hues x 8 luma levels
const PAL=[
[0,0,0],[68,68,68],[116,116,116],[152,152,152],[188,188,188],[212,212,212],[232,232,232],[252,252,252],
[68,48,0],[100,72,0],[136,100,0],[168,128,0],[200,160,0],[228,196,0],[252,228,0],[252,252,0],
[100,32,0],[136,52,0],[172,80,0],[208,108,0],[236,140,0],[252,168,0],[252,196,0],[252,220,0],
[120,8,0],[152,28,0],[188,56,0],[220,88,0],[248,116,0],[252,144,0],[252,168,0],[252,192,0],
[128,0,0],[160,4,0],[196,28,0],[228,56,0],[252,84,0],[252,116,0],[252,148,0],[252,176,0],
[104,0,52],[140,8,80],[172,40,112],[204,76,144],[236,112,172],[252,148,204],[252,180,228],[252,212,252],
[72,0,100],[104,12,136],[140,40,168],[176,76,200],[212,116,232],[236,152,252],[252,188,252],[252,220,252],
[20,0,116],[56,16,152],[88,48,184],[128,88,216],[164,128,248],[196,164,252],[224,200,252],[248,232,252],
[0,0,120],[8,24,156],[36,60,192],[72,100,224],[112,144,252],[152,180,252],[188,212,252],[220,240,252],
[0,28,100],[0,56,136],[0,92,172],[12,132,208],[48,172,244],[92,208,252],[136,236,252],[176,252,252],
[0,44,68],[0,76,104],[0,112,140],[0,152,176],[8,192,212],[48,228,248],[92,252,252],[136,252,252],
[0,60,0],[0,96,0],[0,136,0],[4,176,0],[32,216,0],[72,248,0],[116,252,0],[160,252,0],
[0,56,0],[0,92,0],[0,132,0],[0,172,0],[0,212,0],[16,248,0],[64,252,0],[112,252,0],
[32,48,0],[68,80,0],[104,116,0],[148,152,0],[188,192,0],[220,228,0],[248,252,0],[252,252,0],
[72,40,0],[108,68,0],[144,96,0],[180,128,0],[216,160,0],[248,196,0],[252,228,0],[252,252,0],
[96,36,0],[132,60,0],[164,92,0],[196,124,0],[228,156,0],[252,192,0],[252,220,0],[252,248,0]
];
const C=PAL.map((v,i)=>({r:v[0],g:v[1],b:v[2],css:`rgb(${v[0]},${v[1]},${v[2]})`,hue:i>>3,luma:i&7,reg:i<<1,idx:i}));
const cv=document.getElementById('c'),ctx=cv.getContext('2d',{alpha:false});
let W=0,H=0,MX=0,MY=0,T=0,FR=0,prevTime=0,fps=60;
let fpsR=new Float32Array(60),fpsI=0;
let seed=Date.now()%99999,soundOn=false,hudOn=false;
let aCtx=null,mGain=null,aNd=[];
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;MX=W/2;MY=H/2;}
resize();window.addEventListener('resize',()=>{resize();modeInit();},false);
function mkR(s){return function(){s=(s*1664525+1013904223)&0x7fffffff;return s/0x7fffffff;};}
let R=mkR(seed);
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.opacity=1;clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity=0,2200);}

// AUDIO
function initAudio(){if(aCtx)return;aCtx=new(window.AudioContext||window.webkitAudioContext)();mGain=aCtx.createGain();mGain.gain.value=0.14;const cmp=aCtx.createDynamicsCompressor();cmp.threshold.value=-20;cmp.ratio.value=4;mGain.connect(cmp);cmp.connect(aCtx.destination);}
function killAudio(){aNd.forEach(n=>{try{n.stop(0);n.disconnect();}catch(e){}});aNd=[];}
function tone(freq,type,vol,dur,delay){if(!soundOn||!aCtx)return;delay=delay||0;const o=aCtx.createOscillator(),g=aCtx.createGain();o.type=type;o.frequency.value=freq;const t0=aCtx.currentTime+delay;g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol,t0+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);o.connect(g);g.connect(mGain);o.start(t0);o.stop(t0+dur+0.05);aNd.push(o);if(aNd.length>100)aNd.splice(0,25).forEach(n=>{try{n.stop(0);n.disconnect();}catch(e){}});}

// MODES
const MODES=['TIA SCANLINE RASTER','PHOSPHOR BLOOM FIELD','COLOR WHEEL VORTEX','CHROMA CRYSTAL LATTICE','LUMA WAVE TERRAIN','HUE CASCADE TUNNEL','PIXEL STORM ATTRACTOR','CIRCUIT NEURAL NET','COLORBURST SUPERNOVA','SPECTRUM AURORA','REGISTER MATRIX','COMPOSITE INTERFERENCE'];
let modeIdx=0,modeT=0,modeDur=0,flashAlpha=0;
let pts=[],slRows=[],crys=[],nNet={nd:[],ed:[]},aur=[],iWaves=[];

function spawnPts(n,ox,oy,spread){
  pts=[];ox=ox||MX;oy=oy||MY;spread=spread||1;
  for(let i=0;i<n;i++){const c=C[R()*128|0];const a=R()*Math.PI*2,sp=R()*3+0.5;pts.push({x:ox+(R()-0.5)*W*spread,y:oy+(R()-0.5)*H*spread,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:c.r,g:c.g,b:c.b,ci:c.idx,hue:c.hue,luma:c.luma,sz:R()*5+1.5,ph:R()*Math.PI*2,phspd:R()*0.1+0.02,trail:[],maxTrail:8+R()*14|0});}
}

// DRAW MODE 0 — TIA SCANLINE RASTER
function initSL(){slRows=[];for(let y=0;y<262;y++){const row=[];for(let x=0;x<160;x++)row.push(C[R()*128|0]);slRows.push({row,dy:R()*0.4+0.1,ph:R()*Math.PI*2});}}
function drawSL(t){
  const sy=H/262,sx=W/160;
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  for(let y=0;y<262;y++){
    const sl=slRows[y];
    const yp=((y*sy+t*sl.dy*55)%H+H)%H;
    if(yp>H+sy*2)continue;
    for(let x=0;x<160;x++){
      const c=sl.row[(x+((t*38*sl.dy)|0)+y*3)%160];
      const f=0.72+0.28*Math.sin(t*7+y*0.28+x*0.09);
      ctx.fillStyle=`rgb(${c.r*f|0},${c.g*f|0},${c.b*f|0})`;
      ctx.fillRect(x*sx,yp,sx+0.5,sy+0.5);
    }
    if(y%8===0){ctx.fillStyle='rgba(0,0,0,0.32)';ctx.fillRect(0,yp,W,sy*0.4);}
  }
  const vg=ctx.createRadialGradient(MX,MY,Math.min(W,H)*0.2,MX,MY,Math.max(W,H)*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.2)';for(let y=0;y<H;y+=2)ctx.fillRect(0,y,W,1);
}

// DRAW MODE 1 — PHOSPHOR BLOOM
function initPH(){spawnPts(750,MX,MY,1);}
function drawPH(t){
  ctx.fillStyle='rgba(0,0,0,0.065)';ctx.fillRect(0,0,W,H);
  pts.forEach((p,i)=>{
    p.ph+=p.phspd;
    p.vx+=(Math.sin(t*0.55+p.ph+i*0.003)*0.26);
    p.vy+=(Math.cos(t*0.42+p.ph*1.2)*0.26);
    p.vx*=0.974;p.vy*=0.974;
    p.trail.push([p.x,p.y]);
    if(p.trail.length>p.maxTrail)p.trail.shift();
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<-5)p.x=W+5;else if(p.x>W+5)p.x=-5;
    if(p.y<-5)p.y=H+5;else if(p.y>H+5)p.y=-5;
    const ci=(p.ci+FR*0.06|0)%128,c=C[ci],tl=p.trail.length;
    for(let j=1;j<tl;j++){
      ctx.beginPath();ctx.arc(p.trail[j][0],p.trail[j][1],p.sz*(j/tl),0,Math.PI*2);
      ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${(j/tl)*0.55})`;ctx.fill();
    }
    const gd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*4.5);
    gd.addColorStop(0,`rgba(${c.r},${c.g},${c.b},0.88)`);
    gd.addColorStop(0.4,`rgba(${c.r},${c.g},${c.b},0.22)`);
    gd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*4.5,0,Math.PI*2);ctx.fillStyle=gd;ctx.fill();
  });
}

// DRAW MODE 2 — COLOR WHEEL VORTEX
function drawCWV(t){
  ctx.fillStyle='rgba(0,0,0,0.055)';ctx.fillRect(0,0,W,H);
  const R2=Math.min(W,H)*0.465,rings=10,spokes=16;
  for(let ri=rings-1;ri>=0;ri--){
    const r0=(ri/rings)*R2,r1=((ri+1)/rings)*R2;
    const rot=t*(0.14+ri*0.028)*(ri%2===0?1:-1)+ri*0.2;
    for(let s=0;s<spokes;s++){
      const a0=s/spokes*Math.PI*2+rot,a1=(s+1)/spokes*Math.PI*2+rot;
      const c=C[(s+(ri<<1))%16*8+ri%8];
      const pulse=1+0.2*Math.sin(t*3+ri+s*0.45);
      ctx.beginPath();ctx.arc(MX,MY,r1*pulse,a0,a1);ctx.arc(MX,MY,r0*pulse,a1,a0,true);ctx.closePath();
      ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},0.92)`;ctx.fill();
    }
  }
  const nc=C[((t*12)|0)%128];
  for(let ring=0;ring<6;ring++){
    const rr=7+ring*7+Math.sin(t*6+ring)*5;
    const gc=ctx.createRadialGradient(MX,MY,0,MX,MY,rr);
    gc.addColorStop(0,`rgba(${nc.r},${nc.g},${nc.b},${0.95-ring*0.14})`);
    gc.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(MX,MY,rr,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill();
  }
}

// DRAW MODE 3 — CHROMA CRYSTAL LATTICE
function initCC(){
  crys=[];const n=55+R()*45|0;
  for(let i=0;i<n;i++){const c=C[R()*128|0];crys.push({x:R()*W,y:R()*H,sz:R()*65+16,ang:R()*Math.PI*2,spd:(R()-0.5)*0.034,sides:3+(R()*6|0),ci:c.idx,ph:R()*Math.PI*2,phspd:R()*0.07+0.016,vx:(R()-0.5)*0.4,vy:(R()-0.5)*0.4});}
}
function drawCC(t){
  ctx.fillStyle='rgba(0,0,0,0.052)';ctx.fillRect(0,0,W,H);
  for(let i=0;i<crys.length;i++){for(let j=i+1;j<crys.length;j++){const a=crys[i],b=crys[j];const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);if(d<190){const ca=C[a.ci%128],cb=C[b.ci%128];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(${ca.r},${ca.g},${ca.b},${(1-d/190)*0.22})`;ctx.lineWidth=0.5;ctx.stroke();}}}
  crys.forEach(cr=>{
    cr.ang+=cr.spd;cr.ph+=cr.phspd;cr.x+=cr.vx;cr.y+=cr.vy;
    if(cr.x<-110)cr.x=W+110;else if(cr.x>W+110)cr.x=-110;
    if(cr.y<-110)cr.y=H+110;else if(cr.y>H+110)cr.y=-110;
    const ci=(cr.ci+(FR*0.04|0))%128,c=C[ci];
    const s=cr.sz*(1+0.3*Math.sin(cr.ph));
    ctx.save();ctx.translate(cr.x,cr.y);ctx.rotate(cr.ang);
    const ga=ctx.createRadialGradient(0,0,s*0.1,0,0,s*1.9);
    ga.addColorStop(0,`rgba(${c.r},${c.g},${c.b},0.32)`);ga.addColorStop(0.6,`rgba(${c.r},${c.g},${c.b},0.07)`);ga.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(0,0,s*1.9,0,Math.PI*2);ctx.fillStyle=ga;ctx.fill();
    ctx.beginPath();
    for(let v=0;v<cr.sides;v++){const a=v/cr.sides*Math.PI*2,rv=s*(0.68+0.32*Math.sin(cr.ph*2+v*0.7));v===0?ctx.moveTo(Math.cos(a)*rv,Math.sin(a)*rv):ctx.lineTo(Math.cos(a)*rv,Math.sin(a)*rv);}
    ctx.closePath();ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},0.35)`;ctx.fill();
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.88)`;ctx.lineWidth=1.8;ctx.stroke();
    ctx.beginPath();
    for(let v=0;v<cr.sides*2;v++){const a=v/cr.sides*Math.PI,rv2=s*(v%2===0?0.48:0.2)*(0.88+0.12*Math.sin(cr.ph*3+v));v===0?ctx.moveTo(Math.cos(a)*rv2,Math.sin(a)*rv2):ctx.lineTo(Math.cos(a)*rv2,Math.sin(a)*rv2);}
    ctx.closePath();ctx.fillStyle=`rgba(${Math.min(255,c.r+85)},${Math.min(255,c.g+85)},${Math.min(255,c.b+85)},0.65)`;ctx.fill();
    ctx.beginPath();ctx.arc(0,0,s*0.16,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.72)';ctx.fill();
    ctx.restore();
  });
}

// DRAW MODE 4 — LUMA WAVE TERRAIN
function drawLW(t){
  const cw=W/16,ch=H/8;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  for(let h=0;h<16;h++){for(let l=0;l<8;l++){
    const c=C[h*8+l],x=h*cw,y=l*ch;
    const w1=Math.sin(t*1.7+h*0.42+l*0.88)*0.24+Math.sin(t*3.2+h*0.78+l*0.35)*0.1;
    const sc=1+w1,bx=x+(cw-cw*sc)*0.5,by=y+(ch-ch*sc)*0.5;
    ctx.fillStyle=c.css;ctx.fillRect(bx,by,cw*sc,ch*sc);
    ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(bx,by,cw*sc,ch*sc*0.14);
    ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(bx,by+ch*sc*0.72,cw*sc,ch*sc*0.28);
    if(cw>42&&ch>20){const reg=((h*8+l)*2).toString(16).toUpperCase().padStart(2,'0');ctx.fillStyle='rgba(0,0,0,0.65)';ctx.font=`bold ${ch*0.2|0}px Courier New`;ctx.textAlign='left';ctx.fillText('$'+reg,x+3,y+ch-5);}
    const br=0.35+0.65*Math.abs(w1/0.34);ctx.strokeStyle=`rgba(255,255,255,${br*0.48})`;ctx.lineWidth=0.7;ctx.strokeRect(bx,by,cw*sc,ch*sc);
  }}
  const bx2=((t*92)%W+W)%W;const bg=ctx.createLinearGradient(bx2-22,0,bx2+22,0);bg.addColorStop(0,'rgba(255,255,255,0)');bg.addColorStop(0.5,'rgba(255,255,255,0.13)');bg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=bg;ctx.fillRect(bx2-22,0,44,H);
}

// DRAW MODE 5 — HUE CASCADE TUNNEL
function drawHT(t){
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,W,H);
  const rings=52,ox=MX+Math.sin(t*0.38)*W*0.14,oy=MY+Math.cos(t*0.31)*H*0.12;
  for(let ri=rings;ri>=0;ri--){
    const depth=(ri+t*7.5)%rings,r=depth/rings;
    const rx=W*r*0.5,ry=H*r*0.5;
    const c=C[(ri*2+(t*5.5)|0)%16*8+((ri*0.38+(t*1.8)|0))%8];
    ctx.save();ctx.translate(ox,oy);ctx.rotate(t*0.38+ri*0.19);
    ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${0.22+r*0.78})`;
    ctx.lineWidth=1+r*3.2;
    ctx.beginPath();ctx.rect(-rx,-ry,rx*2,ry*2);ctx.stroke();
    [[-rx,-ry],[rx,-ry],[rx,ry],[-rx,ry]].forEach(([dx,dy])=>{
      const dc=C[((c.hue+4)%16)*8+c.luma];
      ctx.beginPath();ctx.arc(dx,dy,4+r*9,0,Math.PI*2);
      ctx.fillStyle=`rgba(${dc.r},${dc.g},${dc.b},${0.55+r*0.4})`;ctx.fill();
    });
    ctx.restore();
  }
  const tc=C[((t*14)|0)%128];
  const tg=ctx.createRadialGradient(ox,oy,0,ox,oy,65);
  tg.addColorStop(0,`rgba(${tc.r},${tc.g},${tc.b},0.95)`);tg.addColorStop(0.5,`rgba(${tc.r},${tc.g},${tc.b},0.28)`);tg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(ox,oy,65,0,Math.PI*2);ctx.fillStyle=tg;ctx.fill();
}

// DRAW MODE 6 — PIXEL STORM ATTRACTOR
function initPS(){spawnPts(1600,MX,MY,1);}
function drawPS(t){
  ctx.fillStyle='rgba(0,0,0,0.095)';ctx.fillRect(0,0,W,H);
  const gwells=[[MX+Math.sin(t*0.29)*W*0.3,MY+Math.cos(t*0.25)*H*0.3],[MX+Math.sin(t*0.17+2)*W*0.22,MY+Math.cos(t*0.22+1)*H*0.22],[MX+Math.sin(t*0.43+4)*W*0.14,MY+Math.cos(t*0.38+2)*H*0.14]];
  pts.forEach((p,i)=>{
    p.ph+=p.phspd;let fx=0,fy=0;
    gwells.forEach(g=>{const dx=g[0]-p.x,dy=g[1]-p.y,d2=dx*dx+dy*dy+100,s=11000/d2;fx+=dx*s;fy+=dy*s;});
    const cdx=p.x-MX,cdy=p.y-MY,cd=Math.sqrt(cdx*cdx+cdy*cdy)+1;
    fx+=(-cdy/cd)*0.28;fy+=(cdx/cd)*0.28;
    p.vx=(p.vx+fx*0.015)*0.965;p.vy=(p.vy+fy*0.015)*0.965;
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0){p.x=0;p.vx*=-0.5;}else if(p.x>W){p.x=W;p.vx*=-0.5;}
    if(p.y<0){p.y=0;p.vy*=-0.5;}else if(p.y>H){p.y=H;p.vy*=-0.5;}
    const ci2=((p.hue*8+p.luma+(FR*0.045|0))%128+128)%128,c=C[ci2];
    const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy),sz=p.sz*(0.8+spd*0.07);
    ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${Math.min(0.9,0.3+spd*0.14)})`;
    ctx.fillRect(p.x-sz*0.5,p.y-sz*0.5,sz,sz);
  });
}

// DRAW MODE 7 — CIRCUIT NEURAL NET
function initNN(){
  nNet={nd:[],ed:[]};const n=48+R()*32|0;
  for(let i=0;i<n;i++){const c=C[R()*128|0];nNet.nd.push({x:R()*W*0.88+W*0.06,y:R()*H*0.88+H*0.06,vx:(R()-0.5)*0.65,vy:(R()-0.5)*0.65,r:c.r,g:c.g,b:c.b,ci:c.idx,sz:R()*13+5,ph:R()*Math.PI*2,phspd:R()*0.07+0.02,fire:0,fireSpd:R()*0.055+0.018});}
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)if(R()<0.17)nNet.ed.push({a:i,b:j,sig:R(),sigSpd:R()*0.038+0.01});
}
function drawNN(t){
  ctx.fillStyle='rgba(0,0,0,0.085)';ctx.fillRect(0,0,W,H);
  nNet.ed.forEach(e=>{
    const a=nNet.nd[e.a],b=nNet.nd[e.b];
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>290)return;e.sig=(e.sig+e.sigSpd)%1;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
    ctx.strokeStyle=`rgba(${a.r},${a.g},${a.b},${0.07+(1-d/290)*0.16})`;ctx.lineWidth=0.6;ctx.stroke();
    const px=a.x+dx*e.sig,py=a.y+dy*e.sig;
    const sc=C[((a.ci+b.ci)>>1)%128];
    ctx.beginPath();ctx.arc(px,py,3.5,0,Math.PI*2);ctx.fillStyle=`rgba(${sc.r},${sc.g},${sc.b},0.92)`;ctx.fill();
  });
  nNet.nd.forEach(n2=>{
    n2.ph+=n2.phspd;n2.fire=(n2.fire+n2.fireSpd)%1;
    n2.vx+=Math.sin(t*0.27+n2.ph)*0.04;n2.vy+=Math.cos(t*0.34+n2.ph)*0.04;
    n2.vx*=0.991;n2.vy*=0.991;n2.x+=n2.vx;n2.y+=n2.vy;
    if(n2.x<18||n2.x>W-18)n2.vx*=-1;if(n2.y<18||n2.y>H-18)n2.vy*=-1;
    const ci2=(n2.ci+(FR*0.028|0))%128,c=C[ci2],sz=n2.sz*(1+0.36*Math.sin(n2.ph));
    for(let ring=3;ring>=0;ring--){const rr=sz*(1+ring*0.55),ga=ctx.createRadialGradient(n2.x,n2.y,0,n2.x,n2.y,rr);ga.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${0.7/(ring+1)})`);ga.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.arc(n2.x,n2.y,rr,0,Math.PI*2);ctx.fillStyle=ga;ctx.fill();}
    ctx.beginPath();ctx.arc(n2.x,n2.y,sz,0,Math.PI*2);ctx.fillStyle=c.css;ctx.fill();
    if(n2.fire<0.5){ctx.beginPath();ctx.arc(n2.x,n2.y,sz*(1+n2.fire*3.2),0,Math.PI*2);ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${0.65*(1-n2.fire*2)})`;ctx.lineWidth=1.4;ctx.stroke();}
  });
}

// DRAW MODE 8 — COLORBURST SUPERNOVA
function initSN(){spawnPts(1300,MX,MY,0.08);}
function drawSN(t){
  ctx.fillStyle='rgba(0,0,0,0.075)';ctx.fillRect(0,0,W,H);
  const ox=MX+Math.sin(t*0.52)*W*0.22,oy=MY+Math.cos(t*0.39)*H*0.18;
  pts.forEach((p,i)=>{
    p.ph+=p.phspd;
    const sa=p.ph+t*0.14,sm=1.5+2*Math.sin(t*1.4+i*0.006);
    p.vx=Math.cos(sa)*sm;p.vy=Math.sin(sa)*sm;p.x+=p.vx;p.y+=p.vy;
    const dx=p.x-ox,dy=p.y-oy,d=Math.sqrt(dx*dx+dy*dy),maxD=Math.min(W,H)*0.56;
    if(d>maxD){p.x=ox+(R()-0.5)*25;p.y=oy+(R()-0.5)*25;p.ph=R()*Math.PI*2;const c2=C[R()*128|0];p.r=c2.r;p.g=c2.g;p.b=c2.b;p.ci=c2.idx;p.hue=c2.hue;p.luma=c2.luma;}
    const ci2=((p.hue*8+(t*4|0)+p.luma)%128+128)%128,c=C[ci2];
    const fo=Math.max(0,1-d/maxD),sz=p.sz*(0.5+fo*1.6+Math.sin(t*5.5+i*0.02)*0.18);
    ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},${fo*0.8})`;ctx.fillRect(p.x-sz*0.5,p.y-sz*0.5,sz,sz);
  });
  for(let ring=0;ring<12;ring++){const c=C[((ring*11+(t*8)|0)%128+128)%128];const rr=22+ring*17+Math.sin(t*4+ring*0.7)*11;ctx.beginPath();ctx.arc(ox,oy,rr,0,Math.PI*2);ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},${0.58*(1-ring*0.07)})`;ctx.lineWidth=2-ring*0.12;ctx.stroke();}
  for(let jet=0;jet<8;jet++){const ja=jet/8*Math.PI*2+t*0.35,jc=C[(jet*16+(t*5)|0)%128];ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+Math.cos(ja)*110,oy+Math.sin(ja)*110);ctx.strokeStyle=`rgba(${jc.r},${jc.g},${jc.b},0.62)`;ctx.lineWidth=2.5;ctx.stroke();}
}

// DRAW MODE 9 — SPECTRUM AURORA
function initAU(){
  aur=[];for(let i=0;i<20;i++){const bands=[];for(let b=0;b<22;b++)bands.push({ph:R()*Math.PI*2,spd:R()*0.024+0.007,amp:R()*H*0.17+H*0.038,freq:R()*2.4+0.7,w:R()*W*0.38+W*0.08});aur.push({bands,hue:i%16,y:H*0.07+R()*H*0.84,dy:(R()-0.5)*0.28});}
}
function drawAU(t){
  ctx.fillStyle='rgba(0,0,3,0.11)';ctx.fillRect(0,0,W,H);
  aur.forEach((a,ai)=>{
    a.y+=a.dy;if(a.y<-120||a.y>H+120)a.dy*=-1;
    a.bands.forEach((bd,bi)=>{
      bd.ph+=bd.spd;const c=C[a.hue*8+(bi%8)];
      ctx.beginPath();
      for(let x=0;x<=W;x+=5){const y=a.y+Math.sin(x/bd.w*bd.freq+bd.ph+t*0.48)*bd.amp+Math.sin(x/115+t*1.75+ai*0.38)*22+Math.sin(x/38+t*3.1+bi*0.28)*9;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.lineTo(W,H+20);ctx.lineTo(0,H+20);ctx.closePath();
      ctx.fillStyle=`rgba(${c.r},${c.g},${c.b},0.033)`;ctx.fill();
      ctx.beginPath();
      for(let x=0;x<=W;x+=5){const y=a.y+Math.sin(x/bd.w*bd.freq+bd.ph+t*0.48)*bd.amp+Math.sin(x/115+t*1.75+ai*0.38)*22+Math.sin(x/38+t*3.1+bi*0.28)*9;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.strokeStyle=`rgba(${c.r},${c.g},${c.b},0.24)`;ctx.lineWidth=0.8;ctx.stroke();
    });
  });
  if(FR%4===0){ctx.fillStyle='rgba(255,255,255,0.55)';ctx.beginPath();ctx.arc(R()*W,R()*H,0.7,0,Math.PI*2);ctx.fill();}
}

// DRAW MODE 10 — REGISTER MATRIX
function drawRM(t){
  ctx.fillStyle='rgba(0,0,0,0.065)';ctx.fillRect(0,0,W,H);
  const cw=W/16,ch=H/8;
  for(let h=0;h<16;h++){for(let l=0;l<8;l++){
    const c=C[h*8+l],cx2=h*cw+cw*0.5,cy2=l*ch+ch*0.5;
    const wave=Math.sin(t*1.35+h*0.36+l*0.62+Math.sin(t*0.48+h*0.18)*1.4);
    const sc=0.68+wave*0.32,sz=Math.min(cw,ch)*0.44*sc;
    ctx.fillStyle=c.css;ctx.fillRect(cx2-sz,cy2-sz,sz*2,sz*2);
    ctx.fillStyle='rgba(0,0,0,0.24)';for(let sl=0;sl<sz*2;sl+=3)ctx.fillRect(cx2-sz,cy2-sz+sl,sz*2,1);
    if(cw>28&&ch>16){const reg=((h*8+l)*2).toString(16).toUpperCase().padStart(2,'0');ctx.fillStyle='rgba(0,0,0,0.65)';ctx.font=`${Math.max(7,ch*0.12)|0}px Courier New`;ctx.textAlign='center';ctx.fillText('$'+reg,cx2,cy2+sz+ch*0.14);}
    const br=0.38+0.62*Math.abs(wave);ctx.strokeStyle=`rgba(255,255,255,${br*0.52})`;ctx.lineWidth=0.75;ctx.strokeRect(cx2-sz,cy2-sz,sz*2,sz*2);
  }}
  const bx=((t*108)%W+W)%W,by=((t*77)%H+H)%H;
  const bg=ctx.createLinearGradient(bx-24,0,bx+24,0);bg.addColorStop(0,'rgba(255,255,255,0)');bg.addColorStop(0.5,'rgba(255,255,255,0.12)');bg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=bg;ctx.fillRect(bx-24,0,48,H);
  const bg2=ctx.createLinearGradient(0,by-17,0,by+17);bg2.addColorStop(0,'rgba(255,255,255,0)');bg2.addColorStop(0.5,'rgba(255,255,255,0.08)');bg2.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=bg2;ctx.fillRect(0,by-17,W,34);
}

// DRAW MODE 11 — COMPOSITE INTERFERENCE
function initCI(){
  iWaves=[];for(let i=0;i<14;i++)iWaves.push({cx2:R()*W,cy2:R()*H,freq:R()*0.026+0.004,ph:R()*Math.PI*2,spd:R()*0.032+0.008,amp:R()*105+38});
}
function drawCI(t){
  const img=ctx.createImageData(W,H),d=img.data,step=3;
  for(let y=0;y<H;y+=step){for(let x=0;x<W;x+=step){
    let val=0;for(const w of iWaves){const dx=x-w.cx2,dy=y-w.cy2;val+=Math.sin(Math.sqrt(dx*dx+dy*dy)*w.freq-t*w.spd*24+w.ph)*w.amp;}
    const norm=(val+iWaves.length*105)/(iWaves.length*210),ci=Math.max(0,Math.min(127,(norm*128)|0)),c=C[ci];
    for(let dy2=0;dy2<step&&y+dy2<H;dy2++){const row=(y+dy2)*W;for(let dx2=0;dx2<step&&x+dx2<W;dx2++){const idx=(row+(x+dx2))<<2;d[idx]=c.r;d[idx+1]=c.g;d[idx+2]=c.b;d[idx+3]=255;}}
  }}
  ctx.putImageData(img,0,0);
  ctx.fillStyle='rgba(0,0,0,0.14)';for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  const vg=ctx.createRadialGradient(MX,MY,Math.min(W,H)*0.24,MX,MY,Math.max(W,H)*0.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.52)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

// OVERLAYS
function drawPaletteStrip(t){
  const sh=Math.max(13,H*0.021),cw=W/128;
  for(let i=0;i<128;i++){const c=C[i],wave=Math.sin(t*2.4+i*0.17)*sh*0.32;ctx.fillStyle=c.css;ctx.fillRect(i*cw,H-sh+wave,cw+0.5,sh-wave);}
  ctx.fillStyle='rgba(255,255,255,0.52)';for(let h=0;h<16;h++)ctx.fillRect(h*8*cw,H-sh-2,1,3);
  const ci=((t*24)|0)%128,sx=ci*cw;ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fillRect(sx,H-sh-4,cw,4);
}
function drawFlash(){if(flashAlpha>0.005){ctx.fillStyle=`rgba(255,255,255,${flashAlpha})`;ctx.fillRect(0,0,W,H);flashAlpha*=0.72;}}

const MINIT=[initSL,initPH,()=>{},initCC,()=>{},()=>{},initPS,initNN,initSN,initAU,()=>{},initCI];
const MDRAW=[drawSL,drawPH,drawCWV,drawCC,drawLW,drawHT,drawPS,drawNN,drawSN,drawAU,drawRM,drawCI];
const MAUD=[
  ()=>{if(FR%52===0){tone(110,'square',0.04,0.6);tone(165,'square',0.03,0.6,0.05);tone(220,'square',0.025,0.6,0.1);}},
  ()=>{if(FR%36===0)tone(220+R()*440,'sine',0.035,0.5);},
  ()=>{if(FR%28===0){tone(440,'sawtooth',0.04,0.28);tone(660,'sawtooth',0.03,0.28,0.05);}},
  ()=>{if(FR%42===0)tone(880+R()*880,'triangle',0.024,0.6);},
  ()=>{if(FR%22===0)tone(55+R()*110,'square',0.044,0.7);},
  ()=>{if(FR%20===0)tone(330+R()*440,'sawtooth',0.03,0.18);},
  ()=>{if(FR%13===0)tone(110+R()*1000,'square',0.018,0.1);},
  ()=>{if(FR%55===0){tone(220,'triangle',0.035,1.0);tone(330,'triangle',0.03,1.0,0.04);tone(440,'triangle',0.025,1.0,0.08);}},
  ()=>{if(FR%9===0)tone(440+R()*1340,'sine',0.017,0.07);},
  ()=>{if(FR%70===0){tone(55,'sine',0.05,1.5);tone(82,'sine',0.04,1.5,0.06);}},
  ()=>{if(FR%30===0){tone(440,'square',0.04,0.07);tone(880,'square',0.035,0.07,0.06);}},
  ()=>{if(FR%17===0)tone(60+R()*120,'sawtooth',0.044,0.42);}
];

function modeInit(idx){
  if(idx===undefined)idx=modeIdx;
  modeIdx=((idx%MODES.length)+MODES.length)%MODES.length;
  modeDur=370+R()*360|0;modeT=0;MINIT[modeIdx]();
}
function nextMode(){flashAlpha=0.28;modeIdx=(modeIdx+1)%MODES.length;modeInit(modeIdx);toast(MODES[modeIdx]);if(soundOn&&aCtx){tone(220,'square',0.05,0.3);tone(440,'square',0.04,0.3,0.06);}}
function regenerate(){seed=Date.now()%99999;R=mkR(seed);ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);flashAlpha=0.72;modeIdx=R()*MODES.length|0;modeInit(modeIdx);toast('REGENERATED — '+MODES[modeIdx]);if(soundOn&&aCtx)for(let i=0;i<6;i++)tone(110*(i+1),'square',0.04,0.28,i*0.07);}

let hudPrev=0;
function updateHUD(){
  if(!hudOn||T-hudPrev<0.12)return;hudPrev=T;
  const ci=((T*22)|0)%128,c=C[ci];
  document.getElementById('hm').textContent=MODES[modeIdx];
  document.getElementById('hp').textContent=(modeT/modeDur*100|0)+'%';
  document.getElementById('hlu').textContent=c.luma;
  document.getElementById('hhi').textContent=c.hue;
  document.getElementById('hpa').textContent=pts.length;
  document.getElementById('hsl').textContent=((T*60)|0)%262;
  document.getElementById('hcr').textContent='$'+c.reg.toString(16).toUpperCase().padStart(2,'0');
  document.getElementById('hfr').textContent=FR;
  document.getElementById('hau').textContent=soundOn?'ON':'OFF';
  document.getElementById('hfps').textContent=fps.toFixed(1);
}

function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min((now-prevTime)/1000,0.05);prevTime=now;
  T+=dt;FR++;modeT++;
  fpsR[fpsI%60]=1/dt;fpsI++;let fs=0;for(let i=0;i<60;i++)fs+=fpsR[i];fps=fs/60;
  if(modeT>=modeDur)nextMode();
  MDRAW[modeIdx](T);
  drawPaletteStrip(T);
  drawFlash();
  if(soundOn&&aCtx)MAUD[modeIdx]();
  updateHUD();
}

window.addEventListener('keydown',e=>{
  const k=e.key.toUpperCase();
  if(k==='H'){hudOn=!hudOn;document.getElementById('hud').classList.toggle('vis',hudOn);toast('HUD '+(hudOn?'ON':'OFF'));}
  else if(k==='S'){soundOn=!soundOn;if(soundOn){initAudio();if(aCtx&&aCtx.state==='suspended')aCtx.resume();}else killAudio();toast('SOUND '+(soundOn?'ON':'OFF'));}
  else if(k===' '){e.preventDefault();regenerate();}
},false);
cv.addEventListener('click',()=>{if(aCtx&&aCtx.state==='suspended')aCtx.resume();regenerate();},false);
window.addEventListener('touchend',e=>{e.preventDefault();if(aCtx&&aCtx.state==='suspended')aCtx.resume();regenerate();},{passive:false});

ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
modeInit(0);
requestAnimationFrame(t2=>{prevTime=t2;requestAnimationFrame(frame);});
</script>
