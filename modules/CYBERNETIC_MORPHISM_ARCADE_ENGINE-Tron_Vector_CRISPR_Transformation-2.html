<script>
(function(){
'use strict';

// ─── GLOBALS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const hudTL = document.getElementById('hud-tl');
const hudTR = document.getElementById('hud-tr');
const hudBR = document.getElementById('hud-br');
const flash = document.getElementById('flash');

let W, H, CX, CY;
let hudVisible = false;
let soundOn = false;
let universeID = 0;
let frame = 0;
let lastTime = 0;
let audioCtx = null;
let masterGain = null;
let oscillators = [];
let noiseBuffer = null;

// ─── UNIVERSE STATE ──────────────────────────────────────────────────────────
let U = {}; // universe parameters

function rng(a,b){ return a + Math.random()*(b-a); }
function rni(a,b){ return Math.floor(rng(a,b+1)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function mod(a,b){ return ((a%b)+b)%b; }
function hsl(h,s,l,a=1){ return `hsla(${h|0},${s|0}%,${l|0}%,${a})`; }

// ─── PALETTE ENGINE ─────────────────────────────────────────────────────────
const PALETTE_MODES = ['neon-tron','acid-cyber','bio-green','plasma-violet','solar-flare','ice-grid','chromatic-shift'];

function buildPalette(seed){
  const mode = pick(PALETTE_MODES);
  const hBase = rng(0,360);
  const hSplit = rng(60,180);
  return {
    mode,
    hBase,
    hSplit,
    bg: rng(0,25),
    saturation: rng(80,100),
    brightness: rng(50,100),
    cycleSpeed: rng(0.15,0.8),
    neonIntensity: rng(0.6,1.0),
    ribbonCount: rni(3,8),
  };
}

function getPaletteColor(pal, t, variant=0, alpha=1){
  const h = mod(pal.hBase + t * 360 * pal.cycleSpeed + variant * pal.hSplit, 360);
  const s = pal.saturation;
  const l = pal.brightness * (0.4 + 0.6 * Math.abs(Math.sin(t*Math.PI + variant)));
  return `hsla(${h|0},${s|0}%,${l|0}%,${alpha})`;
}

function getEdgeColor(pal, t, idx, alpha=1){
  const h = mod(pal.hBase + frame*0.003*pal.cycleSpeed + idx*37.7 + t*60, 360);
  return `hsla(${h|0},${(pal.saturation)|0}%,${(55+30*Math.sin(t+idx))|0}%,${alpha})`;
}

// ─── NOISE / HASH ─────────────────────────────────────────────────────────
function hash(n){ n=(n<<13)^n; return 1-(((n*(n*n*15731+789221)+1376312589)&0x7fffffff)/1073741824); }
function noise2(x,y){ const ix=x|0,iy=y|0,fx=x-ix,fy=y-iy; const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy); const a=hash(ix+iy*57),b=hash(ix+1+iy*57),c=hash(ix+(iy+1)*57),d=hash(ix+1+(iy+1)*57); return lerp(lerp(a,b,u),lerp(c,d,u),v); }
function fbm(x,y,oct=4){ let v=0,a=0.5,f=1; for(let i=0;i<oct;i++){v+=a*noise2(x*f,y*f);a*=0.5;f*=2;} return v; }

// ─── CELLULAR AUTOMATA ────────────────────────────────────────────────────
const CA_SIZE = 64;
let caGrid = [], caNext = [];
let caRule = 0;

function initCA(){
  caGrid = new Uint8Array(CA_SIZE*CA_SIZE);
  caNext = new Uint8Array(CA_SIZE*CA_SIZE);
  caRule = pick([30,90,110,184,126,54,18,22,45,75,105]);
  for(let i=0;i<caGrid.length;i++) caGrid[i] = Math.random()<0.35?1:0;
}

function stepCA(){
  for(let y=0;y<CA_SIZE;y++){
    for(let x=0;x<CA_SIZE;x++){
      const nx=mod(x+1,CA_SIZE),px=mod(x-1,CA_SIZE);
      const ny=mod(y+1,CA_SIZE),py=mod(y-1,CA_SIZE);
      const n = caGrid[py*CA_SIZE+px]+caGrid[py*CA_SIZE+x]+caGrid[py*CA_SIZE+nx]
               +caGrid[y*CA_SIZE+px]+caGrid[y*CA_SIZE+nx]
               +caGrid[ny*CA_SIZE+px]+caGrid[ny*CA_SIZE+x]+caGrid[ny*CA_SIZE+nx];
      const c = caGrid[y*CA_SIZE+x];
      // Conway-adjacent with twist
      caNext[y*CA_SIZE+x]=(c&&(n===2||n===3))||((!c)&&(n===3||n===U.caBirth))?1:0;
    }
  }
  let tmp=caGrid; caGrid=caNext; caNext=tmp;
}

// ─── MORPHISM GRAPH ──────────────────────────────────────────────────────
const MAX_NODES = 38;
const MAX_EDGES = 90;
let nodes = [], edges = [], morphisms = [];

function mkNode(id){
  const angle = rng(0,Math.PI*2);
  const r = rng(0.1,0.45)*Math.min(W,H)*0.5;
  return {
    id, x:CX+r*Math.cos(angle), y:CY+r*Math.sin(angle),
    vx:rng(-0.4,0.4), vy:rng(-0.4,0.4),
    radius:rng(3,9), type:rni(0,4),
    phase:rng(0,Math.PI*2), freq:rng(0.5,2.5),
    energy:rng(0.3,1.0), transforming:false, tPhase:0,
    orbit:rng(0,1)<0.3, orbitR:rng(50,180), orbitSpeed:rng(0.002,0.008), orbitAngle:rng(0,Math.PI*2),
    orbitParent:-1, morphLabel:pick(['α','β','γ','δ','η','μ','φ','ψ','Ω','λ','σ','τ','ρ','ξ']),
    mass:rng(1,3)
  };
}

function initGraph(){
  nodes=[];edges=[];morphisms=[];
  const n = rni(12, MAX_NODES);
  for(let i=0;i<n;i++) nodes.push(mkNode(i));
  // wire edges
  const eCount = Math.min(MAX_EDGES, rni(n, n*3));
  const edgeSet = new Set();
  for(let i=0;i<eCount;i++){
    let a=rni(0,n-1),b=rni(0,n-1);
    if(a===b) continue;
    const key=`${Math.min(a,b)}_${Math.max(a,b)}`;
    if(edgeSet.has(key)) continue;
    edgeSet.add(key);
    edges.push({a,b,weight:rng(0.2,1),phase:rng(0,Math.PI*2),
      type:rni(0,3), // 0=line,1=bezier,2=arc
      active:true, pulsePos:0, pulseSpeed:rng(0.005,0.025)
    });
  }
  // morphisms (higher-order edges of edges)
  for(let i=0;i<Math.min(12,edges.length);i++){
    morphisms.push({
      edgeA:rni(0,edges.length-1), edgeB:rni(0,edges.length-1),
      t:0, speed:rng(0.003,0.012), color:rng(0,360),
      label:pick(['F','G','H','η','ε','μ','∘','⊗','⊕','→','⇒','⟹'])
    });
  }
}

function updateGraph(){
  const t = frame*0.01;
  const repel = U.repelStr;
  const attract = U.attractStr;
  for(let i=0;i<nodes.length;i++){
    const nd=nodes[i];
    if(nd.orbit && nd.orbitParent>=0 && nd.orbitParent<nodes.length){
      nd.orbitAngle+=nd.orbitSpeed;
      const p=nodes[nd.orbitParent];
      nd.x=p.x+nd.orbitR*Math.cos(nd.orbitAngle);
      nd.y=p.y+nd.orbitR*Math.sin(nd.orbitAngle);
    } else {
      // vector field drift
      const nx=nd.x/W*4+t*0.1, ny=nd.y/H*4+t*0.1;
      const field = fbm(nx,ny,3);
      const angle2 = field*Math.PI*4 + t*U.fieldTwist;
      nd.vx+=Math.cos(angle2)*0.03*U.fieldStrength;
      nd.vy+=Math.sin(angle2)*0.03*U.fieldStrength;
      // node repulsion
      for(let j=i+1;j<nodes.length;j++){
        const nb=nodes[j];
        const dx=nd.x-nb.x, dy=nd.y-nb.y;
        const d2=dx*dx+dy*dy+1;
        const f=repel/d2;
        nd.vx+=dx*f; nd.vy+=dy*f;
        nb.vx-=dx*f; nb.vy-=dy*f;
      }
      // center attraction
      nd.vx+=(CX-nd.x)*attract;
      nd.vy+=(CY-nd.y)*attract;
      nd.vx*=0.96; nd.vy*=0.96;
      nd.x+=nd.vx; nd.y+=nd.vy;
    }
    // wrap with bounce
    if(nd.x<40){nd.x=40;nd.vx=Math.abs(nd.vx);}
    if(nd.x>W-40){nd.x=W-40;nd.vx=-Math.abs(nd.vx);}
    if(nd.y<40){nd.y=40;nd.vy=Math.abs(nd.vy);}
    if(nd.y>H-40){nd.y=H-40;nd.vy=-Math.abs(nd.vy);}
    // transformation pulse
    if(nd.transforming){ nd.tPhase+=0.04; if(nd.tPhase>1){nd.transforming=false;nd.tPhase=0;nd.type=rni(0,4);} }
    if(Math.random()<0.001) nd.transforming=true;
  }
  // edge pulses
  for(const e of edges){
    e.pulsePos=mod(e.pulsePos+e.pulseSpeed,1);
  }
  // morphism travel
  for(const m of morphisms){
    m.t=mod(m.t+m.speed,1);
    m.color=mod(m.color+0.3,360);
  }
  // occasional graph rewiring
  if(frame%180===0 && nodes.length>2){
    // add/remove random edge
    if(Math.random()<0.5 && edges.length<MAX_EDGES){
      const a=rni(0,nodes.length-1), b=rni(0,nodes.length-1);
      if(a!==b) edges.push({a,b,weight:rng(0.2,1),phase:rng(0,Math.PI*2),type:rni(0,3),active:true,pulsePos:0,pulseSpeed:rng(0.005,0.025)});
    } else if(edges.length>4){
      edges.splice(rni(0,edges.length-1),1);
    }
  }
}

// ─── PARTICLE SWARM ──────────────────────────────────────────────────────
const MAX_PARTICLES = 280;
let particles = [];

function initParticles(){
  particles=[];
  const n = rni(120, MAX_PARTICLES);
  for(let i=0;i<n;i++) spawnParticle();
}

function spawnParticle(){
  const angle=rng(0,Math.PI*2);
  const speed=rng(0.3,2.5);
  particles.push({
    x:rng(0,W), y:rng(0,H),
    vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
    life:1, maxLife:rng(80,300),
    age:0, size:rng(1,4),
    type:rni(0,3), // 0=dot,1=line,2=cross
    hue:rng(0,360), trail:[],
    targetNode:rni(0,Math.max(1,nodes.length-1)),
    flocking:Math.random()<0.6
  });
}

function updateParticles(){
  const t=frame*0.01;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.age++;
    p.life=1-p.age/p.maxLife;
    if(p.life<=0||p.age>p.maxLife){particles.splice(i,1);spawnParticle();continue;}
    // flocking toward target node
    if(p.flocking && nodes.length>0){
      const tn=nodes[p.targetNode%nodes.length];
      const dx=tn.x-p.x, dy=tn.y-p.y;
      const d=Math.sqrt(dx*dx+dy*dy)+1;
      p.vx+=dx/d*0.08*U.swarmStr;
      p.vy+=dy/d*0.08*U.swarmStr;
      if(d<15){p.targetNode=rni(0,nodes.length-1);}
    }
    // vector field
    const fx=p.x/W*3+t*0.05, fy=p.y/H*3+t*0.05;
    const angle=fbm(fx,fy,2)*Math.PI*6+t*U.fieldTwist*0.5;
    p.vx+=Math.cos(angle)*0.02;
    p.vy+=Math.sin(angle)*0.02;
    // drag
    p.vx*=0.97; p.vy*=0.97;
    // trail
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>12) p.trail.shift();
    p.x+=p.vx; p.y+=p.vy;
    // wrap
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    p.hue=mod(p.hue+0.5,360);
  }
}

// ─── FRACTAL / L-SYSTEM STRUCTURES ──────────────────────────────────────
let lStructures = [];

function genLStructure(){
  const rules = [
    {axiom:'F',rules:{F:'F+F−F−F+F'},angle:90,depth:3},
    {axiom:'X',rules:{X:'F+[[X]−X]−F[−FX]+X',F:'FF'},angle:25,depth:4},
    {axiom:'F−F−F−F',rules:{F:'F−F+F+FF−F−F+F'},angle:90,depth:3},
    {axiom:'F',rules:{F:'F[+F]F[−F]F'},angle:26,depth:4},
    {axiom:'X',rules:{X:'F[+X][−X]FX',F:'FF'},angle:20,depth:5},
  ];
  const r=pick(rules);
  let str=r.axiom;
  for(let i=0;i<r.depth;i++){
    let ns='';
    for(const c of str) ns+=(r.rules[c]||c);
    str=ns;
    if(str.length>8000) break;
  }
  return {str,angle:r.angle,scale:rng(1.5,4),cx:rng(W*0.15,W*0.85),cy:rng(H*0.15,H*0.85),rot:rng(0,Math.PI*2),hue:rng(0,360),alpha:rng(0.15,0.4),len:rng(5,18)};
}

function initLStructures(){
  lStructures=[];
  const n=rni(2,5);
  for(let i=0;i<n;i++) lStructures.push(genLStructure());
}

function drawLStructure(ls, pal, t){
  ctx.save();
  ctx.translate(ls.cx,ls.cy);
  ctx.rotate(ls.rot+t*0.002);
  const stack=[];
  let x=0,y=0,a=0;
  const step=ls.len;
  const ang=ls.angle*Math.PI/180;
  ctx.beginPath();
  ctx.lineWidth=0.7;
  const h=mod(ls.hue+t*20,360);
  ctx.strokeStyle=`hsla(${h|0},90%,65%,${ls.alpha})`;
  let drawn=0;
  for(const c of ls.str){
    if(drawn>3000) break;
    if(c==='F'||c==='f'){
      const nx=x+step*Math.cos(a), ny=y+step*Math.sin(a);
      if(c==='F'){ctx.moveTo(x,y);ctx.lineTo(nx,ny);drawn++;}
      x=nx;y=ny;
    } else if(c==='+') a+=ang;
    else if(c==='-') a-=ang;
    else if(c==='[') stack.push({x,y,a});
    else if(c===']'&&stack.length){const s=stack.pop();x=s.x;y=s.y;a=s.a;}
  }
  ctx.stroke();
  ctx.restore();
}

// ─── CRISPR TRANSFORMATION NETWORKS ──────────────────────────────────────
let crisprStrands = [];

function initCRISPR(){
  crisprStrands=[];
  const n=rni(3,8);
  for(let i=0;i<n;i++){
    const pts=[];
    const segments=rni(6,16);
    const cx=rng(W*0.1,W*0.9), cy=rng(H*0.1,H*0.9);
    for(let j=0;j<segments;j++){
      pts.push({x:cx+rng(-150,150),y:cy+rng(-100,100),phase:rng(0,Math.PI*2)});
    }
    crisprStrands.push({pts,hue:rng(0,360),width:rng(1,3),type:rni(0,3),speed:rng(0.005,0.02),cutSite:rni(1,segments-2),splicing:false,spliceT:0});
  }
}

function drawCRISPR(pal, t){
  for(const s of crisprStrands){
    if(!s.pts.length) continue;
    s.hue=mod(s.hue+0.2,360);
    // animate splice
    if(Math.random()<0.0015&&!s.splicing) s.splicing=true;
    if(s.splicing){s.spliceT+=0.03; if(s.spliceT>1){s.splicing=false;s.spliceT=0;s.cutSite=rni(1,s.pts.length-1);}}
    // draw double helix
    ctx.save();
    for(let strand=0;strand<2;strand++){
      ctx.beginPath();
      for(let i=0;i<s.pts.length;i++){
        const p=s.pts[i];
        const wave=18*Math.sin(i*0.8+t*s.speed*60+p.phase+(strand?Math.PI:0));
        const nx=p.x+wave*Math.sin(t*0.5+i*0.3);
        const ny=p.y+wave*Math.cos(t*0.5+i*0.3);
        i===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);
      }
      const h=mod(s.hue+strand*120,360);
      ctx.strokeStyle=`hsla(${h|0},90%,65%,0.5)`;
      ctx.lineWidth=s.width;
      ctx.stroke();
    }
    // crossbars
    for(let i=0;i<s.pts.length-1;i+=2){
      const p=s.pts[i];
      const wave=18*Math.sin(i*0.8+t*s.speed*60+p.phase);
      const nx=p.x+wave*Math.sin(t*0.5+i*0.3);
      const ny=p.y+wave*Math.cos(t*0.5+i*0.3);
      const nw=-wave;
      const mx=p.x+nw*Math.sin(t*0.5+i*0.3);
      const my=p.y+nw*Math.cos(t*0.5+i*0.3);
      ctx.beginPath();ctx.moveTo(nx,ny);ctx.lineTo(mx,my);
      const hi=mod(s.hue+180,360);
      ctx.strokeStyle=`hsla(${hi|0},70%,75%,0.35)`;
      ctx.lineWidth=0.8;
      ctx.stroke();
    }
    // cut site glow
    if(s.cutSite<s.pts.length){
      const p=s.pts[s.cutSite];
      const glow=s.splicing?s.spliceT:0.3+0.2*Math.sin(t*3);
      ctx.beginPath();
      ctx.arc(p.x,p.y,8+glow*12,0,Math.PI*2);
      ctx.strokeStyle=`hsla(${mod(s.hue+60,360)|0},100%,80%,${glow*0.9})`;
      ctx.lineWidth=2;
      ctx.stroke();
      if(s.splicing){
        ctx.font=`${10+s.spliceT*6|0}px 'Courier New'`;
        ctx.fillStyle=`hsla(${mod(s.hue+60,360)|0},100%,90%,${s.spliceT*0.9})`;
        ctx.fillText('CUT',p.x+12,p.y-8);
      }
    }
    ctx.restore();
  }
}

// ─── VECTOR LATTICE ───────────────────────────────────────────────────────
let latticePoints = [];
let LATTICE_W = 24, LATTICE_H = 16;

function initLattice(){
  latticePoints=[];
  LATTICE_W=rni(16,28); LATTICE_H=rni(10,20);
  for(let y=0;y<LATTICE_H;y++)
    for(let x=0;x<LATTICE_W;x++){
      latticePoints.push({
        gx:x,gy:y,
        ox:W/(LATTICE_W+1)*(x+1), oy:H/(LATTICE_H+1)*(y+1),
        px:0,py:0,
        phase:rng(0,Math.PI*2), freq:rng(0.5,2.0),
        energy:rng(0.3,1.0)
      });
    }
}

function drawLattice(pal, t){
  const amp = U.latticeAmp;
  const gw=W/(LATTICE_W+1), gh=H/(LATTICE_H+1);
  // update positions
  for(const lp of latticePoints){
    const nx=lp.ox/W*3+t*0.07, ny=lp.oy/H*3+t*0.07;
    const n1=fbm(nx,ny,3), n2=fbm(nx+5.3,ny+2.1,3);
    lp.px=lp.ox+n1*amp*Math.sin(t*lp.freq+lp.phase);
    lp.py=lp.oy+n2*amp*Math.cos(t*lp.freq+lp.phase*1.3);
  }
  // draw edges
  ctx.lineWidth=0.6;
  for(let y=0;y<LATTICE_H;y++){
    for(let x=0;x<LATTICE_W;x++){
      const i=y*LATTICE_W+x;
      const p=latticePoints[i];
      // right
      if(x<LATTICE_W-1){
        const q=latticePoints[i+1];
        const dist=Math.hypot(q.px-p.px,q.py-p.py);
        const stress=clamp((dist-gw)/gw,0,1);
        const h=mod(pal.hBase+frame*pal.cycleSpeed*0.5+stress*90,360);
        ctx.strokeStyle=`hsla(${h|0},90%,${50+stress*30|0}%,${0.25+stress*0.4})`;
        ctx.beginPath();ctx.moveTo(p.px,p.py);ctx.lineTo(q.px,q.py);ctx.stroke();
      }
      // down
      if(y<LATTICE_H-1){
        const q=latticePoints[i+LATTICE_W];
        const dist=Math.hypot(q.px-p.px,q.py-p.py);
        const stress=clamp((dist-gh)/gh,0,1);
        const h=mod(pal.hBase+60+frame*pal.cycleSpeed*0.5+stress*90,360);
        ctx.strokeStyle=`hsla(${h|0},85%,${50+stress*30|0}%,${0.2+stress*0.35})`;
        ctx.beginPath();ctx.moveTo(p.px,p.py);ctx.lineTo(q.px,q.py);ctx.stroke();
      }
    }
  }
  // nodes
  for(const lp of latticePoints){
    const en=lp.energy*(0.7+0.3*Math.sin(t*lp.freq+lp.phase));
    if(en<0.4) continue;
    ctx.beginPath();
    const h=mod(pal.hBase+120+lp.gx*7.3+lp.gy*5.1+frame*0.3,360);
    ctx.fillStyle=`hsla(${h|0},90%,70%,${en*0.6})`;
    ctx.arc(lp.px,lp.py,1.5,0,Math.PI*2);
    ctx.fill();
  }
}

// ─── TRON LIGHT RIBBONS ───────────────────────────────────────────────────
let lightRibbons = [];

function initRibbons(){
  lightRibbons=[];
  const n=rni(4,10);
  for(let i=0;i<n;i++){
    const pts=[];
    let x=rng(0,W),y=rng(0,H),a=rng(0,Math.PI*2);
    const turns=rni(8,25);
    for(let j=0;j<turns;j++){
      const dist=rng(40,180);
      x+=Math.cos(a)*dist; y+=Math.sin(a)*dist;
      pts.push({x,y});
      a+=pick([-Math.PI/2,Math.PI/2,0,Math.PI])*(0.5+Math.random()*0.5);
    }
    lightRibbons.push({pts,hue:rng(0,360),width:rng(1,4),glow:rng(4,16),speed:rng(0.003,0.01),headPos:0,tailLen:rng(0.2,0.7),alpha:rng(0.5,1.0)});
  }
}

function drawRibbons(pal, t){
  for(const r of lightRibbons){
    r.headPos=mod(r.headPos+r.speed,1);
    r.hue=mod(r.hue+0.4,360);
    if(r.pts.length<2) continue;
    const total=r.pts.length-1;
    const head=r.headPos*total;
    const tail=Math.max(0,head-r.tailLen*total);
    // draw glow trail
    for(let w=r.glow;w>0;w-=1.5){
      ctx.beginPath();
      let started=false;
      let alpha=0;
      for(let i=Math.floor(tail);i<=Math.ceil(head);i++){
        if(i>=r.pts.length) break;
        const prog=clamp((i-tail)/(head-tail),0,1);
        alpha=prog*r.alpha*(1-w/r.glow)*0.6;
        const p=r.pts[i];
        if(!started){ctx.moveTo(p.x,p.y);started=true;}
        else ctx.lineTo(p.x,p.y);
      }
      ctx.strokeStyle=`hsla(${r.hue|0},100%,80%,${alpha})`;
      ctx.lineWidth=w;
      ctx.lineJoin='round';
      ctx.stroke();
    }
    // draw bright core
    ctx.beginPath();
    let started=false;
    for(let i=Math.floor(tail);i<=Math.ceil(head);i++){
      if(i>=r.pts.length) break;
      const p=r.pts[i];
      if(!started){ctx.moveTo(p.x,p.y);started=true;}
      else ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle=`hsla(${r.hue|0},100%,97%,${r.alpha})`;
    ctx.lineWidth=1;
    ctx.stroke();
    // head flash
    const headI=Math.floor(head);
    if(headI<r.pts.length){
      const p=r.pts[headI];
      ctx.beginPath();
      ctx.arc(p.x,p.y,r.glow*0.6,0,Math.PI*2);
      ctx.fillStyle=`hsla(${r.hue|0},100%,95%,0.8)`;
      ctx.fill();
    }
  }
}

// ─── MORPHISM GRAPH DRAWING ──────────────────────────────────────────────
function drawGraph(pal, t){
  if(!nodes.length) return;
  // edges
  for(const e of edges){
    if(!e.active||e.a>=nodes.length||e.b>=nodes.length) continue;
    const na=nodes[e.a],nb=nodes[e.b];
    const h=mod(pal.hBase+e.phase*57+frame*pal.cycleSpeed*0.4,360);
    const alpha=0.3+0.3*Math.sin(t*2+e.phase);
    ctx.lineWidth=0.8+e.weight;
    // type 0: straight
    if(e.type===0){
      ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);
      ctx.strokeStyle=`hsla(${h|0},85%,60%,${alpha})`;
      ctx.stroke();
    } else if(e.type===1){
      // bezier
      const mx=(na.x+nb.x)/2+rng(-60,60)*Math.sin(t+e.phase);
      const my=(na.y+nb.y)/2+rng(-60,60)*Math.cos(t+e.phase);
      ctx.beginPath();ctx.moveTo(na.x,na.y);
      ctx.quadraticCurveTo(mx,my,nb.x,nb.y);
      ctx.strokeStyle=`hsla(${h|0},90%,65%,${alpha})`;
      ctx.stroke();
    } else {
      // arc
      const cx=(na.x+nb.x)/2,cy=(na.y+nb.y)/2;
      const r=Math.hypot(nb.x-na.x,nb.y-na.y)*0.6;
      const a1=Math.atan2(na.y-cy,na.x-cx), a2=Math.atan2(nb.y-cy,nb.x-cx);
      ctx.beginPath();ctx.arc(cx,cy,r,a1,a2,e.phase>Math.PI);
      ctx.strokeStyle=`hsla(${h|0},80%,60%,${alpha*0.7})`;
      ctx.stroke();
    }
    // pulse dot
    const px=lerp(na.x,nb.x,e.pulsePos), py=lerp(na.y,nb.y,e.pulsePos);
    ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${h|0},100%,90%,0.9)`;
    ctx.fill();
  }
  // morphisms (2-cells)
  for(const m of morphisms){
    if(m.edgeA>=edges.length||m.edgeB>=edges.length) continue;
    const ea=edges[m.edgeA], eb=edges[m.edgeB];
    if(ea.a>=nodes.length||eb.a>=nodes.length) continue;
    const pa=nodes[ea.a], pb=nodes[eb.a];
    const mx1=lerp(pa.x,nodes[ea.b>=nodes.length?ea.a:ea.b].x,m.t);
    const my1=lerp(pa.y,nodes[ea.b>=nodes.length?ea.a:ea.b].y,m.t);
    const mx2=lerp(pb.x,nodes[eb.b>=nodes.length?eb.a:eb.b].x,m.t);
    const my2=lerp(pb.y,nodes[eb.b>=nodes.length?eb.a:eb.b].y,m.t);
    ctx.beginPath();ctx.moveTo(mx1,my1);ctx.lineTo(mx2,my2);
    ctx.strokeStyle=`hsla(${m.color|0},100%,75%,0.45)`;
    ctx.lineWidth=1.2;
    ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
    // arrow
    const ang=Math.atan2(my2-my1,mx2-mx1);
    const al=8;
    ctx.beginPath();
    ctx.moveTo(mx2,my2);
    ctx.lineTo(mx2-al*Math.cos(ang-0.5),my2-al*Math.sin(ang-0.5));
    ctx.lineTo(mx2-al*Math.cos(ang+0.5),my2-al*Math.sin(ang+0.5));
    ctx.closePath();
    ctx.fillStyle=`hsla(${m.color|0},100%,75%,0.7)`;
    ctx.fill();
    // label
    ctx.font='11px Courier New';
    ctx.fillStyle=`hsla(${m.color|0},100%,85%,0.8)`;
    ctx.fillText(m.label,(mx1+mx2)/2,(my1+my2)/2-5);
  }
  // nodes
  for(const nd of nodes){
    const pulse=0.7+0.3*Math.sin(t*nd.freq+nd.phase);
    const r=nd.radius*pulse*(nd.transforming?1+nd.tPhase*0.8:1);
    const h=mod(pal.hBase+nd.type*90+frame*pal.cycleSpeed*0.3,360);
    // glow
    const grad=ctx.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,r*4);
    grad.addColorStop(0,`hsla(${h|0},100%,80%,${0.6*nd.energy})`);
    grad.addColorStop(1,`hsla(${h|0},100%,40%,0)`);
    ctx.beginPath();ctx.arc(nd.x,nd.y,r*4,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
    // core shape
    ctx.beginPath();
    switch(nd.type%4){
      case 0: ctx.arc(nd.x,nd.y,r,0,Math.PI*2); break;
      case 1:
        ctx.moveTo(nd.x,nd.y-r*1.2);
        for(let k=1;k<6;k++) ctx.lineTo(nd.x+r*1.2*Math.sin(k*Math.PI*2/5),nd.y-r*1.2*Math.cos(k*Math.PI*2/5));
        ctx.closePath(); break;
      case 2:
        ctx.rect(nd.x-r,nd.y-r,r*2,r*2); break;
      case 3:
        ctx.moveTo(nd.x,nd.y-r*1.3);
        ctx.lineTo(nd.x+r*1.1,nd.y+r*0.8);
        ctx.lineTo(nd.x-r*1.1,nd.y+r*0.8);
        ctx.closePath(); break;
    }
    ctx.fillStyle=`hsla(${h|0},90%,65%,${0.85*nd.energy})`;
    ctx.fill();
    ctx.strokeStyle=`hsla(${h|0},100%,90%,0.9)`;
    ctx.lineWidth=1;ctx.stroke();
    // label
    ctx.font='9px Courier New';
    ctx.fillStyle=`hsla(${h|0},100%,95%,0.7)`;
    ctx.fillText(nd.morphLabel,nd.x+r+2,nd.y-r);
  }
}

// ─── PARTICLES DRAWING ────────────────────────────────────────────────────
function drawParticles(pal, t){
  for(const p of particles){
    if(p.life<=0) continue;
    const alpha=p.life*0.75;
    const h=mod(p.hue+frame*0.5,360);
    // trail
    if(p.trail.length>1){
      ctx.beginPath();
      ctx.moveTo(p.trail[0].x,p.trail[0].y);
      for(let i=1;i<p.trail.length;i++) ctx.lineTo(p.trail[i].x,p.trail[i].y);
      ctx.strokeStyle=`hsla(${h|0},90%,65%,${alpha*0.3})`;
      ctx.lineWidth=p.size*0.5;ctx.stroke();
    }
    ctx.beginPath();
    switch(p.type){
      case 0: ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); break;
      case 1:
        ctx.moveTo(p.x-p.size,p.y);ctx.lineTo(p.x+p.size,p.y);
        ctx.moveTo(p.x,p.y-p.size);ctx.lineTo(p.x,p.y+p.size); break;
      default: ctx.rect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
    ctx.fillStyle=`hsla(${h|0},100%,75%,${alpha})`;
    ctx.strokeStyle=`hsla(${h|0},100%,90%,${alpha})`;
    ctx.lineWidth=0.8;
    p.type===1?ctx.stroke():ctx.fill();
  }
}

// ─── SPECTRAL RIBBONS ─────────────────────────────────────────────────────
let spectralRibbons = [];

function initSpectral(){
  spectralRibbons=[];
  const n=rni(3,7);
  for(let i=0;i<n;i++){
    spectralRibbons.push({
      y:rng(0,H), width:rng(20,100), speed:rng(-0.3,0.3),
      hueOff:rng(0,360), alpha:rng(0.03,0.12), freq:rng(1,4),
      waveAmp:rng(10,60), waveFreq:rng(0.005,0.02)
    });
  }
}

function drawSpectral(pal, t){
  for(const r of spectralRibbons){
    r.y+=r.speed;
    if(r.y<-r.width) r.y=H+r.width;
    if(r.y>H+r.width) r.y=-r.width;
    const steps=Math.ceil(W/8);
    for(let i=0;i<steps;i++){
      const x=i*8;
      const wave=r.waveAmp*Math.sin(x*r.waveFreq+t*r.freq);
      const cy=r.y+wave;
      const h=mod(pal.hBase+r.hueOff+i*2+frame*pal.cycleSpeed*0.5,360);
      ctx.fillStyle=`hsla(${h|0},90%,60%,${r.alpha})`;
      ctx.fillRect(x,cy-r.width/2,9,r.width);
    }
  }
}

// ─── BACKGROUND GRID ─────────────────────────────────────────────────────
function drawGrid(pal, t){
  const spacing = U.gridSpacing;
  const pulse = 0.04+0.02*Math.sin(t*0.5);
  ctx.lineWidth=0.4;
  for(let x=0;x<W;x+=spacing){
    const h=mod(pal.hBase+x*0.1+t*10,360);
    ctx.strokeStyle=`hsla(${h|0},70%,40%,${pulse})`;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<H;y+=spacing){
    const h=mod(pal.hBase+60+y*0.1+t*10,360);
    ctx.strokeStyle=`hsla(${h|0},70%,40%,${pulse})`;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
}

// ─── CA OVERLAY ──────────────────────────────────────────────────────────
function drawCA(pal, t){
  if(!U.showCA) return;
  const cw=W/CA_SIZE, ch=H/CA_SIZE;
  for(let y=0;y<CA_SIZE;y++){
    for(let x=0;x<CA_SIZE;x++){
      if(!caGrid[y*CA_SIZE+x]) continue;
      const h=mod(pal.hBase+x*3+y*2+frame*pal.cycleSpeed*0.2,360);
      ctx.fillStyle=`hsla(${h|0},80%,55%,0.12)`;
      ctx.fillRect(x*cw,y*ch,cw,ch);
    }
  }
}

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────
function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=soundOn?0.18:0;
    // noise buffer for ambience
    noiseBuffer=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
    const nd=noiseBuffer.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
    masterGain.connect(audioCtx.destination);
  }catch(e){}
}

function rebuildAudio(){
  if(!audioCtx) return;
  // stop old
  for(const o of oscillators){ try{o.stop();}catch(e){} }
  oscillators=[];
  if(!soundOn) return;
  // build from universe
  const pal=U.palette;
  const baseFreq=110+pal.hBase*1.5;
  // drone layers
  const freqs=[baseFreq,baseFreq*1.5,baseFreq*2,baseFreq*3.01,baseFreq*0.5];
  for(let i=0;i<freqs.length;i++){
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    const filter=audioCtx.createBiquadFilter();
    filter.type='bandpass';
    filter.frequency.value=freqs[i]*(1+i*0.3);
    filter.Q.value=5+i*3;
    osc.type=pick(['sine','triangle','sawtooth','square']);
    osc.frequency.value=freqs[i];
    osc.frequency.setValueAtTime(freqs[i],audioCtx.currentTime);
    g.gain.value=0.015*(1-i*0.15);
    osc.connect(filter);filter.connect(g);g.connect(masterGain);
    osc.start();
    oscillators.push(osc);
  }
  // noise layer
  const ns=audioCtx.createBufferSource();
  ns.buffer=noiseBuffer;ns.loop=true;
  const ng=audioCtx.createGain();ng.gain.value=0.008;
  const nf=audioCtx.createBiquadFilter();nf.type='highpass';nf.frequency.value=800;
  ns.connect(nf);nf.connect(ng);ng.connect(masterGain);
  ns.start();oscillators.push(ns);
}

function updateAudio(){
  if(!audioCtx||!soundOn||oscillators.length<2) return;
  const t=audioCtx.currentTime;
  const pal=U.palette;
  // modulate freq based on visual vars
  const energy=nodes.reduce((s,n)=>s+n.energy,0)/(nodes.length||1);
  const baseFreq=110+pal.hBase*1.5;
  for(let i=0;i<Math.min(5,oscillators.length);i++){
    const o=oscillators[i];
    if(!o.frequency) continue;
    const target=baseFreq*(i+1)*(0.98+energy*0.04+0.02*Math.sin(t*0.3+i));
    o.frequency.linearRampToValueAtTime(target,t+0.3);
  }
}

function resize(){

  H=canvas.height=window.innerHeight;

    <span style="color:${getPaletteColor(pal,0.1,0,1)}">◈ ${U.name}</span><br>

    <span style="color:${getPaletteColor(pal,0.3,2,0.7)}">MORPHISMS: ${morphisms.length}</span><br>
    <span style="color:${getPaletteColor(pal,0.4,3,0.6)}">PARTICLES: ${particles.length}</span><br>
    <span style="color:${getPaletteColor(pal,0.5,0,0.5)}">FRAME: ${frame}</span>
  `;
  hudTR.innerHTML=`
    <span style="color:${getPaletteColor(pal,0.1,2,0.9)}">PALETTE: ${pal.mode}</span><br>
    <span style="color:${getPaletteColor(pal,0.2,3,0.8)}">UNIVERSE: ${universeID}</span><br>

// ─── MAIN RENDER LOOP ─────────────────────────────────────────────────────
function render(ts){
  requestAnimationFrame(render);
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  frame++;
  const t=frame*0.016;
  const pal=U.palette;

  // ── background ──
  ctx.fillStyle=`hsla(${pal.bg|0},20%,3%,${U.bgAlpha})`;
  ctx.fillRect(0,0,W,H);

  // ── spectral ribbons ──
  drawSpectral(pal,t);

  // ── grid ──
  drawGrid(pal,t);

  // ── CA overlay ──
  if(frame%3===0) stepCA();
  drawCA(pal,t);

  // ── lattice ──
  drawLattice(pal,t);

  // ── L-structures ──
  for(const ls of lStructures) drawLStructure(ls,pal,t);

  // ── CRISPR strands ──
  drawCRISPR(pal,t);

  // ── Tron ribbons ──
  drawRibbons(pal,t);

  // ── graph ──
  updateGraph();
  drawGraph(pal,t);

  // ── particles ──
  updateParticles();
  drawParticles(pal,t);

  // ── vignette ──
  const vg=ctx.createRadialGradient(CX,CY,Math.min(W,H)*0.2,CX,CY,Math.max(W,H)*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  // ── occasional L-system refresh ──
  if(frame%600===0) initLStructures();
  if(frame%300===0) initCRISPR();
  if(frame%900===0) initRibbons();

  // ── audio ──
  if(soundOn&&frame%30===0) updateAudio();

  // ── HUD ──
  if(hudVisible&&frame%6===0) updateHUD();
}

// ─── INPUT ───────────────────────────────────────────────────────────────
function onKey(e){
  if(e.key===' '||e.key==='Enter'){ e.preventDefault(); newUniverse(); }
  if(e.key.toLowerCase()==='h'){ hudVisible=!hudVisible; hud.style.display=hudVisible?'block':'none'; }
  if(e.key.toLowerCase()==='s'){
    soundOn=!soundOn;
    initAudio();
    if(masterGain) masterGain.gain.setTargetAtTime(soundOn?0.18:0,audioCtx.currentTime,0.1);
    if(soundOn) rebuildAudio();
  }
}

let touchStartX=0,touchStartY=0,touchStartT=0;
function onTouchStart(e){
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
  touchStartT=Date.now();
}
