function hslRgb(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  var c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2, r,g,b;
  if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;}else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
  return [Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];
}

// ── DRAW TOKENISED LINE ──────────────────────────────────────────────────────
// Draws tokens left-to-right from (x,y) at given fontSize and alpha.
// Font is set fresh each call — no CSS transform ever touches this text.
function drawLine(tokens, x, y, fs, alpha) {
  if (alpha <= 0.001) return;
  var font = 'normal ' + fs.toFixed(2) + 'px ' + PARAMS.face;
  if (cx.font !== font) cx.font = font;
  cx.textBaseline = 'middle';
  var spc = fs * PARAMS.letterMul;
  var gb  = PARAMS.glowBlur;
  cx.globalAlpha = alpha;
  var cur = x;
  for (var i=0; i<tokens.length; i++) {
    var tok = tokens[i];
    cx.fillStyle = tok.c;
    if (PARAMS.doGlow) {
      cx.shadowColor = tok.c;
      cx.shadowBlur  = gb;
      cx.globalAlpha = alpha * PARAMS.glowAlpha;
      cx.fillText(tok.t, cur, y);
      cx.shadowBlur  = gb * 1.8;
      cx.fillText(tok.t, cur, y);
      cx.shadowBlur  = 0;
      cx.globalAlpha = alpha;
    }
    cx.fillText(tok.t, cur, y);
    cur += cx.measureText(tok.t).width + tok.t.length * spc;
  }
  cx.shadowBlur  = 0;
  cx.globalAlpha = 1;
}

function measureLine(tokens, fs) {
  var font = 'normal ' + fs.toFixed(2) + 'px ' + PARAMS.face;
  if (cx.font !== font) cx.font = font;
  var spc = fs * PARAMS.letterMul, w = 0;
  for (var i=0; i<tokens.length; i++)
    w += cx.measureText(tokens[i].t).width + tokens[i].t.length * spc;
  return w;
}

// ── ACTIVE COMMANDS ──────────────────────────────────────────────────────────
var active = [];

function spawnCmd() {
  var txt = CMDS[Math.floor(Math.random()*CMDS.length)];
  var tokens = tokenize(txt);
  var ax = CW * (0.04 + Math.random()*0.92);
  var ay = CH * (0.05 + Math.random()*0.90);
  var dur = PARAMS.duration * (0.6 + Math.random()*0.8);
  active.push({tok:tokens, ax:ax, ay:ay, start:performance.now(), dur:dur});
  playCmdSound(Math.random());
}

// ── BACKGROUND ───────────────────────────────────────────────────────────────
var bgP=[], bgGrid=[];

function initBg() {
  bgP=[];
  var c1=P._cRgb, c2=P._pRgb;
  for(var i=0;i<PARAMS.bgCount;i++){
    var c=Math.random()>0.5?c1:c2;
    bgP.push({x:Math.random()*CW, y:Math.random()*CH,
      r:Math.random()*PARAMS.bgSize+0.3,
      vx:(Math.random()-0.5)*PARAMS.bgSpeed*0.4,
      vy:-(Math.random()*PARAMS.bgSpeed+0.04),
      c:'rgb('+c[0]+','+c[1]+','+c[2]+')',
      ph:Math.random()*Math.PI*2});
  }
  bgGrid=[];
  var gs=40+Math.floor(Math.random()*65);
  for(var gx=0;gx<CW+gs;gx+=gs) bgGrid.push({t:'v',v:gx});
  for(var gy=0;gy<CH+gs;gy+=gs) bgGrid.push({t:'h',v:gy});
}

function drawBg(ts) {
  cx.globalAlpha=1;
  cx.fillStyle=P.bg;
  cx.fillRect(0,0,CW,CH);
  var mode=PARAMS.bgMode, ba=PARAMS.bgAlpha;
  if(mode===0){
    for(var i=0;i<bgP.length;i++){
      var p=bgP[i];
      p.y-=p.vy; p.x+=p.vx;
      if(p.y<-4){p.y=CH+4;p.x=Math.random()*CW;}
      if(p.x<-4)p.x=CW+4; if(p.x>CW+4)p.x=-4;
      cx.globalAlpha=ba*(0.3+0.7*Math.abs(Math.sin(ts*0.0004+p.ph)));
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle=p.c;cx.fill();
    }
  } else if(mode===1){
    var c1=P._cRgb;
    for(var i=0;i<bgGrid.length;i++){
      var gl=bgGrid[i];
      var pulse=Math.sin(ts*0.0005+gl.v*0.018)*0.5+0.5;
      cx.globalAlpha=pulse*ba*0.6;
      cx.strokeStyle='rgb('+c1[0]+','+c1[1]+','+c1[2]+')';
      cx.lineWidth=0.5;
      cx.beginPath();
      if(gl.t==='v'){cx.moveTo(gl.v,0);cx.lineTo(gl.v,CH);}
      else{cx.moveTo(0,gl.v);cx.lineTo(CW,gl.v);}
      cx.stroke();
    }
  } else if(mode===2){
    var c1=P._cRgb,c2=P._pRgb,step=5,t=ts*0.001;
    for(var y=0;y<CH;y+=step){
      for(var x=0;x<CW;x+=step){
        var v=Math.sin(x*0.022+t)*Math.sin(y*0.018+t*0.7)+Math.sin((x+y)*0.014+t*1.1);
        if(v>0.8){
          cx.globalAlpha=((v-0.8)/1.2)*ba*1.5;
          cx.fillStyle=v>1.2?'rgb('+c1[0]+','+c1[1]+','+c1[2]+')':'rgb('+c2[0]+','+c2[1]+','+c2[2]+')';
          cx.fillRect(x,y,step,step);
        }
      }
    }
  } else {
    for(var i=0;i<bgP.length;i++){var p=bgP[i];p.x+=p.vx;p.y+=p.vy;if(p.y<0)p.y=CH;if(p.y>CH)p.y=0;if(p.x<0)p.x=CW;if(p.x>CW)p.x=0;}
    var c1=P._cRgb;
    for(var i=0;i<bgP.length;i++){
      for(var j=i+1;j<bgP.length;j++){
        var dx=bgP[i].x-bgP[j].x,dy=bgP[i].y-bgP[j].y,d=Math.sqrt(dx*dx+dy*dy);

      }
      cx.globalAlpha=ba*1.2;cx.beginPath();cx.arc(bgP[i].x,bgP[i].y,bgP[i].r*1.5,0,Math.PI*2);cx.fillStyle=bgP[i].c;cx.fill();
    }
  }
  cx.globalAlpha=1;
}

function drawVignette() {
  var g=cx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*0.72);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.5,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,'+PARAMS.vigStr+')');
  cx.globalAlpha=1;cx.fillStyle=g;cx.fillRect(0,0,CW,CH);
}

function drawScanlines(){
  cx.fillStyle='rgba(0,0,0,'+PARAMS.scanOp+')';
  for(var y=0;y<CH;y+=6)cx.fillRect(0,y,CW,3);
}

// ── RENDER LOOP ──────────────────────────────────────────────────────────────
var spawnCD=0, lastT=0;

function frame(now) {
  requestAnimationFrame(frame);
  var dt=now-lastT; lastT=now;

  drawBg(now);

  // Draw each active command at its CURRENT font size — computed fresh, native pixels
  for (var i=active.length-1; i>=0; i--) {
    var a=active[i];
    var t=Math.min((now-a.start)/a.dur, 1);
    // Smooth accelerating growth: small → big
    var eg=Math.pow(t, PARAMS.easeExp);
    var fs=PARAMS.szStart + eg*(PARAMS.szEnd - PARAMS.szStart);
    // Alpha: fade in briefly, hold, then fade out as it grows large
    var alpha;
    if(t < 0.05)             alpha = t/0.05;
    else if(t < PARAMS.fadeFrac) alpha = 1;
    else                      alpha = 1-(t-PARAMS.fadeFrac)/(1-PARAMS.fadeFrac);
    alpha = Math.max(0, PARAMS.alphaStart * alpha);
    // Centre horizontally at anchor
    var w=measureLine(a.tok, fs);
    drawLine(a.tok, a.ax - w/2, a.ay, fs, alpha);
    // Sync audio filter to visual growth of frontmost element
    if(i===active.length-1 && audioEnabled && audioCtx){
      masterFilter.frequency.setTargetAtTime(
        Math.max(200, Math.min(PARAMS.filterFreq*(0.4+t*1.6), 18000)),
        audioCtx.currentTime, 0.08);
    }
    if(t>=1) active.splice(i,1);
  }

  drawVignette();
  drawScanlines();

  spawnCD-=dt;
  if(spawnCD<=0){
    spawnCD=PARAMS.spawnMs*(0.6+Math.random()*0.8);
    spawnCmd();
    if(active.length>PARAMS.maxActive) active.shift();
  }

  updateHUDDyn(now);
}

// ── AUDIO ────────────────────────────────────────────────────────────────────
var audioCtx=null, audioEnabled=false;
var masterGain, masterFilter, lfoNode, lfoGain, reverbNode, reverbGain, dryGain;
var _droneOn=false;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=0;
  masterFilter=audioCtx.createBiquadFilter(); masterFilter.type='lowpass';
  masterFilter.frequency.value=PARAMS.filterFreq; masterFilter.Q.value=2.5;
  lfoNode=audioCtx.createOscillator(); lfoNode.type='sine'; lfoNode.frequency.value=PARAMS.lfoRate;
  lfoGain=audioCtx.createGain(); lfoGain.gain.value=320;
  lfoNode.connect(lfoGain); lfoGain.connect(masterFilter.frequency); lfoNode.start();
  reverbNode=audioCtx.createConvolver();
  var len=audioCtx.sampleRate*2, imp=audioCtx.createBuffer(2,len,audioCtx.sampleRate);
  for(var ch=0;ch<2;ch++){var d=imp.getChannelData(ch);for(var k=0;k<len;k++)d[k]=(Math.random()*2-1)*Math.pow(1-k/len,3.5);}
  reverbNode.buffer=imp;
  reverbGain=audioCtx.createGain(); reverbGain.gain.value=PARAMS.reverbMix;
  dryGain=audioCtx.createGain(); dryGain.gain.value=1-PARAMS.reverbMix*0.4;
  masterFilter.connect(dryGain); dryGain.connect(masterGain);
  masterFilter.connect(reverbNode); reverbNode.connect(reverbGain); reverbGain.connect(masterGain);
  masterGain.connect(audioCtx.destination);
}

function playCmdSound(t){
  if(!audioEnabled||!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  var now=audioCtx.currentTime, freq=Math.min(PARAMS.baseFreq*(1+t*2.2),2400);
  var types=['sine','triangle','sawtooth','square'];
  for(var h=0;h<PARAMS.harmonics;h++){
    var o=audioCtx.createOscillator(),og=audioCtx.createGain();
    o.type=types[h%4]; o.frequency.value=freq*(h+1)*0.5;
    og.gain.setValueAtTime(0,now);
    og.gain.linearRampToValueAtTime(0.032/(h+1),now+0.022);
    og.gain.exponentialRampToValueAtTime(0.0001,now+0.32+h*0.05);
    o.connect(og); og.connect(masterFilter); o.start(now); o.stop(now+0.45+h*0.05);
  }
}

function playRegen(){
  if(!audioEnabled||!audioCtx)return;
  var now=audioCtx.currentTime;
  for(var i=0;i<8;i++){
    var o=audioCtx.createOscillator(),og=audioCtx.createGain();
    o.type=['sawtooth','square','triangle'][i%3];
    o.frequency.value=80+Math.random()*3200;
    og.gain.setValueAtTime(0.022,now+i*0.032);
    og.gain.linearRampToValueAtTime(0,now+i*0.032+0.04);
    o.connect(og); og.connect(masterFilter); o.start(now+i*0.032); o.stop(now+i*0.032+0.06);
  }
}

function startDrone(){
  if(!audioEnabled||!audioCtx||_droneOn)return;
  _droneOn=true;
  (function tick(){
    if(!audioEnabled||!audioCtx){_droneOn=false;return;}
    var now=audioCtx.currentTime;
    var o=audioCtx.createOscillator(),og=audioCtx.createGain();
    o.type='sine'; o.frequency.value=PARAMS.baseFreq*0.25;
    og.gain.setValueAtTime(0.009,now);
    og.gain.linearRampToValueAtTime(0.002,now+4.5);
    o.connect(og); og.connect(masterFilter); o.start(now); o.stop(now+5);
    setTimeout(tick, 4000+Math.random()*3000);
  })();
}

function updateAudioParams(){
  if(!audioCtx)return;
  var t=audioCtx.currentTime;
  masterFilter.frequency.cancelScheduledValues(t);
  masterFilter.frequency.linearRampToValueAtTime(PARAMS.filterFreq,t+1.2);
  lfoNode.frequency.setTargetAtTime(PARAMS.lfoRate,t,0.5);
  reverbGain.gain.linearRampToValueAtTime(PARAMS.reverbMix,t+1);
}

function setAudio(on){
  audioEnabled=on;
  if(on){
    initAudio();
    if(audioCtx.state==='suspended')audioCtx.resume();
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.38,audioCtx.currentTime+0.4);
    startDrone();
  } else if(audioCtx){
    masterGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.35);
    _droneOn=false;
  }
  refreshHUD();
}

// ── REGENERATE ───────────────────────────────────────────────────────────────
function regenerate(ex,ey){
  GEN++;
  active.length=0;
  randomPalette();
  initBg();
  if(audioCtx)updateAudioParams();
  playRegen();
  refreshHUD();
  if(ex===undefined)return;
  var rip=document.createElement('div');
  rip.className='rip';
  var rs=44;
  rip.style.cssText='left:'+(ex-rs/2)+'px;top:'+(ey-rs/2)+'px;width:'+rs+'px;height:'+rs+'px;border:2px solid '+P.cmd+';';
  document.body.appendChild(rip);
  setTimeout(function(){rip.remove();},900);
}

// ── HUD ──────────────────────────────────────────────────────────────────────
var hudOn=false, fpsQ=[], fpsLast=0;
var strats=['Analogous','Neon','Earth','Ice','Toxic','Violet','Fire'];
var modes=['Particles','Grid','Wave','Neural'];

function refreshHUD(){
  var el=document.getElementById('hud');
  if(!hudOn){el.classList.remove('on');return;}
  el.classList.add('on');
  document.getElementById('hud-tl').innerHTML=
    '<span style="color:'+P.comment+'">root@</span><span style="color:'+P.path+'">matrix</span>'
    +'<span style="color:'+P.comment+'">:</span><span style="color:'+P.number+'">~</span>'
    +'<span style="color:'+P.pipe+'">#</span> <span class="bl" style="color:'+P.cmd+'">█</span><br>'
    +'<span style="color:'+P.flag+'">PALETTE '+strats[P._st]+'  hue='+P._b+'°</span><br>'
    +'<span style="color:'+P.string+'">BG:'+modes[PARAMS.bgMode]+'  spawn:'+Math.round(PARAMS.spawnMs)+'ms  max:'+PARAMS.maxActive+'</span><br>'
    +'<span style="color:'+P.variable+'">FONT:'+Math.round(PARAMS.szStart)+' → '+Math.round(PARAMS.szEnd)+'px  face:'+PARAMS.face+'</span>';
  document.getElementById('hud-tr').innerHTML=
    '<span id="hfps" style="color:'+P.cmd+'">-- FPS</span><br>'
    +'<span style="color:'+P.regex+'">GEN #'+GEN+'</span><br>'
    +'<span style="color:'+(audioEnabled?P.cmd:P.comment)+'">SOUND '+(audioEnabled?'ON ♪':'OFF ○')+'</span><br>'
    +'<span id="hact" style="color:'+P.variable+'">ACTIVE: 0</span>';
  document.getElementById('hud-br').style.color=P.comment;
}

function updateHUDDyn(now){
  if(!hudOn)return;
  fpsQ.push(now-fpsLast); fpsLast=now;
  if(fpsQ.length>50)fpsQ.shift();
  var avg=fpsQ.reduce(function(a,b){return a+b;},0)/fpsQ.length;
  var fps=Math.round(1000/avg);
  var fe=document.getElementById('hfps');
  if(fe){fe.textContent=fps+' FPS';fe.style.color=fps>50?P.cmd:fps>28?P.string:P.variable;}
  var ae=document.getElementById('hact');
  if(ae)ae.textContent='ACTIVE: '+active.length;
}

// ── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  var k=e.key.toLowerCase();
  if(k===' '||k==='enter'){e.preventDefault();regenerate(CW/2,CH/2);}
  else if(k==='h'){hudOn=!hudOn;refreshHUD();}
  else if(k==='s'){setAudio(!audioEnabled);}
});
document.addEventListener('click',function(e){regenerate(e.clientX,e.clientY);});
document.addEventListener('touchend',function(e){
  e.preventDefault();var t=e.changedTouches[0];regenerate(t.clientX,t.clientY);
},{passive:false});
setTimeout(function(){document.getElementById('hint').classList.add('gone');},5000);

// ── BOOT ─────────────────────────────────────────────────────────────────────
randomPalette();
initBg();
refreshHUD();
requestAnimationFrame(frame);
</script></body></html>
