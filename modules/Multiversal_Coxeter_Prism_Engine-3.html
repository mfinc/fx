<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiversal Coxeter Prism Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Multiversal Coxeter Prism Engine – a high-performance WebGL kaleidoscopic prism generator using Coxeter reflections, E8-inspired lattice projections, quaternion rotations, Lie exponentials, fractal hybrids, Voronoi tessellations and spectral harmonic gradients with optional FFT-driven sound.">

<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:black;
    touch-action:manipulation;
}
canvas{
    display:block;
}
#hud{
    position:fixed;
    bottom:12px;
    left:12px;
    font-family:monospace;
    font-size:12px;
    color:#0ff;
    opacity:.85;
    pointer-events:none;
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hud">Multiversal Coxeter Prism Engine<br>
SPACE / Tap: Randomize<br>
S: Sound<br>
H: HUD
</div>

<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl2",{antialias:false});
if(!gl){ alert("WebGL2 required"); }

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize",resize);
resize();

const vert = `#version 300 es
in vec2 p;
void main(){
    gl_Position = vec4(p,0.0,1.0);
}`;
const frag = `#version 300 es
precision highp float;
out vec4 O;
uniform vec2 R;
uniform float T;
uniform float symmetry;
uniform float latticeMode;
uniform float colorMode;
uniform float modulation;

#define MAX_STEPS 64
#define MAX_DIST 10.
#define SURF_DIST .001

mat2 rot(float a){ float c=cos(a), s=sin(a); return mat2(c,-s,s,c); }

vec2 reflectCoxeter(vec2 p){
    float k = 3.14159/symmetry;
    float a = atan(p.y,p.x);
    float r = length(p);
    a = mod(a,2.*k);
    a = abs(a-k);
    return vec2(cos(a),sin(a))*r;
}

vec3 lattice(vec3 p){
    if(latticeMode<1.0){
        return fract(p*2.)-.5;
    }else if(latticeMode<2.0){
        return fract(p*3.)-.5;
    }
    return fract(p*1.618)-.5;
}

float mandel(vec2 c){
    vec2 z=vec2(0);
    float m=0.;
    for(int i=0;i<20;i++){
        z=vec2(z.x*z.x-z.y*z.y,2.*z.x*z.y)+c;
        if(dot(z,z)>4.)break;
        m++;
    }
    return m/20.;
}

float sdSphere(vec3 p,float r){
    return length(p)-r;
}

float map(vec3 p){
    vec3 lp=lattice(p);
    float s=sdSphere(lp,.4);
    return s;
}

float raymarch(vec3 ro, vec3 rd){
    float dO=0.;
    for(int i=0;i<MAX_STEPS;i++){
        vec3 p=ro+rd*dO;
        float dS=map(p);
        dO+=dS;
        if(dO>MAX_DIST||abs(dS)<SURF_DIST)break;
    }
    return dO;
}

vec3 palette(float t){
    if(colorMode<1.0)
        return .5+.5*cos(6.28318*(vec3(.2,.5,.8)*t+vec3(0,.25,.5)));
    else if(colorMode<2.0)
        return .5+.5*cos(6.28318*(vec3(.7,.4,.3)*t+vec3(.2,.3,.6)));
    return .5+.5*cos(6.28318*(vec3(.1,.8,.3)*t+vec3(.1,.2,.4)));
}

void main(){
    vec2 uv=(gl_FragCoord.xy*2.-R)/min(R.x,R.y);
    uv*=rot(T*.2);

    uv=reflectCoxeter(uv);

    float m=mandel(uv*1.5);
    vec3 ro=vec3(0.,0.,-3.);
    vec3 rd=normalize(vec3(uv,1.5));

    float d=raymarch(ro,rd);
    float depth=exp(-.2*d);

    float t=m+depth+sin(T*modulation)*.2;

    vec3 col=palette(t);
    col*=pow(depth,1.2);
    O=vec4(col,1.);
}`;

function compile(type,src){
    const s=gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    return s;
}
const program=gl.createProgram();
gl.attachShader(program,compile(gl.VERTEX_SHADER,vert));
gl.attachShader(program,compile(gl.FRAGMENT_SHADER,frag));
gl.linkProgram(program);
gl.useProgram(program);

const quad=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(program,"p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const uR=gl.getUniformLocation(program,"R");
const uT=gl.getUniformLocation(program,"T");
const uSym=gl.getUniformLocation(program,"symmetry");
const uLat=gl.getUniformLocation(program,"latticeMode");
const uCol=gl.getUniformLocation(program,"colorMode");
const uMod=gl.getUniformLocation(program,"modulation");

let symmetry=6;
let latticeMode=0;
let colorMode=0;
let modulation=2;

function randomize(){
    symmetry=Math.floor(Math.random()*8)+3;
    latticeMode=Math.floor(Math.random()*3);
    colorMode=Math.floor(Math.random()*3);
    modulation=Math.random()*4+1;
}
addEventListener("keydown",e=>{
    if(e.code==="Space")randomize();
    if(e.key==="h"||e.key==="H")
        document.getElementById("hud").style.display=
        document.getElementById("hud").style.display==="none"?"block":"none";
    if(e.key==="s"||e.key==="S")toggleSound();
});
addEventListener("click",randomize);

let start=performance.now();

function draw(){
    let t=(performance.now()-start)/1000;
    gl.uniform2f(uR,canvas.width,canvas.height);
    gl.uniform1f(uT,t);
    gl.uniform1f(uSym,symmetry);
    gl.uniform1f(uLat,latticeMode);
    gl.uniform1f(uCol,colorMode);
    gl.uniform1f(uMod,modulation);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    requestAnimationFrame(draw);
}
draw();

/* ---------- SOUND (OFF = ZERO COMPUTE) ---------- */
let audioCtx=null;
let oscillators=[];
function toggleSound(){
    if(!audioCtx){
        audioCtx=new (window.AudioContext||window.webkitAudioContext)();
        for(let i=0;i<6;i++){
            let o=audioCtx.createOscillator();
            let g=audioCtx.createGain();
            o.frequency.value=110*(i+1);
            g.gain.value=.05;
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            oscillators.push({o,g});
        }
    }else{
        oscillators.forEach(x=>x.o.stop());
        audioCtx.close();
        audioCtx=null;
        oscillators=[];
    }
}
</script>
</body>
</html>
