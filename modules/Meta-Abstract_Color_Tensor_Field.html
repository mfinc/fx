<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meta-Abstract Color Tensor Field</title>
<meta name="description" content="Meta-Abstract Color Tensor Field — a dynamic tensor-based color flow visualization with vortices, harmonic palettes, and interactive field distortions.">
<style>
html, body {
  margin:0; padding:0;
  overflow:hidden;
  background:black;
  touch-action:none;
  font-family:monospace;
}
canvas { display:block; }
#hud {
  position:fixed;
  top:10px; left:10px;
  color:#0f0;
  font-size:12px;
  display:none;
  background:rgba(0,0,0,0.4);
  padding:8px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

let W,H,DPR;
function resize(){
  DPR = window.devicePixelRatio || 1;
  W = canvas.width = innerWidth * DPR;
  H = canvas.height = innerHeight * DPR;
  canvas.style.width = innerWidth+"px";
  canvas.style.height = innerHeight+"px";
}
resize();
addEventListener("resize", resize);

// ====== STATE ======
let particles = [];
let attractors = [];
let phase = 0;
let time = 0;
let showHUD = false;
let soundOn = false;

// ====== AUDIO ======
let audioCtx, osc, gain;
function initSound(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  osc = audioCtx.createOscillator();
  gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = "sine";
  osc.start();
  gain.gain.value = 0;
}

// ====== UTILS ======
function rand(a,b){ return Math.random()*(b-a)+a; }

// HSV → RGB
function hsv(h,s,v){
  let f = (n,k=(n+h*6)%6)=>v-v*s*Math.max(Math.min(k,4-k,1),0);
  return [f(5),f(3),f(1)];
}

// ====== FIELD FUNCTION (Tensor-like) ======
function field(x,y){
  let nx = x/W - 0.5;
  let ny = y/H - 0.5;

  // base tensor components
  let hue = (Math.atan2(ny,nx)/(Math.PI*2)+0.5 + phase) % 1;
  let sat = 0.6 + 0.4*Math.sin(3*nx + phase*3);
  let lum = 0.5 + 0.5*Math.cos(3*ny - phase*2);
  let chroma = Math.sqrt(nx*nx+ny*ny);

  // vortices
  for(let a of attractors){
    let dx = nx - a.x;
    let dy = ny - a.y;
    let d = Math.sqrt(dx*dx+dy*dy)+0.001;
    hue += a.strength / d;
    sat += 0.2*Math.sin(1/d);
  }

  return {hue,sat,lum,chroma};
}

// ====== PARTICLES ======
function spawnParticles(n=1200){
  for(let i=0;i<n;i++){
    particles.push({
      x: rand(0,W),
      y: rand(0,H),
      life: rand(50,200)
    });
  }
}

// ====== ATTRACTORS (Pantone/RAL/NCS proxies) ======
function spawnAttractors(n=6){
  attractors=[];
  for(let i=0;i<n;i++){
    attractors.push({
      x: rand(-0.4,0.4),
      y: rand(-0.4,0.4),
      strength: rand(-1,1)
    });
  }
}

// ====== INTERACTION ======
let pointer = {x:0,y:0,active:false};

canvas.addEventListener("pointermove", e=>{
  pointer.x = e.clientX * DPR;
  pointer.y = e.clientY * DPR;
  pointer.active = true;
});

canvas.addEventListener("pointerdown", ()=>{
  inject();
});

// ====== INJECT NEW FIELD ======
function inject(){
  spawnParticles(400);
  spawnAttractors(6);
}

// ====== DRAW ======
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,W,H);

  for(let p of particles){
    let f = field(p.x,p.y);

    // velocity from tensor
    let angle = f.hue * Math.PI * 2;
    let speed = (f.chroma + 0.2) * 2;

    // pointer warp
    if(pointer.active){
      let dx = p.x - pointer.x;
      let dy = p.y - pointer.y;
      let d = Math.sqrt(dx*dx+dy*dy)+1;
      speed += 50/(d);
      angle += Math.atan2(dy,dx);
    }

    p.x += Math.cos(angle)*speed;
    p.y += Math.sin(angle)*speed;

    // wrap
    if(p.x<0) p.x+=W;
    if(p.y<0) p.y+=H;
    if(p.x>W) p.x-=W;
    if(p.y>H) p.y-=H;

    // color harmonic rules (triadic/tetradic)
    let h = (f.hue + Math.floor(time*0.1)%3/3) % 1;
    let [r,g,b] = hsv(h, f.sat, f.lum);

    ctx.fillStyle = `rgb(${r*255},${g*255},${b*255})`;
    ctx.fillRect(p.x, p.y, 1.5, 1.5);

    p.life--;
    if(p.life<=0){
      p.x = rand(0,W);
      p.y = rand(0,H);
      p.life = rand(100,300);
    }
  }
}

// ====== AUDIO UPDATE ======
function updateSound(){
  if(!soundOn || !audioCtx) return;

  let density = particles.length;
  let vortex = attractors.length;

  let freq = 100 + density*0.02 + vortex*40;
  let vol = Math.min(0.1, density/5000);

  osc.frequency.value = freq;
  gain.gain.value = vol;
}

// ====== LOOP ======
function loop(){
  time += 0.01;
  phase += 0.0005;

  // phase transitions
  if(Math.random()<0.002){
    phase += rand(0.2,1.0);
    spawnAttractors(6);
  }

  draw();
  updateSound();

  if(showHUD){
    hud.style.display="block";
    hud.innerHTML = `
Particles: ${particles.length}<br>
Attractors: ${attractors.length}<br>
Phase: ${phase.toFixed(2)}<br>
Sound: ${soundOn}
`;
  } else {
    hud.style.display="none";
  }

  requestAnimationFrame(loop);
}

// ====== CONTROLS ======
window.addEventListener("keydown", e=>{
  if(e.code==="Space") inject();
  if(e.key==="h"||e.key==="H") showHUD=!showHUD;
  if(e.key==="s"||e.key==="S"){
    soundOn=!soundOn;
    initSound();
  }
});

// ====== INIT ======
spawnParticles(1500);
spawnAttractors(6);
loop();
</script>
</body>
</html>
