<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atari 2600 Hyper-Abstract Visual Synth — Procedural Generative Atari Color Engine</title>

<meta name="description" content="A hyper-complex generative audiovisual visualizer engineered around the Atari 2600 color palette and video graphics circuitry concepts. Procedural scanline synthesis, Atari-style color science, generative graphics, synchronized audio evolution, and surreal abstract animation.">
<meta name="keywords" content="Atari 2600 graphics, generative art, Atari color palette, procedural animation, retro graphics, generative visualizer, TIA video chip, Atari scanlines, generative audiovisual art">
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html,body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

canvas{
position:absolute;
top:0;
left:0;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:#fff;
background:rgba(0,0,0,.35);
padding:8px;
font-size:12px;
letter-spacing:.05em;
display:none;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="hud">
ATARI 2600 HYPER VISUAL SYNTH<br>
H — Toggle HUD<br>
S — Toggle Sound<br>
SPACE / CLICK / TAP — Regenerate<br>
</div>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

let W,H

function resize(){
W = canvas.width = window.innerWidth
H = canvas.height = window.innerHeight
}
resize()
window.addEventListener("resize",resize)

const hud = document.getElementById("hud")

let showHUD=false
let soundEnabled=false

document.addEventListener("keydown",e=>{

if(e.key==="h"||e.key==="H"){
showHUD=!showHUD
hud.style.display=showHUD?"block":"none"
}

if(e.key==="s"||e.key==="S"){
soundEnabled=!soundEnabled
if(soundEnabled)initAudio()
}

if(e.code==="Space") regenerate()

})

canvas.onclick = regenerate
canvas.ontouchstart = regenerate

// Atari-like palette
const palette = [

"#000000","#1D2B53","#7E2553","#008751",
"#AB5236","#5F574F","#C2C3C7","#FFF1E8",
"#FF004D","#FFA300","#FFEC27","#00E436",
"#29ADFF","#83769C","#FF77A8","#FFCCAA",

"#2F4B7C","#665191","#A05195","#D45087",
"#F95D6A","#FF7C43","#FFA600","#B0FF00",
"#00FFD9","#00A6FF","#D726FF","#FF0066"

]

// audio engine
let audioCtx
let osc
let gain

function initAudio(){

if(audioCtx) return

audioCtx = new (window.AudioContext||window.webkitAudioContext)()

osc = audioCtx.createOscillator()
gain = audioCtx.createGain()

osc.type="sawtooth"
gain.gain.value=.05

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()

}

// random parameters

let params

function regenerate(){

params={

seed:Math.random()*1000,
rot:Math.random()*6.28,
density:40+Math.random()*120,
spiral:Math.random()*5,
wave:Math.random()*5,
particles:200+Math.random()*800,
paletteShift:Math.floor(Math.random()*palette.length),
speed:.2+Math.random()*2,
twist:Math.random()*4,
noiseScale:.002+Math.random()*.02

}

}

regenerate()

// particle system

let particles=[]

function resetParticles(){

particles=[]

for(let i=0;i<params.particles;i++){

particles.push({

x:Math.random()*W,
y:Math.random()*H,
vx:Math.random()*2-1,
vy:Math.random()*2-1

})

}

}

resetParticles()

let t=0

function animate(){

requestAnimationFrame(animate)

t+=.01*params.speed

ctx.fillStyle="black"
ctx.fillRect(0,0,W,H)

// scanline grid

for(let y=0;y<H;y+=2){

let hue = Math.floor((y*params.wave+t*50)%palette.length)

ctx.fillStyle = palette[(hue+params.paletteShift)%palette.length]

ctx.fillRect(0,y,W,1)

}

// oscillator field

for(let x=0;x<W;x+=params.density){

for(let y=0;y<H;y+=params.density){

let dx = x-W/2
let dy = y-H/2

let dist = Math.sqrt(dx*dx+dy*dy)

let a = Math.sin(dist*params.noiseScale - t*params.wave)

let col = palette[
(Math.floor(a*10)+params.paletteShift+palette.length)%palette.length
]

ctx.fillStyle=col

ctx.beginPath()

let r = Math.abs(a)*params.density*.8

ctx.arc(x,y,r,0,6.28)

ctx.fill()

}

}

// spiral interference

for(let i=0;i<150;i++){

let a = i*.1 + t*params.twist

let r = i*3

let x = W/2 + Math.cos(a)*r
let y = H/2 + Math.sin(a)*r

ctx.fillStyle = palette[(i+params.paletteShift)%palette.length]

ctx.fillRect(x,y,3,3)

}

// particle strange attractor

particles.forEach(p=>{

let dx=W/2-p.x
let dy=H/2-p.y

let d=Math.sqrt(dx*dx+dy*dy)+.01

p.vx+=dx/d*.01
p.vy+=dy/d*.01

p.x+=p.vx
p.y+=p.vy

ctx.fillStyle = palette[
(Math.floor(d*.02)+params.paletteShift)%palette.length
]

ctx.fillRect(p.x,p.y,2,2)

})

if(soundEnabled && osc){

let freq = 120 + Math.sin(t*2)*60 + params.wave*40

osc.frequency.value=freq

}

}

animate()

</script>
</body>
</html>
