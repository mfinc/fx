  #hud-right{position:absolute;top:16px;right:16px;color:#f0f;font-size:11px;line-height:1.8;text-shadow:0 0 8px #f0f;background:rgba(40,0,40,0.7);padding:10px 14px;border:1px solid rgba(255,0,255,0.3);border-radius:4px;text-align:right}

<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hud-inner">
    <div id="h-fps">FPS: --</div>
    <div id="h-entities">ENTITIES: --</div>
    <div id="h-phase">PHASE: --</div>
    <div id="h-palette">PALETTE: --</div>
    <div id="h-mode">MODE: --</div>
    <div id="h-time">T: --</div>
  </div>
  <div id="hud-right">
    <div>SPACE / TAP → NEW UNIVERSE</div>
    <div>H → TOGGLE HUD</div>
    <div>S → TOGGLE SOUND</div>
    <div>CATEGORY THEORY ENGINE v∞</div>
  </div>
</div>
<div id="hint">SPACE · TAP → NEW UNIVERSE &nbsp;|&nbsp; H → HUD &nbsp;|&nbsp; S → SOUND</div>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');
const hint = document.getElementById('hint');

let W, H, cx, cy, dpr;
let RAF, running = true;
let t = 0, dt = 0, lastT = 0;
let frameCount = 0, fpsTimer = 0, fps = 60;
let hudVisible = false;
let soundOn = false;
let audioCtx = null, masterGain = null;
let oscillators = [];

// ─── Universe State ───────────────────────────────────────────────
let U = {};

function rnd(a, b){ return a + Math.random()*(b-a); }
function rndInt(a, b){ return Math.floor(rnd(a, b+1)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function hsl(h,s,l,a=1){ return `hsla(${h|0},${s|0}%,${l|0}%,${a})`; }
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return v<lo?lo:v>hi?hi:v; }
function mod(a,b){ return ((a%b)+b)%b; }
function dist2(ax,ay,bx,by){ const dx=ax-bx,dy=ay-by; return dx*dx+dy*dy; }

// ─── Color Systems ────────────────────────────────────────────────
const PALETTES = [
  {name:'NEON ARCADE',   fn:(p,t)=>`hsl(${mod(p*360+t*80,360)},100%,60%)`},
  {name:'SPECTRAL FLOW', fn:(p,t)=>`hsl(${mod(p*720+t*50,360)},90%,55%)`},
  {name:'TRON GRID',     fn:(p,t)=>`hsl(${mod(190+p*60+t*20,360)},100%,${50+20*Math.sin(p*Math.PI)}%)`},
  {name:'CYBER SUNSET',  fn:(p,t)=>`hsl(${mod(300+p*180+t*40,360)},95%,60%)`},
  {name:'QUANTUM FOAM',  fn:(p,t)=>`hsl(${mod(p*540+t*60,360)},80%,${40+30*Math.cos(p*6)}%)`},
  {name:'PLASMA ARC',    fn:(p,t)=>`hsl(${mod(120+p*400+t*90,360)},100%,65%)`},
  {name:'VOID PULSE',    fn:(p,t)=>`hsl(${mod(240+Math.sin(p*Math.PI*2+t)*180,360)},100%,55%)`},
];

function getColor(p, t, alpha=1){
  const c = U.palette.fn(p, t);
  if(alpha===1) return c;
  return c.replace('hsl(','hsla(').replace(')',`,${alpha})`);
}

// ─── Init Universe ────────────────────────────────────────────────
function initUniverse(){
  t = 0;
  U = {
    palette: pick(PALETTES),
    colorSeed: Math.random()*1000,
    bgHue: rnd(0,360),
    gridScale: rnd(30,70),
    gridLayers: rndInt(2,5),
    numEntities: isMobile() ? rndInt(8,18) : rndInt(16,40),
    numAttractors: rndInt(2,5),
    numVoronoi: isMobile() ? rndInt(8,20) : rndInt(20,50),
    numMorphisms: rndInt(5,14),
    numObjects: rndInt(4,10),
    symmetryOrder: pick([3,4,5,6,7,8]),
    fractalType: pick(['lorenz','rossler','thomas','duffing']),
    waveMode: pick(['fourier','wavelet','spectral']),
    phase: 0,
    phaseTimer: 0,
    phaseDuration: rnd(8,20),
    phases: ['GRID_EMERGENCE','ENTITY_SPAWN','CRISPR_EVOLUTION','CATEGORY_DIAGRAM','KALEIDOSCOPE','FIREWORKS','VOID_COLLAPSE'],
    currentPhase: 0,
    entities: [],
    attractorPts: [],
    voronoiSeeds: [],
    morphisms: [],
    objects: [],
    tensorPts: [],
    fourierTerms: [],
    fireworks: [],
    bifurcation: [],
    hue: rnd(0,360),
    hueVel: rnd(0.1,0.5),
  };
  buildEntities();
  buildVoronoi();
  buildCategoryDiagram();
  buildAttractor();
  buildFourier();
  buildBifurcation();
  buildTensorField();
}

function isMobile(){ return Math.min(W,H) < 600; }

// ─── Entities (Digital Humans → Computational Units) ──────────────
function buildEntities(){
  U.entities = [];
  for(let i=0;i<U.numEntities;i++){
    U.entities.push({
      x: rnd(W*0.1, W*0.9),
      y: rnd(H*0.1, H*0.9),
      vx: rnd(-0.8,0.8),
      vy: rnd(-0.8,0.8),
      phase: Math.random(),  // 0=human, 1=cyber unit
      evolveSpeed: rnd(0.0003, 0.002),
      size: rnd(8, 18),
      colorP: Math.random(),
      trail: [],
      trailMax: isMobile() ? 20 : 40,
      angle: Math.random()*Math.PI*2,
      angleV: rnd(-0.03,0.03),
      targetX: rnd(W*0.1, W*0.9),
      targetY: rnd(H*0.1, H*0.9),
      retargetTimer: rnd(0,5),
      modular: Math.random() < 0.3,
      crisprSegments: rndInt(3,8),
    });
  }
}

// ─── Voronoi Seeds ────────────────────────────────────────────────
function buildVoronoi(){
  U.voronoiSeeds = [];
  for(let i=0;i<U.numVoronoi;i++){
    U.voronoiSeeds.push({
      x: rnd(0,W), y: rnd(0,H),
      vx: rnd(-0.3,0.3), vy: rnd(-0.3,0.3),
      colorP: Math.random(),
    });
  }
}

// ─── Category Theory Objects + Morphisms ─────────────────────────
function buildCategoryDiagram(){
  U.objects = [];
  U.morphisms = [];
  const R = Math.min(W,H)*0.28;
  for(let i=0;i<U.numObjects;i++){
    const a = (i/U.numObjects)*Math.PI*2 + Math.random()*0.4;
    U.objects.push({
      x: cx + Math.cos(a)*R*(0.5+Math.random()*0.5),
      y: cy + Math.sin(a)*R*(0.5+Math.random()*0.5),
      label: pick(['A','B','C','D','E','F','G','H','X','Y','Z','Ω','Λ','Σ','Φ','Ψ']),
      colorP: Math.random(),
      pulseP: Math.random(),
      size: rnd(14,24),
      vx: rnd(-0.15,0.15), vy: rnd(-0.15,0.15),
    });
  }
  for(let i=0;i<U.numMorphisms;i++){
    const a = Math.floor(Math.random()*U.numObjects);
    let b = Math.floor(Math.random()*U.numObjects);
    if(b===a) b=(a+1)%U.numObjects;
    U.morphisms.push({
      from: a, to: b,
      label: pick(['f','g','h','φ','ψ','η','μ','α','β','id','∘','⊗','⊕','∀','∃']),
      colorP: Math.random(),
      curvature: rnd(-0.5,0.5),
      flowP: Math.random(),
      flowSpeed: rnd(0.3,1.2),
    });
  }
}

// ─── Fractal Attractor ────────────────────────────────────────────
function buildAttractor(){
  U.attractorPts = [];
  const n = isMobile() ? 1200 : 3000;
  let x=0.1,y=0,z=0;
  const skip = 200;
  for(let i=0;i<n+skip;i++){
    let nx,ny,nz;
    if(U.fractalType==='lorenz'){
      const dt2=0.005,s=10,r=28,b=8/3;
      nx=x+dt2*(s*(y-x));
      ny=y+dt2*(x*(r-z)-y);
      nz=z+dt2*(x*y-b*z);
    } else if(U.fractalType==='rossler'){
      const dt2=0.01,a=0.2,b2=0.2,c=5.7;
      nx=x+dt2*(-y-z);
      ny=y+dt2*(x+a*y);
      nz=z+dt2*(b2+z*(x-c));
    } else if(U.fractalType==='thomas'){
      const dt2=0.05,b2=0.19;
      nx=x+dt2*(Math.sin(y)-b2*x);
      ny=y+dt2*(Math.sin(z)-b2*y);
      nz=z+dt2*(Math.sin(x)-b2*z);
    } else {
      const dt2=0.02,a=0.1,b2=0.28,g=0.5;
      nx=x+dt2*y;
      ny=y+dt2*(-g*y-b2*x-a*x*x*x);
      nz=z+dt2*(x-z);
    }
    x=nx;y=ny;z=nz;
    if(i>=skip) U.attractorPts.push([x,y,z]);
  }
}

// ─── Fourier Terms ────────────────────────────────────────────────
function buildFourier(){
  U.fourierTerms = [];
  const n = rndInt(5,16);
  for(let i=0;i<n;i++){
    U.fourierTerms.push({
      freq: (i+1)*rnd(0.5,2),
      amp: rnd(0.3,1.5)/(i+1),
      phase: Math.random()*Math.PI*2,
      colorP: Math.random(),
    });
  }
}

// ─── Logistic Bifurcation ─────────────────────────────────────────
function buildBifurcation(){
  U.bifurcation = [];
  const steps = isMobile() ? 80 : 160;
  for(let i=0;i<steps;i++){
    const r = 2.5 + (i/steps)*1.5;
    let x = 0.5;
    for(let j=0;j<200;j++) x=r*x*(1-x);
    const pts = [];
    for(let j=0;j<50;j++){
      x=r*x*(1-x);
      pts.push(x);
    }
    U.bifurcation.push({r, pts});
  }
}

// ─── Tensor Field ─────────────────────────────────────────────────
function buildTensorField(){
  U.tensorPts = [];
  const nx = isMobile() ? 12 : 20, ny = isMobile() ? 8 : 14;
  for(let i=0;i<nx;i++){
    for(let j=0;j<ny;j++){
      U.tensorPts.push({
        x: (i/(nx-1))*W,
        y: (j/(ny-1))*H,
        colorP: Math.random(),
        angle: Math.random()*Math.PI,
      });
    }
  }
}

// ─── Audio ────────────────────────────────────────────────────────
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  const comp = audioCtx.createDynamicsCompressor();
  masterGain.connect(comp);
  comp.connect(audioCtx.destination);
  spawnOscillators();
}

function spawnOscillators(){
  oscillators.forEach(o=>{try{o.stop()}catch(e){}});
  oscillators=[];
  const baseFreqs = [55,110,165,220,330,440,660];
  baseFreqs.forEach((f,i)=>{
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const pan = audioCtx.createStereoPanner();
    osc.type = pick(['sine','triangle','sawtooth','square']);
    osc.frequency.value = f * (0.98+Math.random()*0.04);
    g.gain.value = 0.02 + Math.random()*0.03;
    pan.pan.value = rnd(-0.8,0.8);
    osc.connect(g); g.connect(pan); pan.connect(masterGain);
    osc.start();
    oscillators.push(osc);
    // modulate freq
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.frequency.value = rnd(0.1,0.8);
    lfoG.gain.value = f*rnd(0.02,0.1);
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    lfo.start();
    oscillators.push(lfo);
  });
}

function stopAudio(){
  oscillators.forEach(o=>{try{o.stop()}catch(e){}});
  oscillators=[];
  if(audioCtx){audioCtx.close();audioCtx=null;masterGain=null;}
}

function modulateAudio(){
  if(!soundOn||!audioCtx||!oscillators.length) return;
  // sync pitch to color hue
  try{
    const baseI = rndInt(0,6);
    if(oscillators[baseI*2]){
      oscillators[baseI*2].frequency.setValueAtTime(
        55*Math.pow(2,(U.hue/360)*3) * (1+0.02*Math.sin(t*2)),
        audioCtx.currentTime
      );
    }
  }catch(e){}
}

// ─── Fireworks ────────────────────────────────────────────────────
function spawnFirework(){
  const x = rnd(W*0.1,W*0.9), y = rnd(H*0.1,H*0.7);
  const n = isMobile() ? rndInt(16,30) : rndInt(30,60);
  const colorP = Math.random();
  for(let i=0;i<n;i++){
    const a = (i/n)*Math.PI*2 + rnd(-0.2,0.2);
    const sp = rnd(1,5);
    U.fireworks.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-rnd(0,2),
      life:1,decay:rnd(0.008,0.025),colorP,
      size:rnd(1,3),trail:[],
      isMorphism: Math.random()<0.3,
      label: pick(['f','g','h','φ','ψ','→','⊗','∘','id']),
    });
  }
}

// ─── Render: Background Grid ──────────────────────────────────────
function drawGrid(){
  const scale = U.gridScale * (1 + 0.1*Math.sin(t*0.3));
  const hOff = (t*15) % scale;
  const vOff = (t*8) % scale;
  const alpha = 0.18 + 0.08*Math.sin(t*0.5);
  ctx.strokeStyle = getColor(mod(t*0.04,1), t*0.1, alpha);
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  for(let x2=-scale+hOff;x2<W+scale;x2+=scale){
    ctx.moveTo(x2,0); ctx.lineTo(x2,H);
  }
  for(let y2=-scale+vOff;y2<H+scale;y2+=scale){
    ctx.moveTo(0,y2); ctx.lineTo(W,y2);
  }
  ctx.stroke();
  // perspective grid
  if(U.gridLayers>2){
    ctx.globalAlpha=0.08;
    ctx.strokeStyle = getColor(mod(t*0.06+0.3,1),t*0.15);
    ctx.lineWidth=0.5;
    ctx.beginPath();
    const hy=H*0.45+cy*0.1*Math.sin(t*0.2);
    for(let i=-20;i<=20;i++){
      const x2=cx+i*(scale*1.5);
      ctx.moveTo(x2,H); ctx.lineTo(cx,hy);
    }
    for(let d=0;d<8;d++){
      const fy=hy+(H-hy)*(d/8);
      const span=((H-fy)/(H-hy))*W*1.2;
      ctx.moveTo(cx-span,fy); ctx.lineTo(cx+span,fy);
    }
    ctx.stroke();
    ctx.globalAlpha=1;
  }
}

// ─── Render: Attractor ────────────────────────────────────────────
function drawAttractor(){
  const pts = U.attractorPts;
  if(!pts.length) return;
  // find bounds
  let mnx=Infinity,mxx=-Infinity,mny=Infinity,mxy=-Infinity;
  pts.forEach(([x2,y2])=>{mnx=Math.min(mnx,x2);mxx=Math.max(mxx,x2);mny=Math.min(mny,y2);mxy=Math.max(mxy,y2);});
  const sc = Math.min(W,H)*0.35/Math.max(mxx-mnx,mxy-mny,0.001);
  const ox = cx-(mnx+mxx)*0.5*sc, oy = cy-(mny+mxy)*0.5*sc + cy*0.2*Math.sin(t*0.2);
  const step = isMobile() ? 3 : 1;
  ctx.lineWidth=0.8;
  ctx.beginPath();
  for(let i=0;i<pts.length;i+=step){
    const [x2,y2] = pts[i];
    const sx=ox+x2*sc, sy=oy+y2*sc;
    if(i===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  }
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0, getColor(0,t,0.5));
  grad.addColorStop(0.5, getColor(0.5,t,0.6));
  grad.addColorStop(1, getColor(1,t,0.5));
  ctx.strokeStyle = grad;
  ctx.stroke();
}

// ─── Render: Voronoi / Delaunay ───────────────────────────────────
function drawVoronoi(){
  const seeds = U.voronoiSeeds;
  const step = isMobile() ? 6 : 4;
  // Fast approximate voronoi via scanline
  for(let y2=0;y2<H;y2+=step){
    for(let x2=0;x2<W;x2+=step){
      let minD=Infinity, minI=0;
      for(let i=0;i<seeds.length;i++){
        const d=dist2(x2,y2,seeds[i].x,seeds[i].y);
        if(d<minD){minD=d;minI=i;}
      }
      const seed=seeds[minI];
      const alpha = 0.04 + 0.02*Math.sin(t+seed.colorP*Math.PI*2);
      ctx.fillStyle = getColor(seed.colorP, t, alpha);
      ctx.fillRect(x2,y2,step,step);
    }
  }
  // Draw Voronoi edges as glowing lines
  ctx.lineWidth=0.5;
  seeds.forEach((s,i)=>{
    let minD=Infinity,minJ=0;
    seeds.forEach((s2,j)=>{if(j!==i){const d=dist2(s.x,s.y,s2.x,s2.y);if(d<minD){minD=d;minJ=j;}}});
    const s2=seeds[minJ];
    const mx=(s.x+s2.x)*0.5, my=(s.y+s2.y)*0.5;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(mx,my);
    ctx.strokeStyle=getColor(s.colorP,t,0.35);
    ctx.stroke();
    // Delaunay-style circumcircle hint
    const r=Math.sqrt(minD)*0.5;
    ctx.beginPath();
    ctx.arc(mx,my,Math.min(r*0.3,20),0,Math.PI*2);
    ctx.strokeStyle=getColor(s2.colorP,t,0.15);
    ctx.stroke();
  });
}

// ─── Render: Tensor Field ─────────────────────────────────────────
function drawTensorField(){
  U.tensorPts.forEach(pt=>{
    const nx = Math.cos(pt.x*0.008+t*0.7)*Math.sin(pt.y*0.006+t*0.5);
    const ny = Math.sin(pt.x*0.006+t*0.6)*Math.cos(pt.y*0.008+t*0.4);
    const angle = Math.atan2(ny,nx) + t*0.3;
    const len = 16 + 10*Math.abs(nx);
    ctx.save();
    ctx.translate(pt.x,pt.y);
    ctx.rotate(angle);
    ctx.strokeStyle = getColor(pt.colorP,t,0.6);
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(-len*0.5,0); ctx.lineTo(len*0.5,0);
    // arrowhead
    ctx.moveTo(len*0.5,0); ctx.lineTo(len*0.3,-4);
    ctx.moveTo(len*0.5,0); ctx.lineTo(len*0.3,4);
    ctx.stroke();
    // perpendicular tensor eigenvector
    ctx.rotate(Math.PI*0.5);
    ctx.strokeStyle = getColor(mod(pt.colorP+0.5,1),t,0.3);
    ctx.lineWidth=0.5;
    ctx.beginPath();
    ctx.moveTo(-len*0.3,0); ctx.lineTo(len*0.3,0);
    ctx.stroke();
    ctx.restore();
  });
}

// ─── Render: Fourier Wave ─────────────────────────────────────────
function drawFourier(){
  const terms = U.fourierTerms;
  const segments = isMobile() ? 120 : 260;
  ctx.lineWidth=1.5;
  for(let layer=0;layer<2;layer++){
    ctx.beginPath();
    for(let i=0;i<=segments;i++){
      const px = (i/segments)*W;
      const tx2 = (i/segments)*Math.PI*2;
      let y2 = 0;
      terms.forEach((term,j)=>{
        y2 += term.amp * Math.sin(term.freq*(tx2 + t*(j%2===0?1:-1)*0.5) + term.phase + layer*1.2);
      });
      const sy = cy + y2*(H*0.12) + (layer===1?H*0.25:-H*0.25);
      if(i===0) ctx.moveTo(px,sy); else ctx.lineTo(px,sy);
    }
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0, getColor(layer*0.5,t,0.7));
    grad.addColorStop(0.5, getColor(0.3+layer*0.3,t,0.9));
    grad.addColorStop(1, getColor(0.7+layer*0.2,t,0.7));
    ctx.strokeStyle=grad;
    ctx.stroke();
  }
  // FFT spectral bars
  const bars = isMobile() ? 20 : 40;
  const bw = W/bars;
  terms.forEach((term,i)=>{
    if(i>=bars) return;
    const amp = term.amp * Math.abs(Math.sin(term.freq*t + term.phase));
    const bh = amp * H * 0.08;
    const bx = (i/terms.length)*W;
    ctx.fillStyle = getColor(term.colorP,t,0.4);
    ctx.fillRect(bx, H-bh-2, bw*0.8, bh);
  });
}

// ─── Render: Bifurcation ──────────────────────────────────────────
function drawBifurcation(){
  const bif = U.bifurcation;
  const margin = W*0.05;
  const bw = (W-2*margin)/(bif.length||1);
  const bh = H*0.15;
  const by = H*0.88;
  bif.forEach((b,i)=>{
    b.pts.forEach(x2=>{
      const px = margin + i*bw;
      const py = by - x2*bh;
      ctx.fillStyle = getColor(i/bif.length,t,0.6);
      ctx.fillRect(px,py,1,1);
    });
  });
  // label
  ctx.fillStyle = getColor(0.2,t,0.5);
  ctx.font = '9px Courier New';
  ctx.fillText('LOGISTIC MAP r: [2.5→4]', margin, by+14);
}

// ─── Render: Kaleidoscope / Reflection Groups ─────────────────────
function drawKaleidoscope(){
  const n = U.symmetryOrder;
  const R = Math.min(W,H)*0.4;
  const layers = isMobile() ? 2 : 4;
  for(let layer=0;layer<layers;layer++){
    for(let k=0;k<n;k++){
      ctx.save();
      ctx.translate(cx,cy);
      ctx.rotate((k/n)*Math.PI*2 + t*(0.05+layer*0.02));
      // reflection
      if(k%2===1) ctx.scale(-1,1);
      const localR = R*(0.3+layer*0.2);
      ctx.beginPath();
      const pts2=[];
      const segs=8;
      for(let s=0;s<segs;s++){
        const a=(s/segs)*Math.PI*2/n+t*(0.1+layer*0.07);
        const r2=localR*(0.4+0.6*Math.abs(Math.sin(a*3+t)));
        pts2.push([Math.cos(a)*r2, Math.sin(a)*r2]);
      }
      ctx.moveTo(pts2[0][0],pts2[0][1]);
      for(let s=1;s<segs;s++) ctx.lineTo(pts2[s][0],pts2[s][1]);
      ctx.closePath();
      ctx.strokeStyle=getColor((k/n+layer*0.15+t*0.03)%1,t,0.5);
      ctx.lineWidth=1;
      ctx.stroke();
      // inner glow
      const grad=ctx.createRadialGradient(0,0,0,0,0,localR*0.5);
      grad.addColorStop(0,getColor((k/n+t*0.05)%1,t,0.08));
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;
      ctx.fill();
      ctx.restore();
    }
  }
}

// ─── Render: Category Theory Diagram ─────────────────────────────
function drawCategoryDiagram(){
  const objs=U.objects, morphs=U.morphisms;
  // morphisms (arrows)
  morphs.forEach(m=>{
    const a=objs[m.from], b=objs[m.to];
    if(!a||!b) return;
    ctx.save();
    const dx=b.x-a.x, dy=b.y-a.y;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len<1){ctx.restore();return;}
    const mx=(a.x+b.x)*0.5 + m.curvature*(-dy)*0.3;
    const my=(a.y+b.y)*0.5 + m.curvature*dx*0.3;
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.quadraticCurveTo(mx,my,b.x,b.y);
    ctx.strokeStyle=getColor(m.colorP,t,0.7);
    ctx.lineWidth=1.2;
    ctx.setLineDash([4,4]);
    ctx.stroke();
    ctx.setLineDash([]);
    // arrowhead
    const tx2=(b.x-mx), ty2=(b.y-my);
    const ta=Math.atan2(ty2,tx2);
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(ta);
    ctx.fillStyle=getColor(m.colorP,t,0.9);
    ctx.beginPath();
    ctx.moveTo(-10,-5); ctx.lineTo(0,0); ctx.lineTo(-10,5);
    ctx.fill();
    ctx.restore();
    // flowing dot along morphism
    m.flowP = mod(m.flowP + dt*m.flowSpeed*0.5, 1);
    const fp=m.flowP;
    const bx2=(1-fp)*(1-fp)*a.x+2*(1-fp)*fp*mx+fp*fp*b.x;
    const by2=(1-fp)*(1-fp)*a.y+2*(1-fp)*fp*my+fp*fp*b.y;
    ctx.beginPath();
    ctx.arc(bx2,by2,3,0,Math.PI*2);
    ctx.fillStyle=getColor(m.colorP,t,1);
    ctx.fill();
    // label
    ctx.fillStyle=getColor(m.colorP,t,0.8);
    ctx.font='bold 11px Courier New';
    ctx.fillText(m.label, mx+4, my-4);
    ctx.restore();
  });
  // objects (nodes)
  objs.forEach(obj=>{
    const pulse=0.8+0.2*Math.sin(t*2+obj.pulseP*Math.PI*2);
    const r=obj.size*pulse;
    // glow
    const grad=ctx.createRadialGradient(obj.x,obj.y,0,obj.x,obj.y,r*2);
    grad.addColorStop(0,getColor(obj.colorP,t,0.6));
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(obj.x,obj.y,r*2,0,Math.PI*2);
    ctx.fill();
    // node
    ctx.beginPath();
    ctx.arc(obj.x,obj.y,r,0,Math.PI*2);
    ctx.strokeStyle=getColor(obj.colorP,t,1);
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.fillStyle=getColor(obj.colorP,t,0.3);
    ctx.fill();
    // label
    ctx.fillStyle=getColor(obj.colorP,t,1);
    ctx.font='bold 12px Courier New';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(obj.label,obj.x,obj.y);
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';
  });
}

// ─── Render: Entities ─────────────────────────────────────────────
function drawEntities(){
  U.entities.forEach(e=>{
    const p=e.phase;
    // trail
    if(e.trail.length>1){
      ctx.beginPath();
      ctx.moveTo(e.trail[0][0],e.trail[0][1]);
      for(let i=1;i<e.trail.length;i++) ctx.lineTo(e.trail[i][0],e.trail[i][1]);
      ctx.strokeStyle=getColor(e.colorP,t,0.3*(1-p)+0.15*p);
      ctx.lineWidth=1;
      ctx.stroke();
    }
    ctx.save();
    ctx.translate(e.x,e.y);
    ctx.rotate(e.angle);
    const s=e.size;
    if(p<0.5){
      // humanoid
      const hp=1-p*2;
      ctx.strokeStyle=getColor(e.colorP,t,0.9);
      ctx.lineWidth=1.5;
      // head
      ctx.beginPath(); ctx.arc(0,-s*0.6,s*0.3*hp,0,Math.PI*2); ctx.stroke();
      // body
      ctx.beginPath(); ctx.moveTo(0,-s*0.3*hp); ctx.lineTo(0,s*0.4); ctx.stroke();
      // arms
      ctx.beginPath(); ctx.moveTo(-s*0.5,0); ctx.lineTo(s*0.5,0); ctx.stroke();
      // legs
      ctx.beginPath(); ctx.moveTo(0,s*0.4); ctx.lineTo(-s*0.4,s*0.9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,s*0.4); ctx.lineTo(s*0.4,s*0.9); ctx.stroke();
    } else {
      // computational module (CRISPR-evolved)
      const mp=p*2-1;
      ctx.strokeStyle=getColor(e.colorP,t,1);
      ctx.lineWidth=1.5;
      const segs=e.crisprSegments;
      for(let i=0;i<segs;i++){
        const a=(i/segs)*Math.PI*2+t*(0.5+mp);
        const ir=s*0.3, or2=s*(0.5+mp*0.5);
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*ir,Math.sin(a)*ir);
        ctx.lineTo(Math.cos(a)*or2,Math.sin(a)*or2);
        ctx.stroke();
        // CRISPR helix hint
        const ha=a+Math.PI*0.2;
        ctx.beginPath();
        ctx.arc(Math.cos(a)*ir*1.5,Math.sin(a)*ir*1.5, 2, 0, Math.PI*2);
        ctx.fillStyle=getColor(mod(e.colorP+i/segs,1),t,0.8);
        ctx.fill();
      }
      // core
      ctx.beginPath(); ctx.arc(0,0,s*0.2,0,Math.PI*2);
      ctx.fillStyle=getColor(e.colorP,t,0.5);
      ctx.fill();
      ctx.stroke();
      // category label
      ctx.fillStyle=getColor(e.colorP,t,0.9);
      ctx.font=`${8+4*mp}px Courier New`;
      ctx.textAlign='center';
      ctx.fillText(pick(['∀','∃','⊗','⊕','∘','Ω','Λ','μ']),0,3);
      ctx.textAlign='left';
    }
    ctx.restore();
  });
}

// ─── Render: Fireworks ────────────────────────────────────────────
function drawFireworks(){
  U.fireworks.forEach(f=>{
    ctx.save();
    ctx.globalAlpha=f.life;
    if(f.isMorphism){
      ctx.fillStyle=getColor(f.colorP,t,1);
      ctx.font='10px Courier New';
      ctx.textAlign='center';
      ctx.fillText(f.label,f.x,f.y);
    } else {
      const grad=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size*4);
      grad.addColorStop(0,getColor(f.colorP,t,1));
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(f.x,f.y,f.size*4,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

// ─── Render: Vector Chromatic Flow Field ──────────────────────────
function drawFlowField(){
  const step2 = isMobile() ? 40 : 28;
  for(let x2=step2;x2<W;x2+=step2){
    for(let y2=step2;y2<H;y2+=step2){
      const angle=Math.sin(x2*0.009+t*0.4)*Math.cos(y2*0.007+t*0.5)*Math.PI*2;
      const len=8+6*Math.sin(x2*0.012+y2*0.008+t);
      ctx.save();
      ctx.translate(x2,y2);
      ctx.rotate(angle);
      ctx.strokeStyle=getColor((x2/W+y2/H)*0.5+t*0.02,t,0.25);
      ctx.lineWidth=0.7;
      ctx.beginPath();
      ctx.moveTo(-len*0.5,0); ctx.lineTo(len*0.5,0);
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ─── Update ───────────────────────────────────────────────────────
function update(){
  dt = Math.min((performance.now()-lastT)/1000, 0.05);
  lastT = performance.now();
  t += dt;
  U.hue = mod(U.hue + U.hueVel*dt*30, 360);

  // Phase cycling
  U.phaseTimer += dt;
  if(U.phaseTimer > U.phaseDuration){
    U.phaseTimer=0;
    U.phaseDuration=rnd(8,20);
    U.currentPhase=(U.currentPhase+1)%U.phases.length;
  }
  U.phase=U.phases[U.currentPhase];

  // Occasional fireworks
  if(Math.random()<0.015*(isMobile()?0.5:1)){
    spawnFirework();
  }
  // Prune fireworks
  U.fireworks = U.fireworks.filter(f=>{
    f.x+=f.vx; f.y+=f.vy; f.vy+=0.05;
    f.life-=f.decay;
    return f.life>0;
  });

  // Update entities
  U.entities.forEach(e=>{
    e.phase=Math.min(1,e.phase+e.evolveSpeed*dt*60);
    e.retargetTimer-=dt;
    if(e.retargetTimer<0){
      e.retargetTimer=rnd(3,8);
      e.targetX=rnd(W*0.05,W*0.95);
      e.targetY=rnd(H*0.05,H*0.95);
    }
    const tdx=e.targetX-e.x, tdy=e.targetY-e.y;
    const td=Math.sqrt(tdx*tdx+tdy*tdy)+0.001;
    e.vx=lerp(e.vx,tdx/td*1.2,0.02);
    e.vy=lerp(e.vy,tdy/td*1.2,0.02);
    e.x+=e.vx; e.y+=e.vy;
    e.angle+=e.angleV;
    e.x=clamp(e.x,0,W); e.y=clamp(e.y,0,H);
    e.trail.push([e.x,e.y]);
    if(e.trail.length>e.trailMax) e.trail.shift();
  });

  // Move voronoi seeds
  U.voronoiSeeds.forEach(s=>{
    s.x+=s.vx; s.y+=s.vy;
    if(s.x<0||s.x>W) s.vx*=-1;
    if(s.y<0||s.y>H) s.vy*=-1;
  });

  // Move category objects
  U.objects.forEach(obj=>{
    obj.x+=obj.vx; obj.y+=obj.vy;
    if(obj.x<50||obj.x>W-50) obj.vx*=-1;
    if(obj.y<50||obj.y>H-50) obj.vy*=-1;
  });

  // Audio modulation
  if(soundOn) modulateAudio();

  // FPS
  frameCount++;
  fpsTimer+=dt;
  if(fpsTimer>0.5){
    fps=Math.round(frameCount/fpsTimer);
    frameCount=0;fpsTimer=0;
  }
}

// ─── HUD ──────────────────────────────────────────────────────────
function updateHUD(){
  if(!hudVisible) return;
  document.getElementById('h-fps').textContent=`FPS: ${fps}`;
  document.getElementById('h-entities').textContent=`ENTITIES: ${U.entities.length}`;
  document.getElementById('h-phase').textContent=`PHASE: ${U.phase||'--'}`;
  document.getElementById('h-palette').textContent=`PALETTE: ${U.palette?.name||'--'}`;
  document.getElementById('h-mode').textContent=`MODE: ${U.fractalType?.toUpperCase()||'--'} / SYM-${U.symmetryOrder}`;
  document.getElementById('h-time').textContent=`T: ${t.toFixed(1)}s`;
}

// ─── Main Render ──────────────────────────────────────────────────
function render(){
  // Background
  ctx.fillStyle=`hsla(${U.hue*0.3|0},20%,3%,0.18)`;
  ctx.fillRect(0,0,W,H);

  const ph=U.currentPhase/U.phases.length;

  // Layer composition based on phase
  ctx.globalAlpha=0.6+0.4*Math.sin(t*0.2);
  drawFlowField();
  ctx.globalAlpha=1;
  drawGrid();

  ctx.globalAlpha=0.5+0.15*Math.sin(t*0.3);
  drawVoronoi();
  ctx.globalAlpha=1;

  drawAttractor();
  drawFourier();
  drawBifurcation();

  ctx.globalAlpha=0.7+0.3*Math.sin(t*0.4);
  drawTensorField();
  ctx.globalAlpha=1;

  ctx.globalAlpha=0.4+0.3*Math.sin(U.phaseTimer/U.phaseDuration*Math.PI);
  drawKaleidoscope();
  ctx.globalAlpha=1;

  drawCategoryDiagram();
  drawEntities();
  drawFireworks();

  // Phase-specific accent overlay
  ctx.globalAlpha=0.06*Math.sin(U.phaseTimer/U.phaseDuration*Math.PI);
  ctx.fillStyle=getColor(ph,t,1);
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;

  // Scanline effect
  for(let y2=0;y2<H;y2+=4){
    ctx.fillStyle=`rgba(0,0,0,0.03)`;
    ctx.fillRect(0,y2,W,1);
  }

  updateHUD();
}

// ─── Loop ─────────────────────────────────────────────────────────
function loop(){
  if(!running) return;
  update();
  render();
  RAF=requestAnimationFrame(loop);
}

// ─── Resize ───────────────────────────────────────────────────────
function resize(){
  dpr=Math.min(window.devicePixelRatio||1, isMobile()?1.5:2);
  W=window.innerWidth; H=window.innerHeight;
  cx=W*0.5; cy=H*0.5;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
}

// ─── New Universe ────────────────────────────────────────────────
function newUniverse(){
  resize();
  initUniverse();
  // flash
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(0,0,W,H);
}

// ─── Controls ─────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();newUniverse();}
  if(e.key==='h'||e.key==='H'){
    hudVisible=!hudVisible;
    hud.style.display=hudVisible?'block':'none';
  }
  if(e.key==='s'||e.key==='S'){
    soundOn=!soundOn;
    if(soundOn) initAudio(); else stopAudio();
  }
});

let touchStartT=0;
document.addEventListener('touchstart',e=>{
  touchStartT=performance.now();
},{passive:true});
document.addEventListener('touchend',e=>{
  if(performance.now()-touchStartT<300) newUniverse();
},{passive:true});
document.addEventListener('click',()=>newUniverse());

window.addEventListener('resize',()=>{
  resize();
  // rebuild voronoi and tensor on resize
  buildVoronoi();
  buildTensorField();
});

// ─── Hint fade ────────────────────────────────────────────────────
setTimeout(()=>{hint.style.opacity='0';},5000);

// ─── Boot ─────────────────────────────────────────────────────────
lastT=performance.now();
resize();
initUniverse();
loop();

})();
</script>
