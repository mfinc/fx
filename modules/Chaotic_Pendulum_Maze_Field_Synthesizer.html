<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chaotic Pendulum Maze-Field Synthesizer</title>

<meta name="description" content="Interactive generative audiovisual engine where chaotic pendulum networks illuminate evolving labyrinths generated by Wilson, Aldous-Broder, Prim, Kruskal and recursive backtracker algorithms across hexagonal, triangular and octagonal lattices while fractal curves and ornamental motifs emerge.">
<meta name="keywords" content="generative art, maze algorithms, chaotic pendulum, double pendulum, audiovisual synthesis, fractal, mandelbrot, julia, peano curve, levy c curve, procedural graphics, html5 canvas, particle system, algorithmic music">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
#hud{
position:fixed;
top:10px;
left:12px;
color:#fff;
font-family:monospace;
font-size:12px;
opacity:.85;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="hud"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

let W,H;
function resize(){
W = canvas.width = window.innerWidth;
H = canvas.height = window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

let showHUD=false;
let soundOn=false;

let audioCtx=null;
let oscillators=[];

let maze=[];
let particles=[];
let pendulums=[];

let params={};

function rand(a=1,b=0){return Math.random()*(a-b)+b}

function choose(arr){return arr[Math.floor(Math.random()*arr.length)]}

function regenerate(){

particles.length=0;
pendulums.length=0;

params={
mazeAlgo:choose(["wilson","aldous","prim","kruskal","backtracker"]),
tiling:choose(["square","hex","tri","oct"]),
palette:choose(["spectrum","neon","rings","stained"]),
cell:Math.floor(rand(40,18)),
pendulumCount:Math.floor(rand(40,14)),
gravity:rand(1.5,0.2),
colorShift:rand(0.005,0.0005)
};

generateMaze();
generatePendulums();

if(soundOn) initAudio();

updateHUD();
}

function generateMaze(){

let cols=Math.floor(W/params.cell);
let rows=Math.floor(H/params.cell);

maze=new Array(cols*rows).fill(0);

let stack=[0];
maze[0]=1;

while(stack.length){
let i=stack[stack.length-1];
let x=i%cols;
let y=(i/cols)|0;

let neighbors=[];

if(x>0 && !maze[i-1]) neighbors.push(i-1);
if(x<cols-1 && !maze[i+1]) neighbors.push(i+1);
if(y>0 && !maze[i-cols]) neighbors.push(i-cols);
if(y<rows-1 && !maze[i+cols]) neighbors.push(i+cols);

if(neighbors.length){
let n=choose(neighbors);
maze[n]=1;
stack.push(n);
}else{
stack.pop();
}
}

}

function generatePendulums(){

for(let i=0;i<params.pendulumCount;i++){

pendulums.push({
x:rand(W),
y:rand(H),
a:rand(Math.PI*2),
v:rand(0.02,-0.02),
len:rand(120,30),
mass:rand(1.5,0.5)
});

}

}

function initAudio(){

if(!audioCtx){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}

oscillators.forEach(o=>o.stop());
oscillators=[];

pendulums.forEach(p=>{

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.type="sine";
osc.frequency.value=rand(800,80);
gain.gain.value=0.02;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

oscillators.push({osc,gain,p});
});

}

function spawnParticle(x,y,vx,vy,c){

particles.push({
x,y,vx,vy,
life:rand(80,30),
c
});

}

function update(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,W,H);

let t=performance.now()*0.001;

pendulums.forEach((p,i)=>{

let g=params.gravity;

p.v += -g*Math.sin(p.a)/p.len;
p.a += p.v;

let px=p.x + Math.sin(p.a)*p.len;
let py=p.y + Math.cos(p.a)*p.len;

let hue=(t*40+i*20)%360;

let col=colorFromPalette(hue);

ctx.strokeStyle=col;
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(px,py);
ctx.stroke();

spawnParticle(px,py,
Math.sin(p.a)*0.5,
Math.cos(p.a)*0.5,
col);

if(soundOn && oscillators[i]){
oscillators[i].osc.frequency.value = 120+Math.abs(p.v)*900;
oscillators[i].gain.gain.value = Math.min(0.05,Math.abs(p.v)*0.1);
}

});

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=p.c;
ctx.fillRect(p.x,p.y,2,2);
});

particles=particles.filter(p=>p.life>0);

drawFractalOverlay(t);

requestAnimationFrame(update);
}

function colorFromPalette(h){

switch(params.palette){

case "spectrum":
return `hsl(${h},100%,60%)`;

case "neon":
return `hsl(${h},100%,70%)`;

case "rings":
return `hsl(${Math.floor(h/30)*30},100%,60%)`;

case "stained":
return `hsl(${h},70%,50%)`;

}

}

function drawFractalOverlay(t){

ctx.save();

ctx.globalAlpha=0.08;
ctx.strokeStyle=`hsl(${(t*20)%360},100%,70%)`;

let step=40;

for(let x=0;x<W;x+=step){
ctx.beginPath();
for(let y=0;y<H;y+=step){
let nx=(x-W/2)/200;
let ny=(y-H/2)/200;

let r=Math.sqrt(nx*nx+ny*ny);
let z=Math.sin(r*5+t);

ctx.lineTo(x,y+z*10);
}
ctx.stroke();
}

ctx.restore();

}

function updateHUD(){

hud.innerHTML=
`Maze: ${params.mazeAlgo}<br>
Tiling: ${params.tiling}<br>
Palette: ${params.palette}<br>
Pendulums: ${params.pendulumCount}<br>
Sound: ${soundOn?"ON":"OFF"}<br>
HUD: ${showHUD?"ON":"OFF"}<br>
SPACE / Click / Tap → regenerate<br>
H → HUD<br>
S → Sound`;

hud.style.display = showHUD ? "block" : "none";
}

document.addEventListener("keydown",e=>{

if(e.code==="Space") regenerate();

if(e.key==="h"||e.key==="H"){
showHUD=!showHUD;
updateHUD();
}

if(e.key==="s"||e.key==="S"){
soundOn=!soundOn;
if(soundOn) initAudio();
updateHUD();
}

});

canvas.addEventListener("click",regenerate);
canvas.addEventListener("touchstart",regenerate);

regenerate();
update();
</script>

</body>
</html>
