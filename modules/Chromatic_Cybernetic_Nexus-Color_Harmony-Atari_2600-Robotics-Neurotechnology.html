const HARMONIES = ['COMPLEMENTARY','TRIADIC','TETRADIC','SPLIT-COMP','ANALOGOUS','SQUARE','DOUBLE-COMP','PENTADIC'];

const TIA = [

  '#003c00','#205c20','#407c40','#5c9c5c','#74b474','#8cd08c','#a4e4a4','#b8fcb8',
  '#143800','#345c1c','#507c38','#6c9850','#84b468','#9ccc7c','#b4e490','#c8fca4',
  '#2c3000','#4c501c','#687034','#848c4c','#9ca864','#b4c078','#ccd488','#e0ec9c',
  '#442800','#644818','#846830','#a08444','#b89c58','#d0b46c','#e8cc7c','#fce08c'
];

function atariColor(idx) { return TIA[idx % TIA.length]; }
function hslToHex(h,s,l) {
  h=h%360; if(h<0)h+=360;
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};
  const r=Math.round(f(0)*255),g=Math.round(f(8)*255),b=Math.round(f(4)*255);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return[r,g,b];}
function lerpHex(a,b,x){const A=hexToRgb(a),B=hexToRgb(b);return'rgb('+(A[0]+(B[0]-A[0])*x|0)+','+(A[1]+(B[1]-A[1])*x|0)+','+(A[2]+(B[2]-A[2])*x|0)+')';}

// ─── HARMONY COLORS ─────────────────────────────────────────────────────────
function getHarmony(base, type) {
  const h = base % 360;
  switch(type%8) {
    case 0: return [h, (h+180)%360]; // complementary
    case 1: return [h, (h+120)%360, (h+240)%360]; // triadic
    case 2: return [h, (h+90)%360, (h+180)%360, (h+270)%360]; // tetradic
    case 3: return [h, (h+150)%360, (h+210)%360]; // split-comp
    case 4: return [h, (h+30)%360, (h+60)%360, (h-30+360)%360, (h-60+360)%360]; // analogous
    case 5: return [h, (h+90)%360, (h+180)%360, (h+270)%360]; // square
    case 6: return [h, (h+30)%360, (h+180)%360, (h+210)%360]; // double-comp
    case 7: return [h,(h+72)%360,(h+144)%360,(h+216)%360,(h+288)%360]; // pentadic
  }
}
function harmonyColor(idx, sat=90, lit=60) {
  const hues = getHarmony(baseHue, harmonyType);
  const h = hues[idx % hues.length];
  return hslToHex(h, sat, lit);
}

// ─── RANDOMIZE ───────────────────────────────────────────────────────────────

// ─── 6502 ASM FRAGMENTS ──────────────────────────────────────────────────────

  'LDX #$1E','DEX','BNE *-1','STA COLUBK','LDA #$0E','STA COLUPF',

  'CPX #$80','BEQ DONE','BNE LOOP','JMP START','STA HMOVE','STA RESP0',
  'LDA INPT4','BMI FIRE','LDA #$3C','STA NUSIZ0','STA AUDC0','STA AUDF0',
  'LDA #$07','STA AUDV0','LDA SWCHA','AND #$F0','CMP #$F0','BCC MOVUP',
  'LDA #$00','STA CTRLPF','STA REFP0','LDA #$01','STA VDELP0',
];
let asmIdx = 0;
let asmLines = ASM6502.slice(0,6);
function tickAsm() {
  if(Math.random()<0.08) {
    asmLines.shift();
    asmLines.push(ASM6502[asmIdx % ASM6502.length]);
    asmIdx++;
  }
}

// ─── MAZE SYSTEM ─────────────────────────────────────────────────────────────
let maze = [], mazeW = 12, mazeH = 12, cellW, cellH;
let mazePlayers = [];
function buildMaze() {
  const mz = params.mazeSize || 12;
  mazeW = mz; mazeH = mz;
  cellW = W / mazeW; cellH = H / mazeH;
  maze = [];
  // DFS maze gen
  const visited = Array.from({length:mazeH},()=>new Array(mazeW).fill(false));
  const walls = Array.from({length:mazeH},()=>Array.from({length:mazeW},()=>({r:true,b:true})));
  function dfs(x,y) {
    visited[y][x]=true;
    const dirs=[[1,0,'r'],[0,1,'b'],[-1,0,'l'],[0,-1,'t']].sort(()=>Math.random()-0.5);
    for(const [dx,dy,d] of dirs) {
      const nx=x+dx,ny=y+dy;
      if(nx<0||ny<0||nx>=mazeW||ny>=mazeH||visited[ny][nx])continue;
      if(d==='r')walls[y][x].r=false;
      else if(d==='b')walls[y][x].b=false;
      else if(d==='l')walls[ny][nx].r=false;
      else if(d==='t')walls[ny][nx].b=false;
      dfs(nx,ny);
    }
  }
  dfs(0,0);
  maze = walls;
  mazePlayers = Array.from({length:3},(_,i)=>({
    x: Math.random()*mazeW|0, y: Math.random()*mazeH|0,
    dx: (Math.random()<.5?1:-1), dy: 0,
    hue: baseHue + i*120,
    trail: [], timer: 0,
    speed: 0.3+Math.random()*0.7
  }));
}

// ─── PCB / CIRCUIT BOARD ─────────────────────────────────────────────────────
let circuit = [];
function buildCircuit() {
  circuit = [];
  const n = 18 + (Math.random()*20|0);
  for(let i=0;i<n;i++) {
    circuit.push({
      x: Math.random()*W, y: Math.random()*H,
      type: Math.random()*5|0,
      r: 5 + Math.random()*18,
      hue: baseHue + Math.random()*180,
      connections: [],
      phase: Math.random()*Math.PI*2,
      speed: 0.3+Math.random()*1.2,
      pulse: 0
    });
  }
  // connect nearby nodes
  for(let i=0;i<circuit.length;i++) {
    for(let j=i+1;j<circuit.length;j++) {
      const d=Math.hypot(circuit[i].x-circuit[j].x,circuit[i].y-circuit[j].y);
      if(d<180+Math.random()*100) circuit[i].connections.push(j);
    }
  }
}

// ─── ROBOTS ───────────────────────────────────────────────────────────────────

robots.forEach(initRobot);

}

// ─── SOUND ENGINE ────────────────────────────────────────────────────────────
let audioCtx = null;
function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function beep(freq=440, dur=0.08, type='square', vol=0.06) {
  if(!soundOn||!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}

// ─── DRAW HELPERS ────────────────────────────────────────────────────────────
function poly(ctx, x, y, n, r, rot=0) {
  ctx.beginPath();
  for(let i=0;i<n;i++) {
    const a = rot + i*Math.PI*2/n;
    i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r)
         :ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath();
}

// ─── DRAW COLOR WHEEL ────────────────────────────────────────────────────────
function drawColorWheel(x, y, r, alpha, rot, segments=72) {
  ctx.save();
  ctx.globalAlpha = alpha;
  const step = Math.PI*2/segments;
  for(let i=0;i<segments;i++) {
    const a0=rot+i*step, a1=rot+(i+1)*step;
    const hue = (i/segments)*360;
    // inner: dark, outer: bright
    const grad = ctx.createRadialGradient(x,y,r*0.28,x,y,r);
    grad.addColorStop(0, hslToHex(hue,20,10));
    grad.addColorStop(0.5, hslToHex(hue,90,50));
    grad.addColorStop(1, hslToHex(hue,100,80));
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.arc(x,y,r,a0,a1);
    ctx.closePath();
    ctx.fillStyle=grad;
    ctx.fill();
  }
  // harmony markers
  const hues = getHarmony(baseHue, harmonyType);
  hues.forEach((h,i)=>{
    const a = rot + (h/360)*Math.PI*2;
    const mx = x+Math.cos(a)*r*0.82;
    const my = y+Math.sin(a)*r*0.82;
    ctx.beginPath();
    ctx.arc(mx,my,6,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(mx,my,4,0,Math.PI*2);
    ctx.fillStyle=hslToHex(h,90,60);
    ctx.fill();
  });
  ctx.restore();
}

// ─── DRAW CHROMATICITY DIAGRAM ───────────────────────────────────────────────
function drawChromaticity(x, y, size, alpha, rot) {
  ctx.save();
  ctx.globalAlpha = alpha*0.6;
  ctx.translate(x,y);
  ctx.rotate(rot);
  // Horseshoe approximation
  const pts = [];
  for(let i=0;i<36;i++) {
    const a = (i/36)*Math.PI*1.8 - Math.PI*0.1;
    const r2 = size*(0.5+0.5*Math.abs(Math.sin(a*2.3)));
    pts.push([Math.cos(a)*r2, Math.sin(a)*r2]);
  }
  for(let i=0;i<pts.length-1;i++) {
    const hue = (i/pts.length)*360;
    const grad = ctx.createLinearGradient(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
    grad.addColorStop(0,hslToHex(hue,90,55)+'cc');
    grad.addColorStop(1,hslToHex((hue+10)%360,90,55)+'cc');
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(pts[i][0],pts[i][1]);
    ctx.lineTo(pts[i+1][0],pts[i+1][1]);
    ctx.closePath();
    ctx.fillStyle=grad;
    ctx.fill();
  }
  // white point
  ctx.beginPath();
  ctx.arc(0,0,size*0.07,0,Math.PI*2);
  ctx.fillStyle='#ffffffcc';
  ctx.fill();
  ctx.restore();
}

// ─── DRAW POLYTOPE ────────────────────────────────────────────────────────────
function drawPolytope(x, y, r, type, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  const hues = getHarmony(baseHue, harmonyType);
  switch(type%8) {
    case 0: { // hexagon rings
      for(let k=0;k<4;k++) {
        ctx.rotate(rot*(1+k*0.3));
        poly(ctx,0,0,6,r*(0.3+k*0.18),rot*0.5);
        ctx.strokeStyle=hslToHex(hues[k%hues.length],80,60)+'99';
        ctx.lineWidth=1.5;
        ctx.stroke();
      }
      break;
    }
    case 1: { // dodecagon
      for(let k=0;k<5;k++) {
        poly(ctx,0,0,12,r*(0.22+k*0.15),rot*(1+k));
        ctx.strokeStyle=harmonyColor(k,80,65)+'88';
        ctx.lineWidth=1+k*0.3;
        ctx.stroke();
      }
      break;
    }
    case 2: { // star polygon
      for(let k=0;k<4;k++) {
        ctx.beginPath();
        for(let i=0;i<10;i++) {
          const a=rot+i*Math.PI*4/10;
          const rr=(i%2===0)?r*(0.4+k*0.1):r*(0.18+k*0.07);
          i===0?ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr)
               :ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
        }
        ctx.closePath();
        ctx.strokeStyle=harmonyColor(k,90,60)+'aa';
        ctx.lineWidth=1.2;
        ctx.stroke();
      }
      break;
    }
    case 3: { // rhombic
      for(let k=0;k<6;k++) {
        ctx.save();
        ctx.rotate(k*Math.PI/6+rot);
        ctx.beginPath();
        ctx.moveTo(0,-r*(0.3+k*0.1));
        ctx.lineTo(r*(0.15+k*0.05),0);
        ctx.lineTo(0,r*(0.3+k*0.1));
        ctx.lineTo(-r*(0.15+k*0.05),0);
        ctx.closePath();
        ctx.strokeStyle=harmonyColor(k,80,55)+'99';
        ctx.lineWidth=1;
        ctx.stroke();
        ctx.restore();
      }
      break;
    }
    case 4: { // penrose-ish
      for(let k=0;k<5;k++) {
        ctx.save();
        ctx.rotate(k*Math.PI*2/5+rot);
        for(let j=0;j<3;j++) {
          ctx.beginPath();
          ctx.moveTo(0,0);
          ctx.lineTo(r*(0.4+j*0.2),0);
          ctx.lineTo(r*(0.3+j*0.15)*Math.cos(Math.PI/5),r*(0.3+j*0.15)*Math.sin(Math.PI/5));
          ctx.closePath();
          ctx.strokeStyle=harmonyColor(k+j,90,65)+'88';
          ctx.lineWidth=1;
          ctx.stroke();
        }
        ctx.restore();
      }
      break;
    }
    case 5: { // cube projection
      const pts=[];
      for(let i=0;i<8;i++) {
        const bx=((i>>0)&1)*2-1, by=((i>>1)&1)*2-1, bz=((i>>2)&1)*2-1;
        const px=bx*r*0.3+bz*r*0.15;
        const py=by*r*0.3+bz*r*0.1;
        pts.push([px,py]);
      }
      const edges=[[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
      edges.forEach(([a,b],k)=>{
        ctx.beginPath();
        ctx.moveTo(pts[a][0],pts[a][1]);
        ctx.lineTo(pts[b][0],pts[b][1]);
        ctx.strokeStyle=harmonyColor(k,80,60)+'cc';
        ctx.lineWidth=1.2;
        ctx.stroke();
      });
      break;
    }
    case 6: { // hypercube
      for(let ring=0;ring<3;ring++) {
        const rr=r*(0.3+ring*0.22);
        poly(ctx,0,0,8,rr,rot*(ring+1));
        ctx.strokeStyle=harmonyColor(ring,80,60)+'88';
        ctx.lineWidth=1;
        ctx.stroke();
        // spokes
        for(let i=0;i<8;i++) {
          const a=rot*(ring+1)+i*Math.PI/4;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a)*rr*0.5,Math.sin(a)*rr*0.5);
          ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
          ctx.strokeStyle=harmonyColor(ring+i,70,55)+'66';
          ctx.lineWidth=0.8;
          ctx.stroke();
        }
      }
      break;
    }
    case 7: { // stella octangula
      [0,Math.PI/4,Math.PI/3,Math.PI/2].forEach((extra,k)=>{
        poly(ctx,0,0,4,r*(0.35+k*0.1),rot+extra);
        ctx.strokeStyle=harmonyColor(k,90,65)+'99';
        ctx.lineWidth=1.2;
        ctx.stroke();
        poly(ctx,0,0,4,r*(0.35+k*0.1),rot+extra+Math.PI/4);
        ctx.strokeStyle=harmonyColor(k+2,90,65)+'66';
        ctx.lineWidth=0.8;
        ctx.stroke();
      });
      break;
    }
  }
  ctx.restore();
}

// ─── DRAW PCB CIRCUIT ────────────────────────────────────────────────────────
function drawCircuit(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // draw connections
  circuit.forEach((node,i)=>{
    node.connections.forEach(j=>{
      const other=circuit[j];
      const pulsed = (Math.sin(t*node.speed+node.phase)>0.7);
      const c0=hslToHex(node.hue,80,pulsed?80:35);
      const c1=hslToHex(other.hue,80,pulsed?80:35);
      const grad=ctx.createLinearGradient(node.x,node.y,other.x,other.y);
      grad.addColorStop(0,c0+'88');
      grad.addColorStop(1,c1+'44');
      ctx.beginPath();
      ctx.moveTo(node.x,node.y);
      // manhattan-ish routing
      ctx.lineTo(other.x,node.y);
      ctx.lineTo(other.x,other.y);
      ctx.strokeStyle=grad;
      ctx.lineWidth=pulsed?1.5:0.7;
      ctx.stroke();
      // signal dot
      if(pulsed) {
        const frac=(Math.sin(t*node.speed*2+node.phase)*0.5+0.5);
        const sx=node.x+(other.x-node.x)*frac;
        const sy=node.y+(other.y-node.y)*frac;
        ctx.beginPath();
        ctx.arc(sx,sy,2.5,0,Math.PI*2);
        ctx.fillStyle=hslToHex(node.hue,100,85);
        ctx.fill();
      }
    });
    // draw component
    const pulse=Math.sin(t*node.speed+node.phase)*0.5+0.5;
    ctx.save();
    ctx.translate(node.x,node.y);
    const colH=hslToHex(node.hue,90,40+pulse*30);
    switch(node.type) {
      case 0: // IC chip
        ctx.fillStyle=colH+'cc';
        ctx.fillRect(-node.r,-node.r*0.6,node.r*2,node.r*1.2);
        ctx.strokeStyle=hslToHex(node.hue,60,80)+'cc';
        ctx.lineWidth=0.8;
        ctx.strokeRect(-node.r,-node.r*0.6,node.r*2,node.r*1.2);
        for(let p=0;p<4;p++){
          ctx.fillStyle=hslToHex(node.hue,80,70)+'bb';
          ctx.fillRect(-node.r+(p+1)*node.r*2/5-1,-node.r*0.7,2,4);
          ctx.fillRect(-node.r+(p+1)*node.r*2/5-1,node.r*0.6-4,2,4);
        }
        break;
      case 1: // capacitor
        ctx.beginPath();
        ctx.arc(0,0,node.r*0.5,0,Math.PI*2);
        ctx.fillStyle=colH+'aa';
        ctx.fill();
        ctx.strokeStyle='#fff8';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(-node.r*0.3,-node.r*0.3);
        ctx.lineTo(node.r*0.3,node.r*0.3);
        ctx.moveTo(node.r*0.3,-node.r*0.3);
        ctx.lineTo(-node.r*0.3,node.r*0.3);
        ctx.stroke();
        break;
      case 2: // transistor
        poly(ctx,0,0,3,node.r*0.5,t*0.3);
        ctx.fillStyle=colH+'99';
        ctx.fill();
        ctx.strokeStyle=hslToHex(node.hue,80,75)+'cc';
        ctx.lineWidth=1;
        ctx.stroke();
        break;
      case 3: // resistor
        ctx.fillStyle=colH+'cc';
        ctx.fillRect(-node.r*0.8,-node.r*0.25,node.r*1.6,node.r*0.5);
        for(let b=0;b<3;b++){
          ctx.strokeStyle=harmonyColor(b,90,65);
          ctx.lineWidth=1.5;
          ctx.beginPath();
          ctx.moveTo(-node.r*0.4+b*node.r*0.35,-node.r*0.25);
          ctx.lineTo(-node.r*0.4+b*node.r*0.35,node.r*0.25);
          ctx.stroke();
        }
        break;
      case 4: // via/pad
        ctx.beginPath();
        ctx.arc(0,0,node.r*0.4,0,Math.PI*2);
        ctx.fillStyle=hslToHex(node.hue,100,80+(pulse*20))+'ee';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0,0,node.r*0.22,0,Math.PI*2);
        ctx.fillStyle='#000a';
        ctx.fill();
        break;
    }
    ctx.restore();
  });
  ctx.restore();
}

// ─── DRAW ROBOT ──────────────────────────────────────────────────────────────
function drawRobot(r, alpha) {
  const {x,y,size,hue,armPhase,blinkT,type} = r;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  const s=size;
  const col=hslToHex(hue,80,55);
  const col2=hslToHex(hue+40,90,65);
  const glow=hslToHex(hue,100,70);
  // glow aura
  const aura=ctx.createRadialGradient(0,0,s*0.3,0,0,s*1.4);
  aura.addColorStop(0,glow+'33');
  aura.addColorStop(1,'transparent');
  ctx.fillStyle=aura;
  ctx.beginPath();
  ctx.arc(0,0,s*1.4,0,Math.PI*2);
  ctx.fill();
  // body
  ctx.fillStyle=col+'ee';
  ctx.fillRect(-s*0.35,-s*0.2,s*0.7,s*0.55);
  ctx.strokeStyle=col2+'cc';
  ctx.lineWidth=1.5;
  ctx.strokeRect(-s*0.35,-s*0.2,s*0.7,s*0.55);
  // head
  ctx.fillStyle=hslToHex(hue,70,45)+'ee';
  ctx.fillRect(-s*0.25,-s*0.55,s*0.5,s*0.35);
  ctx.strokeStyle=col2+'cc';
  ctx.strokeRect(-s*0.25,-s*0.55,s*0.5,s*0.35);
  // eyes
  const blinkOpen = Math.sin(blinkT)>-0.95;
  [[-0.12,0],[0.12,0]].forEach(([ex])=>{
    ctx.beginPath();
    ctx.arc(ex*s,-s*0.4,s*0.07,0,Math.PI*2);
    ctx.fillStyle=blinkOpen?hslToHex(r.eyeHue,100,70)+'ff':'#111';
    ctx.fill();
    if(blinkOpen){
      ctx.beginPath();
      ctx.arc(ex*s,-s*0.4,s*0.1,0,Math.PI*2);
      ctx.strokeStyle=hslToHex(r.eyeHue,100,80)+'88';
      ctx.lineWidth=1;
      ctx.stroke();
    }
  });
  // antenna
  ctx.beginPath();
  ctx.moveTo(0,-s*0.55);
  ctx.lineTo(0,-s*0.78);
  ctx.strokeStyle=col2;
  ctx.lineWidth=1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0,-s*0.82,s*0.06,0,Math.PI*2);
  ctx.fillStyle=glow;
  ctx.fill();
  // arms
  const armSwing=Math.sin(armPhase)*0.4;
  [[-1,1]].forEach(([sign])=>{
    ctx.save();
    ctx.translate(sign*s*0.35,s*0.0);
    ctx.rotate(sign*armSwing);
    ctx.fillStyle=col+'cc';
    ctx.fillRect(sign>0?0:-s*0.28,-s*0.06,s*0.28,s*0.12);
    // hand
    ctx.beginPath();
    ctx.arc(sign>0?s*0.28:-s*0.28,0,s*0.08,0,Math.PI*2);
    ctx.fillStyle=col2;
    ctx.fill();
    ctx.restore();
  });
  // type-specific details
  if(type===1){
    // circuit overlay on body
    ctx.strokeStyle=hslToHex(hue+90,100,75)+'66';
    ctx.lineWidth=0.5;
    for(let i=0;i<3;i++){
      ctx.beginPath();
      ctx.moveTo(-s*0.3+i*s*0.15,s*0.05);
      ctx.lineTo(-s*0.3+i*s*0.15,s*0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-s*0.3+i*s*0.15,s*0.15);
      ctx.lineTo(-s*0.1+i*s*0.15,s*0.15);
      ctx.stroke();
    }
  }
  if(type===2){
    // 6502 text on chest
    ctx.fillStyle='#0f08';
    ctx.font=`${s*0.09}px 'Courier New'`;
    ctx.textAlign='center';
    ctx.fillText('6502',0,s*0.12);
  }
  // legs
  ctx.fillStyle=col+'cc';
  [[-0.17,1],[0.17,1]].forEach(([lx])=>{
    const legPhase=Math.sin(armPhase+lx*Math.PI);
    ctx.save();
    ctx.translate(lx*s, s*0.35);
    ctx.rotate(legPhase*0.3);
    ctx.fillRect(-s*0.07,0,s*0.14,s*0.28);
    ctx.restore();
  });
  ctx.restore();
}

// ─── DRAW CYBORG ─────────────────────────────────────────────────────────────
function drawCyborg(c, alpha) {
  const {x,y,size,hue,phase,implants,type} = c;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  const col=hslToHex(hue,80,55);
  const colM=hslToHex(hue+180,90,65);
  // organic head
  ctx.beginPath();
  ctx.arc(0,-size*0.32,size*0.28,0,Math.PI*2);
  ctx.fillStyle=hslToHex(hue,30,55)+'cc';
  ctx.fill();
  ctx.strokeStyle=col;
  ctx.lineWidth=1.5;
  ctx.stroke();
  // cyber half-face
  ctx.save();
  ctx.clip();
  ctx.fillStyle=col+'99';
  ctx.fillRect(0,-size*0.6,size*0.3,size*0.6);
  ctx.restore();
  // implant eye
  ctx.beginPath();
  ctx.arc(size*0.08,-size*0.33,size*0.09,0,Math.PI*2);
  ctx.fillStyle=hslToHex(hue,100,70);
  ctx.fill();
  const pulse=Math.sin(t*2+phase)*0.5+0.5;
  ctx.beginPath();
  ctx.arc(size*0.08,-size*0.33,size*0.12+pulse*size*0.04,0,Math.PI*2);
  ctx.strokeStyle=hslToHex(hue,100,80)+(Math.round(pulse*100+100).toString(16));
  ctx.lineWidth=1;
  ctx.stroke();
  // body (half organic, half mech)
  ctx.fillStyle=hslToHex(hue,25,45)+'cc';
  ctx.fillRect(-size*0.28,-size*0.04,size*0.28,size*0.45);
  ctx.fillStyle=col+'bb';
  ctx.fillRect(0,-size*0.04,size*0.28,size*0.45);
  // implant nodes
  for(let i=0;i<implants;i++){
    const ia=phase+i*Math.PI*2/implants;
    const ir=size*0.35;
    const nx=Math.cos(ia)*ir, ny=Math.sin(ia)*ir*0.5+size*0.18;
    const ipulse=Math.sin(t*3+ia)*0.5+0.5;
    ctx.beginPath();
    ctx.arc(nx,ny,size*0.04,0,Math.PI*2);
    ctx.fillStyle=hslToHex(hue,100,60+ipulse*30);
    ctx.fill();
    // wire
    ctx.beginPath();
    ctx.moveTo(nx,ny);
    ctx.lineTo(0,size*0.2);
    ctx.strokeStyle=colM+'55';
    ctx.lineWidth=0.7;
    ctx.stroke();
  }
  // aug module
  ctx.fillStyle=colM+'aa';
  ctx.fillRect(size*0.1,size*0.05,size*0.2,size*0.12);
  ctx.strokeStyle=hslToHex(hue,100,75)+'88';
  ctx.lineWidth=0.7;
  ctx.strokeRect(size*0.1,size*0.05,size*0.2,size*0.12);
  ctx.restore();
}

// ─── DRAW UFO ────────────────────────────────────────────────────────────────
function drawUFO(u, alpha) {
  const {x,y,r,hue,beamOn,phase} = u;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  const pulse=Math.sin(t*3+phase)*0.5+0.5;
  // beam
  if(beamOn){
    const blen=H*0.35+pulse*H*0.1;
    const bw=r*0.8;
    const grad=ctx.createLinearGradient(0,r*0.3,0,r*0.3+blen);
    grad.addColorStop(0,hslToHex(hue,100,80)+'66');
    grad.addColorStop(1,hslToHex(hue,100,80)+'00');
    ctx.beginPath();
    ctx.moveTo(-bw/2,r*0.3);
    ctx.lineTo(bw/2,r*0.3);
    ctx.lineTo(bw,r*0.3+blen);
    ctx.lineTo(-bw,r*0.3+blen);
    ctx.closePath();
    ctx.fillStyle=grad;
    ctx.fill();
  }
  // dome
  ctx.beginPath();
  ctx.arc(0,-r*0.15,r*0.45,Math.PI,0);
  ctx.fillStyle=hslToHex(hue,60,40)+'dd';
  ctx.fill();
  ctx.strokeStyle=hslToHex(hue,80,70)+'cc';
  ctx.lineWidth=1.5;
  ctx.stroke();
  // saucer
  const saucerGrad=ctx.createRadialGradient(0,0,r*0.1,0,0,r);
  saucerGrad.addColorStop(0,hslToHex(hue,80,65)+'ee');
  saucerGrad.addColorStop(0.6,hslToHex(hue,90,40)+'dd');
  saucerGrad.addColorStop(1,hslToHex(hue,60,20)+'88');
  ctx.beginPath();
  ctx.ellipse(0,0,r,r*0.28,0,0,Math.PI*2);
  ctx.fillStyle=saucerGrad;
  ctx.fill();
  ctx.strokeStyle=hslToHex(hue,100,75);
  ctx.lineWidth=1.5;
  ctx.stroke();
  // lights
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+t*0.5;
    const lx=Math.cos(a)*r*0.75, ly=Math.sin(a)*r*0.18;
    const lit=Math.sin(t*4+i*Math.PI/4+phase)>0;
    ctx.beginPath();
    ctx.arc(lx,ly,r*0.07,0,Math.PI*2);
    ctx.fillStyle=lit?hslToHex((hue+i*45)%360,100,80):hslToHex(hue,40,25);
    ctx.fill();
  }
  ctx.restore();
}

// ─── DRAW 6502 ASM PANEL ─────────────────────────────────────────────────────
function drawASMPanel(x, y, w, h, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(x,y,w,h);
  ctx.strokeStyle=harmonyColor(0,80,60)+'88';
  ctx.lineWidth=1;
  ctx.strokeRect(x,y,w,h);
  ctx.font=`${Math.max(8,h/9)}px 'Courier New'`;
  ctx.textAlign='left';
  // scanline effect
  for(let i=0;i<h;i+=3){
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(x,y+i,w,1);
  }
  const colors=['#0f0','#0ff','#ff0','#f0f','#f80','#8f0'];
  asmLines.forEach((line,i)=>{
    const fy = y+14+(i*(h/7));
    const c=colors[i%colors.length];
    // address
    ctx.fillStyle=harmonyColor(i+2,60,55)+'cc';
    ctx.fillText(`${(0x4000+asmIdx*3+i).toString(16).toUpperCase().padStart(4,'0')}: `,x+6,fy);
    // instruction
    const parts=line.split(' ');
    ctx.fillStyle=c+'ee';
    ctx.fillText(parts[0],x+68,fy);
    if(parts[1]){
      const arg=parts[1];
      const argColor=arg.startsWith('#')?'#ff8':'#8ff';
      ctx.fillStyle=argColor+'dd';
      ctx.fillText(arg,x+110,fy);
    }
  });
  // Atari TIA register display
  const regY=y+h-18;
  ctx.fillStyle=harmonyColor(1,80,65)+'cc';
  ctx.font=`${Math.max(7,h/11)}px 'Courier New'`;
  ctx.fillText(`COLUBK=$${(baseHue/360*256|0).toString(16).toUpperCase().padStart(2,'0')} COLUPF=$${((baseHue+90)/360*256%256|0).toString(16).toUpperCase().padStart(2,'0')}`,x+6,regY);
  ctx.restore();
}

// ─── DRAW MAZE ────────────────────────────────────────────────────────────────
function drawMaze(alpha) {
  if(!maze||!maze.length) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  cellW = W/mazeW; cellH = H/mazeH;
  ctx.lineWidth=1.5;
  const wallCol=harmonyColor(0,70,40)+'88';
  for(let y=0;y<mazeH;y++) for(let x=0;x<mazeW;x++) {
    const cell=maze[y][x];
    const px=x*cellW, py=y*cellH;
    ctx.strokeStyle=wallCol;
    if(cell.r){ctx.beginPath();ctx.moveTo(px+cellW,py);ctx.lineTo(px+cellW,py+cellH);ctx.stroke();}
    if(cell.b){ctx.beginPath();ctx.moveTo(px,py+cellH);ctx.lineTo(px+cellW,py+cellH);ctx.stroke();}
    if(x===0){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,py+cellH);ctx.stroke();}
    if(y===0){ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+cellW,py);ctx.stroke();}
    // Atari-style floor tile
    const tileHue=(x+y)%2===0?baseHue:(baseHue+60)%360;
    ctx.fillStyle=hslToHex(tileHue,50,10)+'55';
    ctx.fillRect(px+0.5,py+0.5,cellW-1,cellH-1);
  }
  // maze players
  mazePlayers.forEach(p=>{
    const px=p.x*cellW+cellW*0.5, py=p.y*cellH+cellH*0.5;
    const r=Math.min(cellW,cellH)*0.28;
    // trail
    p.trail.forEach((tr,i)=>{
      ctx.beginPath();
      ctx.arc(tr[0],tr[1],r*(0.3-i*0.05),0,Math.PI*2);
      ctx.fillStyle=hslToHex(p.hue,80,55)+(Math.round((0.4-i*0.07)*255).toString(16).padStart(2,'0'));
      ctx.fill();
    });
    ctx.beginPath();
    ctx.arc(px,py,r,0,Math.PI*2);
    ctx.fillStyle=hslToHex(p.hue,90,65)+'ee';
    ctx.fill();
    ctx.strokeStyle='#fff8';
    ctx.lineWidth=1;
    ctx.stroke();
  });
  ctx.restore();
}

// ─── TILING OVERLAY ─────────────────────────────────────────────────────────
function drawTiling(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha * 0.18;
  const hues = getHarmony(baseHue, harmonyType);
  const type = (params.tilingType||0) % 5;
  const gs = 60;
  switch(type) {
    case 0: // square grid
      for(let x=0;x<W+gs;x+=gs) for(let y=0;y<H+gs;y+=gs) {
        const hue=hues[((x/gs|0)+(y/gs|0))%hues.length];
        ctx.strokeStyle=hslToHex(hue,80,50)+'88';
        ctx.lineWidth=0.5;
        ctx.strokeRect(x-gs/2,y-gs/2,gs,gs);
      }
      break;
    case 1: // hex grid
      for(let row=0;row<H/gs*1.5;row++) for(let col=0;col<W/gs*1.3;col++) {
        const ox=col*gs*1.5, oy=row*gs*1.732+(col%2)*gs*0.866;
        poly(ctx,ox,oy,6,gs*0.5,t*0.1);
        ctx.strokeStyle=hslToHex(hues[(row+col)%hues.length],80,50)+'66';
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
      break;
    case 2: // triangular
      for(let row=0;row<H/gs*2+2;row++) for(let col=0;col<W/gs*1.5+2;col++) {
        const bx=col*gs*0.5, by=row*gs*0.866;
        ctx.beginPath();
        ctx.moveTo(bx,by);
        ctx.lineTo(bx+gs*0.5,by+gs*0.866);
        ctx.lineTo(bx-gs*0.5,by+gs*0.866);
        ctx.closePath();
        ctx.strokeStyle=hslToHex(hues[(row+col)%hues.length],80,55)+'55';
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
      break;
    case 3: // rhombi
      for(let row=0;row<H/gs*2+2;row++) for(let col=0;col<W/gs+2;col++) {
        const bx=col*gs+(row%2)*gs*0.5,by=row*gs*0.5;
        ctx.beginPath();
        ctx.moveTo(bx,by-gs*0.28);
        ctx.lineTo(bx+gs*0.5,by);
        ctx.lineTo(bx,by+gs*0.28);
        ctx.lineTo(bx-gs*0.5,by);
        ctx.closePath();
        ctx.strokeStyle=hslToHex(hues[(row+col)%hues.length],80,50)+'55';
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
      break;
    case 4: // truchet-ish
      for(let xi=0;xi<W/gs+2;xi++) for(let yi=0;yi<H/gs+2;yi++) {
        const bx=xi*gs, by=yi*gs;
        ctx.strokeStyle=hslToHex(hues[(xi+yi)%hues.length],80,50)+'77';
        ctx.lineWidth=0.7;
        ctx.beginPath();
        if((xi+yi)%2===0){ctx.arc(bx,by,gs/2,0,Math.PI/2);}
        else{ctx.arc(bx+gs,by,gs/2,Math.PI/2,Math.PI);}
        ctx.stroke();
      }
      break;
  }
  ctx.restore();
}

// ─── DRAW NEURAL NET ─────────────────────────────────────────────────────────
function drawNeural(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  neurons.forEach((n,i)=>{
    const pulse=Math.sin(t*2+i)*0.5+0.5;
    // connections
    n.connections.forEach(j=>{
      const m=neurons[j];
      const firing=n.fireCooldown>0.5;
      const grad=ctx.createLinearGradient(n.x,n.y,m.x,m.y);
      grad.addColorStop(0,hslToHex(n.hue,80,firing?75:35)+'88');
      grad.addColorStop(1,hslToHex(m.hue,80,35)+'44');
      ctx.beginPath();
      ctx.moveTo(n.x,n.y);
      ctx.bezierCurveTo(
        n.x+(m.x-n.x)*0.3+Math.sin(t+i)*15,
        n.y+(m.y-n.y)*0.3+Math.cos(t+j)*15,
        m.x-(m.x-n.x)*0.3,m.y-(m.y-n.y)*0.3,
        m.x,m.y
      );
      ctx.strokeStyle=grad;
      ctx.lineWidth=firing?1.5:0.5;
      ctx.stroke();
    });
    // soma
    ctx.beginPath();
    ctx.arc(n.x,n.y,n.r*(0.8+pulse*0.4),0,Math.PI*2);
    ctx.fillStyle=hslToHex(n.hue,90,40+pulse*30)+'cc';
    ctx.fill();
    ctx.strokeStyle=hslToHex(n.hue,100,75)+'88';
    ctx.lineWidth=1;
    ctx.stroke();
    // implant marker
    if(i%3===0){
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r*1.8,0,Math.PI*2);
      ctx.strokeStyle=hslToHex(n.hue,100,80)+'44';
      ctx.lineWidth=0.7;
      ctx.setLineDash([2,3]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // update
    n.fireCooldown=Math.max(0,n.fireCooldown-0.04);
    if(Math.random()<0.004){n.fireCooldown=1;if(soundOn)beep(200+n.hue*2,0.05,'sine',0.02);}
  });
  ctx.restore();
}

// ─── ATARI SCANLINES ─────────────────────────────────────────────────────────
function drawScanlines() {
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle='#000';
  for(let y=0;y<H;y+=2){
    ctx.fillRect(0,y,W,1);
  }
  ctx.restore();
  // phosphor glow edge
  ctx.save();
  ctx.globalAlpha=0.07;
  const edge=ctx.createRadialGradient(cx,cy,Math.min(W,H)*0.3,cx,cy,Math.max(W,H)*0.75);
  edge.addColorStop(0,'transparent');
  edge.addColorStop(1,'#000');
  ctx.fillStyle=edge;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
function drawBackground() {
  const bgGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.8);
  bgGrad.addColorStop(0,hslToHex(params.bgHue||0,40,8));
  bgGrad.addColorStop(0.5,hslToHex((params.bgHue||0)+30,35,5));
  bgGrad.addColorStop(1,'#000000');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,W,H);
  // stars
  stars.forEach(s=>{
    const twinkle=Math.sin(t*1.5+s.twinkle)*0.4+0.6;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=hslToHex(s.hue,70,85)+(Math.round(s.alpha*twinkle*255).toString(16).padStart(2,'0'));
    ctx.fill();
  });
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function updateDrawParticles() {
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vx+=(Math.random()-0.5)*0.05;
    p.vy+=(Math.random()-0.5)*0.05;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=hslToHex(p.hue,90,70)+(Math.round(p.alpha*180).toString(16).padStart(2,'0'));
    ctx.fill();
  });
}

// ─── UPDATE ENTITIES ─────────────────────────────────────────────────────────
function updateRobots() {
  const n=params.robotCount||5;
  robots.slice(0,n).forEach(r=>{
    const dx=r.tx-r.x, dy=r.ty-r.y;
    const dist=Math.hypot(dx,dy);
    if(dist<20){r.tx=Math.random()*W;r.ty=Math.random()*H;}
    r.x+=dx/dist*r.speed*(0.5+Math.random()*0.3);
    r.y+=dy/dist*r.speed*(0.5+Math.random()*0.3);
    r.x=Math.max(r.size,Math.min(W-r.size,r.x));
    r.y=Math.max(r.size,Math.min(H-r.size,r.y));
    r.armPhase+=0.07*r.speed;
    r.blinkT+=0.03;
    r.angle=Math.atan2(dy,dx);
  });
}
function updateCyborgs() {
  const n=params.cyborgCount||4;
  cyborgs.slice(0,n).forEach(c=>{
    c.x+=c.vx; c.y+=c.vy;
    if(c.x<0||c.x>W)c.vx*=-1;
    if(c.y<0||c.y>H)c.vy*=-1;
    c.phase+=0.02;
  });
}
function updateUFOs() {
  const n=params.ufoCount||3;
  ufos.slice(0,n).forEach(u=>{
    u.x+=u.vx*(params.orbitSpeed||1);
    u.y+=u.vy*(params.orbitSpeed||1)*0.5;
    u.y+=Math.sin(t*u.orbitSpeed+u.phase)*0.5;
    if(u.x<-u.r*2)u.x=W+u.r;
    if(u.x>W+u.r*2)u.x=-u.r;
    if(u.y<0)u.vy=Math.abs(u.vy);
    if(u.y>H*0.65)u.vy=-Math.abs(u.vy);
    u.phase+=0.01;
    u.beamOn=Math.sin(t*0.5+u.phase)>0.3;
  });
}
function updateMazePlayers() {
  mazePlayers.forEach(p=>{
    p.timer+=p.speed;
    if(p.timer>1){
      p.timer=0;
      const cx2=p.x, cy2=p.y;
      const cell=maze[cy2]?.[cx2];
      if(!cell)return;
      const moves=[];
      if(!cell.r&&cx2+1<mazeW)moves.push([1,0]);
      if(!cell.b&&cy2+1<mazeH)moves.push([0,1]);
      if(cx2>0&&maze[cy2]?.[cx2-1]&&!maze[cy2][cx2-1].r)moves.push([-1,0]);
      if(cy2>0&&maze[cy2-1]?.[cx2]&&!maze[cy2-1][cx2].b)moves.push([0,-1]);
      if(moves.length){
        const mv=moves[Math.random()*moves.length|0];
        const nx=cx2+mv[0], ny=cy2+mv[1];
        p.trail.unshift([p.x*cellW+cellW/2, p.y*cellH+cellH/2]);
        if(p.trail.length>5)p.trail.pop();
        p.x=nx; p.y=ny;
      }
    }
  });
}

// ─── HUD UPDATE ──────────────────────────────────────────────────────────────
function updateHUD() {
  if(!hudVisible) return;
  frames++;
  const now=performance.now();
  if(now-lastFpsTime>500){fps=Math.round(frames*1000/(now-lastFpsTime));frames=0;lastFpsTime=now;}
  document.getElementById('h-fps').textContent=`FPS: ${fps}`;
  document.getElementById('h-mode').textContent=`MODE: ${POLYTOPES[polyType%8]} / ${HARMONIES[harmonyType%8]}`;
  document.getElementById('h-harm').textContent=`HARMONY: ${HARMONIES[harmonyType%8]}`;
  document.getElementById('h-col').textContent=`BASE HUE: ${baseHue.toFixed(1)}°`;
  document.getElementById('h-poly').textContent=`POLYTOPE: ${POLYTOPES[polyType%8]}`;
  document.getElementById('h-seed').textContent=`SEED: ${seed}`;
  document.getElementById('h-layer').textContent=`LAYERS: ${params.polyLayers||3}`;
  document.getElementById('h-asm').textContent=asmLines[0]||'';
  document.getElementById('h-tia').textContent=`TIA: COLUBK → $${(baseHue/360*256|0).toString(16).toUpperCase().padStart(2,'0')}`;
  document.getElementById('h-scan').textContent=`SCANLINE: ${(t*60%262|0)}`;
  document.getElementById('h-robot').textContent=`ROBOTS: ${params.robotCount||5}`;
  document.getElementById('h-cyborg').textContent=`CYBORGS: ${params.cyborgCount||4}`;
  document.getElementById('h-ufo').textContent=`UFOs: ${params.ufoCount||3}`;
  document.getElementById('h-maze').textContent=`MAZE: ${mazeW}×${mazeH}`;
}

// ─── INIT PARAMS ─────────────────────────────────────────────────────────────
params = {
  wheelCount:3, wheelAlpha:0.22, robotCount:5, cyborgCount:4, ufoCount:3,
  pcbDensity:0.7, mazeSize:12, starCount:120, particleCount:100,
  asmSpeed:1, scanSpeed:0.8, polyLayers:4, chromaticRings:5, tilingType:0,
  glowIntensity:1, bgHue:220, atariScanlines:true, orbitSpeed:1, neuralDensity:0.6,
};
buildMaze();
buildCircuit();

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  t += 0.016;
  tickAsm();
  updateRobots();
  updateCyborgs();
  updateUFOs();
  updateMazePlayers();
  updateHUD();

  // ── BACKGROUND + TILING ──
  drawBackground();
  drawTiling(0.8);

  // ── MAZE (deep background layer) ──
  drawMaze(0.28);

  // ── NEURAL NETWORK (implant layer) ──
  drawNeural(0.22 * (params.neuralDensity||0.6));

  // ── PCB CIRCUIT ──
  drawCircuit(0.38 * (params.pcbDensity||0.7));

  // ── COLOR WHEELS (layered, rotating) ──
  const wheelCount = params.wheelCount || 3;
  for(let wi=0;wi<wheelCount;wi++) {
    const wr = Math.min(W,H)*(0.18+wi*0.13);
    const wx = cx + Math.cos(t*(0.2+wi*0.08)+wi*Math.PI*2/wheelCount)*W*0.25;
    const wy = cy + Math.sin(t*(0.15+wi*0.06)+wi*Math.PI*2/wheelCount)*H*0.25;
    drawColorWheel(wx,wy,wr,params.wheelAlpha||0.2,t*(0.05+wi*0.03));
  }

  // ── CHROMATICITY DIAGRAMS ──
  const cRings = params.chromaticRings || 5;
  for(let ri=0;ri<cRings;ri++) {
    const cr=Math.min(W,H)*(0.1+ri*0.08);
    const ca = t*(0.08+ri*0.04) + ri*Math.PI*2/cRings;
    const crx=cx+Math.cos(ca)*W*0.3, cry=cy+Math.sin(ca)*H*0.28;
    drawChromaticity(crx,cry,cr,0.5,t*(0.05+ri*0.02));
  }

  // ── POLYTOPE LAYERS ──
  const polyLayers = params.polyLayers || 4;
  for(let pi=0;pi<polyLayers;pi++) {
    const pr=Math.min(W,H)*(0.15+pi*0.1);
    const pa=t*(0.06+pi*0.04)+pi*Math.PI*2/polyLayers;
    const prx=cx+Math.cos(pa+Math.PI)*W*0.18;
    const pry=cy+Math.sin(pa)*H*0.16;
    drawPolytope(prx,pry,pr,(polyType+pi)%8,t*(0.1+pi*0.05),0.45);
  }
  // central polytope
  drawPolytope(cx,cy,Math.min(W,H)*0.32,polyType,t*0.08,0.35);

  // ── PARTICLES ──
  updateDrawParticles();

  // ── UFOs ──
  const ufoN=params.ufoCount||3;
  ufos.slice(0,ufoN).forEach(u=>drawUFO(u,0.88));

  // ── ROBOTS ──
  const robotN=params.robotCount||5;
  robots.slice(0,robotN).forEach(r=>drawRobot(r,0.88));

  // ── CYBORGS ──
  const cyborgN=params.cyborgCount||4;
  cyborgs.slice(0,cyborgN).forEach(c=>drawCyborg(c,0.82));

  // ── 6502 ASM PANELS (corners) ──
  const panW=Math.min(220,W*0.22), panH=Math.min(130,H*0.18);
  drawASMPanel(8,8,panW,panH,0.72);
  drawASMPanel(W-panW-8,H-panH-8,panW,panH,0.72);

  // ── ATARI COLOR PALETTE BAR ──
  const barH = 14, barY = H-barH-2;
  ctx.save();
  ctx.globalAlpha = 0.7;
  TIA.forEach((col,i)=>{
    const bx=(i/TIA.length)*W;
    const bw=W/TIA.length;
    ctx.fillStyle=col;
    ctx.fillRect(bx,barY,bw+1,barH);
  });
  // marker
  const markerX=(baseHue/360)*W;
  ctx.strokeStyle='#fff';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(markerX,barY);
  ctx.lineTo(markerX,barY+barH);
  ctx.stroke();
  ctx.restore();

  // ── SCANLINES ──
  if(params.atariScanlines) drawScanlines();

  // ── TITLE / BRAND OVERLAY ──
  ctx.save();
  ctx.globalAlpha=0.08+Math.sin(t*0.3)*0.04;
  ctx.font=`bold ${Math.min(W*0.085,80)}px 'Courier New'`;
  ctx.textAlign='center';
  ctx.fillStyle=harmonyColor(0,90,70);
  ctx.fillText('CHROMATIC CYBERNETIC NEXUS',cx,cy+Math.min(W,H)*0.44);
  ctx.restore();
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
function doRandomize() {
  randomize();
  buildStars();
  buildParticles();
  buildNeural();
  if(soundOn) {
    const hues=getHarmony(baseHue,harmonyType);
    hues.forEach((h,i)=>setTimeout(()=>beep(220+h*2,0.12,'sawtooth',0.05),i*60));
  }
}

window.addEventListener('keydown', e=>{
  if(e.code==='Space'){e.preventDefault();doRandomize();}
  if(e.key==='h'||e.key==='H'){
    hudVisible=!hudVisible;
    document.getElementById('hud').style.display=hudVisible?'block':'none';
  }
  if(e.key==='s'||e.key==='S'){
    soundOn=!soundOn;
    if(soundOn){initAudio();beep(440,0.1,'square',0.05);}
  }
});
canvas.addEventListener('click',doRandomize);
canvas.addEventListener('touchstart',e=>{e.preventDefault();doRandomize();},{passive:false});

loop();
</script>
