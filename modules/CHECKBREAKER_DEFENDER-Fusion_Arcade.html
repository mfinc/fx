<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CHECKBREAKER DEFENDER — Fusion Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Orbitron',sans-serif;overflow:hidden;}
  #ui{width:700px;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:linear-gradient(90deg,#0a0a1a,#0d1a2e,#0a0a1a);border:1px solid #1a3a5c;margin-bottom:4px;}
  .stat{text-align:center;}
  .stat-label{font-size:9px;color:#4a7aaa;letter-spacing:2px;text-transform:uppercase;}
  .stat-val{font-size:18px;color:#00f0ff;font-weight:900;text-shadow:0 0 10px #00f0ff;}
  #title{font-size:11px;color:#ff6a00;letter-spacing:3px;font-weight:700;text-shadow:0 0 8px #ff6a00;}
  canvas{border:2px solid #1a3a5c;box-shadow:0 0 40px rgba(0,150,255,0.3),0 0 80px rgba(0,50,100,0.2);}
  #msg{font-family:'Share Tech Mono',monospace;font-size:12px;color:#4a7aaa;margin-top:6px;letter-spacing:1px;height:16px;}
</style>
</head>
<body>
<div id="ui">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="scoreEl">0</div></div>
  <div class="stat"><div class="stat-label">Wave</div><div class="stat-val" id="waveEl">1</div></div>
  <div id="title">CHECKBREAKER<br>DEFENDER</div>
  <div class="stat"><div class="stat-label">Lives</div><div class="stat-val" id="livesEl">3</div></div>
  <div class="stat"><div class="stat-label">Combo</div><div class="stat-val" id="comboEl">x1</div></div>
</div>
<canvas id="c" width="700" height="600"></canvas>
<div id="msg" id="msgEl">— AI AUTOPILOT ENGAGED —</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=700,H=600;

// ─── Audio Engine ───────────────────────────────────────────────────────────
const AC=new (window.AudioContext||window.webkitAudioContext)();
function beep(freq,type,dur,vol=0.3,detune=0){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.value=freq;o.detune.value=detune;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur);
  }catch(e){}
}
function sfx(name){
  const t=AC.currentTime;
  if(name==='bounce'){beep(220,'square',0.08,0.2);beep(330,'sine',0.08,0.15,50);}
  if(name==='capture'){
    beep(440,'sawtooth',0.1,0.3);beep(660,'sawtooth',0.15,0.25,-20);
    setTimeout(()=>beep(880,'sine',0.2,0.2),80);
  }
  if(name==='jump'){beep(330,'square',0.05,0.2);beep(550,'square',0.1,0.3,30);}
  if(name==='fire'){beep(880,'sawtooth',0.06,0.2);beep(660,'square',0.08,0.15);}
  if(name==='explosion'){
    beep(80,'sawtooth',0.3,0.4);beep(60,'sawtooth',0.25,0.35,-30);
    beep(40,'square',0.4,0.3,20);
  }
  if(name==='kingjump'){
    beep(660,'sawtooth',0.1,0.3);beep(990,'sawtooth',0.15,0.25);
    setTimeout(()=>{beep(1320,'sine',0.2,0.3);},100);
  }
  if(name==='wave'){
    [200,300,400,500,700].forEach((f,i)=>setTimeout(()=>beep(f,'sine',0.2,0.3),i*80));
  }
  if(name==='death'){
    [400,300,200,100].forEach((f,i)=>setTimeout(()=>beep(f,'sawtooth',0.2,0.4),i*100));
  }
  if(name==='shield'){beep(1200,'sine',0.15,0.2);beep(1400,'sine',0.15,0.15,20);}
}

// ─── Constants ───────────────────────────────────────────────────────────────
const COLS=8,ROWS=6;
const CW=Math.floor(W/COLS); // cell width
const CH=50; // cell height
const BOARD_TOP=60;
const BOARD_H=ROWS*CH; // 300
const PADDLE_Y=H-50;
const PADDLE_W=80,PADDLE_H=14;
const BALL_R=7;

// ─── Color Palettes ───────────────────────────────────────────────────────────
const COL={
  bg:'#000510',
  grid1:'#060e1a',grid2:'#08142a',
  red:'#ff2244',redGlow:'#ff224488',
  black:'#8833ff',blackGlow:'#8833ff88',
  king:'#ffd700',
  ball:'#00ffee',ballGlow:'#00ffee',
  paddle:'#00aaff',paddleGlow:'#00aaff',
  bullet:'#ffaa00',
  enemyBullet:'#ff3300',
  particle:'#ffffff',
  shield:'#00ff88',
};

// ─── State ────────────────────────────────────────────────────────────────────
let score=0,wave=1,lives=3,combo=1,comboTimer=0;
let gameOver=false,waveClear=false,waveTimer=0;
let particles=[];
let sparks=[];

// Paddle (the Defender ship)
let paddle={
  x:W/2-PADDLE_W/2, y:PADDLE_Y, w:PADDLE_W, h:PADDLE_H,
  vx:0, shield:0, thrusters:[]
};

// Ball (plasma orb — Breakout style, but steerable)
let ball={
  x:W/2, y:PADDLE_Y-20,
  vx:3.5, vy:-4,
  r:BALL_R, active:true,
  trail:[], heat:0
};

// Checker pieces on the board
let pieces=[];

// Bullets
let bullets=[];     // player bullets
let eBullets=[];    // enemy bullets

// AI state
let ai={
  paddleTarget:W/2,
  fireTimer:0,
  strategy:'intercept', // intercept | chase | evade
};

// ─── Board Init ───────────────────────────────────────────────────────────────
function cellX(c){return c*CW+CW/2;}
function cellY(r){return BOARD_TOP+r*CH+CH/2;}
function cellCol(x){return Math.floor((x)/CW);}
function cellRow(y){return Math.floor((y-BOARD_TOP)/CH);}

function initPieces(){
  pieces=[];
  // Place checker pieces in classic checker starting positions
  // Red pieces: rows 0,1,2 (top 3 rows, alternating squares)
  for(let r=0;r<3;r++){
    for(let c=0;c<COLS;c++){
      if((r+c)%2===1){
        pieces.push({
          col:c, row:r,
          x:cellX(c), y:cellY(r),
          tx:cellX(c), ty:cellY(r),
          team:'red', king:false,
          hp:2, maxHp:2,
          alive:true,
          vx:0, vy:0,
          moveTimer:0, fireCooldown:Math.random()*200+100,
          alpha:1, scale:1,
          glowPhase:Math.random()*Math.PI*2,
          // Defender-style: pieces slowly descend each wave
          descentSpeed:0.05+wave*0.01,
        });
      }
    }
  }
  // Black pieces: rows 3,4,5 (lower 3 rows)
  // In this hybrid, black pieces are ALLIED (they block enemy descent!)
  // They act as both shields and jump-targets
  for(let r=3;r<6;r++){
    for(let c=0;c<COLS;c++){
      if((r+c)%2===1){
        pieces.push({
          col:c, row:r,
          x:cellX(c), y:cellY(r),
          tx:cellX(c), ty:cellY(r),
          team:'black', king:false,
          hp:1, maxHp:1,
          alive:true,
          vx:0, vy:0,
          moveTimer:0, fireCooldown:0,
          alpha:1, scale:1,
          glowPhase:Math.random()*Math.PI*2,
          descentSpeed:0,
        });
      }
    }
  }
}

// ─── Particle System ──────────────────────────────────────────────────────────
function spawnParticles(x,y,col,n=12,speed=4){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*speed+1;
    particles.push({
      x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,decay:0.02+Math.random()*0.03,
      r:Math.random()*4+1,col,
    });
  }
}
function spawnSparks(x,y,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    sparks.push({
      x,y,vx:Math.cos(a)*(Math.random()*6+2),vy:Math.sin(a)*(Math.random()*6+2),
      life:1,decay:0.05+Math.random()*0.04,
    });
  }
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle=COL.bg;
  ctx.fillRect(0,0,W,H);

  // Checkerboard grid (subtle)
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      ctx.fillStyle=(r+c)%2===0?COL.grid1:COL.grid2;
      ctx.fillRect(c*CW,BOARD_TOP+r*CH,CW,CH);
    }
  }

  // Grid lines
  ctx.strokeStyle='#0a2040';ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){
    ctx.beginPath();ctx.moveTo(c*CW,BOARD_TOP);ctx.lineTo(c*CW,BOARD_TOP+BOARD_H);ctx.stroke();
  }
  for(let r=0;r<=ROWS;r++){
    ctx.beginPath();ctx.moveTo(0,BOARD_TOP+r*CH);ctx.lineTo(W,BOARD_TOP+r*CH);ctx.stroke();
  }

  // Danger zone gradient at bottom of board
  const dg=ctx.createLinearGradient(0,BOARD_TOP+BOARD_H-60,0,BOARD_TOP+BOARD_H);
  dg.addColorStop(0,'transparent');dg.addColorStop(1,'rgba(255,0,0,0.06)');
  ctx.fillStyle=dg;ctx.fillRect(0,BOARD_TOP+BOARD_H-60,W,60);

  // Stars in the play area below board
  ctx.fillStyle='#1a3a6a';
  for(let i=0;i<30;i++){
    const sx=(i*137.5)%W;
    const sy=BOARD_TOP+BOARD_H+((i*73.1)%(H-BOARD_TOP-BOARD_H));
    ctx.fillRect(sx,sy,1,1);
  }
}

function drawPaddle(){
  const p=paddle;
  const cx=p.x+p.w/2;

  // Thruster flame
  const flameH=8+Math.random()*6;
  for(let i=0;i<3;i++){
    const fx=p.x+p.w*0.2+i*(p.w*0.3);
    const fg=ctx.createLinearGradient(fx,p.y+p.h,fx,p.y+p.h+flameH);
    fg.addColorStop(0,'rgba(0,200,255,0.9)');
    fg.addColorStop(0.5,'rgba(0,100,255,0.5)');
    fg.addColorStop(1,'rgba(0,50,200,0)');
    ctx.fillStyle=fg;
    ctx.beginPath();
    ctx.ellipse(fx,p.y+p.h+flameH/2,4,flameH/2,0,0,Math.PI*2);
    ctx.fill();
  }

  // Shield
  if(p.shield>0){
    ctx.save();
    ctx.globalAlpha=p.shield/30*0.5;
    ctx.strokeStyle=COL.shield;ctx.lineWidth=3;
    ctx.shadowColor=COL.shield;ctx.shadowBlur=15;
    ctx.beginPath();ctx.ellipse(cx,p.y+p.h/2,p.w/2+10,p.h+8,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // Main hull
  const hg=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  hg.addColorStop(0,'#00ccff');hg.addColorStop(0.4,'#0088dd');hg.addColorStop(1,'#003366');
  ctx.shadowColor=COL.paddleGlow;ctx.shadowBlur=18;
  ctx.fillStyle=hg;
  ctx.beginPath();
  ctx.moveTo(p.x+8,p.y);
  ctx.lineTo(p.x+p.w-8,p.y);
  ctx.lineTo(p.x+p.w,p.y+p.h/2);
  ctx.lineTo(p.x+p.w-4,p.y+p.h);
  ctx.lineTo(p.x+4,p.y+p.h);
  ctx.lineTo(p.x,p.y+p.h/2);
  ctx.closePath();ctx.fill();

  // Cockpit
  ctx.fillStyle='rgba(0,240,255,0.4)';
  ctx.beginPath();ctx.ellipse(cx,p.y+p.h/2-2,10,5,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,240,255,0.8)';ctx.lineWidth=1;ctx.stroke();

  // Wing accents
  ctx.strokeStyle='rgba(0,200,255,0.6)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(p.x+12,p.y+4);ctx.lineTo(p.x+p.w-12,p.y+4);ctx.stroke();

  ctx.shadowBlur=0;
}

function drawBall(){
  const b=ball;
  if(!b.active)return;

  // Trail
  b.trail.forEach((t,i)=>{
    const a=(i/b.trail.length)*0.4;
    ctx.globalAlpha=a;
    ctx.fillStyle=COL.ball;
    ctx.shadowColor=COL.ballGlow;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(t.x,t.y,b.r*(i/b.trail.length)*0.7,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Glow
  ctx.shadowColor=COL.ballGlow;ctx.shadowBlur=25;
  const rg=ctx.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,b.r);
  rg.addColorStop(0,'#ffffff');rg.addColorStop(0.4,'#00ffee');rg.addColorStop(1,'#003344');
  ctx.fillStyle=rg;
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
}

function drawPiece(p){
  if(!p.alive)return;
  ctx.save();
  ctx.globalAlpha=p.alpha;
  ctx.translate(p.x,p.y);
  ctx.scale(p.scale,p.scale);

  const glow=p.team==='red'?COL.redGlow:COL.blackGlow;
  const base=p.team==='red'?COL.red:COL.black;
  const pulse=0.5+0.5*Math.sin(p.glowPhase);

  // Shadow
  ctx.shadowColor=glow;ctx.shadowBlur=12+pulse*8;

  // Outer ring
  ctx.strokeStyle=base;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(0,0,CW*0.38,0,Math.PI*2);ctx.stroke();

  // Inner fill
  const rg=ctx.createRadialGradient(-4,-4,2,0,0,CW*0.33);
  if(p.team==='red'){
    rg.addColorStop(0,'#ff6688');rg.addColorStop(0.5,'#cc1133');rg.addColorStop(1,'#440011');
  }else{
    rg.addColorStop(0,'#bb88ff');rg.addColorStop(0.5,'#6600cc');rg.addColorStop(1,'#220044');
  }
  ctx.fillStyle=rg;
  ctx.beginPath();ctx.arc(0,0,CW*0.33,0,Math.PI*2);ctx.fill();

  // Hex pattern inside
  ctx.strokeStyle=p.team==='red'?'rgba(255,100,120,0.3)':'rgba(180,100,255,0.3)';
  ctx.lineWidth=0.5;
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(a)*CW*0.25,Math.sin(a)*CW*0.25);ctx.stroke();
  }

  // King crown
  if(p.king){
    ctx.fillStyle=COL.king;ctx.shadowColor='#ffd700';ctx.shadowBlur=15;
    // Crown shape
    ctx.beginPath();
    ctx.moveTo(-10,4);ctx.lineTo(-10,-2);
    ctx.lineTo(-6,4);ctx.lineTo(-3,-5);
    ctx.lineTo(0,4);ctx.lineTo(3,-5);
    ctx.lineTo(6,4);ctx.lineTo(10,-2);
    ctx.lineTo(10,4);ctx.closePath();ctx.fill();
  }

  // HP bar
  if(p.hp<p.maxHp&&p.maxHp>1){
    const bw=CW*0.6;
    ctx.fillStyle='#330000';
    ctx.fillRect(-bw/2,-CW*0.45,bw,4);
    ctx.fillStyle='#ff3300';
    ctx.fillRect(-bw/2,-CW*0.45,bw*(p.hp/p.maxHp),4);
  }

  ctx.shadowBlur=0;
  ctx.restore();
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor=COL.bullet;ctx.shadowBlur=12;
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,4);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.5,'#ffcc00');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(b.x,b.y,4,0,Math.PI*2);ctx.fill();
    // Trail
    ctx.strokeStyle='rgba(255,200,0,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x,b.y+12);ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  });

  eBullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor=COL.enemyBullet;ctx.shadowBlur=12;
    const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,4);
    g.addColorStop(0,'#ffffff');g.addColorStop(0.5,'#ff4400');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,80,0,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x,b.y-10);ctx.stroke();
    ctx.shadowBlur=0;ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.shadowColor=p.col;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  sparks.forEach(s=>{
    ctx.save();ctx.globalAlpha=s.life;
    ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
    ctx.shadowColor='#aaffff';ctx.shadowBlur=4;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+s.vx*2,s.y+s.vy*2);ctx.stroke();
    ctx.restore();
  });
}

function drawHUD(){
  // Board boundary glow
  ctx.strokeStyle='#1a4a7a';ctx.lineWidth=2;
  ctx.strokeRect(0,BOARD_TOP,W,BOARD_H);

  // Danger line
  ctx.strokeStyle='rgba(255,0,0,0.2)';ctx.lineWidth=1;ctx.setLineDash([8,8]);
  ctx.beginPath();ctx.moveTo(0,BOARD_TOP+BOARD_H);ctx.lineTo(W,BOARD_TOP+BOARD_H);ctx.stroke();
  ctx.setLineDash([]);

  // Score/wave
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('waveEl').textContent=wave;
  document.getElementById('livesEl').textContent=lives;
  document.getElementById('comboEl').textContent='x'+combo;
}

// ─── Physics / Update ─────────────────────────────────────────────────────────
function updateBall(){
  const b=ball;
  if(!b.active)return;

  // Trail
  b.trail.push({x:b.x,y:b.y});
  if(b.trail.length>12)b.trail.shift();

  b.x+=b.vx;b.y+=b.vy;
  b.heat=Math.min(1,b.heat+0.01);

  // Wall bounces
  if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);sfx('bounce');spawnSparks(b.x,b.y,5);}
  if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);sfx('bounce');spawnSparks(b.x,b.y,5);}
  if(b.y-b.r<BOARD_TOP){b.y=BOARD_TOP+b.r;b.vy=Math.abs(b.vy);sfx('bounce');spawnSparks(b.x,b.y,5);}

  // Paddle bounce
  if(b.y+b.r>=paddle.y&&b.y-b.r<=paddle.y+paddle.h&&
     b.x>=paddle.x&&b.x<=paddle.x+paddle.w&&b.vy>0){
    b.vy=-Math.abs(b.vy);
    // Add paddle velocity influence
    b.vx+=(b.x-(paddle.x+paddle.w/2))/12;
    b.vx=Math.max(-7,Math.min(7,b.vx));
    sfx('bounce');
    spawnSparks(b.x,b.y,8);
    combo=Math.min(combo+1,8);comboTimer=180;
    b.y=paddle.y-b.r;
  }

  // Ball lost
  if(b.y-b.r>H){
    b.active=false;
    lives--;sfx('death');
    spawnParticles(b.x,b.y,'#00ffee',20,6);
    combo=1;
    if(lives<=0){triggerGameOver();}
    else{setTimeout(resetBall,1000);}
  }

  // Ball hits pieces
  pieces.forEach(p=>{
    if(!p.alive)return;
    const dx=b.x-p.x,dy=b.y-p.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<b.r+CW*0.38){
      hitPiece(p,b);
      // Reflect
      const ang=Math.atan2(dy,dx);
      const speed=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      b.vx=Math.cos(ang)*speed*1.02;
      b.vy=Math.sin(ang)*speed*1.02;
      // Speed cap
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if(spd>8){b.vx=b.vx/spd*8;b.vy=b.vy/spd*8;}
    }
  });
}

function hitPiece(p,b){
  p.hp--;
  sfx(p.king?'kingjump':'capture');
  spawnParticles(p.x,p.y,p.team==='red'?COL.red:COL.black,10,5);
  spawnSparks(p.x,p.y,6);
  p.scale=1.3;setTimeout(()=>{if(p)p.scale=1;},100);

  if(p.hp<=0){
    p.alive=false;
    const pts=(p.king?300:100)*combo;
    score+=pts;
    sfx('explosion');
    spawnParticles(p.x,p.y,p.team==='red'?COL.red:COL.black,20,7);
    // Checker jump: if black piece, try to promote allied ball
    if(p.team==='red'&&p.king){
      score+=500*combo;
    }
    // Defender bonus: if piece was close to bottom
    if(p.row>=ROWS-1)score+=200*combo;
  }else{
    score+=25*combo;
    // Checker rule: damaged piece retreats diagonally (simulated jump)
    tryCheckerJump(p);
  }
}

function tryCheckerJump(p){
  // Move piece diagonally backward (red moves down, black moves up)
  const dirs=p.team==='red'?[[1,1],[-1,1]]:[[1,-1],[-1,-1]];
  for(const [dc,dr] of dirs){
    const nc=p.col+dc,nr=p.row+dr;
    if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS){
      const occ=pieces.find(q=>q.alive&&q.col===nc&&q.row===nr);
      if(!occ){
        p.col=nc;p.row=nr;
        p.tx=cellX(nc);p.ty=cellY(nr);
        sfx('jump');
        break;
      }
    }
  }
}

function updatePieces(dt){
  const t=performance.now();
  pieces.forEach(p=>{
    if(!p.alive)return;
    p.glowPhase+=0.04;

    // Smooth movement towards target
    p.x+=(p.tx-p.x)*0.1;
    p.y+=(p.ty-p.y)*0.1;

    // Red pieces: Defender-style descent
    if(p.team==='red'){
      p.ty+=p.descentSpeed;
      p.row=cellRow(p.ty);

      // Reached bottom of board -> player loses a life!
      if(p.ty>BOARD_TOP+BOARD_H+20){
        p.alive=false;
        lives--;sfx('death');
        spawnParticles(p.x,H-20,'#ff2244',15,5);
        if(lives<=0)triggerGameOver();
      }

      // Red pieces fire at paddle (enemy fire)
      p.fireCooldown--;
      if(p.fireCooldown<=0){
        p.fireCooldown=100+Math.random()*150-wave*5;
        eBullets.push({x:p.x,y:p.y+12,vy:3+wave*0.3});
        sfx('fire');
      }

      // Checker: red tries to move diagonally toward center/down
      p.moveTimer--;
      if(p.moveTimer<=0){
        p.moveTimer=60+Math.floor(Math.random()*80);
        tryRedMove(p);
      }
    }

    // Black pieces: try to block red
    if(p.team==='black'){
      p.moveTimer--;
      if(p.moveTimer<=0){
        p.moveTimer=80+Math.floor(Math.random()*100);
        tryBlackBlock(p);
      }
    }
  });
}

function tryRedMove(p){
  const dirs=[[1,1],[-1,1],[0,1]]; // red moves down
  for(const [dc,dr] of dirs.sort(()=>Math.random()-0.5)){
    const nc=p.col+dc,nr=p.row+dr;
    if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS){
      const occ=pieces.find(q=>q.alive&&q.col===nc&&q.row===nr);
      if(!occ){p.col=nc;p.row=nr;p.tx=cellX(nc);p.ty=cellY(nr);break;}
      // Try checker jump-capture: jump over black piece
      else if(occ.team==='black'){
        const jc=p.col+dc*2,jr=p.row+dr*2;
        if(jc>=0&&jc<COLS&&jr>=0&&jr<ROWS){
          const occ2=pieces.find(q=>q.alive&&q.col===jc&&q.row===jr);
          if(!occ2){
            occ.alive=false;
            spawnParticles(occ.x,occ.y,COL.black,12,5);sfx('jump');
            p.col=jc;p.row=jr;p.tx=cellX(jc);p.ty=cellY(jr);
            break;
          }
        }
      }
    }
  }
}

function tryBlackBlock(p){
  // Black pieces try to move toward approaching red pieces
  const reds=pieces.filter(q=>q.alive&&q.team==='red');
  if(reds.length===0)return;
  const nearest=reds.reduce((a,b)=>Math.abs(b.row-p.row)<Math.abs(a.row-p.row)?b:a);
  const dc=Math.sign(nearest.col-p.col)||0;
  const nc=p.col+dc,nr=p.row-1;
  if(nc>=0&&nc<COLS&&nr>=0&&nr<ROWS){
    const occ=pieces.find(q=>q.alive&&q.col===nc&&q.row===nr);
    if(!occ){p.col=nc;p.row=nr;p.tx=cellX(nc);p.ty=cellY(nr);}
  }
}

function updateBullets(){
  // Player bullets
  bullets=bullets.filter(b=>{
    b.y-=b.vy;
    if(b.y<0)return false;
    let hit=false;
    pieces.forEach(p=>{
      if(!p.alive||hit)return;
      const dx=b.x-p.x,dy=b.y-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<CW*0.38){
        hitPiece(p,{x:b.x,y:b.y,vx:0,vy:-1});
        hit=true;
        spawnParticles(b.x,b.y,'#ffaa00',8,4);
      }
    });
    return !hit;
  });

  // Enemy bullets
  eBullets=eBullets.filter(b=>{
    b.y+=b.vy;
    if(b.y>H)return false;
    // Hit paddle
    if(b.y>=paddle.y&&b.y<=paddle.y+paddle.h&&
       b.x>=paddle.x&&b.x<=paddle.x+paddle.w){
      if(paddle.shield>0){
        paddle.shield=0;sfx('shield');
        spawnParticles(b.x,b.y,COL.shield,10,4);
      }else{
        lives--;sfx('death');
        spawnParticles(b.x,b.y,'#ff3300',15,5);
        combo=1;
        if(lives<=0)triggerGameOver();
      }
      return false;
    }
    return true;
  });
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;
    p.life-=p.decay;return p.life>0;
  });
  sparks=sparks.filter(s=>{
    s.x+=s.vx;s.y+=s.vy;s.vx*=0.9;s.vy*=0.9;
    s.life-=s.decay;return s.life>0;
  });
}

// ─── AI ───────────────────────────────────────────────────────────────────────
function updateAI(){
  // Combo timer
  if(comboTimer>0){comboTimer--;if(comboTimer===0)combo=1;}

  // Shield recharge
  if(paddle.shield<0)paddle.shield++;

  const b=ball;

  // Predict ball landing x
  let px=b.x,py=b.y,pvx=b.vx,pvy=b.vy;
  for(let i=0;i<200;i++){
    px+=pvx;py+=pvy;
    if(px-BALL_R<0){px=BALL_R;pvx=Math.abs(pvx);}
    if(px+BALL_R>W){px=W-BALL_R;pvx=-Math.abs(pvx);}
    if(py>paddle.y)break;
  }
  ai.paddleTarget=px-PADDLE_W/2;

  // Dodge enemy bullets
  const danger=eBullets.find(eb=>
    Math.abs(eb.x-(paddle.x+PADDLE_W/2))<PADDLE_W&&
    eb.y>paddle.y-80&&eb.y<paddle.y
  );
  if(danger){
    ai.paddleTarget=danger.x<W/2?W-PADDLE_W-20:20;
  }

  // Move paddle
  const targetCX=ai.paddleTarget+PADDLE_W/2;
  const currCX=paddle.x+PADDLE_W/2;
  const diff=targetCX-currCX;
  const speed=Math.min(Math.abs(diff),5+wave*0.3);
  paddle.x+=Math.sign(diff)*speed;
  paddle.x=Math.max(0,Math.min(W-PADDLE_W,paddle.x));

  // AI fires
  ai.fireTimer--;
  if(ai.fireTimer<=0){
    ai.fireTimer=15+Math.floor(Math.random()*20);
    // Target nearest threat
    const threats=pieces.filter(p=>p.alive&&p.team==='red').sort((a,b)=>b.ty-a.ty);
    if(threats.length>0){
      const t=threats[0];
      // Aim at target
      const tx=t.x,ty=t.y;
      const cx=paddle.x+PADDLE_W/2;
      bullets.push({x:cx,y:paddle.y,vy:9+wave*0.5,
        vx:(tx-cx)/(Math.abs(ty-paddle.y)/9)*0.3});
      sfx('fire');
    }
  }

  // Activate shield if many bullets incoming
  if(eBullets.length>3&&paddle.shield===0){
    paddle.shield=30;sfx('shield');
  }
}

// ─── Wave Management ─────────────────────────────────────────────────────────
function checkWaveClear(){
  const alive=pieces.filter(p=>p.alive&&p.team==='red');
  if(alive.length===0&&!waveClear){
    waveClear=true;waveTimer=120;
    sfx('wave');
    score+=1000*wave;
    spawnParticles(W/2,H/2,'#00ffee',40,8);
    spawnParticles(W/2,H/2,'#ffd700',30,10);
    document.getElementById('msgEl').textContent='— WAVE '+wave+' CLEARED! BONUS: '+(1000*wave)+' —';
  }
  if(waveClear){
    waveTimer--;
    if(waveTimer<=0){
      wave++;waveClear=false;
      initPieces();
      resetBall();
      document.getElementById('msgEl').textContent='— WAVE '+wave+' INCOMING —';
      // King promotion: some pieces become kings
      if(wave%3===0){
        pieces.filter(p=>p.team==='red').slice(0,Math.min(wave,4)).forEach(p=>{
          p.king=true;p.hp=3;p.maxHp=3;
          p.descentSpeed+=0.03;
        });
      }
    }
  }
}

function resetBall(){
  ball.x=paddle.x+PADDLE_W/2;
  ball.y=paddle.y-20;
  const ang=-Math.PI/2+(Math.random()-0.5)*0.8;
  const spd=4.5+wave*0.2;
  ball.vx=Math.cos(ang)*spd;
  ball.vy=Math.sin(ang)*spd;
  ball.active=true;
  ball.trail=[];
  ball.heat=0;
}

function triggerGameOver(){
  gameOver=true;sfx('death');
  setTimeout(()=>{
    gameOver=false;score=0;wave=1;lives=3;combo=1;
    initPieces();resetBall();
    document.getElementById('msgEl').textContent='— NEW GAME —';
  },3000);
}

// ─── Screen Effects ───────────────────────────────────────────────────────────
function drawGameOver(){
  ctx.save();
  ctx.fillStyle='rgba(0,0,10,0.7)';ctx.fillRect(0,0,W,H);
  ctx.font='bold 48px Orbitron';ctx.textAlign='center';
  ctx.fillStyle='#ff2244';ctx.shadowColor='#ff2244';ctx.shadowBlur=30;
  ctx.fillText('GAME OVER',W/2,H/2-20);
  ctx.font='18px Orbitron';ctx.fillStyle='#00aaff';ctx.shadowColor='#00aaff';
  ctx.fillText('FINAL SCORE: '+score,W/2,H/2+30);
  ctx.restore();
}

function drawWaveClear(){
  const a=Math.sin(performance.now()/200)*0.3+0.7;
  ctx.save();ctx.globalAlpha=a;
  ctx.font='bold 36px Orbitron';ctx.textAlign='center';
  ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=20;
  ctx.fillText('WAVE CLEARED!',W/2,H/2);
  ctx.restore();
}

// ─── Main Loop ────────────────────────────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min(t-lastT,50);lastT=t;

  ctx.clearRect(0,0,W,H);
  drawBg();

  if(!gameOver){
    updateBall();
    updatePieces(dt);
    updateBullets();
    updateParticles();
    updateAI();
    checkWaveClear();
  }

  // Draw
  pieces.forEach(drawPiece);
  drawBall();
  drawBullets();
  drawParticles();
  drawPaddle();
  drawHUD();

  if(gameOver)drawGameOver();
  if(waveClear)drawWaveClear();

  requestAnimationFrame(loop);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
// Resume audio context on first interaction
document.addEventListener('click',()=>{if(AC.state==='suspended')AC.resume();},{once:true});
document.addEventListener('keydown',()=>{if(AC.state==='suspended')AC.resume();},{once:true});

initPieces();
resetBall();
requestAnimationFrame(loop);
</script>
