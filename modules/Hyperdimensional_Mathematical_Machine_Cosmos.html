<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>Hyperdimensional Mathematical Machine Cosmos</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<meta name="description" content="A generative WebGL mathematical universe where quasi crystal tilings, voronoi cells, fractal mazes, knot networks and fluid fields evolve as a mechanical cosmos of algorithmic geometry.">

<meta name="keywords" content="generative art, penrose tiling, voronoi, delaunay, fractal, maze, sacred geometry, knot, hyperbolic tiling, webgl generative engine">

<style>
html,body{margin:0;padding:0;background:black;overflow:hidden}
canvas{display:block}
#hud{
position:fixed;
top:10px;
left:10px;
font-family:monospace;
font-size:12px;
color:white;
opacity:.8;
display:none
}
</style>

</head>
<body>

<canvas id="c"></canvas>
<div id="hud"></div>

<script>

const canvas=document.getElementById("c")
const gl=canvas.getContext("webgl",{antialias:false})
const hud=document.getElementById("hud")

let W,H

function resize(){
W=canvas.width=window.innerWidth
H=canvas.height=window.innerHeight
gl.viewport(0,0,W,H)
}
window.addEventListener("resize",resize)
resize()

function rand(a=1,b=0){return Math.random()*(a-b)+b}

let start
let params

function regenerate(){

params={
seed:rand(1000),
sym:Math.floor(rand(14,4)),
scale:rand(8,1.5),
turb:rand(2,.2),
flow:rand(2,.2),
chem:rand(2,.2),
wave:rand(3,.5),
curv:rand(2,.2),
palette:Array.from({length:15},()=>rand())
}

start=performance.now()

hud.innerHTML=
"Mathematical Machine Cosmos<br>"+
"sym="+params.sym+
" scale="+params.scale.toFixed(2)

}

regenerate()

const vs=`
attribute vec2 p;
void main(){
gl_Position=vec4(p,0.,1.);
}
`

const fs=`

precision highp float;

uniform vec2 r;
uniform float t;

uniform float sym;
uniform float scale;
uniform float turb;
uniform float flow;
uniform float chem;
uniform float wave;
uniform float curv;

uniform vec3 c0;
uniform vec3 c1;
uniform vec3 c2;
uniform vec3 c3;
uniform vec3 c4;

vec2 rot(vec2 p,float a){
float c=cos(a),s=sin(a);
return vec2(c*p.x-s*p.y,s*p.x+c*p.y);
}

float hash(vec2 p){
return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);
}

float noise(vec2 p){

vec2 i=floor(p);
vec2 f=fract(p);

float a=hash(i);
float b=hash(i+vec2(1,0));
float c=hash(i+vec2(0,1));
float d=hash(i+vec2(1,1));

vec2 u=f*f*(3.-2.*f);

return mix(a,b,u.x)+(c-a)*u.y+(a-b-c+d)*u.x*u.y;

}

float voronoi(vec2 x){

vec2 n=floor(x);
vec2 f=fract(x);

float md=8.;

for(int j=-1;j<=1;j++)
for(int i=-1;i<=1;i++){

vec2 g=vec2(float(i),float(j));
vec2 o=vec2(hash(n+g),hash(n+g+1.));

vec2 r=g+o-f;

float d=dot(r,r);

md=min(md,d);

}

return sqrt(md);

}

float triangle(vec2 p){

vec2 q=vec2(
p.x*0.866025+p.y*0.5,
p.y
);

return abs(fract(q.x)-.5)+abs(fract(q.y)-.5);

}

float knot(vec2 p){

float a=atan(p.y,p.x);
float r=length(p);

float k=.2*sin(a*3.+sin(a*6.));

return smoothstep(.35+k,.37+k,r);

}

float maze(vec2 p){

p*=2.;

float m=abs(fract(p.x)-.5)+abs(fract(p.y)-.5);

return smoothstep(.45,.5,m);

}

float reaction(vec2 p,float t){

float a=noise(p*2.+t*.2);
float b=noise(p*3.-t*.1);

return sin(a*6.+b*4.);

}

void main(){

vec2 uv=(gl_FragCoord.xy/r.xy)*2.-1.;
uv.x*=r.x/r.y;

/* ONLY CHANGE: time slowed by ~67% */

float tt = t * 0.000123;

vec2 p=uv*scale;

p/=1.+curv*dot(p,p);

for(int i=0;i<5;i++){

p=rot(p,tt*.15+float(i));

p+=vec2(
noise(p+tt)*turb,
noise(p-tt)*turb
);

}

float v=voronoi(p*1.3);
float tri=triangle(p);
float mz=maze(p);
float kn=knot(p);

float chemf=reaction(p,tt*chem);

float field=
v*.6+
tri*.4+
mz*.4+
kn*.6+
chemf*.5;

float w=sin(field*6.+tt*wave);

vec3 col=
c0*sin(field*2.)+
c1*cos(field*3.)+
c2*sin(w*2.)+
c3*cos(field*4.)+
c4*sin(field*5.);

col=abs(col);

gl_FragColor=vec4(col,1.);

}
`

function compile(type,src){
let s=gl.createShader(type)
gl.shaderSource(s,src)
gl.compileShader(s)
return s
}

const prog=gl.createProgram()
gl.attachShader(prog,compile(gl.VERTEX_SHADER,vs))
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fs))
gl.linkProgram(prog)
gl.useProgram(prog)

const quad=gl.createBuffer()

gl.bindBuffer(gl.ARRAY_BUFFER,quad)
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
-1,-1,1,-1,-1,1,1,1
]),gl.STATIC_DRAW)

const loc=gl.getAttribLocation(prog,"p")
gl.enableVertexAttribArray(loc)
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0)

const U={}
;["r","t","sym","scale","turb","flow","chem","wave","curv","c0","c1","c2","c3","c4"]
.forEach(n=>U[n]=gl.getUniformLocation(prog,n))

function draw(){

let time=performance.now()-start

gl.uniform2f(U.r,W,H)
gl.uniform1f(U.t,time)

gl.uniform1f(U.sym,params.sym)
gl.uniform1f(U.scale,params.scale)
gl.uniform1f(U.turb,params.turb)
gl.uniform1f(U.flow,params.flow)
gl.uniform1f(U.chem,params.chem)
gl.uniform1f(U.wave,params.wave)
gl.uniform1f(U.curv,params.curv)

gl.uniform3f(U.c0,...params.palette.slice(0,3))
gl.uniform3f(U.c1,...params.palette.slice(3,6))
gl.uniform3f(U.c2,...params.palette.slice(6,9))
gl.uniform3f(U.c3,...params.palette.slice(9,12))
gl.uniform3f(U.c4,...params.palette.slice(12,15))

gl.drawArrays(gl.TRIANGLE_STRIP,0,4)

requestAnimationFrame(draw)

}

draw()

window.addEventListener("keydown",e=>{
if(e.code==="Space")regenerate()
if(e.key==="H"||e.key==="h"){
hud.style.display=hud.style.display==="none"?"block":"none"
}
})

canvas.addEventListener("click",regenerate)
canvas.addEventListener("touchstart",regenerate)

</script>

</body>
</html>
