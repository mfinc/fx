// ─── MAZE GENERATOR ────────────────────────────────────────────────
function generateMaze(cols, rows) {
  cols = Math.max(5, Math.min(cols, 30));
  rows = Math.max(5, Math.min(rows, 20));
  const grid = Array.from({length:rows}, ()=>Array.from({length:cols}, ()=>({visited:false,walls:[true,true,true,true]})));
  const stack = [];
  let cx=0, cy=0;
  grid[cy][cx].visited = true;
  stack.push([cx,cy]);
  while(stack.length) {
    const [x,y] = stack[stack.length-1];
    const neighbors = [];
    if(y>0&&!grid[y-1][x].visited) neighbors.push([x,y-1,0,2]);
    if(x<cols-1&&!grid[y][x+1].visited) neighbors.push([x+1,y,1,3]);
    if(y<rows-1&&!grid[y+1][x].visited) neighbors.push([x,y+1,2,0]);
    if(x>0&&!grid[y][x-1].visited) neighbors.push([x-1,y,3,1]);
    if(neighbors.length) {
      const [nx,ny,w,ow] = neighbors[Math.floor(Math.random()*neighbors.length)];
      grid[y][x].walls[w] = false;
      grid[ny][nx].walls[ow] = false;
      grid[ny][nx].visited = true;
      stack.push([nx,ny]);
    } else stack.pop();
  }
  return grid;
}

// ─── COLOR UTILITIES ───────────────────────────────────────────────
function hsl(h,s,l,a=1){return `hsla(${h},${(s*100).toFixed(1)}%,${(l*100).toFixed(1)}%,${a})`}
function hsv2rgb(h,s,v){
  h/=360; let r,g,b,i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-(f)*s),t2=v*(1-(1-f)*s);
  switch(i%6){case 0:r=v;g=t2;b=p;break;case 1:r=q;g=v;b=p;break;case 2:r=p;g=v;b=t2;break;case 3:r=p;g=q;b=v;break;case 4:r=t2;g=p;b=v;break;case 5:r=v;g=p;b=q;break;}
  return `rgb(${(r*255)|0},${(g*255)|0},${(b*255)|0})`;
}
function parseHex(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function luma(hex){const[r,g,b]=parseHex(hex);return 0.299*r+0.587*g+0.114*b;}

// ─── DRAW: TRON GAME GRID ───────────────────────────────────────────
function drawTronGrid() {
  const {gridCellW,gridCellH,gridColor,gridAlpha} = state;
  ctx.save();
  ctx.strokeStyle = gridColor;
  ctx.globalAlpha = gridAlpha + Math.sin(t*0.5)*0.03;
  ctx.lineWidth = 0.5;
  for(let x=0;x<W;x+=gridCellW){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<H;y+=gridCellH){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // Glowing intersections
  ctx.globalAlpha = gridAlpha*2;
  for(let x=0;x<W;x+=gridCellW) for(let y=0;y<H;y+=gridCellH){
    if(Math.random()<0.002){
      ctx.fillStyle=gridColor;
      ctx.fillRect(x-1,y-1,3,3);
    }
  }
  ctx.restore();
}

// ─── DRAW: MAZE ──────────────────────────────────────────────────
function drawMaze() {
  const {mazeCells,mazeCellW,mazeCellH} = state;
  if(!mazeCells||!mazeCells.length) return;
  ctx.save();
  ctx.strokeStyle = hsl(state.masterHue,0.8,0.6,0.12);
  ctx.lineWidth = 1;
  for(let row=0;row<mazeCells.length;row++){
    for(let col=0;col<mazeCells[row].length;col++){
      const x=col*mazeCellW, y=row*mazeCellH;
      const w=mazeCells[row][col].walls;
      if(w[0]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+mazeCellW,y);ctx.stroke();}
      if(w[1]){ctx.beginPath();ctx.moveTo(x+mazeCellW,y);ctx.lineTo(x+mazeCellW,y+mazeCellH);ctx.stroke();}
      if(w[2]){ctx.beginPath();ctx.moveTo(x,y+mazeCellH);ctx.lineTo(x+mazeCellW,y+mazeCellH);ctx.stroke();}
      if(w[3]){ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+mazeCellH);ctx.stroke();}
    }
  }
  ctx.restore();
}

// ─── DRAW: LIGHT CYCLES ────────────────────────────────────────────
function updateLightCycles() {
  state.lightCycles.forEach(lc => {
    const dx=[0,1,0,-1][lc.dir];
    const dy=[-1,0,1,0][lc.dir];
    lc.x+=dx*lc.speed; lc.y+=dy*lc.speed;
    if(lc.x<0)lc.x=W;if(lc.x>W)lc.x=0;
    if(lc.y<0)lc.y=H;if(lc.y>H)lc.y=0;
    lc.trail.push({x:lc.x,y:lc.y});
    if(lc.trail.length>80) lc.trail.shift();
    if(Math.random()<0.012) lc.dir=(lc.dir+[1,3][Math.floor(Math.random()*2)])%4;
  });
}

function drawLightCycles() {
  state.lightCycles.forEach(lc => {
    if(lc.trail.length<2) return;
    ctx.save();
    for(let i=1;i<lc.trail.length;i++){
      const a=(i/lc.trail.length)*0.5;
      ctx.strokeStyle=lc.color;ctx.globalAlpha=a;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(lc.trail[i-1].x,lc.trail[i-1].y);ctx.lineTo(lc.trail[i].x,lc.trail[i].y);ctx.stroke();
    }
    // Head
    ctx.globalAlpha=0.9;ctx.fillStyle=lc.color;
    ctx.fillRect(lc.x-4,lc.y-4,8,8);
    ctx.restore();
  });
}

// ─── DRAW: COLOR WHEEL ─────────────────────────────────────────────
function drawColorWheel(x,y,r,segs,speed,alpha,type,idx) {
  ctx.save();
  const angle = t*speed + idx*1.3;
  ctx.translate(x,y);
  ctx.globalAlpha=alpha;
  
  if(type===0) { // Standard HSV wheel
    for(let i=0;i<segs;i++){
      const a1=angle+(i/segs)*Math.PI*2, a2=angle+((i+1)/segs)*Math.PI*2;
      const h=(i/segs)*360;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a1,a2);ctx.closePath();
      ctx.fillStyle=hsv2rgb(h,0.9,0.9);ctx.fill();
    }
  } else if(type===1) { // CMYK subtractive rings
    for(let ring=0;ring<3;ring++){
      const rr=r*(0.4+ring*0.2);
      for(let i=0;i<segs;i++){
        const a1=angle+(i/segs)*Math.PI*2, a2=angle+((i+1)/segs)*Math.PI*2;
        const p=i/segs;
        const c=ring===0?`rgb(${(255*(1-p))|0},${(255*p)|0},${(255*(1-Math.abs(p-0.5)*2))|0})`:
                ring===1?`rgb(${(255*p)|0},${(255*(1-p))|0},255)`:
                `rgb(255,${(255*p)|0},${(255*(1-p))|0})`;
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,rr,a1,a2);
        if(ring>0)ctx.arc(0,0,r*(0.2+ring*0.2),a2,a1,true);
        ctx.closePath();ctx.fillStyle=c;ctx.fill();
      }
    }
  } else if(type===2) { // Munsell-style
    for(let i=0;i<segs;i++){
      const a1=angle+(i/segs)*Math.PI*2, a2=angle+((i+1)/segs)*Math.PI*2;
      const h=(i/segs)*360;
      for(let ri=0;ri<4;ri++){
        const r0=r*(ri/4), r1=r*((ri+1)/4);
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r1,a1,a2);ctx.arc(0,0,r0,a2,a1,true);ctx.closePath();
        ctx.fillStyle=hsv2rgb(h,0.3+ri*0.18,0.4+ri*0.15);ctx.fill();
      }
    }
  } else if(type===3) { // RYB Traditional
    const ryb=['#FF0000','#FF4500','#FF8000','#FFA500','#FFD700','#FFFF00',
               '#80FF00','#00FF00','#00FF80','#00FFFF','#0080FF','#0000FF',
               '#4000FF','#8000FF','#BF00FF','#FF00FF','#FF0080','#FF0040'];
    for(let i=0;i<ryb.length;i++){
      const a1=angle+(i/ryb.length)*Math.PI*2, a2=angle+((i+1)/ryb.length)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a1,a2);ctx.closePath();
      ctx.fillStyle=ryb[i];ctx.fill();
    }
  } else if(type===4) { // Opponent process
    for(let i=0;i<segs;i++){
      const a1=angle+(i/segs)*Math.PI*2, a2=angle+((i+1)/segs)*Math.PI*2;
      const p=i/segs;
      const r2=(Math.sin(p*Math.PI)*255)|0;
      const g2=(Math.sin((p+0.33)*Math.PI)*255)|0;
      const b2=(Math.sin((p+0.66)*Math.PI)*255)|0;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a1,a2);ctx.closePath();
      ctx.fillStyle=`rgb(${r2},${g2},${b2})`;ctx.fill();
    }
  } else if(type===5) { // Spectral
    for(let i=0;i<segs;i++){
      const a1=angle+(i/segs)*Math.PI*2, a2=angle+((i+1)/segs)*Math.PI*2;
      const wl=380+(i/segs)*400;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a1,a2);ctx.closePath();
      ctx.fillStyle=wavelengthToColor(wl);ctx.fill();
    }
  } else if(type===6) { // Tetradic
    const tetH=[0,90,180,270];
    for(let q=0;q<4;q++){
      const a1=angle+(q/4)*Math.PI*2, a2=angle+((q+1)/4)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,a1,a2);ctx.closePath();
      ctx.fillStyle=hsl(tetH[q]+state.masterHue,0.9,0.55);ctx.fill();
      // Inner split-complementary
      for(let s=0;s<segs/4;s++){
        const sa1=a1+(s/(segs/4))*(a2-a1), sa2=a1+((s+1)/(segs/4))*(a2-a1);
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r*0.5,sa1,sa2);ctx.closePath();
        ctx.fillStyle=hsl(tetH[q]+state.masterHue+30*(s%3-1),0.8,0.4+s*0.05);ctx.fill();
      }
    }
  } else { // Harmonic oscillating
    for(let i=0;i<segs;i++){
      const a1=angle+(i/segs)*Math.PI*2, a2=angle+((i+1)/segs)*Math.PI*2;
      const h=((state.masterHue+i/segs*360+Math.sin(t*0.3+i)*30)%360+360)%360;
      const rr=r*(0.5+0.5*Math.sin(t*speed*2+i*0.5));
      ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,rr,a1,a2);ctx.closePath();
      ctx.fillStyle=hsl(h,0.9,0.55);ctx.fill();
    }
  }
  
  // Outline
  ctx.globalAlpha=alpha*0.6;
  ctx.strokeStyle='#fff';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();
  
  // Center polytope marker
  ctx.globalAlpha=alpha*2;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
  
  ctx.restore();
}

function wavelengthToColor(wl) {
  let r=0,g=0,b=0;
  if(wl>=380&&wl<440){r=-(wl-440)/60;b=1;}
  else if(wl<490){g=(wl-440)/50;b=1;}
  else if(wl<510){g=1;b=-(wl-510)/20;}
  else if(wl<580){r=(wl-510)/70;g=1;}
  else if(wl<645){r=1;g=-(wl-645)/65;}
  else if(wl<=780){r=1;}
  const f=wl<420?0.3+0.7*(wl-380)/40:wl>700?0.3+0.7*(780-wl)/80:1;
  return `rgb(${(r*f*255)|0},${(g*f*255)|0},${(b*f*255)|0})`;
}

// ─── DRAW: POLYTOPE ────────────────────────────────────────────────
function drawPolytope() {
  const {polyDim,polyRotSpeed,polyScale} = state;
  ctx.save();
  ctx.translate(cx,cy);
  
  const verts4D = [];
  for(let i=0;i<16;i++){
    const x=((i&1)?1:-1)*polyScale*0.5;
    const y=((i&2)?1:-1)*polyScale*0.5;
    const z=((i&4)?1:-1)*polyScale*0.5;
    const w=((i&8)?1:-1)*polyScale*0.5;
    verts4D.push([x,y,z,w]);
  }
  
  const rotXY=t*polyRotSpeed, rotXZ=t*polyRotSpeed*0.7, rotXW=t*polyRotSpeed*0.5;
  const projected = verts4D.map(([x,y,z,w])=>{
    let [x1,y1]=[x*Math.cos(rotXY)-y*Math.sin(rotXY), x*Math.sin(rotXY)+y*Math.cos(rotXY)];
    let [x2,z1]=[x1*Math.cos(rotXZ)-z*Math.sin(rotXZ), x1*Math.sin(rotXZ)+z*Math.cos(rotXZ)];
    const d=6/(6+w*0.01);
    const vd=5/(5+z1*0.01);
    return [x2*d*vd*1.5, y1*d*vd*1.5];
  });
  
  // Draw edges
  ctx.globalAlpha=0.25;
  for(let i=0;i<16;i++) for(let j=i+1;j<16;j++){
    if(popcount(i^j)===1){
      const h=((state.masterHue+(i+j)*20)%360+360)%360;
      ctx.strokeStyle=hsl(h,0.9,0.7);ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(projected[i][0],projected[i][1]);
      ctx.lineTo(projected[j][0],projected[j][1]);ctx.stroke();
    }
  }
  // Vertices
  projected.forEach(([px,py],i)=>{
    ctx.globalAlpha=0.6;
    ctx.fillStyle=hsl((state.masterHue+i*22)%360,1,0.7);
    ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

function popcount(n){let c=0;while(n){c+=n&1;n>>=1;}return c;}

// ─── DRAW: PCB CIRCUIT ────────────────────────────────────────────
function drawPCB() {
  const {pcbNodes,pcbAlpha} = state;
  ctx.save();
  ctx.globalAlpha=pcbAlpha;
  
  // Traces between nodes
  for(let i=0;i<pcbNodes.length;i++){
    const a=pcbNodes[i], b=pcbNodes[(i+1)%pcbNodes.length];
    if(Math.hypot(a.x-b.x,a.y-b.y)<200){
      ctx.strokeStyle=a.color;ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(a.x,a.y);
      // Right-angle PCB routing
      const mx=a.x+(b.x-a.x)*0.5;
      ctx.lineTo(mx,a.y);ctx.lineTo(mx,b.y);ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }
  }
  // Nodes
  pcbNodes.forEach(n=>{
    const pulse=0.6+0.4*Math.sin(t*2+n.pulse);
    ctx.globalAlpha=pcbAlpha*pulse;
    ctx.fillStyle=n.color;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=0.5;ctx.stroke();
    // Label
    ctx.globalAlpha=pcbAlpha*0.8;ctx.fillStyle='#fff';ctx.font='7px Courier New';
    ctx.fillText(n.label,n.x+n.r+2,n.y+3);
    // Via holes
    ctx.globalAlpha=pcbAlpha;ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(n.x,n.y,n.r*0.4,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

// ─── DRAW: ASM RAIN ───────────────────────────────────────────────
function drawASMRain() {
  state.asmCols.forEach(col=>{
    col.y+=col.speed;
    col.timer++;
    if(col.y>H+50){col.y=-20;col.op=ASM_OPS[Math.floor(Math.random()*ASM_OPS.length)];}
    if(col.timer>60+Math.random()*120){
      col.op=ASM_OPS[Math.floor(Math.random()*ASM_OPS.length)];
      col.timer=0;
      col.color=ATARI[Math.floor(Math.random()*ATARI.length)];
    }
    ctx.save();ctx.globalAlpha=col.alpha;ctx.fillStyle=col.color;
    ctx.font='9px Courier New';ctx.fillText(col.op,col.x,col.y);
    // Ghost trail
    ctx.globalAlpha=col.alpha*0.3;ctx.fillText(col.op,col.x,col.y-20);
    ctx.restore();
  });
}

// ─── DRAW: ROBOT ───────────────────────────────────────────────────
function drawRobot(robot) {
  const {x,y,scale,color,accent,type,phase} = robot;
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);
  const p=t*0.8+(phase||0);
  
  ctx.globalAlpha=0.7;ctx.strokeStyle=color;ctx.lineWidth=1.5/scale;ctx.fillStyle='none';
  
  if(type===0||type===undefined) { // Classic bipedal
    // Body
    ctx.strokeRect(-10,-15,20,18);
    // Head
    ctx.strokeRect(-7,-28,14,12);
    // Eyes
    ctx.fillStyle=color;ctx.fillRect(-5,-26,4,3);ctx.fillRect(1,-26,4,3);
    // Arms
    ctx.beginPath();ctx.moveTo(-10,-12);ctx.lineTo(-18,-8+Math.sin(p)*4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,-12);ctx.lineTo(18,-8+Math.sin(p+Math.PI)*4);ctx.stroke();
    // Legs
    ctx.beginPath();ctx.moveTo(-5,3);ctx.lineTo(-5,15+Math.sin(p)*3);ctx.lineTo(-8,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(5,3);ctx.lineTo(5,15+Math.sin(p+Math.PI)*3);ctx.lineTo(8,22);ctx.stroke();
    // Antenna
    ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(0,-35);ctx.stroke();
    ctx.beginPath();ctx.arc(0,-36,2,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  } else if(type===1) { // Wheeled
    ctx.strokeRect(-14,-12,28,16);
    ctx.strokeRect(-9,-22,18,10);
    ctx.beginPath();ctx.arc(0,-26,3,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(-10,4+Math.sin(p)*2,6,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(10,4+Math.sin(p+Math.PI)*2,6,0,Math.PI*2);ctx.stroke();
    // Sensor array
    [-8,-4,0,4,8].forEach((dx,i)=>{
      ctx.fillStyle=i%2?color:'#fff';
      ctx.beginPath();ctx.arc(dx,-19,2,0,Math.PI*2);ctx.fill();
    });
  } else if(type===2) { // Spider
    for(let i=0;i<6;i++){
      const la=(i/6)*Math.PI*2+p*0.3;
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(la)*20,Math.sin(la)*20);
      ctx.lineTo(Math.cos(la)*30+Math.sin(p+i)*5,Math.sin(la)*30);
      ctx.stroke();
    }
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  } else { // Humanoid advanced
    // Torso with lattice
    for(let gy=-12;gy<=0;gy+=6){
      ctx.beginPath();ctx.moveTo(-10,gy);ctx.lineTo(10,gy);ctx.stroke();
    }
    ctx.strokeRect(-10,-18,20,22);
    ctx.strokeRect(-6,-28,12,10);
    // Visor
    const grad=ctx.createLinearGradient(-5,-27,5,-27);
    grad.addColorStop(0,color);grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.fillRect(-5,-27,10,4);
    // Limbs
    ctx.beginPath();ctx.moveTo(-10,-14);ctx.lineTo(-18+Math.cos(p)*5,-2);ctx.lineTo(-16,10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,-14);ctx.lineTo(18+Math.cos(p+Math.PI)*5,-2);ctx.lineTo(16,10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-5,4);ctx.lineTo(-6+Math.sin(p)*3,16);ctx.lineTo(-8,24);ctx.stroke();
    ctx.beginPath();ctx.moveTo(5,4);ctx.lineTo(6+Math.sin(p+Math.PI)*3,16);ctx.lineTo(8,24);ctx.stroke();
  }
  
  ctx.restore();
}

function updateRobots() {
  state.robots.forEach(r=>{
    r.x+=r.vx;r.y+=r.vy;
    if(r.x<-50)r.x=W+50;if(r.x>W+50)r.x=-50;
    if(r.y<-50)r.y=H+50;if(r.y>H+50)r.y=-50;
  });
  state.cyborgs.forEach(c=>{
    c.phase+=0.015;
  });
}

// ─── DRAW: RECOGNIZER (TRON) ───────────────────────────────────────
function drawRecognizer(rec) {
  ctx.save();ctx.translate(rec.x,rec.y);
  ctx.rotate(rec.angle+t*0.01);
  ctx.globalAlpha=0.55;ctx.strokeStyle=rec.color;ctx.lineWidth=1.5;
  const s=rec.scale;
  // Main body - trapezoidal
  ctx.beginPath();
  ctx.moveTo(-s*0.6,-s*0.8);ctx.lineTo(s*0.6,-s*0.8);
  ctx.lineTo(s*0.8,s*0.2);ctx.lineTo(-s*0.8,s*0.2);
  ctx.closePath();ctx.stroke();
  // Legs
  ctx.beginPath();ctx.moveTo(-s*0.5,s*0.2);ctx.lineTo(-s*0.7,s*0.8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*0.5,s*0.2);ctx.lineTo(s*0.7,s*0.8);ctx.stroke();
  // Eye scanner
  ctx.globalAlpha=0.9;ctx.fillStyle=rec.color;
  const ey=Math.sin(t*1.5)*s*0.2;
  ctx.fillRect(-s*0.4,-s*0.55+ey,s*0.8,s*0.1);
  // Internal structure
  ctx.globalAlpha=0.3;ctx.lineWidth=0.5;
  ctx.strokeRect(-s*0.4,-s*0.7,s*0.8,s*0.5);
  for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(-s*0.4,-s*0.7+i*s*0.15);ctx.lineTo(s*0.4,-s*0.7+i*s*0.15);ctx.stroke();}
  ctx.restore();
}

function updateRecognizers() {
  state.recognizers.forEach(r=>{
    r.x+=r.vx;r.y+=r.vy;
    r.angle+=0.005;
    if(r.x<-100)r.x=W+100;if(r.x>W+100)r.x=-100;
    if(r.y<-100)r.y=H+100;if(r.y>H+100)r.y=-100;
  });
}

// ─── DRAW: CHROMATICITY DIAGRAM ────────────────────────────────────
function drawChromaticity() {
  const {chromaPos,chromaSize} = state;
  ctx.save();ctx.translate(chromaPos.x,chromaPos.y);ctx.globalAlpha=0.3;
  
  // Horseshoe outline
  ctx.beginPath();
  for(let i=0;i<60;i++){
    const a=(i/60)*Math.PI*1.8-Math.PI*0.1;
    const r2=chromaSize*(0.4+0.5*Math.abs(Math.sin(a*1.2)));
    if(i===0)ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2);
    else ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
  }
  ctx.closePath();
  // Gradient fill
  const grd=ctx.createRadialGradient(0,0,0,0,0,chromaSize);
  for(let s=0;s<=1;s+=0.1){grd.addColorStop(s,hsl(s*360,0.9,0.55,0.4));}
  ctx.fillStyle=grd;ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=0.8;ctx.stroke();
  
  // Planckian locus
  ctx.globalAlpha=0.5;ctx.strokeStyle='#ff8800';ctx.lineWidth=1;ctx.beginPath();
  for(let i=0;i<=20;i++){
    const u=-Math.PI*0.8+i/20*Math.PI;
    const lx=Math.cos(u)*chromaSize*0.35, ly=Math.sin(u)*chromaSize*0.25;
    if(i===0)ctx.moveTo(lx,ly);else ctx.lineTo(lx,ly);
  }
  ctx.stroke();
  ctx.fillStyle='#ff8800';ctx.font='8px Courier New';ctx.fillText('PLANCKIAN LOCUS',chromaSize*0.1,-chromaSize*0.5);
  ctx.restore();
}

// ─── DRAW: HSV CONE ───────────────────────────────────────────────
function drawHSVCone() {
  const {hsvPos,hsvSize} = state;
  ctx.save();ctx.translate(hsvPos.x,hsvPos.y);ctx.globalAlpha=0.25;
  const segs=24;
  for(let i=0;i<segs;i++){
    const a1=(i/segs)*Math.PI*2, a2=((i+1)/segs)*Math.PI*2;
    const h=(i/segs)*360;
    // Outer ring
    ctx.beginPath();ctx.moveTo(0,-hsvSize);
    ctx.arc(0,0,hsvSize*0.7,a1,a2);ctx.closePath();
    ctx.fillStyle=hsl(h,0.9,0.55);ctx.fill();
    // Inner
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.arc(0,0,hsvSize*0.35,a1,a2);ctx.closePath();
    ctx.fillStyle=hsl(h,0.5,0.7);ctx.fill();
  }
  ctx.globalAlpha=0.4;ctx.strokeStyle='#fff';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.arc(0,0,hsvSize*0.7,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#888';ctx.font='8px Courier New';ctx.fillText('HSV',-10,hsvSize*0.85);
  ctx.restore();
}

// ─── DRAW: PANTONE SWATCHES ────────────────────────────────────────
function drawPantoneSwatches() {
  state.pantoneSwatches.forEach(s=>{
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);ctx.globalAlpha=0.35;
    ctx.fillStyle=s.color;ctx.fillRect(-s.w/2,-s.h/2,s.w,s.h);
    ctx.strokeStyle='#aaa';ctx.lineWidth=0.5;ctx.strokeRect(-s.w/2,-s.h/2,s.w,s.h);
    // White tab
    ctx.fillStyle='#f5f5f5';ctx.fillRect(-s.w/2,s.h/2-14,s.w,14);
    ctx.fillStyle='#333';ctx.font='6px Courier New';
    ctx.fillText(s.label,-s.w/2+2,s.h/2-4);
    ctx.restore();
  });
}

// ─── DRAW: HEATMAP ────────────────────────────────────────────────
function drawHeatmap() {
  state.heatPoints.forEach(p=>{
    ctx.save();
    const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    grd.addColorStop(0,hsl(p.hue,1,0.5,p.alpha));
    grd.addColorStop(0.5,hsl((p.hue+60)%360,0.9,0.4,p.alpha*0.5));
    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    p.hue=(p.hue+0.1)%360;
    ctx.restore();
  });
}

// ─── DRAW: ATARI COLOR STRIPS ─────────────────────────────────────
function drawAtariStrips() {
  state.atariStrips.forEach(s=>{
    ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.angle);ctx.globalAlpha=s.alpha;
    s.cols.forEach((col,i)=>{
      ctx.fillStyle=col;ctx.fillRect(i*s.size,0,s.size,s.size*2);
      // Pixel scanline effect
      ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(i*s.size,s.size,s.size,1);
    });
    ctx.restore();
  });
}

// ─── DRAW: NEURO NODES ────────────────────────────────────────────
function drawNeuroNodes() {
  // Draw connections
  state.neuroNodes.forEach((a,i)=>{
    state.neuroNodes.forEach((b,j)=>{
      if(j<=i) return;
      const dist=Math.hypot(a.x-b.x,a.y-b.y);
      if(dist<200){
        const pulse=Math.sin(t*a.freq+a.phase)*0.5+0.5;
        ctx.save();ctx.globalAlpha=0.06*pulse*(1-dist/200);
        ctx.strokeStyle=a.color;ctx.lineWidth=0.8;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        // Signal pulse on wire
        const sp=((t*1.5+i)%1);
        ctx.globalAlpha=0.3*pulse;ctx.fillStyle=a.color;
        ctx.beginPath();ctx.arc(a.x+(b.x-a.x)*sp,a.y+(b.y-a.y)*sp,2,0,Math.PI*2);ctx.fill();
        ctx.restore();
      }
    });
  });
  state.neuroNodes.forEach(n=>{
    const pulse=Math.sin(t*n.freq+n.phase)*0.3+0.7;
    ctx.save();ctx.globalAlpha=0.4*pulse;
    // Outer glow
    const grd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    grd.addColorStop(0,n.color);grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.7*pulse;ctx.fillStyle=n.color;
    ctx.beginPath();ctx.arc(n.x,n.y,4,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.5;ctx.fillStyle='#fff';ctx.font='7px Courier New';
    ctx.fillText(n.label,n.x+6,n.y+3);
    ctx.restore();
  });
}

// ─── DRAW: CYBORG ────────────────────────────────────────────────
function drawCyborg(c) {
  ctx.save();ctx.translate(c.x,c.y);ctx.scale(c.scale,c.scale);
  ctx.globalAlpha=0.6;ctx.strokeStyle=c.color;ctx.lineWidth=1.2/c.scale;
  const p=c.phase;
  
  if(c.type===0) { // Half-human half-machine
    // Human left side
    ctx.save();ctx.beginPath();ctx.rect(-40,-60,40,80);ctx.clip();
    ctx.strokeStyle='#aaa';
    ctx.beginPath();ctx.arc(0,-45,18,0,Math.PI*2);ctx.stroke();
    ctx.strokeRect(-20,-25,40,40);
    ctx.beginPath();ctx.moveTo(-15,15);ctx.lineTo(-15,50);ctx.stroke();
    ctx.restore();
    // Machine right side
    ctx.save();ctx.beginPath();ctx.rect(0,-60,40,80);ctx.clip();
    ctx.strokeStyle=c.color;
    // Circuit patterns
    for(let gy=-50;gy<20;gy+=8){
      ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(35,gy);ctx.stroke();
      ctx.beginPath();ctx.arc(35,gy,2,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeRect(5,-50,30,40);
    ctx.beginPath();ctx.moveTo(20,15+Math.sin(p)*5);ctx.lineTo(20,50);ctx.stroke();
    ctx.restore();
    // Neural implant crown
    ctx.strokeStyle=c.accent||c.color;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*18,-45+Math.sin(a)*18);
      ctx.lineTo(Math.cos(a)*25,-45+Math.sin(a)*25);ctx.stroke();
    }
  } else if(c.type===1) { // Full cyborg
    ctx.strokeRect(-15,-55,30,20);ctx.strokeRect(-20,-33,40,35);
    // Internal components
    ctx.globalAlpha=0.4;
    for(let gy=-28;gy<2;gy+=7){
      ctx.beginPath();ctx.moveTo(-15,gy);ctx.lineTo(15,gy);ctx.stroke();
    }
    ctx.strokeStyle=c.accent||c.color;
    ctx.beginPath();ctx.arc(0,-20,8,0,Math.PI*2);ctx.stroke();
    // Arms with joints
    ctx.globalAlpha=0.6;ctx.strokeStyle=c.color;
    ctx.beginPath();ctx.moveTo(-20,-20);ctx.lineTo(-35,-5+Math.sin(p)*8);
    ctx.lineTo(-30,15);ctx.stroke();
    ctx.beginPath();ctx.arc(-35,-5+Math.sin(p)*8,4,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(20,-20);ctx.lineTo(35,-5+Math.sin(p+Math.PI)*8);
    ctx.lineTo(30,15);ctx.stroke();
    ctx.beginPath();ctx.arc(35,-5+Math.sin(p+Math.PI)*8,4,0,Math.PI*2);ctx.stroke();
    // Visor
    ctx.fillStyle=c.accent||c.color;ctx.globalAlpha=0.8;
    ctx.fillRect(-10,-50+Math.sin(p*0.3)*2,20,5);
  } else { // Transhumanoid
    ctx.globalAlpha=0.5;
    // Morphic skeleton
    ctx.beginPath();
    for(let i=0;i<12;i++){
      const a=(i/12)*Math.PI*2+p*0.1;
      const r2=30+Math.sin(p+i)*10;
      if(i===0)ctx.moveTo(Math.cos(a)*r2,Math.sin(a)*r2-20);
      else ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2-20);
    }
    ctx.closePath();ctx.stroke();
    // Core
    ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(0,-20,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(0,-20,5,0,Math.PI*2);ctx.fill();
    // Data streams
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2+t*0.5;
      ctx.globalAlpha=0.2;ctx.strokeStyle=c.accent||c.color;
      ctx.beginPath();ctx.moveTo(0,-20);
      ctx.lineTo(Math.cos(a)*50,Math.sin(a)*50-20);ctx.stroke();
    }
  }
  ctx.restore();
}

// ─── DRAW: CATEGORY THEORY ────────────────────────────────────────
function drawCategoryTheory() {
  const {catNodes} = state;
  ctx.save();
  // Morphisms (arrows)
  catNodes.forEach((a,i)=>{
    catNodes.forEach((b,j)=>{
      if(j<=i||Math.random()>0.3) return;
      const dist=Math.hypot(a.x-b.x,a.y-b.y);
      if(dist<300){
        ctx.globalAlpha=0.15;ctx.strokeStyle=a.color;ctx.lineWidth=0.8;
        // Curved arrow
        ctx.beginPath();ctx.moveTo(a.x,a.y);
        const mx=(a.x+b.x)/2+(b.y-a.y)*0.2;
        const my=(a.y+b.y)/2-(b.x-a.x)*0.2;
        ctx.quadraticCurveTo(mx,my,b.x,b.y);ctx.stroke();
        // Arrowhead
        const ang=Math.atan2(b.y-my,b.x-mx);
        ctx.globalAlpha=0.2;ctx.fillStyle=a.color;
        ctx.beginPath();
        ctx.moveTo(b.x,b.y);
        ctx.lineTo(b.x-8*Math.cos(ang-0.4),b.y-8*Math.sin(ang-0.4));
        ctx.lineTo(b.x-8*Math.cos(ang+0.4),b.y-8*Math.sin(ang+0.4));
        ctx.closePath();ctx.fill();
        // Label
        ctx.fillStyle='#fff';ctx.font='8px Courier New';ctx.globalAlpha=0.2;
        ctx.fillText(CAT_LABELS[Math.floor((i+j)%CAT_LABELS.length)],mx,my);
      }
    });
  });
  // Objects
  catNodes.forEach(n=>{
    ctx.globalAlpha=0.35;
    ctx.fillStyle=n.color;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=0.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font=`${n.r}px Courier New`;ctx.globalAlpha=0.6;
    ctx.fillText(n.label,n.x-n.r*0.4,n.y+n.r*0.35);
  });
  ctx.restore();
}

// ─── DRAW: COLOR FIELDS ───────────────────────────────────────────
function drawColorFields() {
  state.colorFields.forEach(f=>{
    ctx.save();ctx.globalAlpha=f.alpha;ctx.translate(f.x,f.y);ctx.rotate(f.angle);
    const grd=ctx.createLinearGradient(-f.w/2,0,f.w/2,0);
    f.stops.forEach((col,i)=>grd.addColorStop(i/(f.stops.length-1),col));
    ctx.fillStyle=grd;ctx.fillRect(-f.w/2,-f.h/2,f.w,f.h);

  });

// ─── DRAW: STEPPED SCALES ─────────────────────────────────────────
function drawSteppedScales() {

    for(let i=0;i<s.steps;i++){
      const l=0.15+i/s.steps*0.75;
      ctx.fillStyle=hsl(s.hue,0.8,l);
      if(s.vertical) ctx.fillRect(s.x,s.y+i*s.sw,s.sw*1.5,s.sw);

// ─── DRAW: TILING ────────────────────────────────────────────────
function drawTiling() {
  const {tilingType,tilingScale,tilingAngle,tilingAlpha,tilingColor} = state;
  ctx.save();ctx.globalAlpha=tilingAlpha;ctx.strokeStyle=tilingColor;ctx.lineWidth=0.5;
  ctx.translate(cx,cy);ctx.rotate(tilingAngle+t*0.002);
  
  const range=Math.max(W,H);
  if(tilingType===0) { // Square
    for(let x=-range;x<range;x+=tilingScale)
      for(let y=-range;y<range;y+=tilingScale)
        ctx.strokeRect(x,y,tilingScale,tilingScale);
  } else if(tilingType===1) { // Hexagonal
    const hx=tilingScale*1.732, hy=tilingScale*1.5;
    for(let row=-range/hy-2;row<range/hy+2;row++)
      for(let col=-range/hx-2;col<range/hx+2;col++){
        const ox=(row%2)*hx*0.5;
        const px=col*hx+ox, py=row*hy;
        ctx.beginPath();
        for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.lineTo(px+Math.cos(a)*tilingScale,py+Math.sin(a)*tilingScale);}
        ctx.closePath();ctx.stroke();
      }
  } else if(tilingType===2) { // Triangular
    for(let y=-range;y<range;y+=tilingScale){
      for(let x=-range;x<range;x+=tilingScale){
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+tilingScale,y);ctx.lineTo(x+tilingScale/2,y+tilingScale);ctx.closePath();ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+tilingScale/2,y+tilingScale);ctx.lineTo(x+tilingScale,y);ctx.lineTo(x+tilingScale*1.5,y+tilingScale);ctx.closePath();ctx.stroke();
      }
    }
  } else if(tilingType===3) { // Penrose-inspired
    for(let i=0;i<40;i++){
      const a=(i/40)*Math.PI*2,r2=tilingScale*(1+i*0.1);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);
      ctx.lineTo(Math.cos(a+Math.PI/5)*r2*0.618,Math.sin(a+Math.PI/5)*r2*0.618);
      ctx.closePath();ctx.stroke();
    }
  } else { // Octagonal
    for(let y=-range;y<range;y+=tilingScale*2.414)
      for(let x=-range;x<range;x+=tilingScale*2.414){
        const s=tilingScale;
        ctx.beginPath();
        ctx.moveTo(x+s*0.414,y);ctx.lineTo(x+s,y);ctx.lineTo(x+s*1.414,y+s*0.414);
        ctx.lineTo(x+s*1.414,y+s);ctx.lineTo(x+s,y+s*1.414);ctx.lineTo(x+s*0.414,y+s*1.414);
        ctx.lineTo(x,y+s);ctx.lineTo(x,y+s*0.414);
        ctx.closePath();ctx.stroke();
      }
  }
  ctx.restore();
}

// ─── DRAW: PUZZLE PIECES ─────────────────────────────────────────
function drawPuzzlePiece(p) {
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle+Math.sin(t*0.3+p.x)*0.05);
  ctx.globalAlpha=0.35;ctx.fillStyle=p.color;ctx.strokeStyle='#fff';ctx.lineWidth=0.8;
  const s=p.size;
  if(p.type===0){ // Tetris L
    ctx.beginPath();ctx.rect(0,0,s,s);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.rect(0,-s,s,s);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.rect(s,-s,s,s);ctx.fill();ctx.stroke();
  } else if(p.type===1){ // Tetris T
    for(let dx=0;dx<3;dx++){ctx.beginPath();ctx.rect(dx*s-s,0,s,s);ctx.fill();ctx.stroke();}
    ctx.beginPath();ctx.rect(0,-s,s,s);ctx.fill();ctx.stroke();
  } else if(p.type===2){ // Standard jigsaw tab
    ctx.beginPath();
    ctx.moveTo(0,0);ctx.lineTo(s*0.3,0);
    ctx.bezierCurveTo(s*0.3,-s*0.3,s*0.7,-s*0.3,s*0.7,0);
    ctx.lineTo(s,0);ctx.lineTo(s,s);ctx.lineTo(0,s);
    ctx.closePath();ctx.fill();ctx.stroke();
  } else if(p.type===3){ // Hexagonal tile
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);}
    ctx.closePath();ctx.fill();ctx.stroke();
  } else { // Diamond
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s,0);ctx.lineTo(0,s);ctx.lineTo(-s,0);ctx.closePath();ctx.fill();ctx.stroke();
  }
  ctx.restore();
}

// ─── DRAW: UFO ────────────────────────────────────────────────────
function drawUFO(u) {
  ctx.save();ctx.translate(u.x,u.y+Math.sin(t*0.8+u.phase)*15);
  ctx.globalAlpha=0.5;
  // Body
  ctx.fillStyle=u.color;
  ctx.beginPath();ctx.ellipse(0,0,u.scale,u.scale*0.35,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=0.5;ctx.stroke();
  // Dome
  ctx.beginPath();ctx.ellipse(0,-u.scale*0.2,u.scale*0.45,u.scale*0.3,0,Math.PI,0);ctx.fill();ctx.stroke();
  // Lights
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+t*0.5;
    const lx=Math.cos(a)*u.scale*0.7, ly=Math.sin(a)*u.scale*0.2;
    ctx.fillStyle=i%2?'#ff0':'#0ff';
    ctx.globalAlpha=0.4+0.4*Math.sin(t*3+i);
    ctx.beginPath();ctx.arc(lx,ly,3,0,Math.PI*2);ctx.fill();
  }
  // Beam
  ctx.globalAlpha=0.1;
  const grd=ctx.createLinearGradient(0,0,0,u.scale*3);
  grd.addColorStop(0,u.color);grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.moveTo(-u.scale*0.4,u.scale*0.3);
  ctx.lineTo(-u.scale*0.8,u.scale*3);ctx.lineTo(u.scale*0.8,u.scale*3);
  ctx.lineTo(u.scale*0.4,u.scale*0.3);ctx.closePath();ctx.fill();
  ctx.restore();
  u.x+=u.vx;if(u.x<-100)u.x=W+100;if(u.x>W+100)u.x=-100;
}

// ─── DRAW: TEMPORAL WAVES ─────────────────────────────────────────

// ─── SOUND ENGINE ─────────────────────────────────────────────────
function initAudio() {
  if(AudioCtx) return;
  AudioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = AudioCtx.createGain();
  masterGain.gain.value = soundOn ? 0.05 : 0;
  masterGain.connect(AudioCtx.destination);
  
  // Ambient drone
  [55,110,165,220].forEach((freq,i)=>{
    const osc=AudioCtx.createOscillator();
    const g=AudioCtx.createGain();
    osc.type=['sine','triangle','sine','sawtooth'][i];
    osc.frequency.value=freq;
    g.gain.value=0.3/(i+1);
    osc.connect(g);g.connect(masterGain);osc.start();
  });
}

function playClick() {
  if(!soundOn||!AudioCtx) return;
  const osc=AudioCtx.createOscillator();
  const g=AudioCtx.createGain();
  osc.type='square';osc.frequency.value=440+Math.random()*880;
  g.gain.setValueAtTime(0.3,AudioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AudioCtx.currentTime+0.15);
  osc.connect(g);g.connect(masterGain);osc.start();osc.stop(AudioCtx.currentTime+0.15);
}

// ─── RESIZE ───────────────────────────────────────────────────────
function resize() {
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  cx=W/2;cy=H/2;
  if(initialized) randomize();
}

// ─── MAIN DRAW LOOP ───────────────────────────────────────────────
function draw() {
  if(!initialized){requestAnimationFrame(draw);return;}
  
  // Background — deep black with scanlines
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.fillRect(0,0,W,H);
  
  // Scanlines
  if(frame%3===0){
    ctx.save();ctx.globalAlpha=0.015;ctx.fillStyle='#000';
    for(let y=0;y<H;y+=2)ctx.fillRect(0,y,W,1);
    ctx.restore();
  }
  
  // ── LAYER 1: Tiling + Grid ───────────────────────────────────────
  drawTiling();
  drawTronGrid();
  drawMaze();
  
  // ── LAYER 2: Ambient ─────────────────────────────────────────────
  drawHeatmap();
  drawColorFields();
  drawTemporalWaves();
  
  // ── LAYER 3: Color Systems ───────────────────────────────────────
  drawAtariStrips();
  drawPantoneSwatches();
  drawSteppedScales();
  drawDeltaE();
  drawHexSwatches();
  drawCSLabels();
  
  // ── LAYER 4: Color Wheels ────────────────────────────────────────
  for(let i=0;i<state.numWheels;i++){
    const ox=state.wheelOffsets[i];
    drawColorWheel(
      cx+(ox?ox.x:0), cy+(ox?ox.y:0),
      state.wheelRadii[i], state.wheelSegs[i],
      state.wheelSpeeds[i], state.wheelAlphas[i],
      state.wheelTypes[i], i
    );
  }
  
  // ── LAYER 5: Science Diagrams ────────────────────────────────────
  drawChromaticity();
  drawHSVCone();
  drawCategoryTheory();
  
  // ── LAYER 6: Polytope ────────────────────────────────────────────
  drawPolytope();
  
  // ── LAYER 7: PCB + ASM ───────────────────────────────────────────
  drawPCB();
  drawASMRain();
  
  // ── LAYER 8: Light Cycles ────────────────────────────────────────
  updateLightCycles();
  drawLightCycles();
  
  // ── LAYER 9: TRON Recognizers ────────────────────────────────────
  updateRecognizers();
  state.recognizers.forEach(drawRecognizer);
  
  // ── LAYER 10: Robots ─────────────────────────────────────────────
  updateRobots();
  state.robots.forEach(r=>drawRobot(r));
  
  // ── LAYER 11: Cyborgs ────────────────────────────────────────────
  state.cyborgs.forEach(drawCyborg);
  
  // ── LAYER 12: Neuro + UFO ────────────────────────────────────────
  drawNeuroNodes();
  state.ufos.forEach(drawUFO);
  
  // ── LAYER 13: Puzzle Pieces ──────────────────────────────────────
  state.puzzlePieces.forEach(drawPuzzlePiece);
  
  // ── LAYER 14: Floaters ───────────────────────────────────────────
  drawTronFloaters();
  
  // ── LAYER 15: CRT vignette ───────────────────────────────────────
  const vig=ctx.createRadialGradient(cx,cy,H*0.2,cx,cy,H*0.85);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.save();ctx.globalAlpha=1;ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);ctx.restore();
  
  // Update HUD
  if(hudVisible) updateHUD();
  
  t+=0.016;frame++;
  requestAnimationFrame(draw);
}

// ─── HUD ─────────────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hud-tl').innerHTML=
    `◈ CHROMASYNTH NEXUS<br>`+
    `FPS: ~60 | T: ${t.toFixed(1)}<br>`+
    `WHEELS: ${state.numWheels}<br>`+
    `POLYTOPE: ${state.polyDim}D HYPERCUBE<br>`+
    `MASTER HUE: ${state.masterHue.toFixed(0)}°`;
  document.getElementById('hud-tr').innerHTML=
    `[SPACE/CLICK] RANDOMIZE<br>`+
    `[H] TOGGLE HUD<br>`+
    `[S] TOGGLE SOUND: ${soundOn?'ON':'OFF'}<br>`+
    `ROBOTS: ${state.robots.length}<br>`+
    `CYBORGS: ${state.cyborgs.length}`;
  document.getElementById('hud-bl').innerHTML=
    `ACTIVE SYSTEMS:<br>`+
    `HSV·HSL·CIELAB·MUNSELL·PANTONE<br>`+
    `NCS·RAL·CMYK·RYB·CHROMATICITY<br>`+
    `GAMUT·DELTA-E·SPECTRAL·OPPONENT<br>`+
    `TRON·PCB·6502-ASM·ATARI2600<br>`+
    `POLYTOPE·CATEGORY-THEORY·NEURO`;
  document.getElementById('hud-br').innerHTML=
    `TILING: ${['SQ','HEX','TRI','PENROSE','OCT'][state.tilingType]}<br>`+
    `PCB NODES: ${state.pcbNodes.length}<br>`+
    `NEURO: ${state.neuroNodes.length}<br>`+
    `RECOGNIZERS: ${state.recognizers.length}<br>`+
    `UFOS: ${state.ufos.length}`;
}

// ─── INIT ────────────────────────────────────────────────────────
function init() {
  if(initialized) return;
  initialized=true;
  initAudio();
}

// ─── EVENTS ──────────────────────────────────────────────────────
window.addEventListener('resize', resize);

window.addEventListener('keydown', e=>{
  if(e.key===' '||e.code==='Space'){
    e.preventDefault();
    playClick();
    randomize();
    initCSLabels();
  }
  if(e.key==='h'||e.key==='H'){
    hudVisible=!hudVisible;
    hud.classList.toggle('visible',hudVisible);
  }
  if(e.key==='s'||e.key==='S'){
    soundOn=!soundOn;
    initAudio();
    if(masterGain)masterGain.gain.value=soundOn?0.05:0;
  }
});

canvas.addEventListener('click', ()=>{ playClick(); randomize(); initCSLabels(); });
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); playClick(); randomize(); initCSLabels(); },{passive:false});

// Start render loop and auto-init immediately
resize();
initCSLabels();
randomize();
draw();
window.addEventListener('load', () => { initAudio(); });
</script>
</body>
</html>
