<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Category Theory Fusion Field</title>
<meta name="description" content="A surreal real-time visualization of category-theoretic color morphisms across RGB, CMYK, CIELAB, and HSV spaces with dynamic graph structures, harmonic evolution, and generative audio.">
<style>
html,body {
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family:monospace;
}
canvas { display:block; }
#hud {
  position:fixed;
  top:10px;
  left:10px;
  color:#fff;
  font-size:12px;
  background:rgba(0,0,0,0.4);
  padding:8px;
  border-radius:6px;
  display:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W, H;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// ---------- STATE ----------
let nodes = [];
let edges = [];
let time = 0;
let showHUD = false;
let soundEnabled = false;
let audioCtx, gainNode;

// ---------- COLOR SYSTEM CONVERSIONS ----------
function hsvToRgb(h,s,v){
  let f = (n, k=(n+h*6)%6)=>v - v*s*Math.max(Math.min(k,4-k,1),0);
  return [f(5),f(3),f(1)];
}

function rgbToHsv(r,g,b){
  let v=Math.max(r,g,b), c=v-Math.min(r,g,b);
  let h=c && ((v==r)?(g-b)/c:((v==g)?2+(b-r)/c:4+(r-g)/c));
  return [ (h<0?h+6:h)/6, c/v || 0, v ];
}

// simplified LAB approximation
function rgbToLab(r,g,b){
  let l = 0.2126*r + 0.7152*g + 0.0722*b;
  let a = r - g;
  let bb = g - b;
  return [l,a,bb];
}

function labToRgb(l,a,b){
  return [
    Math.min(1,Math.max(0,l + a)),
    Math.min(1,Math.max(0,l - a)),
    Math.min(1,Math.max(0,l - b))
  ];
}

// ---------- NODE ----------
class Node{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.vx=(Math.random()-0.5)*0.5;
    this.vy=(Math.random()-0.5)*0.5;
    this.h=Math.random();
    this.s=0.6+Math.random()*0.4;
    this.v=0.7+Math.random()*0.3;
    this.size=2+Math.random()*4;
  }

  update(){
    this.x += this.vx;
    this.y += this.vy;

    if(this.x<0||this.x>W) this.vx*=-1;
    if(this.y<0||this.y>H) this.vy*=-1;

    // temporal evolution
    this.h += 0.0005 + Math.sin(time*0.001)*0.0005;
    this.h %= 1;
  }

  color(){
    let [r,g,b]=hsvToRgb(this.h,this.s,this.v);
    return `rgb(${r*255},${g*255},${b*255})`;
  }

  draw(){
    ctx.beginPath();
    ctx.fillStyle=this.color();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();

    // swatch emission
    for(let i=0;i<3;i++){
      let angle = Math.random()*Math.PI*2;
      let dist = Math.random()*15;
      ctx.fillStyle=this.color();
      ctx.fillRect(
        this.x + Math.cos(angle)*dist,
        this.y + Math.sin(angle)*dist,
        2,2
      );
    }
  }
}

// ---------- EDGE ----------
class Edge{
  constructor(a,b){
    this.a=a;
    this.b=b;
    this.phase=Math.random()*Math.PI*2;
  }

  draw(){
    let dx=this.a.x-this.b.x;
    let dy=this.a.y-this.b.y;
    let d=Math.sqrt(dx*dx+dy*dy);

    let pulse = 0.5 + 0.5*Math.sin(time*0.01 + this.phase);

    let [h1]=rgbToHsv(...hsvToRgb(this.a.h,this.a.s,this.a.v));
    let h2=(h1+0.5)%1; // complementary

    let [r,g,b]=hsvToRgb(h2,0.8,pulse);

    ctx.strokeStyle=`rgba(${r*255},${g*255},${b*255},${pulse})`;
    ctx.lineWidth=1+2*pulse;

    ctx.beginPath();
    ctx.moveTo(this.a.x,this.a.y);
    ctx.lineTo(this.b.x,this.b.y);
    ctx.stroke();
  }
}

// ---------- COLOR WHEEL ----------
function drawWheel(x,y,radius,rot){
  for(let i=0;i<60;i++){
    let a1 = (i/60)*Math.PI*2 + rot;
    let a2 = ((i+1)/60)*Math.PI*2 + rot;

    let [r,g,b]=hsvToRgb(i/60,1,1);

    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.arc(x,y,radius,a1,a2);
    ctx.closePath();
    ctx.fillStyle=`rgba(${r*255},${g*255},${b*255},0.1)`;
    ctx.fill();
  }
}

// ---------- AUDIO ----------
function initAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  let osc = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();

  osc.type="sine";
  osc.frequency.value=120;

  gainNode.gain.value=0;

  osc.connect(gainNode).connect(audioCtx.destination);
  osc.start();
}

function updateAudio(intensity){
  if(!soundEnabled) return;
  gainNode.gain.value = 0.05*intensity;
}

// ---------- INIT ----------
function init(){
  nodes=[];
  edges=[];

  let n = 30 + Math.random()*20;

  for(let i=0;i<n;i++){
    nodes.push(new Node(Math.random()*W,Math.random()*H));
  }

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      if(Math.random()<0.08){
        edges.push(new Edge(nodes[i],nodes[j]));
      }
    }
  }
}
init();

// ---------- LOOP ----------
function loop(){
  requestAnimationFrame(loop);
  time++;

  ctx.fillStyle="rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,W,H);

  let intensity = edges.length / 50;

  // rotating global wheel
  drawWheel(W/2,H/2,Math.min(W,H)*0.3,time*0.002);

  // edges
  edges.forEach(e=>e.draw());

  // nodes
  nodes.forEach(n=>{
    n.update();
    n.draw();
  });

  updateAudio(intensity);

  if(showHUD){
    document.getElementById("hud").style.display="block";
    document.getElementById("hud").innerText =
`Chromatic Category Field
Nodes: ${nodes.length}
Edges: ${edges.length}
Time: ${time}
[SPACE/click] Reset
H: HUD
S: Sound`;
  } else {
    document.getElementById("hud").style.display="none";
  }
}
loop();

// ---------- CONTROLS ----------
window.addEventListener("keydown", e=>{
  if(e.code==="Space") init();
  if(e.key==="h"||e.key==="H") showHUD=!showHUD;
  if(e.key==="s"||e.key==="S"){
    soundEnabled=!soundEnabled;
    if(soundEnabled && !audioCtx) initAudio();
  }
});

window.addEventListener("click", init);
window.addEventListener("touchstart", init);

</script>
</body>
</html>
