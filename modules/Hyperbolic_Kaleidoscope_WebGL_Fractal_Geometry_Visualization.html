<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyperbolic Kaleidoscope WebGL Fractal Geometry Visualization</title>

<meta name="description" content="Hyperbolic kaleidoscope WebGL fractal geometry visualization rendering Poincaré disk tessellations, stereographic sphere projections, Coxeter group reflections, Clifford algebra rotations, spectral overlays, simplex noise turbulence, and surreal ray-marched depth.">
<meta name="keywords" content="hyperbolic kaleidoscope WebGL fractal geometry visualization, Poincare disk tessellation, Coxeter group reflections, stereographic projection sphere, Clifford algebra rotation, complex phase domain coloring, simplex noise fBm, FFT spectral overlay, SDF raymarch, modular arithmetic mapping">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000}
canvas{display:block}
#hud{
position:fixed;
top:10px;
left:10px;
color:#fff;
font-family:monospace;
font-size:12px;
background:rgba(0,0,0,.4);
padding:8px;
border-radius:6px;
}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="hud">SPACE / Click = Re-randomize<br>H = Toggle HUD<br>S = Toggle Audio</div>

<script>
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl');
let pixelRatio = Math.min(window.devicePixelRatio, 2);

function resize(){
canvas.width = innerWidth * pixelRatio;
canvas.height = innerHeight * pixelRatio;
canvas.style.width = innerWidth+"px";
canvas.style.height = innerHeight+"px";
gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize',resize);
resize();

const vert = `
attribute vec2 position;
void main(){ gl_Position = vec4(position,0.0,1.0); }
`;

const frag = `
precision highp float;

uniform vec2 resolution;
uniform float time;
uniform vec4 paramsA;
uniform vec4 paramsB;

#define PI 3.14159265359

// Hash
float hash(vec2 p){
    return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453123);
}

// 2D Simplex Noise (compact)
float noise(vec2 p){
    vec2 i=floor(p);
    vec2 f=fract(p);
    f=f*f*(3.0-2.0*f);
    float a=hash(i);
    float b=hash(i+vec2(1,0));
    float c=hash(i+vec2(0,1));
    float d=hash(i+vec2(1,1));
    return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
}

float fbm(vec2 p){
    float v=0.0;
    float a=0.5;
    for(int i=0;i<5;i++){
        v+=a*noise(p);
        p*=2.0;
        a*=0.5;
    }
    return v;
}

// Coxeter reflection in disk
vec2 reflectCox(vec2 p){
    float n = floor(paramsA.x);
    float ang = 2.0*PI/n;
    float a = atan(p.y,p.x);
    float r = length(p);
    a = mod(a, ang);
    a = abs(a-ang*0.5);
    return vec2(cos(a),sin(a))*r;
}

// Domain coloring
vec3 domainColor(vec2 z){
    float arg = atan(z.y,z.x);
    float mag = length(z);
    float hue = fract(arg/(2.0*PI) + time*0.05);
    float val = 0.5 + 0.5*cos(log(mag+1.0)*6.0);
    return vec3(
        0.5+0.5*cos(6.2831*(hue)),
        0.5+0.5*cos(6.2831*(hue+0.33)),
        0.5+0.5*cos(6.2831*(hue+0.66))
    )*val;
}

// Raymarch SDF sphere
float sdf(vec3 p){
    return length(p)-1.0;
}

float raymarch(vec3 ro, vec3 rd){
    float t=0.0;
    for(int i=0;i<40;i++){
        vec3 pos=ro+rd*t;
        float d=sdf(pos);
        if(d<0.001) return t;
        t+=d;
        if(t>6.0) break;
    }
    return -1.0;
}

void main(){
    vec2 uv=(gl_FragCoord.xy*2.0-resolution)/resolution.y;
    float t=time*0.2;

    // Morph disk and sphere
    vec2 p=uv;
    float r=length(p);
    if(r<1.0){
        p=reflectCox(p);
    }

    float sphereMix=0.5+0.5*sin(t);
    vec3 sphere=vec3(2.0*p,1.0-r*r)/(1.0+r*r);
    vec3 finalPos=mix(vec3(p,0.0),sphere,sphereMix);

    // Clifford rotation approximation
    float a=t*0.5;
    mat2 rot=mat2(cos(a),-sin(a),sin(a),cos(a));
    p=rot*p;

    // Modular mapping
    p=fract(p*paramsA.y)-0.5;

    // Noise displacement
    float h=fbm(p*3.0+paramsB.xy);
    p+=0.1*h;

    vec3 col=domainColor(p);

    // Spectral overlay
    float bands=cos(length(uv)*paramsA.z*5.0-time*2.0);
    bands=log(abs(bands)+1.0);
    col*=0.7+0.6*bands;

    // Raymarched depth shading
    vec3 ro=vec3(0,0,-3);
    vec3 rd=normalize(vec3(uv,1.5));
    float hit=raymarch(ro,rd);
    if(hit>0.0){
        col+=vec3(0.2,0.3,0.4)/(hit);
    }

    gl_FragColor=vec4(col,1.0);
}
`;

function compile(type,src){
let s=gl.createShader(type);
gl.shaderSource(s,src);
gl.compileShader(s);
return s;
}

let program=gl.createProgram();
gl.attachShader(program,compile(gl.VERTEX_SHADER,vert));
gl.attachShader(program,compile(gl.FRAGMENT_SHADER,frag));
gl.linkProgram(program);
gl.useProgram(program);

let buffer=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buffer);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([
-1,-1,1,-1,-1,1,1,1
]),gl.STATIC_DRAW);

let position=gl.getAttribLocation(program,"position");
gl.enableVertexAttribArray(position);
gl.vertexAttribPointer(position,2,gl.FLOAT,false,0,0);

let uRes=gl.getUniformLocation(program,"resolution");
let uTime=gl.getUniformLocation(program,"time");
let uA=gl.getUniformLocation(program,"paramsA");
let uB=gl.getUniformLocation(program,"paramsB");

let start=performance.now();
let paramsA,paramsB;

function randomize(){
paramsA=new Float32Array([
Math.floor(Math.random()*8+3),
Math.random()*4+2,
Math.random()*4+2,
Math.random()
]);
paramsB=new Float32Array([
Math.random()*10,
Math.random()*10,
Math.random(),
Math.random()
]);
}
randomize();

let audioCtx=null;
let osc=null;
let audioOn=false;

function toggleAudio(){
if(audioOn){
osc.stop();
audioCtx.close();
audioOn=false;
}else{
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.frequency.value=220+paramsA[0]*30;
osc.type="sine";
gain.gain.value=0.05;
osc.connect(gain).connect(audioCtx.destination);
osc.start();
audioOn=true;
}
}

window.addEventListener('keydown',e=>{
if(e.code==="Space") randomize();
if(e.key==="h"||e.key==="H"){
document.getElementById("hud").style.display=
document.getElementById("hud").style.display==="none"?"block":"none";
}
if(e.key==="s"||e.key==="S") toggleAudio();
});
window.addEventListener('click',randomize);

function render(){
let now=performance.now();
gl.uniform2f(uRes,canvas.width,canvas.height);
gl.uniform1f(uTime,(now-start)/1000);
gl.uniform4fv(uA,paramsA);
gl.uniform4fv(uB,paramsB);
gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

let frameTime=performance.now()-now;
pixelRatio = frameTime>18 ? Math.max(1,pixelRatio-0.05) : Math.min(2,pixelRatio+0.01);
resize();

requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
