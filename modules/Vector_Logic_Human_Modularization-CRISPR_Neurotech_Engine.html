<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vector-Logic Human Modularization | CRISPR Neurotech Engine</title>
    <meta name="description" content="A high-performance generative art engine merging 1980s vector-arcade aesthetics with CRISPR-based cybernetic neurotechnology and category-theory logic.">
    <meta name="keywords" content="generative art, vector arcade, CRISPR, neurotechnology, category theory, HTML5 canvas, audiovisual simulation">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; cursor: crosshair; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #hud {
            position: absolute; top: 20px; left: 20px; pointer-events: none;
            color: #0ff; font-family: 'Courier New', monospace; font-size: 11px;
            background: rgba(0, 10, 20, 0.85); padding: 15px; border-left: 2px solid #0ff;
            display: none; z-index: 10; text-transform: uppercase; line-height: 1.6;
        }
        .ui {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(0, 255, 255, 0.3); font-family: monospace; font-size: 10px;
            letter-spacing: 4px; pointer-events: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="hud">
        SYSTEM: VECTOR-LOGIC v4.0<br>
        IDENTITY_FLUX: <span id="h-flux">0</span><br>
        CRISPR_NODES: <span id="h-nodes">0</span><br>
        NEURO_MAPPING: CATEGORY-THEORY<br>
        AUDIO_STATE: <span id="h-audio">OFF</span>
    </div>
    <div class="ui">SPACE / TAP: RE-MODULARIZE | H: HUD | S: SOUND</div>
    <canvas id="c"></canvas>

<script>
/**
 * VECTOR-LOGIC HUMAN MODULARIZATION
 * A Stochastic Fusion of 80s Vector Arcades and Genetic Neuro-computation.
 */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
const hud = document.getElementById('hud');

let w, h, dpr;
let modules = [], particles = [];
let audioCtx, masterGain, filter;
let audioEnabled = false, showHud = false;
let palette = [], hueBase = Math.random() * 360;
let frame = 0;

class ModularPacket {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.baseX = x; this.baseY = y;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        this.size = 15 + Math.random() * 30;
        this.color = palette[Math.floor(Math.random() * palette.length)];
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.05;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.rotation += this.rotSpeed;
        if (this.x < 0 || this.x > w) this.vx *= -1;
        if (this.y < 0 || this.y > h) this.vy *= -1;
    }
    draw() {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1.5;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        // Vector-Arcade "Clipped" Mesh
        ctx.beginPath();
        ctx.moveTo(-this.size, -this.size);
        ctx.lineTo(this.size, -this.size);
        ctx.lineTo(this.size, this.size);
        ctx.lineTo(-this.size, this.size);
        ctx.closePath();
        ctx.moveTo(0, -this.size); ctx.lineTo(0, this.size);
        ctx.moveTo(-this.size, 0); ctx.lineTo(this.size, 0);
        ctx.stroke();
        ctx.restore();
    }
}

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    hueBase = Math.random() * 360;
    palette = Array.from({length: 4}, (_, i) => `hsl(${(hueBase + i * 90) % 360}, 100%, 60%)`);
    
    modules = Array.from({length: 12}, () => new ModularPacket(Math.random() * w, Math.random() * h));
    particles = Array.from({length: 80}, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
        c: palette[Math.floor(Math.random() * palette.length)]
    }));

    document.getElementById('h-nodes').innerText = modules.length;
}

function draw() {
    // Plasma-Wave Moiré Background
    const time = frame * 0.005;
    const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
    grad.addColorStop(0, `hsla(${(hueBase + Math.sin(time) * 50) % 360}, 80%, 10%, 1)`);
    grad.addColorStop(1, '#000');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Flowing Spectral Gradients
    ctx.globalAlpha = 0.3;
    for(let i=0; i<3; i++) {
        ctx.strokeStyle = palette[i % palette.length];
        ctx.beginPath();
        for(let x=0; x<w; x+=20) {
            let y = h/2 + Math.sin(x * 0.01 + time + i) * (h/4);
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
    ctx.globalAlpha = 1.0;

    // Optimized Particle Dynamics
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if(p.x < 0 || p.x > w) p.vx *= -1;
        if(p.y < 0 || p.y > h) p.vy *= -1;
        ctx.fillStyle = p.c;
        ctx.fillRect(p.x, p.y, 2, 2);
    });

    // Vector-Logic Modules
    modules.forEach(m => {
        m.update();
        m.draw();
        // Category-Theory "Identity" Links
        modules.forEach(other => {
            let dist = Math.hypot(m.x - other.x, m.y - other.y);
            if(dist < 150) {
                ctx.strokeStyle = m.color;
                ctx.globalAlpha = 1 - (dist / 150);
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(other.x, other.y);
                ctx.stroke();
            }
        });
    });
    ctx.globalAlpha = 1.0;

    frame++;
    if(showHud && frame % 10 === 0) document.getElementById('h-flux').innerText = (Math.random() * 100).toFixed(2);
    requestAnimationFrame(draw);
}

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    masterGain.gain.value = 0.1;
    masterGain.connect(filter);
    filter.connect(audioCtx.destination);
    
    // Deep-Space Ambient Drone
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(55, audioCtx.currentTime);
    osc.connect(masterGain);
    osc.start();

    // Pulse Generator
    setInterval(() => {
        if(!audioEnabled) return;
        const p = audioCtx.createOscillator();
        const pg = audioCtx.createGain();
        p.frequency.setValueAtTime(110 + Math.random() * 220, audioCtx.currentTime);
        pg.gain.setValueAtTime(0.05, audioCtx.currentTime);
        pg.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        p.connect(pg);
        pg.connect(masterGain);
        p.start();
        p.stop(audioCtx.currentTime + 0.5);
    }, 1000);
}

window.addEventListener('keydown', e => {
    if (e.code === 'Space') init();
    if (e.key.toLowerCase() === 'h') {
        showHud = !showHud;
        hud.style.display = showHud ? 'block' : 'none';
    }
    if (e.key.toLowerCase() === 's') {
        audioEnabled = !audioEnabled;
        if (audioEnabled) initAudio();
        if (audioCtx) audioCtx.resume();
        document.getElementById('h-audio').innerText = audioEnabled ? 'ACTIVE' : 'OFF';
        if(masterGain) masterGain.gain.setTargetAtTime(audioEnabled ? 0.1 : 0, audioCtx.currentTime, 0.1);
    }
});

window.addEventListener('mousedown', init);
window.addEventListener('resize', init);

init();
draw();
</script>
</body>
</html>
