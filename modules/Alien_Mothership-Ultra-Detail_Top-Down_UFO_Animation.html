<!DOCTYPE html>

<style>

<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hud-panel">
    <div class="hud-title">⬡ ALIEN MOTHERSHIP HUD ⬡</div>
    <div class="hud-row"><span>ROTATION</span><span class="hud-val" id="h-rot">0.00°</span></div>
    <div class="hud-row"><span>RINGS</span><span class="hud-val" id="h-rings">0</span></div>
    <div class="hud-row"><span>NODES</span><span class="hud-val" id="h-nodes">0</span></div>
    <div class="hud-row"><span>ARMS</span><span class="hud-val" id="h-arms">0</span></div>
    <div class="hud-row"><span>PALETTE</span><span class="hud-val" id="h-pal">—</span></div>
    <div class="hud-row"><span>CYCLE</span><span class="hud-val" id="h-cyc">—</span></div>
    <div class="hud-row"><span>SOUND</span><span class="hud-val" id="h-snd">OFF</span></div>
    <div class="hud-row"><span>FPS</span><span class="hud-val" id="h-fps">0</span></div>
    <div class="hud-row"><span>FRAME</span><span class="hud-val" id="h-frame">0</span></div>
  </div>
  <div id="hud-scanner">
    <canvas id="scanner-canvas"></canvas>
  </div>
  <div id="hud-keys">
    <div><span class="key">SPACE</span> / <span class="key">CLICK</span> / <span class="key">TAP</span> → RANDOMIZE</div>
    <div><span class="key">H</span> → TOGGLE HUD</div>
    <div><span class="key">S</span> → TOGGLE SOUND</div>
  </div>
</div>
<div id="flash"></div>

<script>
// ─── GLOBALS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scannerCanvas = document.getElementById('scanner-canvas');
const sctx = scannerCanvas.getContext('2d');
const hud = document.getElementById('hud');
const flashEl = document.getElementById('flash');
let W, H, cx, cy, baseR;

let hudVisible = false;
let soundOn = false;
let audioCtx = null;
let masterGain = null;
let oscillators = [];

let frame = 0;
let lastTime = 0;
let fps = 0;
let fpsCounter = 0;
let fpsTimer = 0;

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = {}; // ship state, randomized each restart

// ─── PALETTE LIBRARY ─────────────────────────────────────────────────────────
const PALETTES = [
  { name:'PLASMA',   cols:['#ff00ff','#00ffff','#ff6600','#ffff00','#ff0088','#00ff88','#8800ff','#ff4400'] },
  { name:'NEBULA',   cols:['#ff2299','#22ccff','#ff9900','#33ffcc','#aa00ff','#ffee00','#ff5533','#00ffaa'] },
  { name:'BIO',      cols:['#00ff44','#88ff00','#ffff00','#ff8800','#ff0044','#00ffcc','#44ff88','#ccff00'] },
  { name:'CRYOGEN',  cols:['#00eeff','#0088ff','#4400ff','#ff00cc','#ff0044','#ffffff','#88ccff','#0044ff'] },
  { name:'FIRE',     cols:['#ff0000','#ff4400','#ff8800','#ffcc00','#ffff00','#ff2200','#cc0000','#ff6600'] },
  { name:'VOID',     cols:['#8800ff','#4400cc','#ff00aa','#220088','#6600dd','#aa00ff','#ff44cc','#3300aa'] },
  { name:'GOLD',     cols:['#ffcc00','#ff8800','#ffff44','#ff6600','#ffaa00','#ffe000','#ff9900','#ffdd00'] },
  { name:'SPECTRAL', cols:['#ff0000','#ff7700','#ffff00','#00ff00','#0088ff','#4400ff','#ff00ff','#00ffff'] },
  { name:'QUANTUM',  cols:['#00ffff','#ff00ff','#ffff00','#00ff88','#ff0088','#88ffff','#ff88ff','#ffff88'] },
  { name:'ARCANE',   cols:['#ff33ff','#3333ff','#33ffff','#ffff33','#ff3333','#33ff33','#ff9933','#9933ff'] },
];

const CYCLE_MODES = ['SHIFT','PULSE','WAVE','FLASH','BLAZE','AURORA','SPECTRUM','CHROMATIC'];

function rnd(a, b) { return a + Math.random() * (b - a); }
function rndInt(a, b) { return Math.floor(rnd(a, b + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── RANDOMIZE STATE ─────────────────────────────────────────────────────────
function randomize() {
  const pal = pick(PALETTES);
  const cols = pal.cols;
  S = {
    palette: pal,
    cycleMode: pick(CYCLE_MODES),
    cycleSpeed: rnd(0.3, 2.2),
    // ship geometry
    numRings: rndInt(6, 12),
    numArms: rndInt(4, 10),
    numNodes: rndInt(8, 20),
    numVents: rndInt(6, 14),
    numSpires: rndInt(5, 12),
    numPetals: rndInt(3, 8),
    // rotation speeds (some clockwise, some counter)
    rotSpeed: rnd(0.0003, 0.0012),
    ringSpeeds: Array.from({length:14}, () => rnd(-0.002, 0.002)),
    armRotSpeed: rnd(-0.0008, 0.0008),
    innerRotSpeed: rnd(0.001, 0.003),
    coreRotSpeed: rnd(0.002, 0.006),
    petalRotSpeed: rnd(-0.0015, 0.0015),
    // visual
    glowIntensity: rnd(0.5, 1.0),
    ringOpacities: Array.from({length:14}, () => rnd(0.3, 0.9)),
    nodeSize: rnd(0.012, 0.028),
    ventSize: rnd(0.008, 0.018),
    spireLen: rnd(0.04, 0.1),
    coreStyle: rndInt(0, 3),
    hasHexGrid: Math.random() > 0.4,
    hasSpiral: Math.random() > 0.35,
    hasPetals: Math.random() > 0.4,
    hasOrbiters: Math.random() > 0.3,
    hasEnergyWeb: Math.random() > 0.5,
    hasPlasmaArcs: Math.random() > 0.45,
    numOrbiters: rndInt(3, 8),
    orbiterSpeeds: Array.from({length:8}, () => rnd(0.0005, 0.002) * (Math.random()>0.5?1:-1)),
    colA: cols[0], colB: cols[1], colC: cols[2], colD: cols[3],
    colE: cols[4], colF: cols[5], colG: cols[6], colH: cols[7],
    cols,
    // layered detail
    detailLayers: rndInt(3, 7),
    hexSize: rnd(0.018, 0.04),
    spiralTurns: rnd(1.5, 4.5),
    spiralArms: rndInt(2, 6),
    // plasma arc count
    arcCount: rndInt(4, 12),
    // animation offsets
    phaseOffset: rnd(0, Math.PI * 2),
    // Bokeh stars
    starCount: rndInt(60, 140),
    stars: Array.from({length:160}, () => ({
      x: Math.random(), y: Math.random(),
      r: rnd(0.5, 2.2), br: rnd(0.2, 1.0),
      sp: rnd(0.00002, 0.00012)
    })),
  };
  frame = 0;
}

// ─── COLOR HELPERS ───────────────────────────────────────────────────────────
function cycledColor(baseCol, t, idx) {
  const hsl = hexToHSL(baseCol);
  const mode = S.cycleMode;
  const spd = S.cycleSpeed;
  let h = hsl[0], s = hsl[1], l = hsl[2];
  if (mode === 'SHIFT')     h = (h + t * spd * 60 + idx * 40) % 360;
  else if (mode === 'PULSE') l = clamp(l + Math.sin(t * spd + idx) * 20, 20, 90);
  else if (mode === 'WAVE')  { h = (h + Math.sin(t * spd + idx * 0.7) * 80) % 360; }
  else if (mode === 'FLASH') { s = 40 + Math.abs(Math.sin(t * spd * 2 + idx)) * 60; }
  else if (mode === 'BLAZE') { h = (h + t * spd * 120) % 360; l = 40 + Math.sin(t * spd * 3 + idx) * 30; }
  else if (mode === 'AURORA') { h = (h + Math.cos(t * spd * 0.5 + idx * 1.2) * 120) % 360; s = 70 + Math.sin(t * spd + idx) * 30; }
  else if (mode === 'SPECTRUM') { h = (t * spd * 200 + idx * 45) % 360; }
  else if (mode === 'CHROMATIC') { h = (h + t * spd * 30 + Math.sin(t * spd * 4 + idx) * 60) % 360; }
  h = ((h % 360) + 360) % 360;
  return `hsl(${h|0},${clamp(s,20,100)|0}%,${clamp(l,10,90)|0}%)`;
}

const hslCache = {};
function hexToHSL(hex) {
  if (hslCache[hex]) return [...hslCache[hex]];
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max===r) h = ((g-b)/d + (g<b?6:0))/6;
    else if (max===g) h = ((b-r)/d + 2)/6;
    else h = ((r-g)/d + 4)/6;
  }
  const res = [h*360, s*100, l*100];
  hslCache[hex] = [...res];
  return res;
}

function alpha(col, a) {
  if (col.startsWith('hsl')) {
    return col.replace('hsl(','hsla(').replace(')',`,${a})`);
  }
  return col + Math.round(a*255).toString(16).padStart(2,'0');
}

function getColor(idx, t) {
  const base = S.cols[idx % S.cols.length];
  return cycledColor(base, t, idx);
}

// ─── GLOW HELPER ─────────────────────────────────────────────────────────────
function setGlow(col, blur) {
  ctx.shadowColor = col;
  ctx.shadowBlur = blur * S.glowIntensity;
}
function clearGlow() { ctx.shadowBlur = 0; }

// ─── DRAWING PRIMITIVES ───────────────────────────────────────────────────────
function drawGradientCircle(x, y, r, col1, col2, alpha1=1, alpha2=0) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, alpha(col1, alpha1));
  g.addColorStop(1, alpha(col2, alpha2));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
}

function drawRing(x, y, inner, outer, col, a=1, dashes=null) {
  ctx.beginPath();
  if (dashes) ctx.setLineDash(dashes); else ctx.setLineDash([]);
  ctx.arc(x, y, (inner+outer)/2, 0, Math.PI*2);
  ctx.strokeStyle = alpha(col, a);
  ctx.lineWidth = outer - inner;
  ctx.stroke();
  ctx.setLineDash([]);
}

function polygon(x, y, r, n, rot, col, fill=false, lw=1.5) {
  ctx.beginPath();
  for (let i=0;i<=n;i++) {
    const a = rot + i/n * Math.PI*2;
    const px = x + Math.cos(a)*r, py = y + Math.sin(a)*r;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  if (fill) { ctx.fillStyle = col; ctx.fill(); }
  else { ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke(); }
}

function star(x, y, r1, r2, n, rot, col, fill=false, lw=1) {
  ctx.beginPath();
  for (let i=0;i<n*2;i++) {
    const a = rot + i/(n*2) * Math.PI*2;
    const r = i%2===0 ? r1 : r2;
    const px = x + Math.cos(a)*r, py = y + Math.sin(a)*r;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
  if (fill) { ctx.fillStyle = col; ctx.fill(); }
  else { ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke(); }
}

// ─── BACKGROUND ──────────────────────────────────────────────────────────────
function drawBackground(t) {
  ctx.fillStyle = '#000008';
  ctx.fillRect(0, 0, W, H);

  // deep space nebula gradient
  const ng = ctx.createRadialGradient(cx, cy, baseR*0.3, cx, cy, baseR*2.2);
  const c0 = getColor(0, t*0.1);
  const c1 = getColor(4, t*0.08);
  ng.addColorStop(0, alpha(c0, 0.04));
  ng.addColorStop(0.5, alpha(c1, 0.025));
  ng.addColorStop(1, 'transparent');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, W, H);

  // stars
  const sc = Math.min(S.starCount, 140);
  for (let i=0;i<sc;i++) {
    const st = S.stars[i];
    const blink = 0.4 + 0.6 * Math.abs(Math.sin(t * st.sp * 1000 + i * 2.3));
    ctx.beginPath();
    ctx.arc(st.x * W, st.y * H, st.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${st.br * blink * 0.7})`;
    ctx.fill();
  }
}

// ─── HEX GRID ────────────────────────────────────────────────────────────────
function drawHexGrid(t, rot) {
  if (!S.hasHexGrid) return;
  const hs = baseR * S.hexSize;
  const cols_n = Math.ceil(baseR * 2.2 / (hs * 1.732)) + 2;
  const rows_n = Math.ceil(baseR * 2.2 / (hs * 1.5)) + 2;
  const col = getColor(5, t);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot * 0.3);
  ctx.globalAlpha = 0.07;
  ctx.strokeStyle = col;
  ctx.lineWidth = 0.6;
  for (let row = -rows_n; row < rows_n; row++) {
    for (let col2 = -cols_n; col2 < cols_n; col2++) {
      const offset = row % 2 === 0 ? 0 : hs * Math.sqrt(3) * 0.5;
      const hx = col2 * hs * Math.sqrt(3) + offset;
      const hy = row * hs * 1.5;
      if (Math.hypot(hx, hy) > baseR * 1.3) continue;
      ctx.beginPath();
      for (let vi=0;vi<6;vi++) {
        const a = vi/6*Math.PI*2 - Math.PI/6;
        const vx = hx + Math.cos(a)*hs*0.9;
        const vy = hy + Math.sin(a)*hs*0.9;
        vi===0 ? ctx.moveTo(vx,vy) : ctx.lineTo(vx,vy);
      }
      ctx.closePath(); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── SPIRAL ARMS ─────────────────────────────────────────────────────────────
function drawSpiral(t, rot) {
  if (!S.hasSpiral) return;
  const arms = S.spiralArms;
  const turns = S.spiralTurns;
  const steps = 180;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot * S.armRotSpeed * 1000 + t * S.armRotSpeed);
  for (let arm=0; arm<arms; arm++) {
    const armAngle = arm / arms * Math.PI * 2;
    ctx.beginPath();
    let first = true;
    for (let i=0; i<=steps; i++) {
      const frac = i / steps;
      const angle = armAngle + frac * turns * Math.PI * 2;
      const r = frac * baseR * 0.95;
      const px = Math.cos(angle) * r;
      const py = Math.sin(angle) * r;
      first ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      first = false;
    }
    const col = getColor(arm + 2, t);
    const g = ctx.createLinearGradient(-baseR, 0, baseR, 0);
    g.addColorStop(0, alpha(col, 0));
    g.addColorStop(0.4, alpha(col, 0.18));
    g.addColorStop(0.8, alpha(col, 0.08));
    g.addColorStop(1, alpha(col, 0));
    ctx.strokeStyle = g;
    ctx.lineWidth = baseR * 0.014;
    setGlow(col, 8);
    ctx.stroke();
    clearGlow();
  }
  ctx.restore();
}

// ─── ENERGY WEB ───────────────────────────────────────────────────────────────
function drawEnergyWeb(t, rot) {
  if (!S.hasEnergyWeb) return;
  const nodes = S.numNodes;
  const radii = [0.35, 0.6, 0.82].map(r => r * baseR);
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot + t * 0.0003);
  const pts = [];
  for (let li=0; li<radii.length; li++) {
    for (let i=0; i<nodes; i++) {
      const a = i/nodes*Math.PI*2 + li*0.31 + t*0.0002*(li+1);
      pts.push({ x: Math.cos(a)*radii[li], y: Math.sin(a)*radii[li], li });
    }
  }
  // connect nearby nodes
  ctx.lineWidth = 0.6;
  for (let i=0;i<pts.length;i++) {
    for (let j=i+1;j<pts.length;j++) {
      const d = Math.hypot(pts[i].x-pts[j].x, pts[i].y-pts[j].y);
      if (d < baseR * 0.32) {
        const col = getColor(i%8, t);
        ctx.strokeStyle = alpha(col, 0.12 * (1 - d/(baseR*0.32)));
        ctx.beginPath();
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

// ─── RINGS ───────────────────────────────────────────────────────────────────
function drawRings(t, rot) {
  const n = S.numRings;
  for (let i=0; i<n; i++) {
    const frac = (i+1) / (n+1);
    const r = frac * baseR * 0.97;
    const col = getColor(i, t);
    const rspd = S.ringSpeeds[i] || 0.001;
    const ringRot = rot + t * rspd * 1000;

    // base ring glow
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ringRot);
    setGlow(col, 14 + i * 1.5);
    drawRing(0, 0, r * 0.993, r * 1.007, col, S.ringOpacities[i] * 0.7);
    clearGlow();

    // dashed inner detail
    const dash = [baseR * 0.02 * (1 + i*0.1), baseR * 0.01];
    drawRing(0, 0, r * 0.982, r * 0.992, col, S.ringOpacities[i] * 0.4, dash);

    // ring notches / teeth
    const notches = 12 + i * 4;
    for (let k=0;k<notches;k++) {
      const a = k/notches*Math.PI*2;
      const nr = r + baseR*0.012;
      const nx = Math.cos(a)*nr, ny = Math.sin(a)*nr;
      const nr2 = r - baseR*0.012;
      const nx2 = Math.cos(a)*nr2, ny2 = Math.sin(a)*nr2;
      ctx.beginPath();
      ctx.moveTo(nx,ny); ctx.lineTo(nx2,ny2);
      ctx.strokeStyle = alpha(col, 0.5);
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // node dot
      ctx.beginPath();
      ctx.arc(nx, ny, baseR*0.004, 0, Math.PI*2);
      ctx.fillStyle = col;
      ctx.fill();
    }

    // ring glow pulsing
    const pulse = 0.5 + 0.5 * Math.sin(t * 2.1 + i * 0.8 + S.phaseOffset);
    const rg = ctx.createRadialGradient(0,0,r*0.92,0,0,r*1.08);
    rg.addColorStop(0, alpha(col, 0));
    rg.addColorStop(0.5, alpha(col, 0.06 * pulse));
    rg.addColorStop(1, alpha(col, 0));
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(0,0,r*1.08,0,Math.PI*2);
    ctx.arc(0,0,r*0.92,0,Math.PI*2,true);
    ctx.fill();

    ctx.restore();
  }
}

// ─── ARMS / SPOKES ───────────────────────────────────────────────────────────
function drawArms(t, rot) {
  const n = S.numArms;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot + t * S.armRotSpeed * 1200);
  for (let i=0; i<n; i++) {
    const a = i/n*Math.PI*2;
    const col = getColor(i+1, t);
    // main spoke
    ctx.save();
    ctx.rotate(a);
    const g = ctx.createLinearGradient(0,0,baseR*0.9,0);
    g.addColorStop(0, alpha(col,0));
    g.addColorStop(0.15, alpha(col,0.7));
    g.addColorStop(0.7, alpha(col,0.4));
    g.addColorStop(1, alpha(col,0.05));
    ctx.strokeStyle = g;
    ctx.lineWidth = baseR * 0.013;
    setGlow(col, 10);
    ctx.beginPath(); ctx.moveTo(baseR*0.05,0); ctx.lineTo(baseR*0.92,0); ctx.stroke();
    clearGlow();
    // sub-spokes
    for (let s=0; s<3; s++) {
      const frac = 0.3 + s*0.22;
      const subA = 0.12 + s*0.05;
      const len = baseR*(0.22 - s*0.04);
      ctx.beginPath();
      ctx.moveTo(baseR*frac, 0);
      ctx.lineTo(baseR*frac + Math.cos(subA)*len, Math.sin(subA)*len);
      ctx.lineWidth = baseR * 0.005;
      ctx.strokeStyle = alpha(col, 0.35);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(baseR*frac, 0);
      ctx.lineTo(baseR*frac + Math.cos(-subA)*len, Math.sin(-subA)*len);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
}

// ─── SPIRES / TURRETS ────────────────────────────────────────────────────────
function drawSpires(t, rot) {
  const n = S.numSpires;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot + t * S.innerRotSpeed * 0.6);
  for (let i=0;i<n;i++) {
    const a = i/n*Math.PI*2;
    const r = baseR * (0.45 + (i%3)*0.1);
    const sx = Math.cos(a)*r, sy = Math.sin(a)*r;
    const col = getColor(i+3, t);
    const pulse = 0.6 + 0.4 * Math.sin(t * 3.1 + i * 1.7);
    const sz = baseR * S.spireLen * pulse;

    setGlow(col, 16 * pulse);
    // spire triangle
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(a)*sz, sy + Math.sin(a)*sz);
    ctx.lineTo(sx + Math.cos(a+Math.PI*0.5)*sz*0.2, sy + Math.sin(a+Math.PI*0.5)*sz*0.2);
    ctx.lineTo(sx + Math.cos(a-Math.PI*0.5)*sz*0.2, sy + Math.sin(a-Math.PI*0.5)*sz*0.2);
    ctx.closePath();
    ctx.fillStyle = alpha(col, 0.6 * pulse);
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    clearGlow();

    // base disc
    ctx.beginPath();
    ctx.arc(sx, sy, baseR*0.022, 0, Math.PI*2);
    const dg = ctx.createRadialGradient(sx,sy,0,sx,sy,baseR*0.022);
    dg.addColorStop(0, col);
    dg.addColorStop(1, alpha(col,0));
    ctx.fillStyle = dg;
    ctx.fill();

    // energy beam upward
    const bg = ctx.createLinearGradient(sx,sy,sx+Math.cos(a)*sz*1.5, sy+Math.sin(a)*sz*1.5);
    bg.addColorStop(0, alpha(col, 0.5*pulse));
    bg.addColorStop(1, alpha(col, 0));
    ctx.strokeStyle = bg;
    ctx.lineWidth = 2.5 * pulse;
    setGlow(col, 20);
    ctx.beginPath();
    ctx.moveTo(sx,sy);
    ctx.lineTo(sx+Math.cos(a)*sz*1.8, sy+Math.sin(a)*sz*1.8);
    ctx.stroke();
    clearGlow();
  }
  ctx.restore();
}

// ─── NODES ───────────────────────────────────────────────────────────────────
function drawNodes(t, rot) {
  const n = S.numNodes;
  ctx.save();
  ctx.translate(cx, cy);
  for (let i=0;i<n;i++) {
    const speed = S.ringSpeeds[i % S.ringSpeeds.length] * 0.8;
    const a = i/n*Math.PI*2 + rot + t * speed * 900;
    const r = baseR * (0.3 + (i%4)*0.16);
    const nx = Math.cos(a)*r, ny = Math.sin(a)*r;
    const col = getColor(i, t);
    const ns = baseR * S.nodeSize;
    const pulse = 0.7 + 0.3 * Math.sin(t * 4.2 + i * 2.1);

    // outer ring
    setGlow(col, 18 * pulse);
    ctx.beginPath();
    ctx.arc(nx, ny, ns * 1.6 * pulse, 0, Math.PI*2);
    ctx.strokeStyle = alpha(col, 0.6);
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // inner fill
    const ng = ctx.createRadialGradient(nx,ny,0,nx,ny,ns*1.3);
    ng.addColorStop(0, alpha(col, 0.9*pulse));
    ng.addColorStop(0.5, alpha(col, 0.4));
    ng.addColorStop(1, alpha(col, 0));
    ctx.fillStyle = ng;
    ctx.beginPath();
    ctx.arc(nx, ny, ns*1.3, 0, Math.PI*2); ctx.fill();
    clearGlow();

    // cross detail
    ctx.strokeStyle = alpha(col, 0.5*pulse);
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(nx-ns*1.5,ny); ctx.lineTo(nx+ns*1.5,ny);
    ctx.moveTo(nx,ny-ns*1.5); ctx.lineTo(nx,ny+ns*1.5);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── VENTS ───────────────────────────────────────────────────────────────────
function drawVents(t, rot) {
  const n = S.numVents;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot * 0.7 + t * 0.0004);
  for (let i=0;i<n;i++) {
    const a = i/n*Math.PI*2;
    const r = baseR * (0.55 + (i%2)*0.08);
    const vx = Math.cos(a)*r, vy = Math.sin(a)*r;
    const col = getColor(i+6, t);
    const vs = baseR * S.ventSize;
    const pulse = 0.4 + 0.6 * Math.abs(Math.sin(t * 5 + i * 1.3));

    // vent oval
    ctx.save();
    ctx.translate(vx, vy);
    ctx.rotate(a + Math.PI/2);
    const vg = ctx.createLinearGradient(-vs, 0, vs, 0);
    vg.addColorStop(0, alpha(col, 0));
    vg.addColorStop(0.5, alpha(col, 0.8 * pulse));
    vg.addColorStop(1, alpha(col, 0));
    ctx.fillStyle = vg;
    setGlow(col, 22 * pulse);
    ctx.beginPath();
    ctx.ellipse(0, 0, vs*2, vs*0.6, 0, 0, Math.PI*2);
    ctx.fill();
    clearGlow();
    ctx.restore();

    // vent slots
    for (let s=0;s<4;s++) {
      const sa = a + Math.PI/2;
      const sd = (s-1.5)*vs*0.4;
      ctx.beginPath();
      ctx.moveTo(vx + Math.cos(sa)*sd - Math.cos(a)*vs*0.6,
                 vy + Math.sin(sa)*sd - Math.sin(a)*vs*0.6);
      ctx.lineTo(vx + Math.cos(sa)*sd + Math.cos(a)*vs*0.6,
                 vy + Math.sin(sa)*sd + Math.sin(a)*vs*0.6);
      ctx.strokeStyle = alpha(col, 0.5 * pulse);
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ─── PLASMA ARCS ─────────────────────────────────────────────────────────────
function drawPlasmaArcs(t, rot) {
  if (!S.hasPlasmaArcs) return;
  ctx.save();
  ctx.translate(cx, cy);
  const n = S.arcCount;
  for (let i=0;i<n;i++) {
    const a1 = i/n*Math.PI*2 + rot + t * 0.0005;
    const a2 = (i+1+S.numArms*0.4)/n*Math.PI*2 + rot + t * 0.0003;
    const r1 = baseR * (0.2 + (i%3)*0.25);
    const r2 = baseR * (0.3 + (i%4)*0.2);
    const x1 = Math.cos(a1)*r1, y1 = Math.sin(a1)*r1;
    const x2 = Math.cos(a2)*r2, y2 = Math.sin(a2)*r2;
    const col = getColor(i+1, t);
    const pulse = 0.5 + 0.5 * Math.abs(Math.sin(t * 6.7 + i * 2.2));

    // bezier arc
    const mx = (x1+x2)*0.5 + Math.cos(a1+0.5)*r1*0.3;
    const my = (y1+y2)*0.5 + Math.sin(a1+0.5)*r1*0.3;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.quadraticCurveTo(mx,my,x2,y2);
    const ag = ctx.createLinearGradient(x1,y1,x2,y2);
    ag.addColorStop(0, alpha(col,0.8*pulse));
    ag.addColorStop(0.5, alpha(getColor(i+3,t), 0.9*pulse));
    ag.addColorStop(1, alpha(col,0.4*pulse));
    ctx.strokeStyle = ag;
    ctx.lineWidth = 1.5 * pulse;
    setGlow(col, 14 * pulse);
    ctx.stroke();
    clearGlow();
  }
  ctx.restore();
}

// ─── PETALS ──────────────────────────────────────────────────────────────────
function drawPetals(t, rot) {
  if (!S.hasPetals) return;
  const n = S.numPetals;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot + t * S.petalRotSpeed * 1200);
  for (let i=0;i<n;i++) {
    const a = i/n*Math.PI*2;
    const col = getColor(i+2, t);
    const r = baseR * 0.72;
    const pw = baseR * 0.09;
    const pulse = 0.7 + 0.3 * Math.sin(t*2.3 + i*1.2);
    ctx.save();
    ctx.rotate(a);
    const pg = ctx.createLinearGradient(0,0,r,0);
    pg.addColorStop(0, alpha(col,0));
    pg.addColorStop(0.3, alpha(col, 0.25*pulse));
    pg.addColorStop(0.7, alpha(col, 0.15*pulse));
    pg.addColorStop(1, alpha(col,0));
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(r*0.3, pw*pulse, r*0.7, pw*pulse, r, 0);
    ctx.bezierCurveTo(r*0.7, -pw*pulse, r*0.3, -pw*pulse, 0, 0);
    ctx.fill();
    ctx.strokeStyle = alpha(col, 0.4*pulse);
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(r*0.1,0); ctx.lineTo(r*0.92,0);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

// ─── ORBITERS ────────────────────────────────────────────────────────────────
function drawOrbiters(t, rot) {
  if (!S.hasOrbiters) return;
  const n = S.numOrbiters;
  for (let i=0;i<n;i++) {
    const spd = S.orbiterSpeeds[i] || 0.001;
    const a = rot + t * spd * 1000 + i/n*Math.PI*2;
    const r = baseR * (1.05 + i*0.04);
    const ox = cx + Math.cos(a)*r, oy = cy + Math.sin(a)*r;
    const col = getColor(i+4, t);
    const os = baseR * 0.025;
    const pulse = 0.6 + 0.4*Math.sin(t*3+i*2);
    setGlow(col, 20*pulse);
    // orbiter body
    ctx.beginPath();
    ctx.arc(ox,oy,os,0,Math.PI*2);
    const og = ctx.createRadialGradient(ox,oy,0,ox,oy,os);
    og.addColorStop(0,col); og.addColorStop(1,alpha(col,0));
    ctx.fillStyle = og; ctx.fill();
    // trail
    const tlen = 16;
    for (let ti=1;ti<=tlen;ti++) {
      const ta = a - ti*0.04*Math.sign(spd);
      const tx = cx + Math.cos(ta)*r, ty = cy + Math.sin(ta)*r;
      ctx.beginPath();
      ctx.arc(tx,ty,os*(1-ti/tlen)*0.8,0,Math.PI*2);
      ctx.fillStyle = alpha(col, 0.6*(1-ti/tlen)*pulse);
      ctx.fill();
    }
    clearGlow();
    // orbiter wings
    ctx.save();
    ctx.translate(ox,oy);
    ctx.rotate(a+Math.PI/2);
    ctx.strokeStyle = alpha(col,0.6*pulse);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-os*2.5,0); ctx.lineTo(os*2.5,0);
    ctx.stroke();
    ctx.restore();
  }
}

// ─── INNER CORE RINGS ────────────────────────────────────────────────────────
function drawInnerCore(t, rot) {
  const layers = S.detailLayers;
  ctx.save();
  ctx.translate(cx, cy);
  // multiple counter-rotating inner rings
  for (let l=0;l<layers;l++) {
    const frac = 0.05 + l/(layers+1)*0.22;
    const r = baseR * frac;
    const col = getColor(l, t);
    const lrot = rot + t * S.innerRotSpeed * (l%2===0?1:-1) * (1+l*0.3) * 800;
    ctx.save();
    ctx.rotate(lrot);
    const sides = 6 + l*2;
    setGlow(col, 10 + l*3);
    polygon(0,0,r,sides,0,col,false,1.8);
    polygon(0,0,r*0.82,sides,Math.PI/sides,alpha(col,0.5),false,0.8);
    // rotating dashes on polygon
    const dashCount = sides*2;
    for (let d=0;d<dashCount;d++) {
      const da = d/dashCount*Math.PI*2;
      const dr = r * 1.05;
      ctx.beginPath();
      ctx.arc(0,0,dr,da,da+Math.PI*0.015);
      ctx.strokeStyle = alpha(col,0.7);
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    clearGlow();
    ctx.restore();
  }
  ctx.restore();
}

// ─── PLASMA CORE ─────────────────────────────────────────────────────────────
function drawPlasmaCore(t, rot) {
  const cr = baseR * 0.18;
  const col = getColor(0, t);
  const col2 = getColor(3, t);
  const col3 = getColor(6, t);
  const pulse = 0.8 + 0.2*Math.sin(t*8 + S.phaseOffset);
  const crot = t * S.coreRotSpeed * 1000;

  ctx.save();
  ctx.translate(cx, cy);

  // outer glow halo
  const hg = ctx.createRadialGradient(0,0,cr*0.5,0,0,cr*2.5);
  hg.addColorStop(0, alpha(col, 0.18*pulse));
  hg.addColorStop(0.5, alpha(col2, 0.08*pulse));
  hg.addColorStop(1, alpha(col3, 0));
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(0,0,cr*2.5,0,Math.PI*2); ctx.fill();

  // rotating core shape
  ctx.rotate(crot);
  if (S.coreStyle === 0) {
    // star core
    setGlow(col, 30*pulse);
    star(0,0,cr,cr*0.55,8,0,col,true);
    star(0,0,cr*0.72,cr*0.38,8,Math.PI/8,col2,true);
    clearGlow();
  } else if (S.coreStyle === 1) {
    // hex core
    setGlow(col, 28*pulse);
    polygon(0,0,cr,6,0,col,true);
    polygon(0,0,cr*0.7,6,Math.PI/6,col2,true);
    polygon(0,0,cr*0.4,6,0,col3,true);
    clearGlow();
  } else if (S.coreStyle === 2) {
    // petal burst
    for (let i=0;i<12;i++) {
      const a = i/12*Math.PI*2;
      setGlow(getColor(i,t), 20*pulse);
      ctx.beginPath();
      ctx.ellipse(Math.cos(a)*cr*0.5, Math.sin(a)*cr*0.5, cr*0.35, cr*0.1, a, 0, Math.PI*2);
      ctx.fillStyle = alpha(getColor(i,t), 0.55*pulse);
      ctx.fill();
      clearGlow();
    }
  } else {
    // ring stack
    for (let i=0;i<5;i++) {
      const ir = cr * (0.2+i*0.18);
      setGlow(getColor(i*2,t), 12*pulse);
      ctx.beginPath(); ctx.arc(0,0,ir,0,Math.PI*2);
      ctx.strokeStyle = getColor(i,t);
      ctx.lineWidth = 2.5; ctx.stroke();
      clearGlow();
    }
  }

  // bright center dot
  setGlow('#ffffff', 40*pulse);
  const cg = ctx.createRadialGradient(0,0,0,0,0,cr*0.25);
  cg.addColorStop(0,'rgba(255,255,255,0.95)');
  cg.addColorStop(0.5,alpha(col,0.6));
  cg.addColorStop(1,alpha(col,0));
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(0,0,cr*0.25,0,Math.PI*2); ctx.fill();
  clearGlow();

  ctx.restore();
}

// ─── OUTER DETAIL RING ───────────────────────────────────────────────────────
function drawOuterDetail(t, rot) {
  const r = baseR * 1.02;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot * 0.5);
  // segmented outer hull
  const segs = 64;
  for (let i=0;i<segs;i++) {
    const a1 = i/segs*Math.PI*2;
    const a2 = (i+0.85)/segs*Math.PI*2;
    const col = getColor(Math.floor(i/8), t);
    const pulse = 0.3 + 0.7*Math.abs(Math.sin(t*1.5+i*0.4));
    ctx.beginPath();
    ctx.arc(0,0,r,a1,a2);
    ctx.arc(0,0,r*0.96,a2,a1,true);
    ctx.closePath();
    ctx.fillStyle = alpha(col, 0.15*pulse);
    ctx.fill();
    ctx.strokeStyle = alpha(col, 0.35*pulse);
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
  ctx.restore();
}

// ─── SCANNER MINIMAP ─────────────────────────────────────────────────────────
function drawScanner(t, rot) {
  const sw = scannerCanvas.width, sh = scannerCanvas.height;
  sctx.clearRect(0,0,sw,sh);
  sctx.fillStyle = 'rgba(0,20,10,0.8)';
  sctx.beginPath(); sctx.arc(sw/2,sh/2,sw/2,0,Math.PI*2); sctx.fill();
  // scan line
  const scanAngle = (t * 1.5) % (Math.PI*2);
  const sg = sctx.createConicalGradient ? null : null;
  sctx.save();
  sctx.translate(sw/2,sh/2);
  sctx.rotate(scanAngle);
  const slg = sctx.createLinearGradient(0,0,sw/2,0);
  slg.addColorStop(0,'rgba(0,255,100,0.5)');
  slg.addColorStop(1,'rgba(0,255,100,0)');
  sctx.fillStyle = slg;
  sctx.beginPath(); sctx.moveTo(0,0);
  sctx.arc(0,0,sw/2,-0.4,0); sctx.closePath(); sctx.fill();
  // mini rings
  for (let i=0;i<4;i++) {
    sctx.beginPath();
    sctx.arc(0,0,sw*0.1*(i+1),0,Math.PI*2);
    sctx.strokeStyle = `rgba(0,255,100,${0.15+i*0.05})`;
    sctx.lineWidth = 0.5; sctx.stroke();
  }
  // cross
  sctx.strokeStyle='rgba(0,255,100,0.4)'; sctx.lineWidth=0.5;
  sctx.beginPath(); sctx.moveTo(-sw/2,0); sctx.lineTo(sw/2,0);
  sctx.moveTo(0,-sh/2); sctx.lineTo(0,sh/2); sctx.stroke();
  sctx.restore();
  // border
  sctx.beginPath(); sctx.arc(sw/2,sh/2,sw/2-1,0,Math.PI*2);
  sctx.strokeStyle='rgba(0,255,100,0.4)'; sctx.lineWidth=1.5; sctx.stroke();
}

// ─── SOUND ────────────────────────────────────────────────────────────────────
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.08;
  masterGain.connect(audioCtx.destination);
}

function startSound() {
  if (!soundOn) return;
  initAudio();
  stopSound();
  const freqs = [55, 110, 165, 220, 440];
  freqs.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = ['sine','triangle','sine','sawtooth','sine'][i];
    osc.frequency.value = freq;
    g.gain.value = [0.4,0.15,0.1,0.03,0.02][i];
    osc.connect(g); g.connect(masterGain);
    osc.start();
    oscillators.push(osc);
  });
}

function stopSound() {
  oscillators.forEach(o => { try { o.stop(); } catch(e){} });
  oscillators = [];
}

function updateSound(t) {
  if (!soundOn || !audioCtx || oscillators.length < 1) return;
  const pulse = 0.7 + 0.3*Math.sin(t*2.1);
  if (masterGain) masterGain.gain.value = 0.06 * pulse;
  if (oscillators[0]) {
    oscillators[0].frequency.value = 55 + Math.sin(t*0.5)*8;
  }
}

// ─── RESIZE ────────────────────────────────────────────────────────────────
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  baseR = Math.min(W, H) * 0.44;
  scannerCanvas.width = scannerCanvas.height = 110;
}

// ─── HUD UPDATE ───────────────────────────────────────────────────────────────
function updateHUD(t, rot) {
  if (!hudVisible) return;
  document.getElementById('h-rot').textContent = ((rot*180/Math.PI)%360).toFixed(1)+'°';
  document.getElementById('h-rings').textContent = S.numRings;
  document.getElementById('h-nodes').textContent = S.numNodes;
  document.getElementById('h-arms').textContent = S.numArms;
  document.getElementById('h-pal').textContent = S.palette.name;
  document.getElementById('h-cyc').textContent = S.cycleMode;
  document.getElementById('h-snd').textContent = soundOn ? 'ON' : 'OFF';
  document.getElementById('h-fps').textContent = fps.toFixed(0);
  document.getElementById('h-frame').textContent = frame;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let rot = 0;
function loop(now) {
  requestAnimationFrame(loop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  const t = now / 1000;
  frame++;

  // FPS
  fpsCounter++;
  fpsTimer += dt;
  if (fpsTimer >= 0.5) { fps = fpsCounter / fpsTimer; fpsCounter = 0; fpsTimer = 0; }

  rot += S.rotSpeed * dt * 60;

  // Draw
  drawBackground(t);
  drawHexGrid(t, rot);
  drawSpiral(t, rot);
  drawEnergyWeb(t, rot);
  drawPetals(t, rot);
  drawOuterDetail(t, rot);
  drawRings(t, rot);
  drawArms(t, rot);
  drawPlasmaArcs(t, rot);
  drawVents(t, rot);
  drawSpires(t, rot);
  drawNodes(t, rot);
  drawInnerCore(t, rot);
  drawPlasmaCore(t, rot);
  drawOrbiters(t, rot);

  if (hudVisible) {
    drawScanner(t, rot);
    updateHUD(t, rot);
  }

  if (soundOn) updateSound(t);
}

// ─── RESTART ─────────────────────────────────────────────────────────────────
function restart() {
  flashEl.classList.add('active');
  setTimeout(() => flashEl.classList.remove('active'), 80);
  randomize();
  if (soundOn) startSound();
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); restart(); }
  else if (e.key === 'h' || e.key === 'H') {
    hudVisible = !hudVisible;
    hud.classList.toggle('visible', hudVisible);
  }
  else if (e.key === 's' || e.key === 'S') {
    soundOn = !soundOn;
    if (soundOn) startSound();
    else stopSound();
  }
});
canvas.addEventListener('click', restart);
canvas.addEventListener('touchend', e => { e.preventDefault(); restart(); }, { passive: false });

// ─── INIT ─────────────────────────────────────────────────────────────────────
resize();
randomize();
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
